 # Innovations
 innovation_RICE_songlines:0 "Songlines"
 innovation_RICE_songlines_desc:0 "Songlines, expressed thorugh song cycles, stories, dance, art, and religious ceremonies, are an integral part of the traditional knowledge of the indigenous peoples of Australia and function like an oral encyclopedia of useful information. They often trace the journeys of ancestral beings as they created the land, animals, plants, and humans, and different parts of songlines might even be in different languages, linking disparate groups together."
 innovation_RICE_fire_stick_farming:0 "Fire Stick Farming"
 innovation_RICE_fire_stick_farming_desc:0 "It is limiting to think of fire as merely a destructive force. Through clever use of carefully controlled burning, the indigenous peoples of Australia can facilitate hunting, reduce hazards, and even change the composition of plants and animals in an area's ecosystem."












