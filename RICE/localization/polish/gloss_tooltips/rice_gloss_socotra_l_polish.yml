 SEVEN_SEAS_GLOSS: "Although popularly associated with stereotypical pirates from the Golden Age of Piracy, the #Bold Seven Seas#! as a figurative term for the entirety of the world's oceans dates back to ancient times. During the ancient and medieval period, the list of “Seven Seas” varied depending on who you asked. Medieval Arabic literature, for instance, defined the Seven Seas as the Persian Gulf, Arabian Sea, the Bay of Bengal, the Strait of Malacca, the Singapore Strait, the Gulf of Thailand, and the South China Sea."
 ERYTHRAEAN_SEA_GLOSS: "The ancient Greeks used the term #Bold Erythraean Sea#! to describe the waters of the Gulf of Aden (between Yemen and the Horn of Africa), and sometimes even beyond that, including the Red Sea, Persian Gulf, Arabian Sea, and parts of the Indian Ocean."