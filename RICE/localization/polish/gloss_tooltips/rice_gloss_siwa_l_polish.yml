 KHARSHIF_GLOSS: "#Bold Kharshif#! is a building material unique to Siwa Oasis in the Western Desert of Egypt that consists of calcified salt blocks mixed with clay, mud, sand. These salt blocks have been traditionally used to construct a variety of buildings, thanks to their durability and ability to help maintain a cool temperate in the hot climate. Much of Shali Fortress, a late medieval fortress that protected Siwa Oasis for centuries, was constructed with Kharshif blocks for instance."