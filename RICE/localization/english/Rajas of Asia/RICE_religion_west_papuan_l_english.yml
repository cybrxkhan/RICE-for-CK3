 abui_pagan_desc:0 "The many gods and ancestral spirits mostly serve two main gods, Lamòling and Lahatàla. Lamòling sits at the hierarchy of gods, a primordial creator of all things, who often takes the form of an animal or human to interact with the material world, though he sometimes acts as a Trickster. Lahatàla, a newer god, dwells in the sky, and rarely takes physical form; instead, he communicates with people by entering their bodies to possess them."

