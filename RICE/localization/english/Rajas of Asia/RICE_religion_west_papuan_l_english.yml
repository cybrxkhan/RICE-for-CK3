 tehit_pagan_adherent:0 "Wuonist"
 tehit_pagan_adherent_plural:0 "Wuonists"
 tehit_pagan_desc:0 "Wuon is the name of a benevolent secret cult, as well as the helpful knowledge they bring to humanity. The Wuon consists of a select group initiated men who exchange ritual goods and pass down knowledge about the origins of the world, how to communicate with sky beings, and ways to combat the Wuon's evil counterpart, Lait. Unlike Wuon knowledge, Lait knowledge is evil, for it requires human sacrifice and killing, and is often practiced by ignorant women. One must avoid being tainted by Lait at all costs."

