 biak_pagan_desc:0 "Long ago, the savior Manarmakeri and his son Konor Manarbew, the Prince of Peace of virgin birth, departed from the islands of the Biak people, leaving behind sacred laws for his people to follow to avoid calamity, and wait until he would return generations later to usher in Koreri, an age of endless joy, prosperity, and peace on Papua. Followers of this faith also believe in the power of #italic korwars#!, ancestral spirits, who assist them in their endeavors, like ambitious voyages to faraway lands to gain fame, glory, and riches, through #italic Wor#! ceremonies."

