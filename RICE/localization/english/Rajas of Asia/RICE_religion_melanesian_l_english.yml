 # Manus island/people - catch-all for the Admiralty Islands

 manus_pagan:0 "Sir Ghost Cult" # 
 manus_pagan_adj:0 "Sir Ghostist"
 manus_pagan_adherent:0 "Sir Ghostist"
 manus_pagan_adherent_plural:0 "Sir Ghostists"
 manus_pagan_desc:0 "Among the native people of Manus, religious worship centers around the veneration of one's deceased paternal ancestors, especially one's father, who is known as #italic Moen Palit#!, or “Sir Ghost.” The skull of one's father (or forebear) is kept in a secure area in one's home to ask for advice, fortune, and protection from harm and illness."

