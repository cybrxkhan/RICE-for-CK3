 # Tolai - Bismarck Archipelago Catch-all

 tolai_pagan:0 "Duk-Duk Society" # Duk-Duk = male spirits, Tubuan = female spirits, who members of the Duk-Duk society adapt during rituals through masks
 tolai_pagan_adj:0 "Duk-Dukist"
 tolai_pagan_adherent:0 "Duk-Dukist"
 tolai_pagan_adherent_plural:0 "Duk-Dukists"
 tolai_pagan_desc:0 "The Duk-Duk secret society engages in spiritual dances where they adapt the costumes and masks associated with male spirits called #italic Duk-Duk#! and female spirits called #italic Tubuan#!, to carry out justice and manage their communities. A person's goal in life is to acquire as much wealth (such as through shell money); those who can distribute greatly when they die will have a good afterlife, while those who have nothing to give to their heirs are condemned to wander in misery forever."

 tolai_pagan_old:0 "Old Duk-Duk Society"
 tolai_pagan_old_adj:0 "Old Duk-Dukist"
 tolai_pagan_old_adherent:0 "Old Duk-Dukist"
 tolai_pagan_old_adherent_plural:0 "Old Duk-Dukists"
 tolai_pagan_old_desc:0 "$tolai_pagan_desc$"

