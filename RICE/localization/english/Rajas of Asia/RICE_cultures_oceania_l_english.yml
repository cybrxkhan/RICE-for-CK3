 # Innovations
 innovation_RICE_sasi:0 "Sasi"
 innovation_RICE_sasi_desc:0 "The Sasi ceremony is used to close an area or type of resource for a period of time, to protect them from overexploitation and preserve the environment."
 innovation_RICE_quipu:0 "Quipu"
 innovation_RICE_quipu_desc:0 "A system of record-keeping using knotted cords is common throughout some civilizations high in the Andean mountains. The cords categorize information based on a variety of factors, including the color, order, and number of the knots."
 innovation_RICE_andean_roads:0 "Andean Roads"
 innovation_RICE_andean_roads_desc:0 "The rugged Andean mountains prove to be no barrier, if one is willing to dedicate the time and resources to develop a complex network of roads, waystations, and messengers."
 innovation_RICE_pacific_navigation:0 "Pacific Navigation"
 innovation_RICE_pacific_navigation_desc:0 "Long-distance sailing in the Pacific is difficult, but not impossible. Navigating the great ocean requires not only courage, willpower, and luck, but also extensive knowledge of the stars, ocean swells, wind and weather patterns, and observation of animals like birds and fish."

