 trait_RICE_stone_money_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is in possession of at least one [Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )] of modest value, as recorded in oral tradition."
 trait_RICE_stone_money_2:0 "Rai Stone Proprietor"
 trait_RICE_stone_money_2_desc:0 "This character is in possession of [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] of decent value, as recorded in oral tradition."
 trait_RICE_stone_money_2_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is in possession of [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] of decent value, as recorded in oral tradition."
 trait_RICE_stone_money_3:0 "Rai Stone Magnate"
 trait_RICE_stone_money_3_desc:0 "This character is in possession of [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] of notable, great value, as recorded in oral tradition."
 trait_RICE_stone_money_3_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is in possession of [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] of notable, great value, as recorded in oral tradition."
 trait_RICE_stone_money_4:0 "Rai Stone Tycoon"
 trait_RICE_stone_money_4_desc:0 "This character has accumulated one of if not the most valuable collection of [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] of anyone alive, as recorded in oral tradition."
 trait_RICE_stone_money_4_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has accumulated one of if not the most valuable collection of [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] of anyone alive, as recorded in oral tradition."
 trait_track_RICE_stone_money:0 "$trait_RICE_stone_money$"
 trait_track_RICE_stone_money_desc:0 "The value of every [Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )] is based on not only the size and quantity of the stone, but the status of its owner, and its history, such as the dangers people took to acquire it in the first place, and its previous owners."
 trait_betel_chewer:0 "Betel Chewer"
 trait_betel_chewer_desc:0 "This character spends an inordinate amount of time doing nothing but chewing on betel nuts, and their teeth are frequently stained red due to their addiction."
 trait_betel_chewer_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] spends an inordinate amount of time doing nothing but chewing on betel nuts, and [ROOT.GetCharacter.GetHerHis] teeth are frequently stained red due to [ROOT.GetCharacter.GetHerHis] addiction."
 trait_RICE_kava_drinker:0 "Kava Drinker"
 trait_RICE_kava_drinker_desc:0 "This character is known for enjoying kava, no matter the occasion. They will drink to the fullest, whether they are with family, friends, or strangers."
 trait_RICE_kava_drinker_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] is known for enjoying kava, no matter the occasion. [ROOT.GetCharacter.GetSheHe|U] will drink to the fullest, whether [ROOT.GetCharacter.GetSheHe] is with family, friends, or strangers."
