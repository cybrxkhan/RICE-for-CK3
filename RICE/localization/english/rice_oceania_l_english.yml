 # Oceania/Pacific Islander Knowledge
 RICE_oceania_courtier_modifier_island: "Pacific Ties and Knowledge"
 RICE_oceania_courtier_modifier_island_desc: "This character has connections with some of the peoples of the Pacific. From them, they have been exposed to"
 RICE_oceania_courtier_modifier_island_agriculture: "$RICE_oceania_courtier_modifier_island$ (Agriculture)"
 RICE_oceania_courtier_modifier_island_agriculture_desc: "$RICE_oceania_courtier_modifier_island_desc$ the unique methods of farming on these islands."
 RICE_oceania_courtier_modifier_kava: "$RICE_oceania_courtier_modifier_island$ (Kava Ceremonies)"
 RICE_oceania_courtier_modifier_kava_desc: "$RICE_oceania_courtier_modifier_island_desc$ the ritual and spiritual importance of drinking kava.\n\n#Emp Can access the [decision|E] to #V $RICE_stress_loss_drink_kava_decision$#! and possibly gain the [GetTrait('RICE_kava_drinker').GetName( GetNullCharacter )|U] [trait|E] regardless of [heritage|E]#!"
 RICE_oceania_courtier_modifier_recruit_islanders: "$RICE_oceania_courtier_modifier_island$ (Island Warfare)"
