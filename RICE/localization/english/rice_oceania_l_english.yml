 oceania.0045.t:0 "Opening the Sasi"
 oceania.0045.desc:0 "A while back, a water [Glossary( 'sasi', 'SASI_GLOSS' )] was enforced on [sasi_open_county.GetNameNoTier], under the guidance of local leaders. People were forbidden from exploiting aquatic resources affected by the #italic sasi#! – until now.\n\nToday, a ceremony was held to indicate the opening of the #italic sasi#!. Those resources which were left untouched have replenished in great numbers during that time."
 oceania.0045.a:0 "Patience has resulted in great prosperity for all!"
