 oceania.0020.t:0 "Chewing Betel Nuts"
 oceania.0020.desc:0 "Is there nothing more pleasurable than chewing betel nuts? I chew, I spit, and I feel relaxed and at ease…."
 oceania.0020.a:0 "I hope my mouth doesn’t get too red from this."
 oceania.0021.t:0 "Betel Nut Addict"
 oceania.0021.desc:0 "Decaying teeth stained red…. Damage to my gums…. And something about my body just doesn’t feel right anymore….\n\nSome say it’s because I chew betel nuts too much. But they can’t be right, because chewing betel nuts makes me feel better."
 oceania.0021.a:0 "How can it be bad? "
 oceania.0022.t:0 "Drinking Kava"
 oceania.0022.desc:0 "We gather together, as we and our ancestors always have, pouring cups full of kava for all to enjoy. We drink in rounds, starting with those of the highest status first, and then going down until everyone has had their full share."
 oceania.0022.desc.ceremonial:0 "\n\nEveryone understands the importance of kava ceremonies like this, which mark important occasions. There are a series of correct rituals, gestures, and procedures one must follow, to honor our ancestors and [ROOT.Char.GetFaith.PantheonTerm]."
 oceania.0022.desc.medicinal:0 "\n\nOur forefathers knew the healing properties of kava, which they have passed down to us. By drinking kava like this together, we can harness its medicinal benefits collectively."
 oceania.0022.desc.social:0 "\n\nAs we do so, we talk about all kinds of things, sharing with each other the joys and sorrows of life. There is nothing that brings us together more than kava!"
 oceania.0022.a:0 "Kava is a wonderful thing."
 oceania.0023.t:0 "$oceania.0022.t$"
 oceania.0023.desc:0 "I have become known for my enthusiasm and support for drinking kava. It’s good to know that everyone knows that I value this ancient drink of ours!"
 oceania.0023.a:0 "Come! Let us drink some kava!"
 oceania.0024.t:0 "[ROOT.Char.GetCulture.GetNameNoTooltip] Meeting Houses"
 oceania.0024.t.palauan:0 "The [ROOT.Char.GetCulture.GetNameNoTooltip] Cheldebechel"
 oceania.0024.desc.intro:0 "Communal meeting houses have played a key role in [ROOT.Char.GetCulture.GetName] society for generations."
 oceania.0024.desc.normal:0 "\n\nAs the [GetPlayer.GetTitleAsNameNoTooltip], it is my duty to continue supporting these meeting houses in a variety of ways. I could contribute resources for ritual religious gatherings, for feasts and other political ceremonies, or for materials to maintain and rebuild the architecture and artwork of these structures."
 oceania.0024.desc.palauan:0 "They often serve as meeting grounds where members of [Glossary( 'cheldebechel', 'CHELDEBECHEL_GLOSS' )] interact or conduct business.\n\nAs the [GetPlayer.GetTitleAsNameNoTooltip], I have the means to support these #italic cheldebechel#!. Both the men and women’s ranked clubs play a key role in our communities."
 oceania.0024.a:0 "Support ritual religious gatherings"
 oceania.0024.b:0 "Support feasts and other political cereomnies"
 oceania.0024.c:0 "Support maintaining and construction of these halls"
