 RICE_oceania_quarry_stone_money:0 "Quarry Stone Money"
 RICE_oceania_quarry_stone_money_tooltip:0 "[Glossary( 'Rai stones', 'YAP_STONE_MONEY_GLOSS' )] are the way to show one's worth and status in society."
 RICE_oceania_quarry_stone_money_desc:0 "[Glossary( 'Rai stones', 'YAP_STONE_MONEY_GLOSS' )] used in our society are acquired from specific islands or lands in maritime expeditions. Their value increases the more dangerous and hazardous the journey was."
 RICE_oceania_quarry_stone_money_effect_tooltip_1:1 "You have a #V [GetPlayer.MakeScope.ScriptValue('RICE_oceania_stone_money_success_chance')|0]%#! chance of success, which is influenced by your [traits|E] and [skills|E], especially [diplomacy_i|E] [diplomacy|E] and [stewardship_i|E] [stewardship|E]."
 RICE_oceania_quarry_stone_money_effect_tooltip_2:1 "You might #N lose#! some crew, influenced by your [traits|E] and [skills|E], especially [martial_i|E] [martial|E] and [learning_i|E] [learning|E]"
 RICE_oceania_quarry_stone_money_effect_tooltip_3:1 "At the start of the expedition, you can spend extra [gold_i|E] [gold|E] to increase the chances of success and survival of the crew."
 RICE_oceania_quarry_stone_money_effect_tooltip_4:1 "If successful, you will gain a random amount of [prestige_i|E|E] [prestige|E] (up to #V [prestige_i|E] [GetPlayer.MakeScope.ScriptValue('RICE_oceania_stone_money_max_prestige_gain_value')|0]#!), [gold_i|E] [gold|E] (up to #V [gold_i|E] [GetPlayer.MakeScope.ScriptValue('RICE_oceania_stone_money_max_gold_gain_display_value')|0]#!), and [trait_level_track_xp|E] in the [GetTrait('RICE_stone_money').GetName( GetNullCharacter )|U] [trait|E] (up to #V [GetPlayer.MakeScope.ScriptValue('RICE_oceania_stone_money_large_trait_xp_gain_value')|0]#!)"
 RICE_oceania_quarry_stone_money_effect_tooltip_5:1 "The amount of crew that dies influences how much [gold_i|E] [gold|E], [prestige_i|E] [prestige|E] and [trait_level_track_xp|E] in the [GetTrait('RICE_stone_money').GetName( GetNullCharacter )|U] [trait|E] you gain, at the #N cost#! of [piety_i|E] [piety|E]"
 RICE_oceania_quarry_stone_money_confirm:0 "Some may die, but it's a sacrifice we're willing to make!"
 RICE_oceania_quarry_stone_money_context_tooltip:0 "#emphasis Historical Context:#! xxxxx"
 RICE_stress_loss_chew_betel_nuts_decision:0 "Chew Betel Nuts"
 RICE_stress_loss_chew_betel_nuts_decision_tooltip:1 "Chewing betel nuts is one way to lose [stress_loss_i|E] [stress|E]...."
 RICE_stress_loss_chew_betel_nuts_decision_desc:0 "All I need to do is chew some betel nuts, and I'll feel energized, euphoric, and a comforting sense of warmth. I'll just have to watch where I spit."
 RICE_stress_loss_chew_betel_nuts_decision_effect_tooltip_1:1 "There is a small chance you'll gain the [GetTrait('betel_chewer').GetName( GetNullCharacter )|U] [trait|E]. This amount increases each time you take this [decision|E]."
 RICE_stress_loss_chew_betel_nuts_decision_confirm:0 "Time to chew some betel!"
 RICE_stress_loss_chew_betel_nuts_decision_context_tooltip:0 "#emphasis Historical Context:#! xxxxx"
 RICE_stress_loss_drink_kava_decision:0 "Drink Kava"
 RICE_stress_loss_drink_kava_decision_tooltip:1 "Drinking kava is a great way to lose [stress_loss_i|E] [stress|E] and socialize with others."
 RICE_stress_loss_drink_kava_decision_desc:0 "Kava is a wonderful beverage which stimulates the mind and is greatly respected by many. We [ROOT.Char.GetCulture.GetCollectiveNoun] have consumed it for generations."
 RICE_stress_loss_drink_kava_decision_effect_tooltip_1:1 "There is a small chance you'll gain the [GetTrait('RICE_kava_drinker').GetName( GetNullCharacter )|U] [trait|E]. This amount increases each time you take this [decision|E]."
 RICE_stress_loss_drink_kava_decision_confirm:0 "Let us gather and enjoy some kava!"
 RICE_stress_loss_drink_kava_decision_context_tooltip:0 "#emphasis Historical Context:#! xxxxx" 
 RICE_oceania_recruit_biak_adventurers:0 "Connect with Biak Adventurers"
 RICE_oceania_recruit_biak_adventurers_tooltip:0 "Work with [RICE_biak|E] adventurers for mutual gain"
 RICE_oceania_recruit_biak_adventurers_desc:0 "Swashbuckling [RICE_biaks|E] sometimes sail to the coasts and islands of [GetGeographicalRegion('RICE_eastern_southeast_asia_region').GetName] in search of adventure. Supporting their endeavors, and working with them, could prove advantageous to both sides."
 RICE_oceania_recruit_biak_adventurers_desc_norman:0 "We swashbuckling [RICE_biaks|E] sometimes sail deep beyond our homelands in search of adventure. Finding like-minded [RICE_biak|E] friends to work with could prove advantageous to both sides."
 RICE_oceania_recruit_biak_adventurers_effect_warriors_tooltip_1:1 "Gain the [GetModifier('RICE_oceania_ties_with_biak_warriors').GetNameWithTooltip] [modifier|E] and some [soldier_i] [special_troops|E] (depending on how much additional [gold_i|E] [gold|E] you are willing to offer them)"
 RICE_oceania_recruit_biak_adventurers_effect_warriors_tooltip_2:1 "For as long as the [modifiers|E] are active, you may receive random events bestowing different bonuses such as [gold_i|E] [gold|E], [soldier_i] [special_troops|E], [control_i|E] [control|E], [courtiers|E], and more!"
 RICE_oceania_recruit_biak_adventurers_effect_traders_tooltip_1:1 "Gain the [GetModifier('RICE_oceania_ties_with_biak_traders').GetNameWithTooltip] [modifier|E] and [legitimacy_i|E] [legitimacy|E], [barter_goods_i] [barter_goods|E], [provisions_i|E] [provisions|E], or [prestige_i|E] [prestige|E] (depending on your [government|E] and how much additional [gold_i|E] [gold|E] you are willing to offer them)"
 RICE_oceania_recruit_biak_adventurers_effect_traders_tooltip_2:1 "For as long as the [modifiers|E] are active, you may receive random events bestowing different bonuses such as [gold_i|E] [gold|E], [prestige_i|E] [prestige|E], [development_i|E] [development|E], [courtiers|E], and more!"
 RICE_oceania_recruit_biak_adventurers_effect_general_tooltip_1:1 "The [RICE_biaks|E] may demand extra [gold|E] or even [titles|E] and react badly if negotiations fail!"
 RICE_oceania_recruit_biak_adventurers_confirm:0 "Contact these adventurers!"
