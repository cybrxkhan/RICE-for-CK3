 RICE_oceania_recruit_biak_adventurers_warriors_option:0 "#Bold Warriors#!"
 RICE_oceania_recruit_biak_adventurers_warriors_option_desc:0 "Invite military adventurers"
 RICE_oceania_recruit_biak_adventurers_warriors_option_tooltip:0 "#italic Sailing from their swift [Glossary( 'wairon', 'WAIRON_GLOSS' )] boats, [RICE_biak|E] warriors have struck fear into the hearts of their enemies as pirates, headhunters, and ferocious fighters for centuries. However, some are willing to work for others, whether for profit or honor.#!"
 RICE_oceania_recruit_biak_adventurers_traders_option:0 "#Bold Traders#!"
 RICE_oceania_recruit_biak_adventurers_traders_option_desc:0 "Invite military adventurers"
 RICE_oceania_recruit_biak_adventurers_traders_option_tooltip:0 "#italic Sailing from their large [Glossary( 'waimansusu', 'WAIMANSUSU_GLOSS' )] boats, [RICE_biak|E] traders have carried impressive loads of trade cargo across the seas for centuries. In doing so, they have created political and social networks, and even established colonies in far-flung lands.#!"
