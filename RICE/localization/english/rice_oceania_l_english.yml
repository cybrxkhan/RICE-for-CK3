 # Activities
 activity_RICE_oceania_sasi_ceremony_host_an_a:0 "$host_activity_a$"
 activity_RICE_oceania_sasi_ceremony:0 "Sasi Ceremony"
 activity_RICE_oceania_sasi_ceremony_desc:0 "By prohibiting the harvesting of natural resources in a designated area, we can protect our natural resources. Those who defy this order will not only pay a fine, but be punished by the angry spirits of our forefathers."
 activity_RICE_oceania_sasi_ceremony_selection_tooltip: "Enforce the start of a [Glossary( 'sasi', 'SASI_GLOSS' )] in a [county|E].\n\n$activity_RICE_oceania_sasi_ceremony_context_tooltip$"
 activity_RICE_oceania_sasi_ceremony_context_tooltip:0 "#emphasis Historical Context:#! $SASI_GLOSS$"
 activity_RICE_oceania_sasi_ceremony_host_desc: "\n$BULLET_WITH_TAB$Gain [piety_i] [piety|E]\n$BULLET_WITH_TAB$Gain [prestige_i|E][prestige|E]\n$BULLET_WITH_TAB$Gain [legitimacy_i|E][legitimacy|E] based on the [development_i|E] [development|E] of the [county|E]\n$BULLET_WITH_TAB$The [county|E] this [activity|E] takes place in will gain a [GetModifier('RICE_oceania_sasi_closed_modifier').GetNameWithTooltip] [modifier|E] which will be replaced after #V 1-3#! years with the more beneficial [GetModifier('RICE_oceania_sasi_open_modifier').GetNameWithTooltip] [modifier|E] for #V 10#! years" 
 activity_RICE_oceania_sasi_ceremony_guest_desc: "$activity_RICE_oceania_sasi_ceremony_host_desc$"
 activity_RICE_oceania_sasi_ceremony_province_desc: ""
 activity_RICE_oceania_sasi_ceremony_destination_selection: "$activity_RICE_oceania_sasi_ceremony_province_desc$"
 activity_RICE_oceania_sasi_ceremony_guest_help_text: "$activity_RICE_oceania_sasi_ceremony$"
 activity_RICE_oceania_sasi_ceremony_predicted_cost: "The cost of this [activity|E] is primarily based on your [income|E]."
 activity_RICE_oceania_sasi_ceremony_conclusion_desc: "The [GetActivityType( 'activity_RICE_oceania_sasi_ceremony' ).GetName] is complete, and the Sasi is now being enforced."
 RICE_oceania_sasi_ceremony_type: "Sasi Ceremony Type"
 RICE_oceania_sasi_ceremony_type_water: "Water Sasi"
 RICE_oceania_sasi_ceremony_type_water_desc: "$EFFECT_LIST_BULLET$Gain the [GetModifier('RICE_oceania_sasi_water_modifier').GetNameWithTooltip] [modifier|E] when the [Glossary( 'sasi', 'SASI_GLOSS' )] is opened\n$EFFECT_LIST_BULLET$Gain extra [development_i|E] [development|E] when the [Glossary( 'sasi', 'SASI_GLOSS' )] is opened if the target [county|E] is #V coastal#! or #V riverside#!\n\n#weak Whether the water comes from the sea, from rivers, or from rainfall, it is what nourishes life, so we must carefully manage how we use it.#!"
 RICE_oceania_sasi_ceremony_type_land: "Land Sasi"
 RICE_oceania_sasi_ceremony_type_land_desc: "$EFFECT_LIST_BULLET$Gain the [GetModifier('RICE_oceania_sasi_land_modifier').GetNameWithTooltip] [modifier|E] when the [Glossary( 'sasi', 'SASI_GLOSS' )] is opened\n$EFFECT_LIST_BULLET$Gain extra [development_i|E] [development|E] when the [Glossary( 'sasi', 'SASI_GLOSS' )] is opened if the target [county|E] has [tribal|E] or #V no#! [holdings|E]\n\n#weak We make great use of the plants and animals in our lands for many purposes, so we have to be careful with how much of these resources we consume.#!"
 RICE_oceania_sasi_ceremony_prohibition_phase: "Prohibition"
 RICE_oceania_sasi_ceremony_prohibition_phase_desc: "The [Glossary( 'sasi', 'SASI_GLOSS' )] ceremony is under way."
 RICE_oceania_sasi_ceremony_conservation_intent_header: "Conservation:"
 RICE_oceania_sasi_ceremony_conservation_intent: "Conservation"
 RICE_oceania_sasi_ceremony_conservation_intent_desc: "Emphasize to all involved the importance of preserving our resources, under the auspices of the spirits. Gain extra [prestige_i|E] [prestige|E]. [GetTrait('temperate').GetName( GetNullCharacter )|U], [GetTrait('patient').GetName( GetNullCharacter )|U], and [GetTrait('diligent').GetName( GetNullCharacter )] characters lose extra [stress_loss_i|E] [stress|E]."
 RICE_oceania_sasi_ceremony_ritual_intent_header: "Ritual:"
 RICE_oceania_sasi_ceremony_ritual_intent: "Ritual"
 RICE_oceania_sasi_ceremony_ritual_intent_desc: "Focus on showing respect and concord with the region's spirits through the rituals of this ceremony. Gain extra [piety_i|E] [piety|E]. [GetTrait('zealous').GetName( GetNullCharacter )|U], [GetTrait('just').GetName( GetNullCharacter )|U], and [GetTrait('humble').GetName( GetNullCharacter )] characters lose extra [stress_loss_i|E] [stress|E]."
 RICE_oceania_sasi_ceremony_completed_log_title:0 "Sasi Closing Ceremony Completed"
 RICE_oceania_sasi_ceremony_completed_log:0 "[CHARACTER.GetShortUIName|U] finished leading the ceremony to close the [Glossary( 'sasi', 'SASI_GLOSS' )]."
 TRAVEL_NAME_FOR_activity_RICE_oceania_sasi_ceremony:0 "[Character.GetFirstNamePossessiveNoTooltip] $activity_RICE_oceania_sasi_ceremony$"
 RICE_SASI_COUNTY_LABEL: "Sasi Restrictions Are In Place Here"
 RICE_sasi_ceremony_story: "Sasi Closure"
 RICE_sasi_ceremony_story_desc: "A [Glossary( 'sasi', 'SASI_GLOSS' )] closure has been enforced. Those who exploit the resources within the restricted area will be punished, both in the material world and the spiritual world. The restrictions will be lifted once a Sasi Opening ceremony is held after at least a year."
 
 # Modifiers
 RICE_oceania_sasi_modifier:0 "Sasi"
 RICE_oceania_sasi_closed_modifier: "Closed Sasi"
 RICE_oceania_sasi_closed_modifier_desc: "A [Glossary( 'sasi', 'SASI_GLOSS' )] closing ceremony was recently conducted here. As the #italic Sasi#! is under effect, and people are forbidden from harvesting certain resources."
 RICE_oceania_sasi_open_modifier: "Opened Sasi"
 RICE_opinion_drank_kava_together: "Drank Kava Together"
 RICE_opinion_chewed_betel_nuts_together: "Cnewed Betel Nuts Together"
 RICE_oceania_sasi_water_modifier: "Water Sasi Ceremony"
 RICE_oceania_sasi_water_modifier_desc: "A water [Glossary( 'sasi', 'SASI_GLOSS' )] opening ceremony was recently conducted here. Because people were forbidden from harvesting certain aquatic resources before the #italic sasi#! reopened, the resources have replenished during that time."
 RICE_oceania_sasi_land_modifier: "Land Sasi Ceremony"
 RICE_oceania_sasi_land_modifier_desc: "A land [Glossary( 'sasi', 'SASI_GLOSS' )] opening ceremony was recently conducted here. Because people were forbidden from harvesting certain land resources before the #italic sasi#! reopened, the resources have replenished during that time."
 RICE_oceania_pacific_connections: "Pacific Linkage"
 RICE_oceania_pacific_connections_desc: "This character has, or is trying to maintain, a link with the peoples who dwell in Oceania."
 RICE_oceania_palau_male_clubs_modifier: "Supported Male Ranked Clubs"
 RICE_oceania_palau_male_clubs_modifier_desc: "This character has provided significant support to male [Glossary( 'cheldebechel', 'CHELDEBECHEL_GLOSS' )] in their community."
 RICE_oceania_palau_female_clubs_modifier: "Supported Female Ranked Clubs"
 RICE_oceania_palau_female_clubs_modifier_desc: "This character has provided significant support to female [Glossary( 'cheldebechel', 'CHELDEBECHEL_GLOSS' )] in their community."
 RICE_oceania_ties_with_biak_warriors: "Ties with Biak Warriors"
 RICE_oceania_ties_with_biak_warriors_desc: "This character has made connections with Biak tribes who originate from an archipelago in Northwest Papua, particularly the warriors of these tribes, who sail forth to terrify their enemies in swift [Glossary( 'wairon', 'WAIRON_GLOSS' )] boats."
 RICE_oceania_ties_with_biak_traders: "Ties with Biak Traders"
 RICE_oceania_ties_with_biak_traders_desc: "This character has made connections with Biak tribes who originate from an archipelago in Northwest Papua, particularly the traders of these tribes, who sail forth to engage in trade and diplomacy in large [Glossary( 'waimansusu', 'WAIMANSUSU_GLOSS' )] boats."
 RICE_oceania_settled_biak_warriors: "Settled Biak Warriors"
 RICE_oceania_settled_biak_warriors_desc: "This region is home to a colony of Biaks, who originate from an archipelago in Northwest Papua. This community is dominated by fearsome warriors, who sail forth to terrify their enemies in swift [Glossary( 'wairon', 'WAIRON_GLOSS' )] boats."
 RICE_oceania_settled_biak_traders: "Settled Biak Traders"
 RICE_oceania_settled_biak_traders_desc: "This region is home to a colony of Biaks, who originate from an archipelago in Northwest Papua. This community is dominated by intrepid traders, who sail forth to engage in trade and diplomacy in large [Glossary( 'waimansusu', 'WAIMANSUSU_GLOSS' )] boats."
 RICE_oceania_biak_piracy_modifier: "Biak Piracy"
 RICE_oceania_biak_piracy_modifier_desc: "This region recently suffered from ruthless raids by Biak pirates, who came from their home archipelago in Northwest Papua in swift [Glossary( 'wairon', 'WAIRON_GLOSS' )] boats."
