 oceania.0010.t:0 "Beyond the Ends of the Earth"
 oceania.0010.desc:0 "The great sea to the east is not a desolate wilderness of saltwater. Beyond the ends of the earth, there are islands and people – and we know this, because these people occasionally come westwards.\n\nWe will do our best to spread word that these travelers and adventurers from the eastern seas are welcome in these lands, that those who may desire to trade and share their knowledge with us will find friends in the [ROOT.Char.GetPrimaryTitle.GetBaseName]!"
 oceania.0010.a:0 "If and when will they arrive on our shores?"
