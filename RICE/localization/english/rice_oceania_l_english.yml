 oceania.0030.t:0 "The [courtier.GetCulture.GetNameNoTooltip] Traveler"
 oceania.0030.desc:0 "The arrival of a stranger, who claims to have traveled here from across the oceans, has caused something of a stir in [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier].\n\nI have met with this sensational figure, named [courtier.GetFirstName], who claims to be of the [courtier.GetCulture.GetName] people. Supposedly, [courtier.GetHerHis] people have knowledge, passed down from their ancestors, that could be of great use to us…."
 oceania.0030.a:0 "Please, teach us what you know!"
 oceania.0030.b:0 "Perhaps you can stay here?"
 oceania.0030.c:0 "An amusing tale, but I’m not interested."
