 RICE_oceania_meeting_houses_decision_palauan:0 "Support Ranked Clubs"
 RICE_oceania_meeting_houses_decision_tooltip:1 "Let us support the foundations of our society."
 RICE_oceania_meeting_houses_decision_desc:0 "For generations, [GetPlayer.GetCulture.GetCollectiveNoun] have constructed communal meeting houses whose ritual, social, economic, and political importance make them the center of life among our people. Supporting these meeting houses, and those that use them, will increase my popularity and authority as [GetPlayer.GetTitleAsNameNoTooltip]."
 RICE_oceania_meeting_houses_decision_palauan_desc:0 "For generations, [GetPlayer.GetCulture.GetCollectiveNoun] have organized our communities through [Glossary( 'cheldebechel', 'CHELDEBECHEL_GLOSS' )], or ranked clubs. Supporting these clubs and their activities will increase my popularity and authority as [GetPlayer.GetTitleAsNameNoTooltip]."
