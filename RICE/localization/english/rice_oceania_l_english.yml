 game_concept_RICE_oceania:0 "Oceania"
 game_concept_RICE_oceania_desc:0 "Oceania encompasses various landmasses and islands of the Pacific beyond maritime Southeast Asia.\n\nWhile most of it is off-map in-game, [courtiers|E] of various Oceanic [cultures|E] and [faiths|E] can spawn on the southeast edge of the map to represent the sporadic ties some of these regions had historically with Southeast Asia. These events also give you the opportunity to make use of these peoples' knowledge in the form of beneficial [modifiers|E]. The [decision|E] to #bold $RICE_welcome_visitors_from_oceania$#! increases the chances of these encounters.\n\nBy default, the types of Oceanic [courtiers|E] you might see depend on your game rules, and include:\n\n$EFFECT_LIST_BULLET$Occasional: West [RICE_papuan|E] and West [RICE_micronesian|E]\n$EFFECT_LIST_BULLET$Rare: Central [RICE_papuan|E] and Central [RICE_micronesian|E]\n$EFFECT_LIST_BULLET$Very Rare: East [RICE_micronesian|E], East [RICE_papuan|E], [RICE_indigenous_australian|E], and West [RICE_melanesian|E]\n$EFFECT_LIST_BULLET$Very Rare with Game Rule: [RICE_polynesian|E] and East [RICE_melanesian|E]\n$EFFECT_LIST_BULLET$Extremely Rare with Game Rule: [RICE_south_american|E]"

 # Rules
 rule_RICE_oceania_frequency:0 "RICE [RICE_oceanic|E] [courtiers|E] Frequency"
 setting_RICE_oceania_frequency_rare:0 "Rare (Default)"
 setting_RICE_oceania_frequency_rare_desc:0 "[RICE_oceanic|E] [courtiers|E] spawn at the default rate on the southeast edge of the map."
 setting_RICE_oceania_frequency_uncommon:0 "#high Uncommon#!"
 setting_RICE_oceania_frequency_uncommon_desc:0 "[RICE_oceanic|E] [courtiers|E] spawn much more frequently on the southeast edge of the map, but are still fairly uncommon."
 setting_RICE_oceania_frequency_common:0 "#high Common#!"
 setting_RICE_oceania_frequency_common_desc:0 "[RICE_oceanic|E] [courtiers|E] spawn more frequently on the southeast edge of the map, but are still fairly uncommon."
 setting_RICE_oceania_frequency_off:0 "#high Off#!"
 setting_RICE_oceania_frequency_off_desc:0 "[RICE_oceanic|E] [courtiers|E] will never spawn, even those who would historically make sense. This will override other related game rules."
 rule_RICE_remote_oceania:0 "RICE Remote [RICE_oceanic|E] [courtiers|E]"
 setting_RICE_remote_oceania_off:0 "Disabled (Default)"
 setting_RICE_remote_oceania_off_desc:0 "[RICE_polynesian|E] and East [RICE_melanesian|E] [courtiers|E] will never spawn on the southeast edge of the map."
 setting_RICE_remote_oceania_on:0 "#high Enabled#!"
 setting_RICE_remote_oceania_on_desc:0 "Though rarer than other [RICE_oceanic|E] [courtiers|E], East [RICE_melanesian|E] and [RICE_polynesian|E] [courtiers|E] can [Glossary( 'ahistorically', 'POLYNESIA_HISTORY_GLOSS' )] spawn on the southeast edge of the map."
 rule_RICE_south_america:0 "RICE [RICE_south_american|E] [courtiers|E]"
 setting_RICE_south_america_off:0 "Disabled (Default)"
 setting_RICE_south_america_off_desc:0 "[RICE_south_american|E] [courtiers|E] will never spawn on the southeast edge of the map."
 setting_RICE_south_america_on:0 "#high Enabled#!"
 setting_RICE_south_america_on_desc:0 "Though rarer than [RICE_oceanic|E] [courtiers|E], [RICE_south_american|E] [courtiers|E] can [Glossary( 'ahistorically', 'SOUTH_AMERICA_HISTORY_GLOSS' )] spawn on the southeast edge of the map."
 
