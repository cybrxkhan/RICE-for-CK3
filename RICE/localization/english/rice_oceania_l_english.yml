 oceania.0061.t:0 "The [biak_culture.GetNameNoTooltip] Warriors"
 oceania.0061.desc.intro.peaceful:0 "The [biak_culture.GetName] warriors came in [Glossary( 'wairon', 'WAIRON_GLOSS' )] boats – deceptively slender and sleek, but possessing fearsome visages carved into its wood, a testament to their owners’ adventurous courage."
 oceania.0061.desc.intro.tense:0 "[biak_leader.GetFirstName] wasn’t too greedy, thankfully, and agreed to our renegotiated terms.\n\nAlthough we got off to a rocky start, and though we can’t trust them fully, for now,"
 oceania.0061.desc.peaceful:0 "$oceania.0061.desc.intro.peaceful$\n\nThankfully, the warriors that I came into contact with, led by a certain [biak_leader.GetFirstName], are friendly and willing to fight for foreigners like us. In exchange for payment, they will bring glory and honor to their clans back home."
 oceania.0061.desc.biak:0 "$oceania.0061.desc.intro.peaceful$\n\nAs fellow [biak_culture.GetCollectiveNoun], we understand well what kind of strength, cunning, and bravery a warrior needs to succeed in their adventures. The warriors I came into contact with, led by [biak_leader.GetFirstName], more than fulfill these requirements, and are happy to work together with me as long as they can share in the spoils."
 oceania.0061.desc.tense:0 "$oceania.0061.desc.intro.tense$ they seem content to fight for me. In exchange for payment, they will bring glory and honor to their clans back home."
 oceania.0061.a:0 "Good. Let us work together."
 oceania.0061.b:0 "Some of you can settle on our lands, too."
 oceania.0061.c:0 "Can you yourself work with us as well?"
 oceania.0061.d:0 "I could use someone like you as a companion."
 oceania.0062.t:0 "The [biak_culture.GetNameNoTooltip] Traders"
 oceania.0062.desc.intro.peaceful:0 "The [biak_culture.GetName] traders came in [Glossary( 'waimansusu', 'WAIMANSUSU_GLOSS' )] boats – large, and possessing enough room to hold a lot of cargo, a testament to its owners’ intrepid sense of business."
 oceania.0062.desc.intro.tense:0 "$oceania.0061.desc.intro.tense$"
 oceania.0062.desc.peaceful:0 "$oceania.0062.desc.intro.peaceful$\n\nThe group of traders I came into contact with were led by a certain [biak_leader.GetFirstName], who assures me that with my support, they can trade wide and far, and bring riches back to the ports I have dominion over. In doing so, they will bring glory and honor to their clans back home as well."
 oceania.0062.desc.biak:0 "$oceania.0062.desc.intro.peaceful$\n\nAs fellow [biak_culture.GetCollectiveNoun], we understand well that successful adventures aren’t just about testing one’s mettle in battle. Accomplishments in trade and diplomacy are just as impressive, and the traders I came into contact with, led by [biak_leader.GetFirstName], seem experienced in those aspects. They’re happy to work together with me as long as we help each other out."
 oceania.0062.desc.tense:0 "$oceania.0061.desc.intro.tense$ they’ve agreed to work with us to mutually profit from trade. In doing so, they will bring glory and honor to their clans back home as well."
 oceania.0062.a:0 "$oceania.0061.a$"
 oceania.0062.b:0 "$oceania.0061.b$"
 oceania.0062.c:0 "$oceania.0061.c$"
 oceania.0062.d:0 "$oceania.0061.d$"
 oceania.0063.t:0 "The [biak_culture.GetNameNoTooltip] Demands"
 oceania.0063.desc.warriors:0 "$oceania.0061.desc.intro.peaceful$\n\nUnfortunately, our attempts to negotiate with them to fight under my banner are breaking down. They are demanding more gold from me, and threaten to retaliate with raids on my lands if I don’t comply.\n\nAlas, they #italic are#! known for their skills in piracy too, so we must tread carefully…."
 oceania.0063.desc.traders:0 "$oceania.0062.desc.intro.peaceful$\n\nUnfortunately, our attempts to negotiate with them to work together for mutual profit are breaking down. They are demanding more gold from me, and threaten to retaliate with raids on my lands if I don’t comply.\n\nAlas, while they are greater traders and diplomats, piracy #italic is#! traditionally another form of profit for them as well, so we must tread carefully…."
 oceania.0063.desc.fallback:0 "Our attempts to negotiate with the [biak_culture.GetCollectiveNoun] adventurers have failed.\n\nThey are threatening to raid us if we do not offer them more gold."
 oceania.0063.a:0 "Fine. You'll get your extra payment."
 oceania.0063.b:0 "No. You #italic will#! accept our original proposal."
 oceania.0063.b.failure:0 "They refuse and engage in piracy"
 oceania.0063.b.success:0 "They back down and agree to the original proposal"
 oceania.0064.t:0 "The [biak_culture.GetNameNoTooltip] Pirates"
 oceania.0064.desc.original:0 "Our attempts to negotiate with the band of [biak_culture.GetName] led by [biak_leader.GetFirstName] have failed.\n\n[biak_leader.GetFirstNameNoTooltip] and [biak_leader.GetHerHis] people are now going up the waterways of [target_duchy.GetNameNoTier], attacking and looting whatever they can. While the damage they are capable of is limited, their depredations do not reflect well on me."
 oceania.0064.desc:0 "[original_negotiator.GetTitledFirstName] recently attempted to recruit the services of [biak_culture.GetName] adventurers led by a certain [biak_leader.GetFirstName].\n\nHowever, negotiations broke down, and as a result, [biak_leader.GetFirstNameNoTooltip] and [biak_leader.GetHerHis] people are now going up the waterways of [target_duchy.GetNameNoTier], attacking and looting whatever they can. While the damage they are capable of is limited, my territories have also been subjected to these depredations, even though we weren’t originally involved in this at all!"
 oceania.0064.a:0 "Whoops...."
 oceania.0064.b:0 "[original_negotiator.GetFirstNameNoTooltip], you fool! What have you done?!"
