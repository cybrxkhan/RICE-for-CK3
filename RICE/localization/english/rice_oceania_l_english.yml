 oceania.0040.t:0 "Another Sasi Ceremony"
 oceania.0040.desc:0 "[Glossary( 'sasi', 'SASI_GLOSS' )] is our tradition, as [ROOT.Char.GetCulture.GetName], to periodically designate resources that cannot be harvested for a period of time, in order to preserve such resources for future use. The #italic sasi#!, of course, is accompanied by appropriate [ROOT.Char.GetFaith.GetReligion.GetAdjective] ceremonies.\n\n"
 oceania.0040.desc.land:0 "We will soon enforce a #italic land sasi#! in [location.GetName], and I will be present at the ceremony to close the #italic sasi#!. Afterwards, people will be forbidden from accessing and exploiting resources in the wilderness there for some time."
 oceania.0040.desc.water:0 "We will soon enforce a #italic water sasi#! in [location.GetName], and I will be present at the ceremony to close the #italic sasi#!. People will be forbidden from accessing and exploiting resources in certain bodies of water there for some time."
 oceania.0040.a:0 "Let’s get going!"
 oceania.0041.t:0 "Arrival"
 oceania.0041.desc:0 "After arriving at the village in [location.GetName] where the [Glossary( 'sasi', 'SASI_GLOSS' )] closing ceremony will be held, the locals welcomed us with much pomp and joy.\n\nThe ceremony will happen, soon, in the coming days. However, perhaps I can distract myself with something in the meanwhile…."
 oceania.0041.a:0 "Spend time in prayer to [ROOT.Char.GetFaith.HighGodName]"
 oceania.0041.b:0 "Discuss local issues with community leaders"
 oceania.0041.c:0 "Relax and enjoy the area’s beautiful scenery"
 oceania.0042.t:0 "Closing the Sasi"
 oceania.0042.desc:0 "Once today’s ceremony is completed, the [Glossary( 'sasi', 'SASI_GLOSS' )] will be closed based on the terms that I and other local leaders have agreed to.\n\nWe pray to the [ROOT.Char.GetFaith.PantheonTerm] to look after us and the resources we are protecting,"
 oceania.0042.desc.land:0 "as we gather under [ROOT.Char.GetCurrentLocation.Custom('GetRandomAppropriateTree')] trees near the village. Any resources found in the area affected by the #italic sasi#!, including animals, plants, and minerals, will be untouchable to everyone."
 oceania.0042.desc.water:0 "as we gather by the edge of [ROOT.Char.Custom('IndefiniteBodyOfWater')] near the village. From fish and coral to other aquatic animals, plants, and minerals, no one will be allowed to harvest these resources affected by the terms of the #italic sasi#!."
 oceania.0042.desc.conclusion:0 "\n\nThe ceremony concludes with much dance and song to accompany the prayers, and the locals thank me for my support."
 oceania.0042.a:0 "Our resources will be preserved for a long time."
