 # Buildings
 building_type_RICE_oceania_caves_of_fakfak:0 "Caves of Fakfak"
 building_type_RICE_oceania_caves_of_fakfak_desc:0 "Many caves and cliffs along the shoreline of the Fakfak region, on the western end of the Bomberai Peninsula, are decorated with ancient rock art of animal and human figures and handprints. Known as blood paintings due to the red paint used in this artwork, it is believed by locals to be the work of their distant ancestors, to mark these places for worship of helpful spirits and to bury their dead."
 building_RICE_oceania_caves_of_fakfak:0 "$building_type_RICE_oceania_caves_of_fakfak$"
 building_RICE_oceania_caves_of_fakfak_desc:0 "$building_type_RICE_oceania_caves_of_fakfak_desc$"
 building_type_RICE_oceania_kabui_bay:0 "Kabui Bay"
 building_type_RICE_oceania_kabui_bay_desc:0 "The Raja Ampat islands host plenty of visually stunning locations, including Kabui Bay, which is filled with many breathtaking karst islands and separates the islands of Waigeo and Gam. This pristine site, a tapestry of vivid greens, blues, and colorful foliage and corals, is associated with folk legends and is said to be the origin of the local people. At times, the environment surrounding the bay has also been used as burial shelters."
 building_RICE_oceania_kabui_bay:0 "$building_type_RICE_oceania_kabui_bay$"
 building_RICE_oceania_kabui_bay_desc:0 "$building_type_RICE_oceania_kabui_bay_desc$"
 
 # Traits
 trait_RICE_stone_money:0 "Rai Stone Owner"
