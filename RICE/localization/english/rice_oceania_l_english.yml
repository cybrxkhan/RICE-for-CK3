 oceania.0050.t:0 "Rai Stones"
 oceania.0050.desc:0 "Ownership of [Glossary( 'rai stones', 'YAP_STONE_MONEY_GLOSS' )] is how [yap_culture.GetCollectiveNoun] measure a [ROOT.Char.Custom('WomanManPossessive')] wealth and worth. But how does one acquire these stones, carved from a certain type of limestone?\n\nFrom other islands where such limestone can be found, of course – particularly #italic Palau#!. Now, I’m sending off an expedition to the eastern ocean to acquire one such stone for myself.\n\nExpeditions to sail to these islands, gain permission from the locals, acquire these stones, and sail back, have been ongoing for ages. They are risky ventures, as people are often injured or even die. However, a stone’s worth is not due solely to its size, but also in the story behind it, including the effort to acquire it."
 oceania.0050.a:0 "I wish the members of the expedition good luck."
 oceania.0050.b:0 "The expedition could use more resources."
 oceania.0050.b.tooltip:0 "#bold Minor#! #P increase#! to the amount of [gold_i|E] [gold|E] you might earn and #bold minor#! #V reduction#! to how many crew members might likely die."
 oceania.0050.c:0 "The expedition could use #italic a lot#! more resources."
 oceania.0050.c.tooltip:0 "#bold Major#! #P increase#! to the amount of [gold_i|E] [gold|E] you might earn and #bold major#! #V reduction#! to how many crew members might likely die."
 oceania.0051.t:0 "$oceania.0050.t$"
 oceania.0051.desc.success:0 "My expedition to the eastern seas to acquire a [Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )] has returned #P successfully#!, carrying with them a beautifully large, carved, disk-shaped stone!\n\nWith the crew’s return, we learn about their journey, and the difficulties they experienced, from sailing across the ocean, and how they negotiated with locals to obtain the stone.\n\n"
 oceania.0051.desc.failure:0 "For days, I’ve felt a sense of unease concerning my expedition to the eastern seas to acquire a [Glossary( 'rai stone', 'YAP_STONE_MONEY_GLOSS' )] for me. Why haven’t they come back?\n\nToday, I’ve received a report that local sailors have found evidence that my expedition #N never#! made it back.\n\nHow unfortunate! Though we will never know for sure what happened on their journey, at least we have some kind of answer."
 oceania.0051.desc.low:0 "Losses were relatively small, and most of the crew made it back safely. As this makes for a less interesting story, the #italic rai stone#! is worth less as a result.\n\nNonetheless, it is still possible that the #italic rai stone#! will grow in worth over time, as its oral history grows with interesting tales about its owners."
 oceania.0051.desc.medium:0 "There were moderate losses among the crew. Deaths and injuries weren’t too excessive, and within a range expected for these expeditions, and this has been factored into the #italic rai stone’s#! worth.\n\nRegardless, the long-term worth of the #italic rai stone#! could still vary, as its oral history grows with interesting tales about its owners."
 oceania.0051.desc.high:0 "Losses among the crew were immense. It was a miracle some even made it back. At least this means the #italic rai stone#! is worth a lot, thanks to the dramatic tale of how it was acquired.\n\nDespite this, who knows what the long-term worth of the #italic rai stone#! will be? Beginning with the dramatic tale of how it was acquired, we will have to see whether the oral history of its owners is just as fascinating."
 oceania.0051.a.failure:0 "May [ROOT.Char.GetFaith.DeathDeityName] be kind to their spirits…."
 oceania.0051.a.success:0 "Excellent work! The crew were truly brave and heroic."
