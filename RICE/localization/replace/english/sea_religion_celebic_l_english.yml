 ## Little dictionary of Aluk deities
 # Puang Matua - Aluk chief deity and ruler of heavens ; "the old lord"
 # Gaun ti Kembong - god of sky, resides between heaven and earth ; "the swollen cloud / the self-expanding cloud"
 # Pong Banggai di Rante - god of earth ; first to do ubi ritual and thus creator of yams ; "the master of the plains"
 # Indo' Belo Tumbang - goddess of the medicine that cures the sick in the Maro ritual ; "the lady who dances beautifully"
 # Pong Tulak Padang - god of the underworld ; carries the earth in the palms of his hands ; "supporter of the earth"
 # Indo' Ongon-Ongon - bad tempered spouse of Pong Tulak Padang, responsible for Earthquakes ; untranslatable
 # Pong Tulangdenna - resides in the irrigation canals serving the rice fields
 # Pong Lalondong - judge of the dead ; "the lord who is a cock"
 # To Sopai - frightful river-god of the Sa'dan, often visualized as a gigantic eel ; should probably not be water god though

 # Tim-bayo Kila - "the flash of lightning"
 # Usuk Sangbamban - "rib of one piece"
 # Indo' Samadenna - "mother all there is"
 # Indo' Pare'-Pare' - "mother small rice species"

 # Heaven and Earth gods be both very important
