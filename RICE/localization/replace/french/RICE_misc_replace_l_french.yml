 kitebacilweism:0 "Mehrisme"
 kitebacilweism_adj:0 "Mehriste"
 kitebacilweism_adherent:0 "Mehriste"
 kitebacilweism_adherent_plural:0 "Mehristes"
 kitebacilweism_desc:0 "Les anciennes croyances religieuses des Iraniens du Nord-Ouest sont apparentées au zoroastrisme orthodoxe, avec lequel elles ont peut-être coexisté à l'apogée des Sassanides, mais elles en sont distinctes. La vénération de la nature est importante, et l'ancienne divinité iranienne Mithra, ou Mehr, joue un rôle cosmologique clé en tant que démiurge et objet commun de culte - un rôle qui aurait pu inspirer le culte romain de Mithra des siècles auparavant."
