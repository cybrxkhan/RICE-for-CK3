 # Yazidi Rework
 yazidi_religion:0 "Iranien occidental"
 yazidi_religion_adj:0 "Iranien occidental"
 yazidi_religion_adherent:0 "Iranien occidental"
 yazidi_religion_adherent_plural:0 "Iraniens occidentaux"
 yazidi_religion_desc:0 "Les montagnes du nord de la Mésopotamie et de l'ouest de l'Iran abritent des peuples de langue iranienne, en particulier les Kurdes, qui ont, au fil des siècles, renforcé leurs croyances en syncrétisant des idées issues d'une multitude de traditions spirituelles, dont le zoroastrisme, l'islam et le gnosticisme."

 meshefaresism:0 "Yârsânisme"
 meshefares_adj:0 "Yarsani"
 meshefaresism_adj:0 "Yarsani"
 meshefares_adherent:0 "Yarsani"
 meshefaresism_adherent:0 "$meshefares_adherent$"
 meshefares_adherent_plural:0 "Yarsanis"
 meshefaresism_adherent_plural:0 "$meshefares_adherent_plural$"
 meshefares_desc:0 "Le "Groupe des Amis", également connu sous le nom d'Ahl-e Haqq, ou "Peuple de la Vérité", croit que Dieu se manifeste dans une incarnation principale et sept incarnations secondaires à chaque époque du monde. Ces sept personnes sont appelées les #Italic Haft Tan#!. L'incarnation primaire de l'actuelle quatrième époque est le Sultan Sahak."
