sarnaism_desc:0 "El dios supremo Singbonga creó el universo así como al pueblo Kherwal. Sin embargo, fueron exiliados de su tierra natal Cheu-Champa por cometer los pecados de incesto y asesinato innecesario, y emigraron hacia el oeste. Los espíritus de la naturaleza de la nueva tierra en la que se establecieron son inferiores pero aún dignos de reverencia, y deben ser adorados en bosquecillos secretos llamados #italic Sarnas#! en lo profundo de los bosques."

