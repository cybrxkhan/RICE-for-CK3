KHARSHIF_GLOSS: "#Bold Kharshif#! es un material de construcción único del Oasis de Siwa en el Desierto Occidental de Egipto que consiste en bloques de sal calcificada mezclados con arcilla, barro y arena. Estos bloques de sal se han utilizado tradicionalmente para construir una variedad de edificios, gracias a su durabilidad y su capacidad para ayudar a mantener una temperatura fresca en el clima cálido. Gran parte de la Fortaleza de Shali, una fortaleza medieval tardía que protegió el Oasis de Siwa durante siglos, fue construida con bloques de Kharshif, por ejemplo."
