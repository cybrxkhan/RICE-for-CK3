l_spanish:

SEVEN_SEAS_GLOSS: "Aunque popularmente asociado con los piratas estereotípicos de la Edad de Oro de la Piratería, los #Bold Siete Mares#! como término figurado para la totalidad de los océanos del mundo se remonta a tiempos antiguos. Durante el período antiguo y medieval, la lista de los 'Siete Mares' variaba dependiendo de a quién se le preguntara. La literatura árabe medieval, por ejemplo, definía los Siete Mares como el Golfo Pérsico, el Mar Arábigo, la Bahía de Bengala, el Estrecho de Malaca, el Estrecho de Singapur, el Golfo de Tailandia y el Mar de China Meridional."
ERYTHRAEAN_SEA_GLOSS: "Los antiguos griegos usaban el término #Bold Mar Eritreo#! para describir las aguas del Golfo de Adén (entre Yemen y el Cuerno de África), y a veces incluso más allá, incluyendo el Mar Rojo, el Golfo Pérsico, el Mar Arábigo y partes del Océano Índico."
