 #Sammitiya Faith (parent)
 pudgalavada:0 "Sammitiya"
 pudgalavada_adj:0 "Sammitiya"
 pudgalavada_adherent:0 "Sammitiyan"
 pudgalavada_adherent_plural:0 "Sammitiyans"
 pudgalavada_desc:0 "The so-called Personalist schools of Buddhism believe that while there is no self, there is a person who carries the burdens of karma and the five aggregates. Other Buddhist schools consider their philosophical views heretical, but they believe they actually uphold the true teachings of the Buddha."
 d_regional_Sammitiya_rite:0 "Regional Sammitiya Rite"

 #Sammitiya
 sammitiya:0 "Sammitiya"
 sammitiya_adj:0 "Sammitiya"
 sammitiya_adherent:0 "Sammitiyan"
 sammitiya_adherent_plural:0 "Sammitiyans"
 sammitiya_desc:0 "The Sammitiya are the most successful and widespread of the schools that branched off from the Vatsiputriyans, with monasteries once spread across northern India. Their chief difference from other major Buddhist branches is their staunch belief in the concept of a person that carries the burdens of karma, which they argue does not contradict, but in fact supports and expands on the Buddha's profound teaching of no self."

 #Sammitiya
 vatsiputriya:0 "Vatsiputriya"
 vatsiputriya_adj:0 "Vatsiputriya"
 vatsiputriya_adherent:0 "Vatsiputriyan"
 vatsiputriya_adherent_plural:0 "Vatsiputriyans"
 vatsiputriya_desc:0 "A few centuries after the Buddha's life, the elder Vatsiputra established the school which formulated the existence of a person that carries the burdens of karma. Though a controversial if not heretical claim for all other Buddhists, his views were once popular throughout much of India."


 tenet_rice_personalism_name: "Pudgala"
 tenet_rice_personalism_desc: "While there is no atman, there is a pudgala, or person, which is neither a conditioned dharma nor an unconditioned dharma. The path to enlightenment involves understanding this pudagala through personal experience, reflection and reasoning."
