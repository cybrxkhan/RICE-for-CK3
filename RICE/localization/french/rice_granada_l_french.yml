 granada.0050.t:0 "Projets de villégiature"
 granada.0050.desc:0 "Voilà bien trop longtemps que je n'ai pas eu l'occasion de prendre quelque repos loin de ma vie trépidante. Nombre de gens issus des classes privilégiées et nobles d'Al-Andalus possèdent des #italic munyas#! à la campagne, où ils peuvent se détendre et passer du temps loin de la ville. Il est temps pour moi de me rendre dans l'une d'elles.\n\nPartir en villégiature dans une #italic munya#! n'est pas réservé à de petits plaisirs comme on en recherche dans les terres des infidèles ignorants. Non, non. Ce sont également des lieux d'expérimentation agronomique et botanique, où des gens de véritable culture se réunissent pour prendre part à des échanges savants.\n\nQuoi qu'il en soit, je vais bientôt participer à un [ROOT.Char.GetInvolvedActivity.GetShortName] à [ROOT.Char.GetTravelPlan.GetData.GetNextDestination.GetProvince.GetName]. Il est possible de s'adonner à maints divertissements au cours de ces excursions, quels que soient la personnalité et les centres d'intérêt de chacun !"
 granada.0050.a:0 "Je veux passer un peu de temps seul."
 granada.0050.a.tooltip:0 "Si vous partez en villégiature dans votre [munya|E] seul, vous avez davantage de chances de perdre du [stress|E]. Si vous le désirez, vous pourriez également avoir l'occasion d'apprendre les derniers développements en agronomie et en botanique afin d'améliorer votre domaine."
 granada.0050.b:0 "Allons nous amuser !"
 granada.0050.b.tooltip:0 "Si vous partez en villégiature dans votre [munya|E] avec un groupe, vous aurez de meilleures chances de gagner du [prestige|E] et de la [piety|E]. Vous pourriez également améliorer les [opinions|E] que les invités ont de vous, ainsi que l'image que vous projetez en tant que dirigeant."
 granada.0051.opening:0 "[sender.Custom2('AppropriateGreeting', ROOT.Char)]"
 granada.0051.desc.host_likes_me:0 "Je vous invite cordialement à me rejoindre en villégiature dans l'une de mes #italic munyas#! à [barony.GetNameNoTier], dans quelques jours, en compagnie d'autres membres de ma cour. Je vous assure que ma #italic munya#! est un merveilleux endroit où vous pourrez vous détendre et jouir de la compagnie de gens de culture. Si vous en avez le loisir, je serais ravi de vous y voir."
 granada.0051.desc.host_dislikes_me:0 "Je partirai bientôt en villégiature dans l'une de mes #italic munyas#! à [barony.GetNameNoTier], dans quelques jours, en compagnie d'autres membres de ma cour. Hélas, les convenances m'obligent à vous inviter à vous joindre à nous pour cette excursion. Les #italic munyas#!, comme vous le savez, sont des lieux où les gens réellement cultivés (je ne suis pas certain que vous en soyez) se réunissent pour jouir de la compagnie les uns des autres. Si vous souhaitez venir, veillez à vous montrer sous votre meilleur jour et à ne pas vous couvrir de honte."
 granada.0051.a:0 "Je serais honoré de séjourner dans sa #italic munya#!!"
 granada.0051.a.tooltip:0 "Séjourner dans la [munya|E] vous offrira l'occasion d'obtenir divers avantages, selon vos intérêts et ce que l'hôte a prévu à l'itinéraire."
 granada.0051.b:0 "Je l'apprécie, mais j'ai malheureusement d'autres engagements."
 granada.0051.c:0 "Sérieusement ? Faites-lui savoir que sa villégiature est une perte de temps !"
 granada.0051.c.tooltip:0 "Envoyez une lettre à [sender.GetTitledFirstName] exprimant votre désapprobation quant à sa villégiature frivole."
 granada.0052.opening:0 "[munya_vacation_rejector.Custom2('AppropriateGreeting', ROOT.Char)]"
 granada.0052.desc:0 "Je souhaite vous informer que je décline votre invitation à séjourner dans votre #italic munya#! à la campagne. Premièrement, je suis déçu de constater que vous paraissez davantage enclin à vous adonner à des divertissements frivoles qu'à vous consacrer à vos devoirs de [host.GetTitleAsNameNoTooltip]. Deuxièmement, j'ai d'ores et déjà des engagements auxquels je dois satisfaire, et je suis donc fort occupé. Je suis certain que vous comprendrez."
 granada.0052.a:0 "Il se peut que nous voyions les choses différemment, et cela se peut."
 granada.0052.b:0 "Comment ose-t-[munya_vacation_rejector.GetSheHe] rejeter mon invitation !"
 granada.0053.t:0 "Villégiature reportée ... Indéfiniment"
 granada.0053.desc:0 "J'ai appris que [host.GetTitledFirstName] venait de trépasser. En conséquence, la villégiature qu'[host.GetSheHe] projetait a été annulée. Moi-même et les autres invités qui comptions nous rendre à sa #italic munya#! n'avons plus à le faire, pour des raisons évidentes."
 granada.0053.a:0 "Fâcheuse nouvelle !"
 granada.0054.t:0 "Villégiature reportée"
 granada.0054.desc:0 "J'ai appris que [host.GetTitledFirstName] venait d'être emprisonné et que moi-même, ainsi que tout autre invité qui devait se rendre dans sa #italic munya#! pour une villégiature, ne sommes plus tenus de le faire."
 granada.0054.a:0 "Quelle situation embarrassante."
 granada.0055.t:0 "Villégiature reportée"
 granada.0055.desc:0 "Au lieu de partir en villégiature dans ma #italic munya#!, il s'avère que c'est dans un cachot que je me rends ! Puisque j'ai été jeté en prison, je dois annuler mes projets de villégiature. Puissé-je sortir bientôt d'ici."
 granada.0055.a:0 "Tous ces préparatifs de villégiature n'ont servi à rien."
