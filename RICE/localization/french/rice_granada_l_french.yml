 granada.0060.t:0 "La villégiature commence"
 granada.0060.desc:0 "Après quelques préparatifs, je suis enfin arrivé à ma #italic munya#! à la campagne pour mon excursion. Durant les prochains jours, j'aurai tout le manoir pour moi seul, afin de pouvoir me détendre et jouir de la vie.\n\nBien entendu, le fait que je sois seul ne signifie pas que je ne puisse m'adonner à des activités productives. Ceux qui sont assez riches et puissants pour posséder de telles grandes villas patronnent souvent les efforts des savants locaux pour mener des expériences botaniques et agronomiques. Je pourrais donc, si je le souhaite, aller vérifier l'avancement des projets que je parraine. Ce serait une agréable surprise que d'acquérir de nouvelles connaissances qui m'aideraient à gouverner mon domaine ou à impressionner autrui.\n\nD'un autre côté, peut-être une villégiature devrait-elle être réservée à la pure relaxation."
 granada.0060.a:0 "Quelles sont les dernières nouvelles des terres agricoles environnantes ?"
 granada.0060.a.tooltip:0 "Cette option vous permettra d'acquérir de nouvelles connaissances sur la gestion de notre domaine et sur les questions agricoles."
 granada.0060.b:0 "Je suis curieux de savoir ce que font mes jardiniers et botanistes."
 granada.0060.b.tooltip:0 "Choisissez cette option pour potentiellement acquérir de nouvelles connaissances sur la façon dont les plantes peuvent vous être bénéfiques personnellement."
 granada.0060.c:0 "C'est le moment de se détendre et de ne se soucier de rien de pénible."
 granada.0060.c.tooltip:0 "Choisissez cette option pour perdre beaucoup plus de [stress|E], au prix de renoncer à toute chance de gagner d'autres avantages."
 granada.0061.t:0 "La villégiature s'achève"
 granada.0061.desc:0 "Toutes les bonnes choses ont une fin. Même si j'ai savouré mon séjour dans ma #italic munya#! ces derniers jours, je dois retourner à mes devoirs de [ROOT.Char.GetTitleAsNameNoTooltip] de ces terres.\n\nNéanmoins, je me réjouis d'avoir pu saisir cette occasion d'échapper aux tourments de la vie. Se rendre à la campagne ainsi ranime toujours l'âme d'un [ROOT.Char.GetWomanMan], et j'attends avec impatience la prochaine occasion que j'aurai de le faire."
 granada.0061.a:0 "Je suis sûr que je reviendrai bientôt."
 granada.0062.t:0 "Agriculture à mon Munya"
 granada.0062.desc:0 "Nombre de #italic munyas#!, telle le mien, servent aussi de plantations produisant toutes sortes de choses, des délicieux fruits et légumes au sucre, en passant par la soie brute issue du mûrier. Aussi, bien que je passe beaucoup de temps à me reposer dans le manoir principal de mon #italic munya#!, j’ai grand désir de voir comment se portent le reste de mes terres.\n\nLes contremaîtres, ainsi que quelques savants spécialistes de l’agronomie que j’ai engagés naguère afin de guider ces activités, m’accompagnent tandis que je parcours champs et vergers. Peut-être devrais-je leur demander ce qu’ils ont récemment appris de leur travail. Ces informations pourraient m’être utiles une fois revenu de mes vacances, et m’aider dans mes responsabilités de [ROOT.Char.GetTitleAsNameNoTooltip] de cette région."
 granada.0062.a:0 "S'informer sur les rendements et la production des cultures"
 granada.0062.a.title:0 "Vous en apprendrez plus sur l'agriculture !"
 granada.0062.b:0 "Poser des questions sur les modes de préparation des denrées alimentaires"
 granada.0062.b.title:0 "Vous en apprendrez plus sur l'alimentation !"
 granada.0063.t:0 "Jardinage à mon Munya"
 granada.0063.desc:0 "Les #italic munyas#! de la campagne possèdent souvent de vastes jardins dans ou près du manoir, et le mien ne fait point exception. Fleurs, arbustes, arbres et autres plantes – tant celles qui sont natives d’Ibérie que celles, exotiques, venues de contrées lointaines – sont disposés avec un sens esthétique certain, aux côtés de charmantes allées, de bancs et d’éléments aquatiques tels que fontaines et bassins.\n\nJ’aime profiter des jardins de mon #italic munya#!, mais je souhaite aussi voir à quoi s’emploie mon personnel. Les jardiniers, ouvriers et savants spécialisés en botanique ne se contentent pas d’entretenir mes jardins, ils se livrent parfois à quelques expériences pour mieux connaître ces plantes.\n\nJe devrais leur demander s’ils ont appris quoi que ce soit d’intéressant. Ces informations pourraient m’être utiles à mon retour de vacances, et peut-être m’aider à trouver des moyens d’impressionner autrui ou de tirer le meilleur parti des jardins de mon palais habituel."
 granada.0063.a:0 "S'informer sur les nouvelles tendances en matière de jardins en Ibérie"
 granada.0063.a.title:0 "Vous en apprendrez plus sur le jardinage!"
 granada.0063.b:0 "Posez des questions sur les propriétés de ces plantes"
 granada.0063.b.title:0 "Vous en apprendrez plus sur les herbes et la médecine!"
 granada.0064.t:0 "Détente à mon Munya"
 granada.0064.desc:0 "Bien qu’il y ait bien des choses fascinantes que je pourrais faire à mon #italic munya#!, comme discuter de l’état des terres agricoles voisines avec mes contremaîtres ou examiner les dernières expériences menées par mes jardiniers et botanistes, je suis ici pour une raison principale : me détendre.\n\nCe séjour a été des plus agréables jusqu’ici, à passer mes journées à ne strictement rien faire – ou du moins rien de fatigant. Je prends quelques bons repas, fais la sieste à loisir durant la journée, me promène dans le jardin ou chevauche à travers la campagne, et m’adonne peut-être à quelques plaisirs simples comme la lecture d’un rouleau."
 granada.0064.a:0 "La vie est belle."
 granada.0064.a.title:0 "Vous êtes remarquablement reposé !"
