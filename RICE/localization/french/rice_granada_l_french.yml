 activity_granada_alhambra_gardens_name:0 "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] visite des jardins de l'Alhambra"
 activity_granada_munya_vacation_private:0 "Villégiature privée en munya"
 activity_granada_munya_vacation_private_name:0 "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] villégiature privée à Munya"
 activity_granada_munya_vacation_group:0 "Villégiature de groupe en munya"
 activity_granada_munya_vacation_group_name:0 "Villégiature de groupe en munya de [ACTIVITY.GetOwner.GetNamePossessiveOrMy|U]"
 activity_granada_munya_vacation_group_owner:0 "Hôte"
 RICE_recent_munya_vacation_req:0 "Est récemment parti en villégiature dans un [munya|E]"
 activity_RICE_granada_munya_vacation_private:0 "Villégiature privée en munya"
 activity_RICE_granada_munya_vacation_private_desc:0 "Tout noble digne de ce nom en Al‑Andalus possède plusieurs domaines de [munya|E] dans la campagne. Ces villas constituent un excellent lieu pour se reposer, que ce soit seul ou en compagnie d’autrui."
 activity_RICE_granada_munya_vacation_private_selection_tooltip: "Partez en vacances dans un [munya|E] seul.\n\n$RICE_granada_alhambra_munya_estate_context_tooltip$"
 activity_RICE_granada_munya_vacation_private_host_desc: "\n$BULLET_WITH_TAB$Perdez [stress_loss_i|E] [stress|E] (et bien davantage que pour des villégiatures de groupe)\n$BULLET_WITH_TAB$Autres bénéfices tels que des [character_modifiers|E] #P bénéfiques#!"
 activity_RICE_granada_munya_vacation_private_guest_desc: "$activity_RICE_granada_munya_vacation_private_host_desc$"
 activity_RICE_granada_munya_vacation_private_province_desc: ""
 activity_RICE_granada_munya_vacation_countryside_province_desc:0 "\n#P ++ Vous possédez un [munya|E] ici, dans un recoin tranquille de la campagne où il n’existe aucun [holdings|E] majeur.#!\n\n#italic Cela vous permettra de perdre davantage de [stress_loss_i|E] [stress|E] que dans d’autres lieux possibles.#!"
 activity_RICE_granada_munya_vacation_private_destination_selection: "$activity_RICE_granada_munya_vacation_private_province_desc$"
 activity_RICE_granada_munya_vacation_private_guest_help_text: "$activity_RICE_granada_munya_vacation_private$"
 activity_RICE_granada_munya_vacation_private_predicted_cost: "Le coût de villégiature au [munya|E] dépend des [activity_options|E] que vous choisissez."
 activity_RICE_granada_munya_vacation_private_conclusion_desc: "La [GetActivityType( 'activity_RICE_granada_munya_vacation_private' ).GetName] est terminé. L’interlude touche à sa fin, et il faut retourner aux rigueurs de l’existence !"
 RICE_granada_munya_vacation_private_type: "Type de visite"
 RICE_granada_munya_vacation_private_type_leisure: "Loisirs"
 RICE_granada_munya_vacation_private_type_leisure_desc: "$EFFECT_LIST_BULLET$ Profitez de cette occasion pour vous reposer autant que possible dans votre [munya|E] de la paisible campagne.\n$EFFECT_LIST_BULLET$ Perdez davantage de [stress_loss_i|E] [stress|E] que pour les autres options\n\n#weak Qui, sain d’esprit, songerait à accomplir quelque chose d’aussi terrible que travailler durant des vacances personnelles ? C’est le moment d’être aussi paresseux que possible !#!"
 RICE_granada_munya_vacation_private_type_agriculture: "Agriculture"
 RICE_granada_munya_vacation_private_type_agriculture_desc: "$EFFECT_LIST_BULLET$ Les [munyas|E] sont des lieux essentiels pour de nouveaux progrès dans la science de l’agriculture.\n$EFFECT_LIST_BULLET$ Gagnez de l’[experience|E] dans le [stewardship_lifestyle|E] ou le [learning_lifestyle|E]\n$EFFECT_LIST_BULLET$ Chance de gagner un [character_modifier|E] #P bénéfique#! lié à l’agriculture\n\n#weak Des gens versés dans la science de l’agriculture peuvent prodiguer à un dirigeant avisé et clairvoyant de sages conseils pour bien nourrir son peuple et accroître la prospérité de son domaine.#!"
 RICE_granada_munya_vacation_private_type_botany: "Botanique"
 RICE_granada_munya_vacation_private_type_botany_desc: "$EFFECT_LIST_BULLET$ C’est le moment idéal pour découvrir ce que vos jardiniers ont accompli dans votre [munya|E].\n$EFFECT_LIST_BULLET$ Gagnez de l’[experience|E] dans le [diplomacy_lifestyle|E] ou le [intrigue_lifestyle|E]\n$EFFECT_LIST_BULLET$ Chance de gagner un [character_modifier|E] #P bénéfique#! lié à la botanique\n\n#weak Le noble ou la noble dont les jardiniers parviennent à produire, à partir des jardins de leur [munya|E], les fleurs et plantes les plus délicates et les plus splendides, gagnera sans nul doute beaucoup de prestige et de respect aux yeux d’autrui.#!"
 RICE_granada_munya_vacation_private_length: "Durée de la villégiature"
 RICE_granada_munya_vacation_private_length_short: "Courte"
 RICE_granada_munya_vacation_private_length_short_desc: "$EFFECT_LIST_BULLET$ La villégiature au [munya|E] durera #V 1#! semaine\n$EFFECT_LIST_BULLET$Plus la villégiature est longue, plus vous et vos invités perdrez de [stress_loss_i|E] [stress|E].\n\n#weak Tout ce que vous pouvez vous permettre, c’est une brève parenthèse loin des tourments du monde, mais vous saurez la chérir.#!"
 RICE_granada_munya_vacation_private_length_medium: "Moyenne"
 RICE_granada_munya_vacation_private_length_medium_desc: "$EFFECT_LIST_BULLET$ La villégiature au [munya|E] durera #V 1#! mois\n$EFFECT_LIST_BULLET$Plus la villégiature est longue, plus vous et vos invités perdrez de [stress_loss_i|E] [stress|E].\n\n#weak Si vous devez tôt ou tard retourner à vos devoirs, il n'y a pas de mal à prendre des vacances prolongées, dans la mesure du raisonnable.#!"
 RICE_granada_munya_vacation_private_length_long: "Longue"
 RICE_granada_munya_vacation_private_length_long_desc: "$EFFECT_LIST_BULLET$ La villégiature au [munya|E] durera #V 3#! mois\n$EFFECT_LIST_BULLET$Plus la villégiature est longue, plus vous et vos invités perdrez de [stress_loss_i|E] [stress|E].\n\n#weak Parfois, il vous faut simplement fuir tout le reste, aussi longtemps que possible. Ce pourrait bien être l’un de ces moments.#!"
 RICE_granada_munya_vacation_private_vacation_phase: "Vacances"
 RICE_granada_munya_vacation_private_vacation_phase_desc: "C'est le moment de se détendre et d'oublier les soucis du monde."
 RICE_granada_munya_vacation_private_relaxation_intent_header: "Détente :"
 RICE_granada_munya_vacation_private_relaxation_intent: "Détente"
 RICE_granada_munya_vacation_private_relaxation_intent_desc: "Vous vous appliquerez à goûter aux plaisirs de ce séjour. Vous êtes assuré de perdre encore davantage de [stress_loss_i|E] [stress|E], et vous en perdrez tout spécialement plus si vous êtes [GetTrait('shy').GetName( GetNullCharacter )] ou [GetTrait('lazy').GetName( GetNullCharacter )]."
 RICE_granada_munya_vacation_private_reflection_intent_header: "Réflexion :"
 RICE_granada_munya_vacation_private_reflection_intent: "Réflexion"
 RICE_granada_munya_vacation_private_reflection_intent_desc: "Vous souhaitez contempler votre propre personne et le monde qui vous entoure. Vous gagnerez de l’[experience|E] dans votre [lifestyle|E] (en plus d’autres gains), et aurez une chance de recevoir une légère augmentation d’une [skill|E] aléatoire. Vous perdrez aussi du [stress_loss_i|E] [stress|E] si vous êtes [GetTrait('diligent').GetName( GetNullCharacter )]."
 RICE_granada_munya_vacation_private_exploration_intent_header: "Exploration :"
 RICE_granada_munya_vacation_private_exploration_intent: "Exploration"
 RICE_granada_munya_vacation_private_exploration_intent_desc: "Sans autrui pour vous importuner, vous pouvez découvrir les curiosités locales à votre propre rythme. Vous gagnerez [prestige_i|E] #V 100#! et le [modifier|E] [GetModifier('RICE_granada_explored_munya').GetNameWithTooltip] à la fin de l’[activity|E]. Vous perdrez aussi [stress_loss_i|E] [stress|E] si vous êtes [GetTrait('brave').GetName( GetNullCharacter )]."
