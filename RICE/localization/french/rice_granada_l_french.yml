 # Aspirations
 RICE_granada_aspiration_hafsa_desc: "\n\n#bold [historical_aspiration_main_objectives|E]#!\n$EFFECT_LIST_BULLET$Atteignez #V 100#! [trait_level_track_xp|E] dans une [trait_level_track|E] du [GetTrait('RICE_hafsa').GetName( GetNullCharacter )] [trait|E] en prenant la [decision|E] de $RICE_granada_hafsa_decision$ suffisamment de fois pour obtenir le [GetTrait('RICE_hafsa_full_rage').GetName( GetNullCharacter )] ou le [GetTrait('RICE_hafsa_full_recovery').GetName( GetNullCharacter )] [trait|E]\n\n#bold Récompenses#!\n$EFFECT_LIST_BULLET$Gagnez @dynasty_prestige_icon! #V [EmptyScope.ScriptValue('RICE_aspiration_medium_resource_bonus')]#! [dynasty_prestige|E]\n$EFFECT_LIST_BULLET$Gagnez @prestige_icon! #V [EmptyScope.ScriptValue('RICE_aspiration_large_resource_bonus')]#! [prestige|E] SI le [GetTrait('RICE_hafsa').GetName( GetNullCharacter )] [trait|E] est remplacé par le [GetTrait('RICE_hafsa_full_rage').GetName( GetNullCharacter )] [trait|E]\n$EFFECT_LIST_BULLET$Gagnez @piety_icon! #V [EmptyScope.ScriptValue('RICE_aspiration_large_resource_bonus')]#! [piety|E] SI le [GetTrait('RICE_hafsa').GetName( GetNullCharacter )] [trait|E] est remplacé par le [GetTrait('RICE_hafsa_full_recovery').GetName( GetNullCharacter )] [trait|E]"
 RICE_granada_historical_aspiration_action_hafsa: "#italic La mort de votre bien-aimé Abu Ja‘far, poète comme vous, pèse lourdement sur votre cœur. Votre chagrin est immense, et vous vous demandez si vous vous remettrez jamais de votre désespoir et de votre tristesse.#!$RICE_granada_aspiration_hafsa_desc$"
 RICE_granada_historical_aspiration_modifier_desc_hafsa: "[GetModifier('RICE_granada_aspiration_successfully_process_grief').GetNameWithTooltip]"

 # Aspiration Modifiers
 RICE_granada_aspiration_successfully_process_grief: "[RICE_aspiration|E] : Processus de guérison réussi"
 RICE_granada_aspiration_successfully_process_grief_desc: "#italic La mort d’Abu Ja‘far, le bien-aimé de Hafsa, poète comme elle, pèse lourdement sur son cœur. Son chagrin est immense, et elle se demande si elle se remettra jamais de son désespoir et de sa tristesse.#!$RICE_granada_aspiration_hafsa_desc$\n\n"

 # Traits
 trait_RICE_hafsa:0 "Deuil déchirant"
 trait_RICE_hafsa_desc:0 "Ce personnage pleure encore la perte de son amant et confrère poète, Abu Ja'far, et tente de faire son deuil.\n\n#weak Ce trait peut gagner des niveaux en sélectionnant les [travel_options|E] appropriées lors des [traveling|E].\n\n#weak Ce [trait|E] permet de prendre la [decision|E] $RICE_granada_hafsa_decision$. Si #V 100#! [trait_level_track_xp|E] sont atteints dans l'une ou l'autre [trait_level_track|E], alors ce [trait|E] sera remplacé par le [trait|E] correspondant [GetTrait('RICE_hafsa_full_rage').GetName( GetNullCharacter )] ou [GetTrait('RICE_hafsa_full_recovery').GetName( GetNullCharacter )], selon le [trait_level_track_xp|E].#!"
 trait_RICE_hafsa_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] pleure encore la perte de son amant et confrère poète, Abu Ja'far, et tente de faire son deuil.\n\n#weak Ce [trait|E] permet de prendre la [decision|E] $RICE_granada_hafsa_decision$. Si #V 100#! [trait_level_track_xp|E] sont atteints dans l'une ou l'autre [trait_level_track|E], alors ce [trait|E] sera remplacé par le [trait|E] correspondant [GetTrait('RICE_hafsa_full_rage').GetName( GetNullCharacter )] ou [GetTrait('RICE_hafsa_full_recovery').GetName( GetNullCharacter )], selon le [trait_level_track_xp|E].#!"
 trait_track_RICE_hafsa_rage:0 "Rage"
 trait_track_RICE_hafsa_rage_desc:0 "#weak Parle à l'éclair, souvenir de mon bien-aimé / — plongeant dans la nuit sans fond — / s'il se souvient comme il me tonna dessus : / donnant à mon cœur sa raclée, / une pluie de coups.#!"
 trait_track_RICE_hafsa_recovery:0 "Guérison"
 trait_track_RICE_hafsa_recovery_desc:0 "#weak Seigneur, donne Ta bénédiction / à ceux que les larmes enserrent, / invisibles tels les sourires des suppliciés, / dérobés comme l'eau d'un puits.#!"
 trait_RICE_hafsa_full_rage:0 "Rage endeuillée"
 trait_RICE_hafsa_full_rage_desc:0 "Le bien-aimé Abu Ja'far, confrère poète de ce personnage, fut cruellement exécuté il y a de nombreuses années. Ce dernier a canalisé ce deuil en une rage féconde, devenant une figure littéraire célèbre, quoique tempétueuse.\n\n#weak Ce trait peut gagner des niveaux en sélectionnant les [travel_options|E] appropriées lors des [traveling|E].\n\n#weak Ce [trait|E] permet les options $RICE_insult_uthman_name$ et $RICE_eulogize_abu_jafar_name$ de la [decision|E] $RICE_granada_hafsa_decision$.#!"
 trait_RICE_hafsa_full_rage_character_desc:0 "Le bien-aimé Abu Ja'far, confrère poète de [ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip], fut cruellement exécuté il y a de nombreuses années. [ROOT.GetCharacter.GetSheHe|U] a canalisé ce deuil en une rage féconde, devenant une figure littéraire célèbre, quoique tempétueuse.\n\n#weak Ce [trait|E] permet les options $RICE_insult_uthman_name$ et $RICE_eulogize_abu_jafar_name$ de la [decision|E] $RICE_granada_hafsa_decision$.#!"
 trait_RICE_hafsa_full_recovery:0 "Guérison du deuil"
 trait_RICE_hafsa_full_recovery_desc:0 "Le bien-aimé Abu Ja'far, confrère poète de ce personnage, fut cruellement exécuté il y a de nombreuses années. Ce dernier a pansé ce deuil, transformant son énergie en activités fécondes et bienfaisantes, comme instruire et guider autrui.\n\n#weak Ce trait peut gagner des niveaux en sélectionnant les [travel_options|E] appropriées lors des [traveling|E].\n\n#weak Ce [trait|E] permet les options $RICE_insult_uthman_name$ et $RICE_eulogize_abu_jafar_name$ de la [decision|E] $RICE_granada_hafsa_decision$.#!"
 trait_RICE_hafsa_full_recovery_character_desc:0 "Le bien-aimé Abu Ja'far, confrère poète de [ROOT.GetCharacter.GetFirstNamePossessiveNoTooltip], fut cruellement exécuté il y a de nombreuses années. [ROOT.GetCharacter.GetSheHe|U] a pansé ce deuil, transformant son énergie en activités fécondes et bienfaisantes, comme instruire et guider autrui.\n\n#weak Ce [trait|E] permet les options $RICE_stop_poetry_name$ et $RICE_teach_others_name$ de la [decision|E] $RICE_granada_hafsa_decision$.#!"
 
 # Game Concepts
 game_concept_alhambra_structure:0 "Structure"
 game_concept_alhambra_structures:0 "Structures"
 game_concept_expand_the_alhambra:0 "Élargir l'Alhambra"
 game_concept_alhambra:0 "Alhambra"
 game_concept_alhambra_desc:0 "L’Alhambra est un vaste complexe de palais et de forteresses situé à Grenade. Une fois le second niveau du [special_building|E] de l’Alhambra construit, les [rulers|E] du [county|E] de Grenade peuvent prendre une [decision|E] pour #bold $RICE_granada_alhambra_decision$#!, qui ne peut être prise qu’une seule fois par vie (deux fois si vous avez une [stewardship|E] ou un [learning|E] élevés).\n\nVous pouvez choisir entre huit types de structures : cinq uniques et trois génériques. Les structures génériques offrent des bonus plus simples et moins puissants, mais elles sont moins coûteuses et peuvent être construites à nouveau par de futurs [rulers|E]. Les structures uniques, quant à elles, procurent des effets plus particuliers et de meilleurs bonus, mais sont plus onéreuses.\n\nDeux autres [decisions|E] sont liées aux structures uniques. Construire le palais des Comares déverrouille la [decision|E] #bold $RICE_granada_alhambra_comares_baths$#!, dont vous pouvez tirer encore plus de bonus en étendant l’Alhambra avec la Maison de culte de l’Alhambra. De même, la [decision|E] #bold $RICE_granada_admire_alhambra_gardens$#! est toujours déverrouillée une fois le second niveau du [special_building|E] de l’Alhambra construit, mais vous pourrez en tirer davantage de bonus en étendant l’Alhambra avec le #bold Generalife#!."
 game_concept_munya:0 "Munya"
 game_concept_munyas:0 "Munyas"
 game_concept_munya_desc:0 "Deux [activities|E] sont associées aux soi‑disant munyas, disponibles pour les [rulers|E] dont la [realm_capital|E] se trouve en [GetGeographicalRegion('world_europe_west_iberia').GetName], et qui répondent à certaines conditions de [culture|E] et de [faith|E], comme le fait de suivre une [faith|E] musulmane ou d’être d’une [culture|E] ayant un [heritage|E] moyen‑orientale spécifique. Historiquement, les #italic munyas#! étaient de grands domaines campagnards appartenant aux élites d’Al‑Andalus.\n\nIl existe deux variantes de cette [activity|E]. Un [GetActivityType( 'activity_RICE_granada_munya_vacation_private' ).GetName] vous permet de vous détendre seul, tandis qu’un [GetActivityType( 'activity_RICE_granada_munya_vacation_group' ).GetName] offre l’occasion de savourer la compagnie d’autrui. Il se peut que vous soyez parfois invité à rejoindre votre [liege|E] lors d’une excursion à la campagne !\n\nLes deux types de villégiature sont des [activities|E] distinctes susceptibles d’octroyer des bienfaits différents. Par exemple, partir seul peut vous offrir l’occasion d’en apprendre davantage sur la gestion de l’agriculture de votre royaume."


