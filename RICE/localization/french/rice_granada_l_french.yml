 RICE_granada_munya_vacation_group_merriment_intent_header: "Gaieté :"
 RICE_granada_munya_vacation_group_merriment_intent: "Gaieté"
 RICE_granada_munya_vacation_group_merriment_intent_desc: "Vous désirez passer ici un #italic très#! bon moment. Vous perdrez [stress_loss_i|E] [stress|E] additionnels. Vous en perdrez encore plus si vous êtes [GetTrait('gluttonous').GetName( GetNullCharacter )], [GetTrait('gregarious').GetName( GetNullCharacter )], ou [GetTrait('lustful').GetName( GetNullCharacter )]."
 RICE_granada_munya_vacation_group_reputation_intent_header: "Réputation :"
 RICE_granada_munya_vacation_group_reputation_intent: "Réputation"
 RICE_granada_munya_vacation_group_reputation_intent_desc: "Vous voulez être connu comme quelqu’un d’agréable lors de ces sorties au [munya|E]. Gagnez [prestige_i|E] [prestige|E] en plus de ce que vous avez déjà acquis. Vous perdrez [stress_loss_i|E] [stress|E] si vous êtes [GetTrait('ambitious').GetName( GetNullCharacter )], [GetTrait('diligent').GetName( GetNullCharacter )], ou [GetTrait('arrogant').GetName( GetNullCharacter )]."
