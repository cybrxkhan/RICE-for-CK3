 granada.0040.t:0 "Bains des Comares"
 granada.0040.desc:0 "Me baigner dans les bains royaux de l’Alhambra est tellement… #italic relaxant#!. Tellement #italic rafraîchissant#!. Tellement #italic revigorant#!. Comment pourrais‑je décrire autrement ce lieu ?\n\nIl règne ici une atmosphère particulièrement paisible, même si, à vrai dire, on pourrait en dire autant du reste de l’Alhambra. J’y viens tout le temps, et c’est toujours agréable – mais aujourd’hui, l’endroit semble encore plus merveilleux que d’ordinaire, comme si tous mes soucis disparaissaient.\n\nAprès que les servantes des bains m’ont aidée à frotter mon corps avec du savon pour en ôter les impuretés, je vais vers l’eau chaude ruisselante pour me rincer."
 granada.0040.a:0 "Ah… tout propre et serein…."
 granada.0041.t:0 "Les jardins de l’Alhambra"
 granada.0041.desc:0 "Il existe de nombreux jardins à travers le monde, mais aucun, à coup sûr, n’égale ceux de l’Alhambra. Au fil des années, les jardins ont été continuellement agrandis avec toujours plus d’arbres, de fleurs, d’arbustes, de fontaines, de canaux, de cours et bien plus encore.\n\nJe suis chanceux, en tant que [ROOT.Char.GetTitleAsNameNoTooltip] de [granada.GetNameNoTier], de pouvoir accéder à ces charmants jardins à tout moment. Voilà quelque temps que je n’ai pas pris le temps de passer une journée entière à les savourer, d’ailleurs."
 granada.0041.a:0 "Il est bon d'apprécier ce que l'Alhambra a à offrir."
