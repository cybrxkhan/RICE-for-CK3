 building_type_RICE_granada_alcazaba_01:0 "Alcazaba de Málaga"
 building_type_RICE_granada_alcazaba_01_desc:0 "Surplombant la mer Méditerranée, cette modeste mais importante forteresse protège la ville de Malaga à la fois sur terre et sur mer."
 building_RICE_granada_alcazaba_01:0 "$building_type_RICE_granada_alcazaba_01$"
 building_RICE_granada_alcazaba_01_desc:0 "$building_type_RICE_granada_alcazaba_01_desc$"
 building_RICE_granada_alcazaba_02:0 "$building_type_RICE_granada_alcazaba_01$ palatial"
 building_RICE_granada_alcazaba_02_desc:0 "S'appuyant sur les modestes fortifications construites à cet endroit, le complexe imprenable du palais de Malaga est l'un des plus impressionnants #italic alcazabas#!, relié au reste des défenses de la ville. Il contient également un magnifique palais, avec des jardins, des piscines et des bains exquis."

 
 # Modifiers
 RICE_granada_garnata_al_yahud_tensions:0 "Tensions à Garnata al-Yahud"
 RICE_granada_garnata_al_yahud_tensions_desc:0 "La légende veut que Grenade ait été fondée par des exilés juifs il y a des siècles. Une grande partie de la population de la ville est juive, si bien qu’en arabe, la cité est souvent appelée « Garnata al-Yahud » (« Grenade des Juifs »). À présent que Grenade a supplanté Ilbira comme centre régional, d’autres groupes s’y sont installés, et des tensions sont apparues entre eux et les Juifs : certains redoutent qu’un jour des violences n’éclatent contre ces derniers.\n\n#italic Tant que ce [county_modifier|E] est actif, les [rulers|E] du [county|E] de Grenade peuvent à l’occasion recevoir de talentueux courtisans juifs prêts à servir à leur cour. Cependant, le sentiment antijuif pourrait à l’avenir atteindre un point d’ébullition parmi les habitants…#!"
 RICE_granada_garnata_al_yahud_jews_dominant:0 "L'influence juive à Garnata al-Yahud"
 RICE_granada_garnata_al_yahud_jews_dominant_desc:0 "La légende veut que Grenade ait été fondée par des exilés juifs il y a des siècles. Une grande partie de la population de la ville est juive, si bien qu’en arabe, la cité est souvent appelée « Garnata al-Yahud » (« Grenade des Juifs »). En raison de diverses évolutions historiques et contemporaines, bien que de légères tensions surgissent de temps à autre, la ville est réputée être un refuge pour les Juifs, et les élites juives exercent une grande influence sur la direction de la région.\n\n#italic Tant que ce [county_modifier|E] est actif, les [rulers|E] du [county|E] de Grenade peuvent à l’occasion recevoir de talentueux courtisans juifs prêts à servir à leur cour.#!"
 RICE_granada_garnata_al_yahud_jews_accepted:0 "Les Juifs sont acceptés à Garnata al-Yahud"
 RICE_granada_garnata_al_yahud_jews_accepted_desc:0 "La légende veut que Grenade ait été fondée par des exilés juifs il y a des siècles. Une grande partie de la population de la ville est juive, si bien qu’en arabe, la cité est souvent appelée « Garnata al-Yahud » (« Grenade des Juifs »). En raison de diverses évolutions historiques et contemporaines, bien que de légères tensions surgissent de temps à autre, les Juifs sont devenus une part acceptée de la société grenadine et sont probablement là pour durer.\n\n#italic Tant que ce [county_modifier|E] est actif, les [rulers|E] du [county|E] de Grenade peuvent à l’occasion recevoir de talentueux courtisans juifs prêts à servir à leur cour.#!"
 RICE_granada_transferred_to_granada:0 "Nouveau siège du pouvoir à Grenade"
 RICE_granada_transferred_to_granada_desc:0 "L'ancienne base du pouvoir de la région, Ilbira, n'était pas bien adaptée à la défense de la région car elle se trouvait sur une plaine plate. Grenade, qui se trouve sur un terrain plus accidenté, est beaucoup plus défendable. Les autorités locales ont commencé à transférer le siège du pouvoir local."
 RICE_granada_lingering_tensions_light:0 "Sentiment Anti-Juif persistant"
 RICE_granada_lingering_tensions_light_desc:0 "Grenade a accueilli de nombreux juifs depuis des générations, et beaucoup d'entre eux sont des fonctionnaires importants de la ville. Récemment, le sentiment antijuif a failli atteindre un point d'ébullition et aurait pu entraîner des morts inutiles, mais les autorités locales ont usé d'une diplomatie habile pour rétablir l'ordre avant que la situation ne devienne incontrôlable. Bien qu'il subsiste des tensions entre les non-Juifs et leurs voisins juifs, les Juifs de Grenade sont soulagés que la tragédie ait été évitée, et la ville attire des Juifs de loin grâce à sa réputation de havre de tolérance (relative)."
 RICE_granada_lingering_tensions_high:0 "Sentiment antijuif important et persistant"
 RICE_granada_lingering_tensions_high_desc:0 "Grenade abrite de nombreux Juifs depuis des générations, et beaucoup d'entre eux sont des fonctionnaires éminents de la ville. Récemment, le sentiment antijuif a failli atteindre un point d'ébullition et aurait pu entraîner de nombreux décès inutiles, mais les autorités locales ont fait usage de la force pour rétablir l'ordre avant que la situation ne devienne incontrôlable. Si les tensions se sont apaisées pour l'instant entre les non-Juifs et leurs voisins juifs, elles n'ont pas totalement disparu, du moins pas encore."
 RICE_granada_pogrom_happened:0 "Pogrom à Grenade"
 RICE_granada_pogrom_happened_desc:0 "Grenade a abrité de nombreux juifs pendant des générations, et beaucoup d'entre eux étaient d'éminents fonctionnaires de la ville. Récemment, le sentiment anti-juif a atteint un point d'ébullition et une foule a assassiné un important administrateur juif accusé de comploter avec les ennemis de la ville, avant de descendre dans les quartiers juifs de la ville pour massacrer tous les Juifs qu'elle pouvait trouver. Les survivants juifs ont fui ailleurs et la violence a perturbé l'économie et la stabilité de la ville."
