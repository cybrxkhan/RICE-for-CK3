 granada.0070.t:0 "La villégiature commence"
 granada.0070.desc:0 "Je suis à présent dans mon #italic munya#! de la campagne pour mon excursion avec ma cour. Je me suis assuré d’arriver tôt afin de vérifier que tout était prêt. Lorsque les premiers invités commencent à arriver, je les accueille avec grâce en maître de maison, avant de les faire entrer.\n\nDurant les jours à venir, nous goûterons à toutes sortes de divertissements en cette charmante villa. Certains hôtes cherchent à éblouir leurs invités par les vues splendides du manoir et de ses environs. D’autres, d’un tempérament plus cultivé, aiment les discussions intellectuelles – par exemple sur les expériences botaniques ou agronomiques menées dans ces #italic munyas#!, ou sur des récitations poétiques. D’autres encore souhaitent simplement festoyer et s’amuser.\n\nBien entendu, j’ai déjà décidé de ce que nous ferons."
 granada.0070.a:0 "Goûtons à la beauté des jardins et des panoramas."
 granada.0070.a.tooltip.1:0 "Vous gagnerez [prestige|E] OU [piety|E], et vos #italic munyas#! pourraient devenir renommés pour leur beauté et leur charme esthétique."
 granada.0070.a.tooltip.2:0 "Les invités introvertis et réservés pourraient davantage apprécier cette activité, et avoir une meilleure [opinion|E] de vous une fois les vacances achevées."
 granada.0070.b:0 "Livrons-nous à la poésie et aux débats intellectuels."
 granada.0070.b.tooltip.1:0 "Vous gagnerez [piety|E], et vos #italic munyas#! pourraient devenir renommés pour attirer des érudits et poètes éloquents."
 granada.0070.b.tooltip.2:0 "Les invités intellectuels et réfléchis pourraient davantage apprécier cette activité, et avoir une meilleure [opinion|E] de vous une fois les vacances achevées."
 granada.0070.c:0 "Faisons la fête et oublions les soucis de la vie !"
 granada.0070.c.tooltip.1:0 "Vous gagnerez [prestige|E], et vos #italic munyas#! pourraient devenir renommés pour leurs nombreuses fêtes animées et joyeuses."
 granada.0070.c.tooltip.2:0 "Les invités extravertis et sociables pourraient davantage apprécier cette activité, et avoir une meilleure [opinion|E] de vous une fois les vacances achevées."
 granada.0071.t:0 "La villégiature commence"
 granada.0071.desc:0 "Je suis enfin arrivé au #italic munya#! de [host.GetTitledFirstNamePossessive] dans la campagne pour notre excursion. J’aperçois que certains des autres invités viennent tout juste d’arriver eux aussi. L'hôte même sort de la résidence principale pour nous saluer et nous inviter à entrer.\n\nBien que nombre d’aristocrates de la région possèdent ce genre de villas, moi inclus, il est toujours intéressant de voir celles appartenant à autrui. Certains cherchent avant tout à réjouir leurs visiteurs avec de magnifiques jardins, une belle architecture ou des panoramas champêtres à couper le souffle. D’autres cultivent une atmosphère de sophistication en invitant de talentueux poètes à se livrer à des activités intellectuelles et littéraires. D’autres encore préfèrent attirer des savants pour mener des expériences botaniques ou agronomiques.\n\nQuoi qu’il en soit, une fois tous les invités arrivés, qui sait quels divertissements nous attendent dans les jours à venir ?"
 granada.0071.a:0 "Je me demande quel sera notre itinéraire ?"
 granada.0072.t:0 "La villégiature s'achève"
 granada.0072.desc:0 "Toute bonne chose a une fin. Si les derniers jours passés dans mon #italic munya#! furent fort plaisants, mes invités et moi devons tôt ou tard retourner à nos occupations quotidiennes. Nous avons tenu un grand banquet final hier soir et, à présent, en ce beau matin radieux, nous devons nous séparer.\n\nNéanmoins, je sais que nous avons tous passé un excellent moment, et que ce fut une agréable diversion aux soucis de la vie de tous les jours."
 granada.0072.a:0 "J’attends déjà la prochaine excursion avec impatience !"
 granada.0073.t:0 "La villégiature s'achève"
 granada.0073.desc:0 "Toute bonne chose a une fin. Si les derniers jours passés dans mon #italic munya#! furent fort plaisants, moi et les autres qui avons rejoint [host.GetTitledFirstName] dans son #italic munya#! pour de longs jours de repos et de loisirs devons tôt ou tard retourner à nos occupations quotidiennes. Nous avons tenu un grand banquet final hier soir et, à présent, en ce beau matin radieux, nous devons nous séparer.\n\nNéanmoins, je sais que nous avons tous passé un excellent moment, et que ce fut une agréable diversion aux soucis de la vie de tous les jours."
 granada.0073.a:0 "Peut-être organiserai-je quelque chose de ce genre dans l’un de mes #italic munyas#!."
 granada.0074.t:0 "Les jardins de mon #italic munya#!"
 granada.0074.desc:0 "Ces derniers jours, j’ai laissé mes invités parcourir certains des plus beaux et brillants jardins de mon #italic munya#!. J’ai beaucoup œuvré afin que ces jardins regorgent de toutes sortes de plantes merveilleuses, des fleurs exotiques aux couleurs éclatantes aux grands arbres imposants sous lesquels il fait bon se reposer. Je veille également à leur montrer quelques-unes des fontaines que j’ai fait installer, dont les splendides jeux d’eau sont rendus possibles par les petits canaux qui amènent l’eau fraîche de la rivière voisine jusqu’à mon manoir.\n\nIl semble que mes efforts ont porté leurs fruits, car je vois l’émerveillement dans les yeux de mes invités, tandis que nous nous reposons dans un coin de jardin – certains sur des bancs, d’autres directement à même le sol – en conversant et en goûtant le temps agréable passé ici."
 granada.0074.a:0 "Je suis ravie qu'ils apprécient les jardins !"
 granada.0074.a.title:0 "Vos invités vantent vos jardins partout !"
 granada.0075.t:0 "Les jardins du #italic munya#! de [host.GetTitledFirstNamePossessiveNoTooltip]"
 granada.0075.desc:0 "Ces derniers jours, [host.GetTitledFirstName] nous a montré certains des plus beaux et brillants jardins de son #italic munya#!. Il est manifeste qu'[host.GetSheHe] en est très fier.\n\nL’autre jour, lorsque je suis entré pour la première fois dans le manoir, j’ai aperçu fugacement quelques jardins au loin. Mais les voir de près est une tout autre affaire ! Ces jardins, comme tout jardin devrait l’être, sont emplis non seulement de plantes spectaculaires – des fleurs étranges mais aux couleurs séduisantes venues de terres lointaines, jusqu’aux hauts arbres majestueux offrant une ombre parfaite pour s’y reposer – mais ils comportent aussi quantité d’éléments aquatiques créatifs, comme de fraîches et revigorantes fontaines et de petits canaux que l’on peut enjamber aisément et observer pendant des heures.\n\nAujourd’hui, nous nous reposons dans l’un de ces jardins – certains d’entre nous sur des bancs, d’autres assis à même le sol – tandis que nous bavardons et savourons notre séjour ici."
 granada.0075.a:0 "J'adore me retrouver dans des endroits aussi charmants !"
 granada.0075.a.title:0 "Vous prenez plaisir à socialiser dans les jardins du #italic munya#!"
 granada.0075.b:0 "Je veux me détendre et observer le paysage."
 granada.0075.b.title:0 "Vous prenez plaisir à inspecter les jardins du #italic munya#!"
 granada.0076.t:0 "Un #italic munya#! de grande culture"
 granada.0076.desc:0 "Aux côtés de mes invités, j’ai aussi convié quelques savants et poètes locaux à notre excursion dans mon #italic munya#!. Des jardins reposants aux salles à manger, des bains aux diverses cours et salles de rassemblement, je vois nombre de mes invités se livrer entre eux à toute sorte d’activités intellectuelles.\n\nCertains débattent des subtilités de la politique actuelle, ou de questions théologiques et philosophiques. D’autres organisent des concours de poésie, récitant de beaux poèmes les uns aux autres, qu’ils traitent des magnifiques scènes qui nous entourent ou de leurs interlocuteurs (de la satire à la flatterie). D’autres encore, d’un tempérament plus calme, semblent apprécier une bonne partie d’échecs ou la lecture de rouleaux issus de ma bibliothèque."
 granada.0076.a:0 "Dans l’ensemble, l’atmosphère est des plus raffinées."
 granada.0076.a.title:0 "Vos invités font connaître vos penchants culturels !"
 granada.0077.t:0 "Un #italic munya#! de grande culture"
 granada.0077.desc:0 "[host.GetTitledFirstName] nous a encouragés à participer à diverses activités intellectuelles ces derniers jours dans son #italic munya#!. La marque d’un grand [host.GetTitleAsNameNoTooltip], après tout, est de s’entourer de gens de culture et de savoir, et [host.GetFirstNameNoTooltip] a même convié quelques savants et poètes locaux à se joindre à nous pour cette excursion.\n\nAinsi, si ces vacances ne sont pas les plus débridées qui soient, elles font la joie de ceux qui ont l’esprit plus tourné vers l’intellect. Chaque jour, je vois certains invités débattre de questions politiques, ou de théologie et de philosophie. D’autres travaillent leurs talents littéraires et s’affrontent en concours de poésie improvisés. D’autres encore, d’un caractère plus réservé, se plaisent à des parties d’échecs ou à la lecture de rouleaux tirés de la bibliothèque de [host.GetFirstNamePossessiveNoTooltip]."
 granada.0077.a:0 "Ces discussions intellectuelles sont éclairantes."
 granada.0077.a.title:0 "Vous acquérez des connaissances intellectuelles"
 granada.0077.b:0 "Jamais la poésie ne fut plus gratifiante."
 granada.0077.b.title:0 "Vous remportez quelques concours de poésie"
 granada.0077.c:0 "J’apprécie de jouer aux échecs et de lire des livres ici."
 granada.0077.c.title.1:0 "Vous avez trouvé un bon livre dans la bibliothèque"
 granada.0077.c.title.2:0 "Vos parties d’échecs sont des matchs passionnants"
 granada.0078.t:0 "Faire la fête au #italic munya#!"
 granada.0078.desc:0 "Lorsque #italic certains#! choisissent de se détendre dans un #italic munya#! en compagnie d’autrui, ils s’adonnent à des activités plus productives, comme débattre de complexes questions savantes, explorer la campagne ou mener des expériences botaniques. Mes invités et moi n’avons pas de temps à consacrer à de telles occupations fastidieuses !\n\nSi mes invités sont libres de faire ce que bon leur semble (dans une certaine mesure), nous sommes ici pour nous divertir. Ces derniers jours, j’ai fait grand effort pour leur fournir abondamment nourriture et boisson afin que nous puissions nous adonner aux plaisirs de la table à notre guise, écouter des performances musicales enjouées et délicieuses, et socialiser au sein d’une assemblée de gens de bonne compagnie qui savent goûter aux joies de l’existence."
 granada.0078.a:0 "Pas besoin d'être malheureux, nous sommes là pour nous amuser !"
 granada.0078.a.title:0 "Vos invités vantent partout vos fêtes extraordinaires !"
 granada.0079.t:0 "Faire la fête au #italic munya#!"
 granada.0079.desc:0 "[host.GetTitledFirstName] ne cesse de nous offrir banquet sur banquet depuis notre arrivée dans son #italic munya#!. Certes, ce n’est peut-être pas le plus grand ni le plus déchaîné des festins auxquels j’aie assisté, mais il y a un certain charme à organiser des réjouissances dans un beau manoir de campagne.\n\nBien que nous soyons libres de nous livrer à d’autres activités, je trouve à peine un moment pour moi ! Ces derniers jours, je n’ai fait pour l’essentiel que manger, boire, savourer de délicieuses performances musicales ou converser avec les autres invités. Beaucoup de ceux qui se sont rassemblés ici semblent passer un fort bon moment, sans le moindre doute."
 granada.0079.a:0 "L'heure de la prochaine fête a-t-elle déjà sonné ?"
 granada.0080.t:0 "Industrie de la soie prospère"
 granada.0080.desc:0 "La soie est, depuis de nombreuses années, l’une des principales exportations de la région de [granada_duchy.GetNameNoTier], en particulier d'[almeria.GetNameNoTier]. Ces derniers temps, pour diverses raisons, les soieries produites à [county.GetNameNoTier] se révèlent encore plus profitables qu’à l’ordinaire ! Voilà qui promet prospérité à la région, en attirant un grand commerce."
 granada.0080.a:0 "J’en suis bien aise."
 granada.0081.t:0 "Industrie de la soie en difficulté"
 granada.0081.desc:0 "La soie est, depuis de nombreuses années, l’une des principales exportations de la région de [granada_duchy.GetNameNoTier], en particulier d'[almeria.GetNameNoTier]. Hélas, dernièrement, les soieries produites à [county.GetNameNoTier] ne se sont pas montrées aussi rentables qu’autrefois, pour diverses raisons. Peut-être certains réseaux de commerce mondiaux connaissent-ils présentement des difficultés, ou bien la quantité de soie brute produite cette année n’a-t-elle simplement pas été suffisante."
 granada.0081.a:0 "J'espère que cela n'affectera pas trop l'économie de la région."
 granada.0082.t:0 "La beauté de [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip]"
 granada.0082.desc:0 "Un voyageur venu de loin me rend visite aujourd’hui. Cet homme ne peut que louer la beauté des paysages de [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier].\n\n« J’étais sceptique avant de venir ici, avoue-t-il, mais à présent que j’ai vu les vallées, les terres arides, les forêts, les montagnes, les rivières… Il m’est difficile de décrire la splendeur de cet endroit. C’est comme une parfaite combinaison de différents climats, un juste milieu entre les extrêmes. Vous êtes béni de vivre en ce lieu, [ROOT.Char.GetTitledFirstName], et je suis certain que votre terre est paisible et prospère. Si je le pouvais, je m’établirais ici, mais tel ne semble point être mon destin, car j’ai mes devoirs. »"
 granada.0082.a:0 "Je vous remercie. Dois-je vous montrer quelques curiosités ?"
 granada.0083.t:0 "Bâtonnets d’aubergine frits"
 granada.0083.desc:0 "Ces derniers temps, j’ai pris l’habitude de manger des bâtonnets d’aubergine frits – je suis fort reconnaissant à mes cuisiniers de savoir préparer une telle délicatesse ! Cette friandise a été apportée sur la péninsule par les Arabes, mais les habitants locaux l’ont depuis faite leur, en particulier à [granada_duchy.GetNameNoTier], où elle est très prisée. En enrobant les aubergines de sucre de canne, on obtient un mélange unique de saveurs sucrées et salées."
 granada.0083.a:0 "Ce sont assurément mes #italic tapas#! préférées."
 granada.0084.t:0 "Oranges et huile d'olive"
 granada.0084.desc:0 "Récemment, j’ai pris goût à déguster des oranges trempées dans l’huile d’olive au cours de mes repas. C’est une délicatesse traditionnelle de [granada_duchy.GetNameNoTier], apportée ici par les Arabes il y a bien des années, et désormais partie intégrante de la cuisine locale.\n\nDes oranges juteuses, mûries sous le soleil andalou, et une huile d’olive d’une saveur incomparable… comment y résister ? Et, bien sûr, parfois le tout est mêlé de morue fraîchement pêchée, d’olives, d’œufs, d’oignons, d’ail ou de diverses épices à ma discrétion… C’est un mets de choix."
 granada.0084.a:0 "Savoureux, délicieux !"
 granada.0085.t:0 "Un nouveau canal à [granada_county.GetNameNoTierNoTooltip] ?"
 granada.0085.desc:0 "[granada_county.GetNameNoTier] a la chance de se trouver au confluent de plusieurs grands cours d’eau, en particulier le Darro, le Genil, le Monachil et le Beiro. La cité dispose ainsi de nombreuses sources d’eau douce.\n\nNous venons de découvrir un emplacement parfait pour construire un nouveau canal partant de l’une de ces rivières vers la ville. Toutefois, mes fonctionnaires ne s’accordent pas sur l’endroit où ce canal devrait être dirigé.\n\nCertains affirment qu’il serait préférable d’utiliser son eau pour irriguer les terres voisines afin d’étendre nos surfaces cultivables. D’autres soutiennent qu’il vaut mieux alimenter en eau les bains publics et les puits pour les citadins. D’autres encore jugent que nous devrions créer de nouveaux jardins et fontaines utilisant l’eau du canal pour embellir la cité."
 granada.0085.a:0 "Investir dans notre agriculture serait une idée intelligente."
 granada.0085.b:0 "Des bains et des fontaines combleront notre peuple."
 granada.0085.c:0 "L'embellissement de la ville rehausserait notre prestige."
 granada.0085.d:0 "Je ne pense pas que nous ayons les ressources nécessaires pour un nouveau canal."
 granada.0086.t:0 "Un canal a besoin d'être entretenu"
 granada.0086.desc:0 "[granada_county.GetNameNoTier] se trouve au confluent de plusieurs grands cours d’eau, en particulier le Darro, le Genil, le Monachil et le Beiro. Avec une telle abondance de bonnes sources d’eau, de nombreux canaux et aqueducs furent construits au fil des siècles pour acheminer l’eau jusqu’à la ville.\n\nToutefois, ces canaux traversent parfois les zones accidentées de la Sierra Nevada et peuvent tomber en décrépitude. J’ai reçu nouvelle que l’un d’eux est dans un état déplorable, et qu’il lui faut des travaux d’entretien au plus tôt pour rester fonctionnel. Il traverse des zones importantes de la région utilisées pour l’agriculture et fournit l’eau nécessaire à plusieurs quartiers clés ; il est donc crucial qu’il soit maintenu en bon état."
 granada.0086.a:0 "Mes fonctionnaires disposeront des fonds dont ils ont besoin."
 granada.0086.b:0 "Je ne peux pas utiliser nos fonds pour l'instant."
 granada.0087.t:0 "Le secteur industriel"
 granada.0087.desc:0 "Aujourd’hui, j’inspecte certains quartiers industriels de [granada_county.GetNameNoTier]. Plusieurs industries importantes de la région, en particulier le tissage de la soie, la poterie et la teinture, sont installées à proximité du Darro, car les ateliers produisant ces biens ont besoin d’un bon approvisionnement en eau pour leurs activités.\n\nQuoi qu’il en soit, la puanteur de l’industrie n’est guère à mon goût. Toutefois, je fais de mon mieux pour discuter des problèmes qui affectent les artisans de ces lieux avec leurs principaux représentants, chefs d’ateliers et éminents marchands."
 granada.0087.a:0 "Tel est le travail que je dois accomplir."
 granada.0088.t:0 "Magnifiques Terres"
 granada.0088.desc:0 "Certains affirment que les terres de [granada_duchy.GetNameNoTier] comptent parmi les plus belles du monde – qu’elles offrent un parfait équilibre entre luxuriance et aridité, et une architecture d’une splendeur inégalée, marquée par les influences arabes, berbères et latines. Gouverner un domaine ici… je puis sans doute me tenir pour chanceux."
 granada.0088.a:0 "Il est vrai que j’ai la fortune de régner sur une terre si merveilleuse."
 granada.0088.b:0 "Je suis sûr que d'autres parties du monde ont aussi de bons arguments."
 granada.0089.t:0 "L'or de la rivière Darro"
 granada.0089.desc:0 "On a toujours trouvé de l’or, en petites quantités, dans le Darro, l’une des principales rivières qui traversent la cité de [granada_county.GetNameNoTier]. Cependant, j’ai récemment reçu nouvelle que, pour une raison ou une autre, l’or s’y trouve plus aisément qu’auparavant.\n\nAujourd’hui, j’ai donc envoyé quelques-uns de mes serviteurs pour aller chercher de l’or dans le lit de la rivière. Ils viennent de revenir avec une certaine quantité de ce métal précieux ; si ce n’est pas grand-chose, c’est déjà plus que ce à quoi je m’attendais."
 granada.0089.a:0 "Bon travail !"
 granada.0090.t:0 "Inspection des canaux de [granada_county.GetNameNoTierNoTooltip]"
 granada.0090.desc:0 "Aujourd’hui, j’inspecte certains canaux de [granada_county.GetNameNoTier]. Beaucoup d’entre eux acheminent l’eau de la rivière Darro vers les différents quartiers de la ville, mais certains proviennent également d’autres rivières voisines, comme le Genil.\n\nEn vérité, il est bon que je sois tenu informé de l’état de ces canaux. Non seulement ils sont essentiels pour fournir l’eau dont les habitants ont besoin, que ce soit pour boire, se baigner, cultiver, travailler dans les ateliers et bien d’autres choses, mais il m’importe aussi de savoir où se trouvent ces canaux, lesquels nécessitent des travaux d’entretien ou des améliorations, et sur lesquels nous pourrons compter en cas de siège par nos ennemis ou de calamités naturelles."
 granada.0090.a:0 "Poursuivons maintenant notre tour...."
