 activity_RICE_granada_munya_vacation_group_selection_tooltip: "Partez en vacances dans un [munya|E] avec un groupe de personnes.\n\n$RICE_granada_alhambra_munya_estate_context_tooltip$"
 activity_RICE_granada_munya_vacation_group_host_desc: "\n$BULLET_WITH_TAB$ [prestige_i|E] [prestige|E]\n$BULLET_WITH_TAB$ Les invités ont une meilleure [opinions|E] du maître de maison\n$BULLET_WITH_TAB$Perdez [stress_loss_i|E] [stress|E] (bien moins toutefois que pour des villégiatures privées)\n$BULLET_WITH_TAB$Autres bénéfices tels que des [character_modifiers|E] #P bénéfiques#!"
 activity_RICE_granada_munya_vacation_group_guest_desc: "$activity_RICE_granada_munya_vacation_group_host_desc$"
 activity_RICE_granada_munya_vacation_group_province_desc: "\n#P ++ Vous possédez un [munya|E] ici, dans une partie tranquille de la campagne dépourvue de [holdings|E] majeures.#!\n\n#italic Cela mènera à une perte accrue de [stress_loss_i|E] [stress|E] comparé aux autres lieux possibles.#!"
