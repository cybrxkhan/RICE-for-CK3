 granada.0030.t:0 "Peine de [hafsa.GetFirstNamePossessiveNoTooltip]"
 granada.0030.desc:0 "Tu hantes encore mes rêves, [abu_jafar.GetFirstName]. Jadis, nous passions des journées oisives et insouciantes, composant des poèmes l’un pour l’autre et nous étreignant sous la lune. Nous menions alors une vie heureuse, deux oiseaux dans un jardin, deux poètes respectés et célèbres en ce monde.\n\n[uthman.GetFirstName], ce [uthman.Custom('InsultNoun')] [uthman.Custom('InsultAdjective')], a mis fin à notre bonheur. [uthman.GetSheHe|U] me convoitait comme un jouet, tel une bête sans esprit, alors même qu'[uthman.GetSheHe] savait parfaitement que mon cœur t’appartenait. Même alors, tu le servais loyalement en tant que fonctionnaire, jusqu’à ce que ses complots et ses méfaits deviennent insupportables, et que tu te rebelles contre [uthman.GetHerHim]. [uthman.GetSheHe|U] saisit ce prétexte pour t’exécuter cruellement.\n\nMême à présent, je pleure ta perte. Même à présent, je maudis [uthman.GetFirstNameNoTooltip]. Même à présent, j’ignore si mon cœur guérira un jour, ni quelle direction prendra ma vie…."
 granada.0030.a:0 "Tu me manques tant, tant…."
 granada.0031.t:0 "Insulter [uthman.GetFirstNameNoTooltip]"
 granada.0031.desc:0 ""Mille malédictions sur vous, [uthman.GetFirstName], pour avoir assassiné [abu_jafar.GetFirstName], espèce de [uthman.Custom('InsultNoun')] [uthman.Custom('InsultAdjective')] que vous êtes ! Je vous crache au visage, même à cette heure !"\n\nMon chagrin n’a point de fin, mais ma rage non plus. Je sens l’inspiration m’envahir ; bientôt, les mots jaillissent de moi tel un fleuve grondant, telle une tempête irrésistible, tel un tremblement de terre qui ravage les cités. Je compose le poème, insultant, raillant et diffamant [uthman.GetFirstNameNoTooltip] d’une nouvelle façon, toujours plus inventive."
 granada.0031.a:0 "Le monde connaîtra ta vilenie !"
 granada.0032.t:0 "Élégie pour [abu_jafar.GetFirstNameNoTooltip]"
 granada.0032.desc:0 ""Ô, [abu_jafar.GetFirstName] ! Je rêve encore de vous, de votre étreinte, de vos lèvres posées sur les miennes. Vous ai-je tenu pour acquis ? Ne vous ai-je pas assez chéri de votre vivant ?"\n\nD’aucuns peuvent se demander pourquoi je porte si souvent les habits d’une veuve en deuil, encore aujourd’hui, alors même que [abu_jafar.GetFirstNameNoTooltip] et moi ne fûmes jamais officiellement mariés. Pourtant, [abu_jafar.GetSheHe] était un [abu_jafar.GetWomanMan] et un poète des plus remarquables, et même à présent, [abu_jafar.GetSheHe] m’inspire quelques vers. Sa beauté, son esprit éloquent et son cœur droit ne seront jamais oubliés."
 granada.0032.a:0 "Mon bien‑aimé, sois à nouveau ma muse…."
 granada.0033.t:0 "Faire une pause dans la poésie"
 granada.0033.desc:0 ""Nous avions coutume d’échanger tant de poèmes l’un avec l’autre. Parfois, c’était [abu_jafar.GetFirstName] qui ouvrait la joute, et parfois c’était moi. Chaque fois que j’écris un poème, à présent, je songe à ces jours heureux, juvéniles et insouciants…"\n\nIl m’est encore difficile de composer des vers. Non point difficile au sens technique, mais au sens du cœur. Chaque mot de poésie que je prononce est un douloureux rappel de [abu_jafar.GetFirstNameNoTooltip]. Il me faut prendre quelque distance avec la poésie… trouver d’autres choses auxquelles me consacrer… du moins pour un temps."
 granada.0033.a:0 "Je dois être dans un meilleur état d'esprit."
 granada.0034.t:0 "Enseigner aux autres"
 granada.0034.desc:0 ""J’ai quitté le monde superficiel et mesquin de la politique de cour depuis la mort de [abu_jafar.GetFirstName], et pourtant… peu à peu… je sens poindre en moi le désir de renouer avec autrui et de l’aider. Est-ce ce que [abu_jafar.GetFirstNameNoTooltip] aurait souhaité ?"\n\nEn dépit de l’existence erratique et asociale que je mène, je l’admets, depuis le décès de mon bien-aimé [abu_jafar.GetFirstNameNoTooltip], je suis encore assez renommé en ces terres comme poète et [ROOT.Char.GetWomanMan] érudit. Certains sont venus me trouver afin que j’instruise leurs jeunes, ou même eux-mêmes, aux arts littéraires. Peut-être sera-ce là un bon moyen de canaliser mes énergies vers quelque chose de plus fécond."
 granada.0034.a:0 "J’entends dire que quelqu’un cherche à recevoir mes leçons…."
 granada.0035.t:0 "$RICE_historical_aspiration_fulfilled_title$"
 granada.0035.desc:0 "Je couvre de malédictions [uthman.GetFirstName], [uthman.GetSheHe] me désirait comme un jouet, et fit exécuter mon bien‑aimé [abu_jafar.GetFirstName] non par raison politique, mais par pure jalousie.\n\nÀ travers le pays, ma poésie a toujours joui d’une grande renommée, mais il semble que je sois à présent encore plus célèbre. J’ignore si je guérirai un jour vraiment de mon chagrin, mais mes poèmes enflammés, qui insultent [uthman.GetFirstNameNoTooltip] ou célèbrent [abu_jafar.GetFirstNameNoTooltip], sont devenus légendaires.\n\nJe suppose que je devrai accepter cela comme une maigre compensation pour ma perte. Au moins, le monde n’oubliera ni la méchanceté de [uthman.GetFirstNameNoTooltip], ni le bonheur que [abu_jafar.GetFirstNameNoTooltip] m’a apporté."
 granada.0035.a:0 "Tels sont les caprices du destin dans ma vie."
 granada.0036.t:0 "$RICE_historical_aspiration_fulfilled_title$"
 granada.0036.desc:0 "Je serais bien sot d’affirmer que j’ai pardonné à [uthman.GetFirstName], [uthman.GetSheHe] me désirait comme un jouet et fit exécuter mon bien‑aimé [abu_jafar.GetFirstName], non pour des raisons politiques, mais par pure jalousie.\n\nEt pourtant, comme on dit, avec le temps, le cœur guérit… un peu. J’aime à penser que [abu_jafar.GetFirstNameNoTooltip] aurait voulu que je trouve quelque chose de fécond et de plein de sens dans la vie, même après sa mort brutale. À travers le pays, ma poésie a toujours été célèbre, mais j’ai à présent trouvé une nouvelle vocation et une nouvelle renommée en formant d’autres aux arts littéraires.\n\nJe suppose que je devrai accepter cela comme une maigre compensation pour ma perte. Au moins, je ne laisserai plus ma vie être dictée par mon chagrin et ma colère !"
 granada.0036.a:0 "$granada.0035.a$"
