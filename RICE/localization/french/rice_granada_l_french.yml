 # Alhambra Decisions
 RICE_granada_alhambra_decision:0 "Étendre l’Alhambra"
 RICE_granada_alhambra_decision_tooltip:0 "L’Alhambra s’étend pour répondre aux besoins d’une Alhambra en expansion."
 RICE_granada_alhambra_decision_desc:0 "Bien que l’[alhambra|E] soit connue dans le monde entier comme un palais d’une sublime beauté sans égale, il subsiste toujours une marge d’amélioration. Peut‑être ce paradis sur terre mérite‑t‑il un ajout digne de lui…"
 RICE_granada_alhambra_decision_effect_tooltip_1:0 "Chaque [alhambra_structure|E] a un coût différent #weak (Coût minimum : @gold_icon! 100)#!"
 RICE_granada_alhambra_decision_effect_tooltip_2:0 "La [alhambra_structure|E] que vous choisirez prendra de 1 à 5 ans pour être achevée ; une fois construite, le [ruler|E] du [county|E] de Grenade recevra divers bonus, comme de la [piety|E] ou le déverrouillage de nouvelles [decisions|E], selon votre choix"
 RICE_granada_alhambra_decision_effect_tooltip_3:0 "Cette [decision|E] ne peut être prise qu’#bold UNE SEULE FOIS#! dans une vie (deux fois si vous avez une [stewardship|E] ou un [learning|E] élevé), choisissez donc sagement ce que vous allez bâtir !"
 RICE_granada_alhambra_pick_a_structure_type:0 "Choisir ce qu'il faut construire"
 RICE_granada_alhambra_pick_a_structure_type_gui:0 "Choisissez quelle [alhambra_structure|E] ajouter à l’[alhambra|E]"
 RICE_granada_alhambra_decision_confirm:0 "Il est temps de se mettre au travail !"
 RICE_granada_alhambra_decision_context_tooltip:0 "#emphasis Contexte historique :#! L’Alhambra (de l’arabe #italic Al-Hamra#!, signifiant « la Rouge ») était un complexe de palais et de forteresses de la dynastie nasride de Grenade, et l’incarnation même de l’architecture mauresque médiévale. En tant que cité autonome, elle possédait ses propres commodités comme des bains publics et des mosquées, et fut continuellement agrandie par les Nasrides du XIIIe au XVe siècle. Un élément frappant de l’Alhambra est le nombre de ses murs, colonnes, fontaines et autres surfaces couverts de versets coraniques ou de poésie de poètes de l’époque, écrits en calligraphie arabe."
 RICE_granada_alhambra_not_done_already:0 "Vous n’avez pas encore agrandi l’[alhambra|E], ou, si votre [stewardship|E] ou votre [learning|E] est de 15 ou plus, vous ne l’avez pas encore fait deux fois"
 RICE_granada_alhambra_currently_building:0 "Aucune [alhambra_structure|E] n’est actuellement en construction dans l’[alhambra|E]"
 RICE_alhambra_court_of_the_lions_option:0 "#Bold Cour des Lions#!"
 RICE_alhambra_court_of_the_lions_option_desc:0 "Une splendeur palatiale inégalée en Ibérie"
 RICE_alhambra_court_of_the_lions_option_tooltip:0 "#V #Bold Coût : @gold_icon! 250#!#!\n\nCette [alhambra_structure|E] confère les bonus suivants au [ruler|E] de Grenade une fois achevée :\n$EFFECT_LIST_BULLET$ @prestige_icon! 200\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 100\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_court_of_the_lions').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Bonus de [prestige|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir\n\n#weak Un palais aux éléments architecturaux novateurs et révolutionnaires, aboutissement de l’histoire architecturale andalouse – depuis sa cour centrale dominée par une fontaine de marbre aux lions finement sculptés, jusqu’à ses salles et voûtes peintes de scènes figurées de personnages importants, ce palais ne manquera pas d’émerveiller et d’éblouir tous ceux qui le visitent !#!"
 RICE_alhambra_comares_palace_option:0 "#Bold Palais des Comares#!"
 RICE_alhambra_comares_palace_option_desc:0 "Une aile palatiale qui en impressionnera plus d'un"
 RICE_alhambra_comares_palace_option_tooltip:0 "#V #Bold Coût : @gold_icon! 250#!#!\n\nCette [alhambra_structure|E] confère les bonus suivants au [ruler|E] de Grenade une fois achevée :\n$EFFECT_LIST_BULLET$ @prestige_icon! 300\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_comares_palace').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Déverrouille la [decision|E] pour #bold $RICE_granada_alhambra_comares_baths$#!\n\n#weak Une splendide structure palatiale comportant plusieurs ailes tout aussi remarquables, dont la Cour des Myrtes avec un vaste bassin réfléchissant, une Salle des Ambassadeurs servant de salle du trône, et les Bains des Comares, les plus grands et les plus magnifiques bains royaux jamais bâtis en Ibérie !#!"
 RICE_alhambra_generalife_option:0 "#Bold Généralife#!"
 RICE_alhambra_generalife_option_desc:0 "Un jardin de délices sublimes"
 RICE_alhambra_generalife_option_tooltip:0 "#V #Bold Coût : @gold_icon! 250#!#!\n\nCette [alhambra_structure|E] confère les bonus suivants au [ruler|E] de Grenade une fois achevée :\n$EFFECT_LIST_BULLET$ @prestige_icon! 150\n$EFFECT_LIST_BULLET$ @piety_icon! 150\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_generalife').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Les bonus octroyés par la [decision|E] #bold $RICE_granada_admire_alhambra_gardens$#! sont améliorés\n$EFFECT_LIST_BULLET$ Les [activities|E] de [munya|E] sont moins coûteuses\n\n#weak Un palais d’été servant de [munya|E], un type de domaine de campagne populaire en Andalousie ; ce manoir se dresse à proximité de l’Alhambra proprement dite sur une colline lui faisant face, et ses jardins le font paraître encore plus paradisiaque que le reste de l’Alhambra.#!"
 RICE_alhambra_rawda_option:0 "#Bold Mausolée de Rawda#!"
 RICE_alhambra_rawda_option_desc:0 "Un dernier lieu de repos pour quelques heureux élus"
 RICE_alhambra_rawda_option_tooltip:0 "#V #Bold Coût : @gold_icon! 200#!#!\n\nCette [alhambra_structure|E] confère les bonus suivants au [ruler|E] de Grenade une fois achevée :\n$EFFECT_LIST_BULLET$ @piety_icon! 200\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 100\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_rawda').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Bonus de [dynasty_prestige|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir\n\n#weak Un majestueux lieu de sépulture pour le sang noble, remplaçant un ancien cimetière modeste et négligé ; la nécropole consiste en une structure rectangulaire décorée de stuc sculpté et de carreaux. Pour y entrer, il faut d’abord pénétrer dans une cour, puis franchir un petit portail en arc outrepassé.#!"
 RICE_alhambra_house_of_worship_option:0 "#Bold [ROOT.Char.GetFaith.HouseOfWorship|U] de l’Alhambra#!"
 RICE_alhambra_house_of_worship_option_desc:0 "Un dernier lieu de repos pour quelques heureux élus"
 RICE_alhambra_house_of_worship_option_tooltip:0 "#V #Bold Coût : @gold_icon! 200#!#!\n\nCette [alhambra_structure|E] confère les bonus suivants au [ruler|E] de Grenade une fois achevée :\n$EFFECT_LIST_BULLET$ @piety_icon! 300\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_house_of_worship').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Les bonus octroyés par la [decision|E] #bold $RICE_granada_alhambra_comares_baths$#! sont améliorés\n$EFFECT_LIST_BULLET$ Bonus de [piety|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir\n\n#weak Une maison de culte pour offrir des services religieux à ceux qui vivent dans cette cité dans la cité qu’est l’Alhambra ; bien entendu, il va sans dire que la nature exacte de ces services religieux dépendra grandement de l’affiliation spirituelle de ceux qui détiennent le pouvoir à l’Alhambra.#!"
 RICE_alhambra_generic_palatial_option:0 "#Bold Résidence palatiale générique#!"
 RICE_alhambra_generic_palatial_option_desc:0 "Un lieu de repos sans égal"
 RICE_alhambra_generic_palatial_option_tooltip:0 "#V #Bold Coût : @gold_icon! 100#!#!\n\nCette [alhambra_structure|E] confère les bonus suivants au [ruler|E] de Grenade une fois achevée :\n$EFFECT_LIST_BULLET$ @prestige_icon! 100 (@prestige_icon! 200 si la [alhambra_structure|E] Cour des Lions a été construite dans l’[alhambra|E])\n$EFFECT_LIST_BULLET$ @piety_icon! 100 (@piety_icon! 200 si la [alhambra_structure|E] Maison de culte de l’Alhambra a été construite dans l’[alhambra|E])\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 50 si la [alhambra_structure|E] Mausolée de Rawda a été construite dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_generic_palatial').GetNameWithTooltip] pendant 10 ans\n\n#weak Quoique jugés moins impressionnants que les parties les plus célèbres de l’Alhambra, de nombreux petits palais, salles, pavillons et autres édifices contribuent à la beauté du lieu – pour certains qui vivent dans l’Alhambra ou la traversent, la quiétude et le charme de ces palais moins connus sont loin d’être négligeables.#!"
 RICE_alhambra_generic_recreational_option:0 "#Bold Jardins génériques#!"
 RICE_alhambra_generic_recreational_option_desc:0 "Une beauté architecturale sans égale en ce monde"
 RICE_alhambra_generic_recreational_option_tooltip:0 "#V #Bold Coût : @gold_icon! 100#!#!\n\nCette [alhambra_structure|E] confère les bonus suivants au [ruler|E] de Grenade une fois achevée :\n$EFFECT_LIST_BULLET$ @piety_icon! 200 (@piety_icon! 300 si la [alhambra_structure|E] Maison de culte de l’Alhambra a été construite dans l’[alhambra|E])\n$EFFECT_LIST_BULLET$ @prestige_icon! 100 si la [alhambra_structure|E] Cour des Lions a été construite dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 50 si la [alhambra_structure|E] Mausolée de Rawda a été construit dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_generic_recreational').GetNameWithTooltip] pendant 10 ans\n\n#weak Un jardin de plus, et donc un autre labyrinthe délicatement façonné de plantes verdoyantes, de fontaines apaisantes et de canaux – mais aussi communs que soient les jardins à l’Alhambra, chacun ne fait que renforcer la certitude que l’Alhambra est, en vérité, un paradis sur terre.#!"
 RICE_alhambra_generic_military_option:0 "#Bold Fortifications génériques#!"
 RICE_alhambra_generic_military_option_desc:0 "Des défenses solides pour une forteresse solide"
 RICE_alhambra_generic_military_option_tooltip:0 "#V #Bold Coût : @gold_icon! 100#!#!\n\nCette [alhambra_structure|E] confère les bonus suivants au [ruler|E] de Grenade une fois achevée :\n$EFFECT_LIST_BULLET$ @prestige_icon! 200 (@prestige_icon! 300 si la [alhambra_structure|E] Cour des Lions a été construite dans l’[alhambra|E])\n$EFFECT_LIST_BULLET$ @piety_icon! 100 si la [alhambra_structure|E] Maison de culte de l’Alhambra a été construite dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 50 si la [alhambra_structure|E] Mausolée de Rawda a été construit dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_generic_military').GetNameWithTooltip] pendant 10 ans\n\n#weak Ces tours, ces murs, ces casernes, ces geôles, et bien plus encore, rappellent à tous que, aussi belle que soit l’Alhambra, elle demeure au bout du compte une puissante forteresse destinée à protéger la région des incursions étrangères. Ceux qui règnent depuis l’Alhambra feraient bien de s’en souvenir, s’ils souhaitent empêcher la chute de la cité face aux envahisseurs.#!"

 # Other Decisions
 RICE_granada_transfer_seat_of_power:0 "Déplacer le siège du pouvoir d’Ilbira à Grenade"
 RICE_granada_transfer_seat_of_power_tooltip:0 "Ilbira n’est pas défendable… mais Grenade l’est."
 RICE_granada_transfer_seat_of_power_desc:0 "Ilbira est actuellement le principal domaine de la région de Grenade. Toutefois, il est difficile à défendre, car il se trouve sur une plaine basse. La ville fortifiée voisine de Grenade, actuellement dominée par une vieille communauté juive, constitue un emplacement bien plus défendable, étant située sur un terrain surélevé. Nous devrions y transférer le siège du pouvoir régional depuis Ilbira."
 RICE_granada_transfer_seat_of_power_confirm:0 "Nous aurons la position dominante !"
 RICE_granada_transfer_seat_of_power_effect_tooltip_1:0 "Le déplacement d’un grand nombre de familles non juives vers [granada_county.GetNameNoTier] pourrait engendrer, à terme, des tensions entre elles et les Juifs déjà présents."
 RICE_granada_transfer_seat_of_power_effect_tooltip_2:0 "Des [courtiers|E] juifs éminents pourraient apparaître occasionnellement à la [court|E] de quiconque est [ruler|E] de [granada.GetNameNoTier]"
 RICE_granada_transfer_seat_of_power_context_tooltip:0 "#emphasis Contexte historique :#! Aux débuts de l’histoire d’al‑Andalus, Grenade n’était pas aussi importante que la ville voisine d’Ilbira (ou Elvira). Lors de la première période des taïfas, au XIe siècle, lorsque la dynastie berbère ziride établit un État indépendant dans le sud de l’Andalousie, elle craignit qu’Ilbira ne fût vulnérable aux attaques ennemies, car située dans une plaine basse. Les Zirides décidèrent donc de transférer leur siège du pouvoir à Grenade, qui était alors un important établissement juif du sud de l’Andalousie."
 RICE_granada_alhambra_comares_baths:0 "Détente dans les bains de Comares"
 RICE_granada_alhambra_comares_baths_tooltip:0 "J'ai besoin d'une pause...."
 RICE_granada_alhambra_comares_baths_desc:0 "Les bains des Comares de l’[alhambra|E] sont, sans nul doute, les plus vastes et les plus grandioses de toute l’Ibérie. Puisque ce lieu m’appartient, je devrais vraiment profiter de ces installations de temps à autre."
 RICE_granada_alhambra_comares_baths_effect_tooltip_1:0 "Vous perdrez un peu de [stress|E] et gagnerez de la [piety|E]"
 RICE_granada_alhambra_comares_baths_effect_tooltip_2:0 "Parce que vous régnez sur [granada.GetNameNoTier] et que la #bold [THIS.Char.GetFaith.HouseOfWorship|U] de l’Alhambra#! a été construit dans l’[alhambra|E], les bonus de cette [activity|E] sont augmentés"
 RICE_granada_alhambra_comares_baths_confirm:0 "Il est temps de prendre un bain !"
 RICE_granada_alhambra_comares_baths_context_tooltip:0 "#emphasis Contexte historique :#! Les bains publics occupaient traditionnellement une place importante dans la vie sociale et religieuse du monde musulman, y compris en Al‑Andalus. Les bains royaux du palais des Comares à l’Alhambra furent construits par le Sultan nasride Yusuf Ier (qui régna de 1333 à 1354), et furent même utilisés plus tard par les souverains catholiques d’Espagne, qui restaurèrent la structure. En plus d’être parmi les plus vastes de l’Ibérie, les bains des Comares comptent parmi les rares exemples de bains islamiques de la péninsule à avoir survécu presque intacts jusqu’à nos jours."
 RICE_granada_alhambra_comares_palace_built_req:0 "La [alhambra_structure|E] #V Palais des Comares#! a été construit dans l’[alhambra|E]"
 RICE_granada_admire_alhambra_gardens:0 "Admirer les jardins de l’Alhambra"
 RICE_granada_admire_alhambra_gardens_tooltip:0 "Un paradis sur terre, comme on dit !"
 RICE_granada_admire_alhambra_gardens_desc:0 "Les jardins de l’[alhambra|E] regorgent d’arbres, de buissons, de cours, de fontaines, de canaux et bien plus encore, qui se mêlent pour donner l’impression d’être au paradis. Voilà quelque temps que je n’ai pas trouvé le temps de les apprécier."
 RICE_granada_admire_alhambra_gardens_effect_tooltip_1:0 "Vous perdrez un peu de [stress|E] et gagnerez du [prestige|E]"
 RICE_granada_admire_alhambra_gardens_effect_tooltip_2:0 "Parce que vous régnez sur [granada.GetNameNoTier] et que le #bold Generalife#! a été construit dans l’[alhambra|E], les bonus de cette [activity|E] sont augmentés"
 RICE_granada_admire_alhambra_gardens_confirm:0 "Il y a beaucoup de beauté à voir ici !"
 RICE_granada_admire_alhambra_gardens_context_tooltip:0 "#emphasis Contexte Historique :#! Les jardins étaient un important symbole de statut social et un moyen pour de nombreuses élites médiévales du monde entier, y compris les souverains musulmans, de démontrer leur pouvoir et leur richesse. L'Alhambra est l'un des meilleurs exemples de cette tradition islamique du jardinage. Grenade était située à proximité de nombreuses sources d'eau de qualité, ce qui lui permettait d'entretenir les nombreux jardins de l'Alhambra ainsi que les installations hydrauliques telles que les fontaines et les canaux."
 RICE_granada_alhambra_munya_estate:0 "Villégiature en munya"
 RICE_granada_alhambra_munya_estate_tooltip:0 "J'ai vraiment besoin d'une pause dans la grande ville."
 RICE_granada_alhambra_munya_estate_desc:0 "Comme tout [ROOT.Char.GetTitleAsNameNoTooltip] qui se respecte en Al‑Andalus, je possède plusieurs domaines de [munya|E] dans la campagne proche de ma capitale. Je devrais séjourner dans l’une de ces villas pour me détendre, que ce soit seul ou en compagnie d’autrui."
 RICE_granada_alhambra_munya_estate_effect_tooltip_1:0 "Vous choisirez si vous souhaitez visiter votre [munya|E] seul afin de vous détendre ou d’y étudier les plantes, ou inviter d’autres personnes comme vos [courtiers|E] et [vassals|E] à vous accompagner dans cette [activity|E] et à y socialiser"
 RICE_granada_alhambra_munya_estate_effect_tooltip_2:0 "Vous pourrez perdre du [stress|E] et gagner divers bonus comme de l’[lifestyle_experience|E] ou des [character_modifiers|E] positifs"
 RICE_granada_alhambra_munya_estate_effect_tooltip_3:0 "$RICE_granada_admire_alhambra_gardens_effect_tooltip_2$"
 RICE_granada_alhambra_munya_estate_confirm:0 "Il est temps de partir à la campagne !"
 RICE_granada_alhambra_munya_estate_context_tooltip:0 "#emphasis Contexte historique :#! Le terme #italic munya#! désignait un certain type de domaine de campagne ou de villa construite par les élites en Al‑Andalus médiévale (et qui donna plus tard naissance au terme espagnol #italic almunia#!). Généralement grandes résidences entourées de jardins et de vastes terres agricoles, elles avaient une double vocation de loisir et d’utilité – elles servaient à la fois de lieux de récréation et de quête intellectuelle, loin de l’agitation de la ville, mais aussi de sites d’expérimentation agricole et botanique."
 RICE_granada_develop_almeria_silk_industry:0 "Subventionner l'industrie de la soie en plein essor à Almería"
 RICE_granada_develop_almeria_silk_industry_tooltip:0 "Le port d'Almería pourrait être plus qu'un simple exportateur de produits de luxe... il pourrait aussi les créer."
 RICE_granada_develop_almeria_silk_industry_desc:0 "L'époque est turbulente en Ibérie et l'ancien centre royal de production de soie de Cordoue est en déclin. Les marchands cherchent à revigorer l'industrie de la soie ibérique en investissant dans les ateliers de soie d'autres villes ibériques, et Almería est une option prometteuse étant donné qu'elle se développe rapidement en tant que l'un des ports maritimes les plus importants de la Méditerranée occidentale."
 #RICE_granada_develop_almeria_silk_industry_effect_tooltip_1:0 "Almeria"
 RICE_granada_develop_almeria_silk_industry_confirm:0 "La soie doit couler à flots !"
 RICE_granada_develop_almeria_silk_industry_context_tooltip:0 "#emphasis Contexte Historique :#! Cordoue a été le premier centre de l'industrie rentable de la soie en Ibérie jusqu'à ce que le califat de Cordoue s'effondre dans les années 1000. Par la suite, Almería a supplanté Cordoue en tant que plus grand producteur de soie d'Ibérie, aidée en cela par le fait qu'elle était l'un des ports les plus importants de la région. Les soieries d'Almería étaient réputées au point d'être mentionnées comme des symboles de luxe dans la littérature européenne médiévale, et étaient souvent utilisées comme cadeaux, hommages ou pour montrer la richesse et le statut d'une personne."
 RICE_granada_demolish_idol_cadiz:0 "Démolir l’idole de Cadix"
 RICE_granada_demolish_idol_cadiz_tooltip:0 "Elle est faite de métal massif, et nous pourrions avoir besoin de cet [gold|E]…."
 RICE_granada_demolish_idol_cadiz_desc:0 "Il existe une antique tour près du port de Cadix, dans un lieu connu comme le quartier des Idoles. Au sommet de cette tour se dresse une magnifique statue faite de métaux précieux. Les habitants affirment que la statue possède des pouvoirs surnaturels et protège la cité du mal, mais que se passerait‑il si je détruisais cette idole pour faire fondre le métal à mon profit ?"
 RICE_granada_demolish_idol_cadiz_effect_tooltip_1:0 "Certains habitants croient que détruire l’idole de Cadix aura des #N conséquences#! surnaturelles pour vous et pour la ville – mais ce ne sont là que superstitions… n’est‑ce pas ?"
 RICE_granada_demolish_idol_cadiz_confirm:0 "Abattez cette idole !"
 RICE_granada_demolish_idol_cadiz_context_tooltip:0 "#emphasis Contexte historique :#! Les sources musulmanes médiévales mentionnent l’existence d’une mystérieuse grande tour surmontée d’une statue près de Cadix. Comme elle n’apparaît pas dans les sources classiques, elle pourrait remonter à l’Antiquité tardive. À l’instar d’autres statues grecques et romaines en Ibérie, la fameuse idole de Cadix était tenue par les musulmans médiévaux pour un objet aux pouvoirs surnaturels et protecteurs. Sa fonction originelle reste incertaine – monument commémoratif, tombeau ou, plus probablement, aide à la navigation maritime – car elle fut détruite au XIIe siècle, peut‑être pour fondre la statue et en tirer de l’argent."
 RICE_demolish_cadiz_idol_nothing:0 "Rien d’étrange ne se produit"
 RICE_demolish_cadiz_idol_character_curse:0 "Vous êtes supposément frappé d’une malédiction"
 RICE_demolish_cadiz_idol_county_curse:0 "Le comté de Cadix est supposément frappé d’une malédiction"
 RICE_demolish_cadiz_idol_both_curse:0 "Vous et le comté de Cadix êtes supposément frappés d’une malédiction"
 RICE_granada_hafsa_decision:0 "Apaiser le chagrin"
 RICE_granada_hafsa_decision_tooltip:0 "Parfois, mes souvenirs me hantent encore."
 RICE_granada_hafsa_decision_desc:0 "Ô mon bien‑aimé, Abu Ja‘far, bien que vous ayez été cruellement exécuté il y a de nombreuses années, mon cœur vous désire encore !"
 RICE_granada_hafsa_decision_effect_tooltip_1:0 "Atteindre #V 100#! [trait_level_track_xp|E] dans l’une ou l’autre des voies du [trait|E] [GetTrait('RICE_hafsa').GetName( GetNullCharacter )] remplacera ce [trait|E] par le [trait|E] [GetTrait('RICE_hafsa_full_rage').GetName( GetNullCharacter )] ou [GetTrait('RICE_hafsa_full_recovery').GetName( GetNullCharacter )], et désactivera les options associées à la voie opposée de [trait_level_track|E]."
 RICE_granada_hafsa_decision_effect_tooltip_2:0 "Vous gagnez entre #V [EmptyScope.ScriptValue('RICE_hafsa_insult_uthman_xp_gain_min')|0]#! et #V [EmptyScope.ScriptValue('RICE_hafsa_insult_uthman_xp_gain_max')|0]#! [trait_level_track_xp|E] dans la [trait_level_track|E] $trait_track_RICE_hafsa_rage$."
 RICE_granada_hafsa_decision_effect_tooltip_3:0 "Vous gagnez entre #V [EmptyScope.ScriptValue('RICE_hafsa_eulogize_abu_jafar_xp_gain_min')|0]#! et #V [EmptyScope.ScriptValue('RICE_hafsa_eulogize_abu_jafar_xp_gain_max')|0]#! [trait_level_track_xp|E] dans la [trait_level_track|E] $trait_track_RICE_hafsa_rage$."
 RICE_granada_hafsa_decision_effect_tooltip_4:0 "Vous perdez entre #V [EmptyScope.ScriptValue('RICE_hafsa_stop_poetry_xp_gain_min')|0]#! et #V [EmptyScope.ScriptValue('RICE_hafsa_stop_poetry_xp_gain_max')|0]#! [trait_level_track_xp|E] dans la [trait_level_track|E] $trait_track_RICE_hafsa_recovery$."
 RICE_granada_hafsa_decision_effect_tooltip_5:0 "Vous perdez entre #V [EmptyScope.ScriptValue('RICE_hafsa_teach_others_xp_gain_min')|0]#! et #V [EmptyScope.ScriptValue('RICE_hafsa_teach_others_xp_gain_max')|0]#! [trait_level_track_xp|E] dans la [trait_level_track|E] $trait_track_RICE_hafsa_recovery$."
 RICE_granada_hafsa_decision_confirm:0 "Mon cœur souffre encore, même à présent !"
 RICE_granada_hafsa_decision_context_tooltip:0 "#emphasis Contexte historique :#! Hafsa bint al‑Hajj al‑Rakuniyya fut l’une des plus grandes poétesses de l’Andalousie du XIIe siècle. Jeune femme, elle entama une passionnée histoire d’amour avec un autre poète, Abu Ja‘far, qui était aussi fonctionnaire au service du prince almohade et gouverneur de Grenade, Uthman. Cependant, Uthman tomba amoureux de la poétesse elle‑même, et entra en conflit avec Abu Ja‘far, qui finit par participer à une rébellion contre le gouverneur. Hafsa pleura Abu Ja‘far le reste de sa vie ; elle se retira de la vie de cour, mais accepta plus tard une invitation pour enseigner à divers princes almohades à Marrakech."
 CHOOSE_HAFSA_ACTION:0 "$RICE_granada_hafsa_decision_confirm$"
 RICE_insult_uthman_name: "Insulter Uthman"
 RICE_insult_uthman_desc: "$RICE_insult_uthman$"
 RICE_insult_uthman_tooltip: "Par ma poésie, le monde maudira Uthman comme je le maudis pour avoir tué mon bien-aimé !"
 RICE_eulogize_abu_jafar_name: "Faire l’éloge d’Abu Ja‘far"
 RICE_eulogize_abu_jafar_desc: "$RICE_eulogize_abu_jafar_name$"
 RICE_eulogize_abu_jafar_tooltip: "Je me souviendrai à jamais de vous, mon bien-aimé : ma poésie pour vous en est la preuve."
 RICE_stop_poetry_name: "Faire une pause dans la poésie"
 RICE_stop_poetry_desc: "$RICE_stop_poetry_name$"
 RICE_stop_poetry_tooltip: "La poésie me rappelle trop les vers que j’échangeais jadis avec mon bien-aimé ; je dois me consacrer à d’autres choses."
 RICE_teach_others_name: "Instruire les autres"
 RICE_teach_others_desc: "$RICE_teach_others_name$"
 RICE_teach_others_tooltip: "Je devrais détourner mes énergies vers quelque chose de plus productif, comme instruire et guider autrui."

 # Events 
 
 granada.0001.t:0 "Le destin de [granada.GetNameNoTierNoTooltip]"
 granada.0001.desc:0 "Je règne sur [granada.GetNameNoTier] depuis près de trois décennies, et je dois beaucoup de mon succès à mon défunt vizir, général et ami, [samuel.GetFullName]. Les Juifs jouent un rôle important dans la politique de la ville depuis des années, et il était le plus puissant et le plus brillant d’entre eux. Grâce à lui, j’ai survécu à de nombreuses intrigues dans ma jeunesse, et j’ai pu établir notre royaume comme une puissance régionale.\n\nHélas, voilà des années qu’il est décédé. Son fils et successeur, [joseph.GetFullName], est capable, mais souffre du péché d’orgueil – même d’autres Juifs que je connais le disent. [joseph.GetFirstName] et moi étions autrefois en bons termes, mais les choses se sont tendues entre nous dernièrement. J’ai même entendu des rumeurs selon lesquelles il me contrôlerait en coulisse et comploterait contre moi. Je ne crois pas à de telles calomnies, mais elles influencent certainement ce que mes sujets pensent de moi. Les gens me voient déjà comme un dirigeant cruel et cupide – des mensonges, je m’en convaincs – et ces rumeurs ne font qu’attiser le feu."
 granada.0001.a:0 "Espérons que les choses s’arrangeront d’elles‑mêmes."
 granada.0001.a.info:0 "#emphasis Contexte historique :#! Badis ibn Habus régna sur Grenade jusqu’en 1073, date à laquelle il fut remplacé par son petit‑fils Abdallah. Son fils aîné Buluggin, le père d’Abdallah, était mort empoisonné en 1064. La rumeur voulait que le vizir de Badis, le savant juif Joseph ibn Naghrela (fils du célèbre Samuel ibn Naghrela), fût à l’origine de la mort de Buluggin. Quoi qu’il en soit, Joseph fut la première victime du pogrom de Grenade qui se produisit le 31 décembre 1066.\n\nAbdallah fut le dernier souverain de la taïfa de Grenade. En 1090, il se rendit aux Almoravides et fut exilé à Aghmat. Là, il écrivit ses mémoires, qui offrent un récit détaillé – quoique partial – de l’histoire de Grenade."
 granada.0002.t:0 "L’idole de Cadix"
 granada.0002.desc:0 "L’Ibérie regorge d’antiques statues dont on prête des pouvoirs surnaturels. L'#bold idole de Cadix#! est un exemple particulièrement remarquable de cet héritage des anciens, en raison de sa taille et de sa fine facture. Et j’admets qu’il serait dommage de détruire une telle œuvre d’art, qui se dresse près de [cadiz.GetNameNoTier] depuis des siècles, et qui fut (d’après certains savants) construite par Hercule ou Alexandre le Grand lorsqu’ils régnaient sur l’Ibérie.\n\nMais la statue #italic est#! faite de métaux précieux solides comme l’or et le cuivre. Et j’aurais bien besoin d’argent.\n\nLes habitants de [cadiz.GetNameNoTier] se lamentent et se plaignent, affirmant que toucher la tour sur laquelle repose l’idole avec des pensées impures pourrait attirer un grand malheur sur moi ou sur [cadiz.GetNameNoTier]. Mais je ne pense pas que la détruire causera quelque calamité surnaturelle que ce soit.\n\nDu moins… je l'espère."
 granada.0002.a:0 "Pourtant, j'ai fait mon choix. Démolir la statue !"
 granada.0003.t:0 "L’idole de Cadix"
 granada.0003.desc.self_no_curse:0 "Il s’avère que rien ne s’est produit après que j’ai détruit la statue. Nulle étrange coïncidence, nul malheur ni calamité. Rien.\n\nAu début, certains habitants de [cadiz.GetNameNoTier] sombrèrent dans l’hystérie, craignant que la mer ne les engloutissent, ou qu’aucun navire ne puisse plus quitter le port, ou que d’autres désastres s’abattent sur nous. Mais rien de tout cela ne se produisit.\n\nJ’admets que, lorsque mes soldats et les ouvriers engagés abattirent la structure, je fus soucieux un moment, mais ces inquiétudes furent vaines. Désormais, je dispose d’une belle quantité de métal précieux que je puis faire fondre pour m’enrichir un peu !"
 granada.0003.desc.self_curse:0 "Au début, lorsque mes soldats et les ouvriers engagés abattirent l’idole de Cadix, je pensai qu’il ne s’était rien passé.\n\nMais j’ai entendu parler de faits étranges survenus peu après. Par exemple, on me fit état de bruits étranges près de ma résidence ou vers la mer non loin de [cadiz.GetNameNoTier], ou encore des difficultés rencontrées par les habitants pour faire sortir leurs navires du port.\n\nAu moins ai‑je obtenu une belle quantité de métal précieux provenant de la statue, que je pourrai faire fondre. Assurément, tous ces autres récits ne sont que coïncidences, de simples histoires farfelues inventées par des habitants superstitieux… n’est‑ce pas ?"
 granada.0003.desc.other_no_curse:0 "On trouve, disséminés à travers l’Ibérie, des monuments en ruine de civilisations disparues, auxquels on prête souvent des capacités surnaturelles. Un exemple notable est la fameuse #bold idole de Cadix#!, grande statue dominant la mer près de [cadiz.GetNameNoTier]. Bien que la statue soit faite de métaux précieux, nul n’osa jamais la détruire pour en tirer de l’argent.\n\nSauf [cadiz_idol_demolisher.GetTitledFirstName].\n\n[cadiz_idol_demolisher.GetFirstName] chercha à utiliser les métaux précieux de la statue, mais les habitants craignaient une punition divine après sa destruction. Pourtant, [cadiz_idol_demolisher.GetSheHe] finit par leur prouver qu’ils avaient tort après avoir ordonné que la statue soit démolie et fondue, car rien d’étrange ne se produisit par la suite. L’idole – ainsi que la puissante tour sur laquelle elle se dressait – n’est plus désormais."
 granada.0003.desc.other_curse:0 "On trouve, disséminés à travers l’Ibérie, des monuments en ruine de civilisations disparues, auxquels on prête souvent des capacités surnaturelles. Un exemple notable est la fameuse #bold idole de Cadix#!, grande statue dominant la mer près de [cadiz.GetNameNoTier]. Bien que la statue soit faite de métaux précieux, nul n’osa jamais la détruire pour en tirer de l’argent.\n\nSauf [cadiz_idol_demolisher.GetTitledFirstName].\n\n[cadiz_idol_demolisher.GetFirstName] chercha à utiliser les métaux précieux de la statue, mais les habitants craignaient une punition divine après sa destruction. Hélas, [cadiz_idol_demolisher.GetSheHe] ordonna obstinément que la statue fût démolie et fondue. Peu après, des phénomènes étranges furent signalés à [cadiz.GetNameNoTier] : bruits étranges la nuit, navires incapables de quitter le port, et d’autres malheurs singuliers.\n\nCe ne peut être là qu’une coïncidence, certainement, et les habitants superstitieux se tourmentent pour rien… n’est‑ce pas ?"
 granada.0003.a:0 "Quel destin pour l’Idole de Cadix !"
