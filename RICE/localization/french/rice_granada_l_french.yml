 RICE_granada_munya_vacation_chess_matches:0 "Parties d’échecs amusantes lors d’une excursion en munya"
 RICE_granada_enjoyed_munya_vacation_great:0 "M’a invité à une excellente villégiature de groupe"
 RICE_granada_enjoyed_munya_vacation:0 "M’a invité à une villégiature de groupe"
 RICE_granada_tower_of_cadiz:0 "Idole de Cadix"
 RICE_granada_tower_of_cadiz_desc:0 "Près des côtes de la ville portuaire de Cadix se trouve une antique grande tour, et au sommet de cette tour se dresse une mystérieuse statue faite de métaux précieux, représentant un homme barbu drapé d’une cape. Nul ne sait avec certitude qui construisit cette tour et sa statue, bien que des savants affirment qu’elles furent érigées par Hercule ou Alexandre le Grand dans les temps anciens. Quoi qu’il en soit, les habitants regardent la statue avec crainte et émerveillement, et croient qu’elle possède des pouvoirs talismaniques, les protégeant ou les avertissant du danger.\n\n#italic Un [ruler|E] en quête d'[gold|E] peut prendre la [decision|E] $RICE_granada_demolish_idol_cadiz$, mais il devrait se méfier de telles tentations, car le folklore local assure que de grands malheurs s’abattront sur ceux qui oseraient commettre un tel acte.#!"
 RICE_granada_cadiz_idol_character_curse:0 "La malédiction de l'idole de Cadix"
 RICE_granada_cadiz_idol_character_curse_desc:0 "On dit que ce personnage était un idiot cupide qui a ordonné la destruction de l'ancienne idole de Cadix, juste pour la faire fondre et gagner de l'argent. Aujourd'hui, la rumeur veut que ce personnage souffre d'une vague de malchance due à ses actions à courte vue et à son manque de respect pour l'autre monde."
 RICE_granada_cadiz_idol_county_curse:0 "Malédiction de l’idole de Cadix"
 RICE_granada_cadiz_idol_county_curse_desc:0 "Les autorités ont récemment détruit l’ancienne idole de Cadix pour la faire fondre et en tirer de l’argent. Une légende locale disait que si la statue venait à être détruite, le malheur s’abattrait sur Cadix, par exemple en empêchant quiconque d’entrer dans la mer en ces lieux. Si cela ne s’est pas produit, d’autres calamités mineures ont eu lieu. Serait‑ce vraiment une simple coïncidence, ou l’inquiétude et l’agitation des superstitieux habitants sont‑elles justifiées ?"
 RICE_granada_inspected_canals:0 "A récemment inspecté les canaux de Grenade"
 RICE_granada_explored_munya:0 "A exploré les environs d’un [munya|E] local"
 RICE_granada_hafsa_mourning:0 "Pleure Abu Ja‘far"
 RICE_granada_hafsa_mourning_desc:0 "La poétesse Hafsa pleure toujours la mort de son aimé, le poète Abu Ja‘far, qui fut fonctionnaire à la cour de l’alors gouverneur de Grenade, Abu Saïd Uthman. Hélas, le gouverneur jaloux désirait la belle Hafsa pour lui‑même, ce qui entraîna un conflit entre les deux hommes et, finalement, l’exécution d’Abu Ja‘far."
#  RICE_granada_hafsa_eternal_grief:0 "Eternal Yearning"
