 RICE_granada_built_generalife:0 "Vient de construire le Generalife"
 RICE_granada_built_house_of_worship:0 "Vient de construire la maison de culte de l’Alhambra"
 RICE_granada_built_generic_palatial:0 "Construction récente d'une résidence palatiale à l'Alhambra"
 RICE_granada_built_generic_recreational:0 "Jardins récemment construits à l'Alhambra"
 RICE_granada_built_generic_military:0 "Vient de construire des fortifications à l’Alhambra"
 RICE_granada_munya_insights_farmland:0 "Idées venue d’un munya (rendements des cultures)"
 RICE_granada_munya_insights_farmland_desc:0 "Un dirigeant de ce comté a récemment passé des vacances dans l’un de ses [munyas|E], domaines de campagne appartenant aux élites andalouses dans la campagne d’Al‑Andalus. Dans cette villa, le dirigeant a appris des développements récents en agronomie fondés sur les expériences et recherches menées par des savants dans ce [munya|E], et comment ce savoir pourrait aider à améliorer la production agricole dans son royaume."
 RICE_granada_munya_insights_foodstuffs:0 "Idées venue d’un munya (préparation des aliments)"
 RICE_granada_munya_insights_foodstuffs_desc:0 "Ce personnage a récemment passé des vacances dans l’un de ses [munyas|E], domaines de campagne appartenant aux élites andalouses dans la campagne d’Al‑Andalus. Durant ce séjour, ce personnage a découvert comment les jardiniers et les cuisiniers de ce [munya|E] avaient mis au point une nouvelle manière intéressante de récolter certaines cultures ou ingrédients, et de les préparer pour des mets délicieux."
 RICE_granada_munya_insights_ornamental_plants:0 "Idées venue d’un munya (plantes ornementales)"
 RICE_granada_munya_insights_ornamental_plants_desc:0 "Ce personnage a récemment passé des vacances dans l’un de ses [munyas|E], domaines de campagne appartenant aux élites andalouses dans la campagne d’Al‑Andalus. Durant ce séjour, ce personnage a appris que ses jardiniers avaient récemment inventé une nouvelle façon de mettre en valeur les magnifiques fleurs et plantes de leurs jardins, ou avaient même commencé à intégrer une nouvelle espèce végétale exotique à leurs parterres."
 RICE_granada_munya_insights_medicine:0 "Idées venue d’un munya (plantes médicinales)"
 RICE_granada_munya_insights_medicine_desc:0 "Ce personnage a récemment passé des vacances dans l’un de ses [munyas|E], domaines de campagne appartenant aux élites andalouses dans la campagne d’Al‑Andalus. Durant ce séjour, ce personnage a appris que des savants, qu’il patronnait pour mener des expériences dans ce [munya|E], avaient récemment découvert de nouvelles applications utiles pour certaines herbes et plantes qui poussent dans leurs jardins."
 RICE_granada_munya_vacation_famed_gardens:0 "Les célèbres jardins de Munya"
 RICE_granada_munya_vacation_famed_gardens_desc:0 "Les [munyas|E], ou villas de campagne de ce personnage en Al‑Andalus, ont acquis la réputation d’abriter des jardins d’une beauté exquise, presque magique, sans égale dans toute l’Ibérie."
 RICE_granada_munya_vacation_famed_intellectual:0 "Intellectuels de munya renommés"
 RICE_granada_munya_vacation_famed_intellectual_desc:0 "Les [munyas|E], ou villas de campagne de ce personnage en Al‑Andalus, ont acquis la réputation d’être des lieux où savants, poètes, et autres gens de savoir se rassemblent pour se livrer à de grands échanges intellectuels et littéraires."
 RICE_granada_munya_vacation_famed_partier:0 "Festins de munya célèbres"
 RRICE_granada_munya_vacation_famed_partier_desc:0 "Les [munyas|E], ou villas de campagne de ce personnage en Al‑Andalus, ont acquis la réputation d’abriter des fêtes extraordinaires – les aristocrates assez chanceux pour être invités aux excursions de ce personnage à la campagne sont assurés d’y passer un excellent moment !"
 RICE_granada_vacationed_at_a_munya:0 "A récemment passé des vacances dans un [munya|E]"
 RICE_granada_almeria_silk_industry:0 "Centre de fabrication de la soie ibérique"
 RICE_granada_almeria_silk_industry_desc:0 "Almeria est le principal centre de production de soie ibérique après le déclin de l'industrie à Cordoue. Le tissage de la soie y est bien établi et Almeria est proche d'autres centres de production de soie dans le sud de l'Andalousie. La ville est également l'un des plus grands ports de la Méditerranée occidentale et ses soies circulent loin. La soie d'Almeria est si légendaire qu'elle est louée et recherchée dans toute l'Europe et l'Afrique du Nord."
 RICE_granada_invested_in_almeria_silks:0 "Investi dans la soie Almérienne"
 RICE_granada_invested_in_almeria_silks_desc:0 "Cette personne a joué un rôle majeur dans le développement de l'industrie de la soie à Almeria, au point qu'elle a dépassé Cordoue en tant que principal centre de production de soie ibérique."
 RICE_granada_granadan_jew:0 "Juif grenadin"
 RICE_granada_granadan_jew_desc:0 "Ce personnage juif est né et a grandi dans la communauté juive de Grenade, qui est (ou était) un centre majeur de la juiverie ibérique, et c'est là qu'il a beaucoup appris dans les domaines de la politique, de la littérature, etc."
 RICE_granada_silk_good:0 "L'industrie locale de la soie prospère"
