 granada.0010.t:0 "D’Ilbira à Grenade"
 granada.0010.desc:0 "Depuis des générations, le domaine d’Ilbira est le centre de la région au pied des montagnes de la Sierra Nevada. Cependant, à mesure que les années passent, les inconvénients de la situation d’Ilbira deviennent de plus en plus flagrants : elle n’est tout simplement pas défendable, car située sur une plaine, et elle est donc vulnérable à une invasion.\n\nAprès avoir débattu de la question avec mes généraux et mes officiers, il est clair que la ville fortifiée voisine de Grenade serait un bien meilleur siège régional du pouvoir, car elle se trouve sur un terrain surélevé et serait difficile à attaquer. Nous avons commencé à construire de nouveaux bâtiments à Grenade, et déplacerons bientôt la majeure partie des habitants d’Ilbira là‑bas. Enfin, même si Grenade est dominée par une ancienne et importante communauté juive, ces Juifs nous ont assuré de leur entière coopération à mesure que nous faisons de notre mieux pour réduire les tensions potentielles entre eux et les nouveaux arrivants."
 granada.0010.a:0 "Nous sommes en position de force, maintenant !"
 granada.0011.t:0 "D’Ilbira à Grenade"
 granada.0011.desc:0 "La nouvelle se répand en Andalousie : [granada_relocator.GetTitledFirstName] a lancé un effort majeur dans [granada_county.GetNameNoTier] pour déplacer la plupart de la population vers un nouveau centre régional. L’ancien, Ilbira, fut jugé inadapté à ce rôle sur le long terme, le domaine étant situé sur une plaine, et donc difficile à défendre.\n\nLe clairvoyant [granada_relocator.GetFirstNameNoTooltip] a compris que la ville fortifiée voisine de Grenade, grâce à son terrain surélevé et accidenté, serait un bien meilleur siège régional du pouvoir. Bien que Grenade ait longtemps été dominée par les Juifs, ceux‑ci coopèrent volontiers avec [granada_relocator.GetFirstNameNoTooltip] pour assurer le bon déroulement du processus.\n\nC’est sans conteste une décision sage de la part de [granada_relocator.GetFirstNameNoTooltip], mais il reste à voir comment cela influencera les futures campagnes militaires dans la région."
 granada.0011.a:0 "Ils ont à présent la position dominante."
 granada.0012.t:0 "Les juifs de Grenade en pleine ascension"
 granada.0012.desc.jewish:0 "Bien que [granada_county.GetNameNoTier] ait toujours abrité une importante communauté [ROOT.Char.GetFaith.GetReligion.GetAdjective], ce n’est que récemment que les Juifs de cette région en ont véritablement pris la pleine mesure, grâce à mes efforts en tant que dirigeant [ROOT.Char.GetFaith.GetReligion.GetAdjective].\n\nÀ présent, nous avons l’opportunité de nous bâtir un foyer solide dans cette belle contrée. Hélas, de mauvais esprits en d’autres terres convoitent la fragile paix que nous avons gagnée, et nous devons toujours être prêts à défendre [granada_county.GetNameNoTierNoTooltip]."
 granada.0012.desc.non_jewish:0 "Bien que [granada_county.GetNameNoTier] ait toujours abrité une importante communauté juive, ce n’est que récemment que les Juifs de cette région en sont véritablement devenus le groupe dominant.\n\nPour une raison ou une autre, ils sont à présent le groupe prépondérant à [granada_county.GetNameNoTierNoTooltip]. Même si je ne suis pas de leur religion, je reconnais qu’il me faudra travailler avec eux comme avec des égaux relatifs afin d’assurer la paix et la prospérité de cette belle contrée."
 granada.0012.a:0 "Une nouvelle ère se lève pour les Juifs de [granada_county.GetNameNoTierNoTooltip]."
 granada.0013.t:0 "Tensions croissantes à Grenade"
 granada.0013.desc:0 "[granada.GetNameNoTier] abrite actuellement l’une des plus grandes communautés juives d’Ibérie. La légende veut même que la cité ait été fondée par des Juifs il y a des siècles.\n\nDepuis des années, les dirigeants de Grenade s’appuient fortement sur les Juifs pour l’administration locale. En raison de leur statut minoritaire, ils sont généralement plus dignes de confiance que les habitants non juifs qui pourraient nourrir des rêves de sédition ou se faire concurrence pour le pouvoir et l’influence. Toutefois, cela a engendré envie, mécontentement et ressentiment chez une grande partie de la population non juive de la région, qui regarde mes fonctionnaires juifs avec suspicion.\n\nRécemment, un poète et érudit local [ROOT.Char.GetCulture.GetName] a écrit un poème malveillant dénigrant les Juifs de Grenade, les qualifiant de gens vils et immoraux qui contrôlent l’État, et me sommant de me débarrasser d’eux dans mon administration. Bien sûr, un poème aussi dément ne m’a guère impressionné, mais j’ai entendu dire qu’il a causé une grande agitation parmi les habitants non juifs de la ville…."
 granada.0013.a:0 "J'espère sincèrement que ce poème n'incitera pas à l'agitation."
 granada.0013.a.tooltip:0 "Les tensions à Grenade pourraient atteindre un point de rupture #italic très#! bientôt…."
 granada.0014.t:0 "La foule"
 granada.0014.desc:0 "Je dormais dans mon manoir à [granada.GetNameNoTier] lorsque mes gardes me réveillèrent en pleine nuit : le chaos s’est abattu sur les rues de la ville !\n\nApparemment, une fausse rumeur s’est répandue plus tôt dans la journée, affirmant que le fonctionnaire juif [yusuf.GetFullName] et d’autres Juifs avaient fait défection auprès d’un dirigeant ennemi, ouvert les portes de la cité et m’avaient tué. En raison de la montée récente du sentiment antijuif, une foule s’est rapidement formée pour « protéger » la ville. De toute évidence, je suis bien vivant et [granada.GetNameNoTierNoTooltip] est sauve.\n\nAvant que je ne comprenne pleinement ce qui se passe, [yusuf.GetFirstName] arrive, pris de panique, me suppliant de lui venir en aide. Quelques instants plus tard, la foule prend d’assaut mon palais, hurlant qu’elle va tuer le « traître » [yusuf.GetFirstName] avant de s’en prendre aux autres Juifs. Je me précipite à la rencontre de la foule pour la rassurer sur mon sort et lui ordonner de se disperser, mais elle n’y prête aucune attention.\n\nÀ présent, la foule se rue à toute allure vers [yusuf.GetFirstName], et mes gardes comme moi avons bien peu de temps pour agir."
 granada.0014.a:0 "Que se passe‑t‑il ? Attendez ! Arrêtez !"
 granada.0014.a.tooltip:0 "Vous êtes impuissant face à la foule."
 granada.0014.b:0 "Je suis votre [ROOT.Char.GetTitleAsNameNoTooltip] ! Calmez‑vous – parlons‑en !"
 granada.0014.b.tooltip:0 "Vous tentez de ramener la foule à la raison."
 granada.0014.c:0 "Gardes ! Protégez [yusuf.GetFirstName] et rétablissez l’ordre, sur‑le‑champ !"
 granada.0014.c.tooltip:0 "Vous ordonnez à vos troupes d'arrêter la foule."
 granada.0015.t:0 "Un jour sombre"
 granada.0015.desc:0 "Je me frotte le front en entendant affluer de nouveaux rapports provenant des quartiers juifs. Ils sont très sombres.\n\nLa nuit dernière, je fus impuissant devant une foule si nombreuse. Elle se rua sur [yusuf.GetFirstName] et le tua avant que je puisse faire quoi que ce fût. Enragée, la foule se déversa ensuite dans les quartiers juifs de la ville, massacrant tous les Juifs qu’elle trouvait. Sa fureur était telle que plusieurs non‑Juifs présents sur place furent également tués.\n\nLorsque mes soldats purent enfin rétablir l’ordre, des centaines, voire des milliers d’innocents étaient morts, et les Juifs survivants fuyaient déjà ailleurs. Une partie de la ville fut détruite, et mon administration fut en grande partie mise en pièces par la perte soudaine de nombreux fonctionnaires juifs compétents."
 granada.0015.a:0 "C’est un jour sombre pour [granada.GetNameNoTier]."
 granada.0016.t:0 "Ordre restauré"
 granada.0016.desc.peaceful:0 "Les deux heures qui suivirent furent extrêmement tendues. Tandis que mes gardes déplacent discrètement [yusuf.GetFirstName] vers un lieu sûr, je m’efforce d’expliquer à la foule, avec calme, fermeté et à haute voix, qu’il ne se passe rien. La rumeur selon laquelle [yusuf.GetFirstName] aurait trahi notre bien‑aimée cité à nos ennemis n’est qu’une rumeur.\n\nÀ mon grand soulagement, mes paroles semblent porter leurs fruits. Les cris et appels à la violence s’éteignent, et la foule commence à se disperser.\n\nPlus tard dans la journée, je vais voir [yusuf.GetFirstName] pour m’assurer qu'[yusuf.GetSheHe] va bien. [yusuf.GetSheHe|U] est secoué, mais survivra. Je me rends ensuite dans les quartiers juifs pour rassurer les Juifs de la ville sur le fait qu’il ne leur arrivera rien. Pendant ce temps, mes fonctionnaires et moi continuerons de surveiller la situation pour empêcher que cela ne se reproduise.\n\nDans l’ensemble, merci à [ROOT.Char.GetFaith.HighGodName], rien n’a dégénéré… J’ai eu peur un moment, mais nous avons évité la tragédie en ce jour !"
 granada.0016.desc.force:0 "Heureusement, mes soldats répondirent rapidement à mes ordres malgré le chaos ambiant. Bien qu’en infériorité numérique, ils se précipitèrent pour escorter [yusuf.GetFirstName] en lieu sûr, et appelèrent en renfort des troupes stationnées ailleurs dans la ville.\n\nMalheureusement, la foule était dans un état d’hystérie, et ces fous téméraires tentèrent de submerger mes troupes dans leur effort pour trouver et attaquer [yusuf.GetFirstName]. Ils ne firent pas le poids face à mes soldats, et certains membres de la foule périrent lors de l’affrontement.\n\nCe matin‑là, j’appris avec soulagement que [yusuf.GetFirstName] était sain et sauf. Il y eut quelques violences contre d’autres Juifs de la ville, mais mes soldats parvinrent à y mettre fin.\n\nDans l’ensemble, cela aurait pu être bien pire, mais alors que je visite aujourd’hui les quartiers juifs pour rassurer les Juifs de la ville sur le fait qu’il ne leur arrivera rien, je sais que la situation demeure précaire. Mes fonctionnaires et moi continuerons de la surveiller pour empêcher que de tels événements se reproduisent, mais certains habitants de [granada.GetNameNoTier] pourraient ne pas voir d’un bon œil ce que j’ai fait."
 granada.0016.a:0 "[ROOT.Char.GetFaith.HighGodName] soit loué, la situation est sous contrôle pour l’instant."
 RICE_granada_1066_jewish_pogrom_context_tooltip:0 "#emphasis Contexte historique :#! Le massacre des Juifs de Grenade, le 30 décembre 1066, fut l’un des épisodes les plus sombres de l’antisémitisme dans l’Espagne médiévale. Les victimes se chiffrèrent peut‑être entre un millier et plusieurs milliers.\n\nLes récits traditionnels affirment que le catalyseur du massacre fut un poème incendiaire écrit par un érudit et poète andalou, Abu Ishaq, qui dénonçait la domination juive à Grenade, en particulier celle du vizir juif du royaume, Joseph ibn Naghrela. Étrangement, cette histoire n’apparaît dans les sources historiques que des siècles après le massacre. Ainsi, même s’il écrivit bien ce poème, il est peu probable qu’il fût la véritable cause du pogrom, l’antisémitisme ayant sans doute augmenté à Grenade depuis des années.\n\nQuoi qu’il en soit, le massacre commença le 30 décembre lorsqu’une rumeur se répandit selon laquelle Joseph avait tué le roi de Grenade, Badis, afin de trahir le royaume à leur rivale, Alméria. Une foule se rassembla pour prendre d’assaut le palais où Joseph cherchait refuge. Même après qu’il eut amené Badis devant eux pour prouver que le roi était en vie, la foule le massacra et le crucifia, avant de se ruer sur les quartiers juifs de la ville.\n\nLes Juifs survivants fuirent ailleurs et, bien que certains soient revenus dans les décennies suivantes (avant d’être expulsés par les Almoravides en 1090), la communauté juive de Grenade ne retrouva jamais sa gloire passée."
 granada.0017.t:0 "Soie d’Alméria"
 granada.0017.desc:0 "La soie est un commerce lucratif, et jadis, [cordoba.GetNameNoTier] était le centre de ce commerce en Ibérie. Toutefois, en raison de l’évolution récente de la situation géopolitique ibérique et des routes commerciales mondiales, [cordoba.GetNameNoTier] ne peut plus produire les quantités de soie d’autrefois.\n\nTandis que d’autres dirigeants de la péninsule se précipitent pour financer l’essor d’ateliers de soie ailleurs, j’ai la bénédiction de régner sur [almeria.GetNameNoTier]. De nombreux marchands que je fréquente m’ont dit que c’est le lieu idéal pour reprendre le rôle qu’occupait [cordoba.GetNameNoTier] en tant que centre de l’industrie de la soie ibérique – certains vont même jusqu’à dire qu’elle pourrait un jour surpasser [cordoba.GetNameNoTier], même si je ne sais si j’en serai témoin de mon vivant.\n\nQuoi qu’il en soit, [almeria.GetNameNoTier] est l’un des ports les plus importants de la Méditerranée occidentale et peut donc exporter de grandes quantités de soie vers d’autres contrées. Cela assurera sans nul doute la future prospérité de la cité."
 granada.0017.a:0 "Nous tirerons un grand profit de toute cette soie !"
 granada.0018.t:0 "Soie d’Alméria"
 granada.0018.desc:0 "Lorsque les Arabes et les Berbères arrivèrent pour la première fois sur la péninsule Ibérique, ils n’apportèrent pas seulement l’islam avec eux, mais également d’autres idées et coutumes, comme les méthodes de production de soie fine. [cordoba.GetNameNoTier] devint rapidement un important centre de production de soie, grâce au mécénat royal des Omeyyades.\n\nÀ présent, pourtant, en raison des années de conflits en Ibérie et de l’évolution du commerce mondial, [cordoba.GetNameNoTier] a décliné en tant que grand producteur de soie. Des ateliers de soie ont fleuri dans de nombreuses villes ibériques, mais [almeria.GetNameNoTier] se distingue au‑dessus d’elles toutes, ayant clairement hérité du rôle de centre de production de la soie ibérique autrefois tenu par [cordoba.GetNameNoTier].\n\nLes élites d'[almeria.GetNameNoTier], notamment [silk_investor.GetTitledFirstName], ont compris le potentiel de profit que recèle le commerce de la soie, et ont commencé à investir massivement dans l’industrie de la soie de la ville. En tant que l’un des plus grands ports de la Méditerranée occidentale, la cité est très bien placée pour exporter la soit‑dite soie d’Alméria, qui commence à gagner en renommée à travers l’Europe et le Moyen‑Orient pour sa qualité."
 granada.0018.a:0 "La ville gagnera en importance grâce à cela…."
 granada.0019.t:0 "Un Juif grenadin prometteur"
 granada.0019.desc:0 "Je me suis récemment lié avec l’un de mes officiers juifs de [granada.GetNameNoTier], nommé [granadan_jew.GetFullName].\n\nLes Juifs de [granada.GetNameNoTierNoTooltip] jouissent d’un niveau d’influence et de pouvoir sans égal en Ibérie, et peut‑être même ailleurs en Europe et au Moyen‑Orient. En conséquence, [granada.GetNameNoTierNoTooltip] produit de nombreux hommes [granadan_jew.GetFaith.GetReligion.GetAdjective] de grand talent et de grande érudition, tels que [granadan_jew.GetFirstNameNoTooltip]. Ils sont fréquents dans mon administration, quelles que soient mes opinions personnelles sur les Juifs.\n\nQuoi qu’il en soit, j’ai entendu de bonnes choses sur ce dont [granadan_jew.GetFirstNameNoTooltip] est capable. Peut‑être devrais‑je le faire venir à ma cour et lui confier de plus grandes responsabilités. Son manque de liens avec les nobles intrigants de ma cour, par exemple, pourrait en faire un atout précieux. D’un autre côté… certains ne voient pas d’un bon œil les Juifs, et pourraient me juger négativement si je fais cela."
 granada.0019.a:0 "J’ai besoin d’hommes de valeur comme lui à mes côtés !"
 granada.0019.b:0 "En y réfléchissant bien, je n’ai pas besoin de lui."
 granada.0020.t:0 "Étendre l’Alhambra"
 granada.0020.desc.intro:0 "L’Alhambra est une synthèse de pierre, de marbre, d’eau, de plantes et de poésie qui offre à chacun une vision du paradis. Pourtant, ce complexe palatial peut toujours être enrichi d’ajouts et de rénovations, et j’ai récemment décidé de la prochaine grande structure de l’Alhambra."
 granada.0020.desc.structure.generalife:0 "\n\nLe #bold Generalife#! sera un #italic munya#! qui éclipsera tous les autres #italic munyas#!. Tel que je l’imagine, ce sera une villa d’une grande beauté, emplie de jardins richement ornés et à couper le souffle, ainsi que de fontaines et de canaux alimentés par les eaux les plus pures et limpides de la rivière Darro. Et, à la différence des #italic munyas#! ordinaires, qui se trouvent à la campagne, tout cela se trouvera juste à côté de l’Alhambra, si bien que je n’aurai guère à voyager pour en profiter !"
 granada.0020.desc.structure.house_of_worship:0 "\n\nNous avons besoin d’une véritable #bold [ROOT.Char.GetFaith.HouseOfWorship|U] de l’Alhambra#! pour répondre aux besoins spirituels de tous ceux qui y résident. Oui, il existe quelques petits édifices de ce genre disséminés ici et là dans l’Alhambra, ainsi que de modestes salles et oratoires, mais cela ne suffit pas. Nous avons besoin d’une véritable maison de culte, où l’on puisse se sentir comme de pieux [ROOT.Char.GetFaith.GetAdherentNamePlural], et où nous puissions être inspirés par [ROOT.Char.GetFaith.HighGodName]. Cet édifice remplira ce rôle."
 granada.0020.desc.structure.rawda:0 "\n\nLe mausolée de Rawda sera une nécropole de grande beauté, et un lieu de sépulture digne pour les membres de la dynastie [ROOT.Char.GetDynasty.GetName]. Une petite cour et un jardin accueilleront ceux qui entrent dans le mausolée, qui prendra la forme d’une enceinte rectangulaire. C’est là que j’ai l’intention d’être enterré, ainsi que de nombreux futurs membres de ma famille, j’ose l’espérer, afin que, même dans l’au‑delà, la beauté et la gloire de l’Alhambra ne soient jamais bien loin."
 granada.0020.desc.structure.comares_palace:0 "\n\nLe #bold palais des Comares#! sera une aile magnifique du complexe de l’Alhambra. Certes, il existe d’autres structures palatiales, et d’autres verront certainement le jour après ma mort. Mais le palais des Comares sera différent des autres. Il aura un bassin réfléchissant, une grande salle du trône pour accueillir mes courtisans et invités, et un bain d’une taille jamais vue en Ibérie – en somme, il sera l’envie du monde entier !"
 granada.0020.desc.structure.court_of_the_lions:0 "\n\nL’Alhambra compte de nombreux palais, chacun ayant sa propre beauté singulière. Celui auquel je souhaite être à jamais associé portera le nom de #bold Cour des Lions#!. Ce ne sera pas la structure la plus grandiose, mais je n’épargnerai aucune dépense, car ce sera un chef‑d’œuvre d’architecture, tant sur le plan technique qu’artistique. Il comportera une fontaine de marbre ornée de lions sculptés en son patio principal, ainsi que des voûtes élaborées dans ses salles – des visions mémorables pour tout futur visiteur du site."
 granada.0020.desc.structure.generic_palatial:0 "\n\nOn ne saurait jamais avoir trop de nouvelles #bold résidences palatiales#! à l’Alhambra. Tout [ROOT.Char.GetTitleAsNameNoTooltip] digne de ce nom doit prouver son rang, sa richesse et son pouvoir aux autres, surtout aux hommes et femmes de moindre importance, par de grandes entreprises telles que l’agrandissement de l’Alhambra par un nouveau complexe palatial. Autrement, comment les autres sauraient‑ils qu’ils me doivent le respect ? Cette résidence servira à la fois de lieu de repos et de loisir, ainsi que de cour pour accueillir les envoyés, et de cabinet d’étude pour travailler ou prier [ROOT.Char.GetFaith.HighGodName]."
 granada.0020.desc.structure.generic_recreational:0 "\n\nQui donc n’aime pas un beau #bold jardin#!, surtout ceux de l’Alhambra ? Voilà pourquoi j’en ajouterai un autre en ces lieux. Certes, quelques sots prétendent que les jardins y sont légion, mais chacun est unique et constitue son propre mélange de fleurs, d’arbustes, de fontaines et bien plus encore, qui contribue à la beauté de l’ensemble de l’Alhambra. Je m’assurerai de faire venir des jardiniers, des botanistes et des ingénieurs hydrauliques expérimentés de contrées lointaines pour garantir que ce jardin soit aussi impressionnant que les autres."
 granada.0020.desc.structure.generic_military:0 "\n\nBien que l’Alhambra soit renommée pour sa beauté et serve d’ordinaire à moi et à ma cour de lieu de repos et de loisir, nous ne devons pas oublier qu’elle demeure, au bout du compte, une forteresse destinée à protéger la région des ennemis étrangers. C’est pourquoi je souhaite ajouter des #bold fortifications#! supplémentaires à l’Alhambra. Même si cela ne sera ni aussi brillant ni aussi impressionnant que d’autres parties du complexe, je puis dormir tranquille en sachant que cela contribuera à la sécurité de ce palais sur le long terme."
 granada.0020.desc.conclusion:0 "\n\nLes travaux de construction de cette nouvelle structure ont désormais commencé. Bien qu’ils prennent du temps, je suis certain qu’elle constituera un ajout digne de ce paradis sur terre !"
 granada.0020.a:0 "J’ai hâte de le voir achevé !"
 granada.0020.tooltip.generalife:0 "La construction du #bold Generalife#! prendra de un à cinq ans. Le [ruler|E] du [county|E] de Grenade recevra les bonus suivants une fois achevé :\n$EFFECT_LIST_BULLET$ @prestige_icon! 150\n$EFFECT_LIST_BULLET$ @piety_icon! 150\n$EFFECT_LIST_BULLET$ [modifier|E]  [GetModifier('RICE_granada_built_generalife').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Les bonus octroyés par la [decision|E] #bold $RICE_granada_admire_alhambra_gardens$#! sont améliorés\n$EFFECT_LIST_BULLET$ La [decision|E] #bold $RICE_granada_alhambra_munya_estate$#! est moins coûteuse"
 granada.0020.tooltip.house_of_worship:0 "La construction de la #bold maison de culte de l’Alhambra#! prendra de un à cinq ans. Le [ruler|E] du [county|E] de Grenade recevra les bonus suivants une fois achevée :\n$EFFECT_LIST_BULLET$ @piety_icon! 300\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_house_of_worship').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Les bonus octroyés par la [decision|E] #bold $RICE_granada_alhambra_comares_baths$#! sont améliorés\n$EFFECT_LIST_BULLET$ Bonus de [piety|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir"
 granada.0020.tooltip.rawda:0 "La construction du #bold mausolée de Rawda#! prendra de un à cinq ans. Le [ruler|E] du [county|E] de Grenade recevra les bonus suivants une fois achevé :\n$EFFECT_LIST_BULLET$ @piety_icon! 200\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 100\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_rawda').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Bonus de [dynasty_prestige|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir"
 granada.0020.tooltip.comares_palace:0 "La construction du #bold palais des Comares#! prendra de un à cinq ans. Le [ruler|E] du [county|E] de Grenade recevra les bonus suivants une fois achevé :\n$EFFECT_LIST_BULLET$ @prestige_icon! 300\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_comares_palace').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Déverrouille la [decision|E] #bold $RICE_granada_alhambra_comares_baths$#!"
 granada.0020.tooltip.court_of_the_lions:0 "La construction de la #bold Cour des Lions#! prendra de un à cinq ans. Le [ruler|E] du [county|E] de Grenade recevra les bonus suivants une fois achevée :\n$EFFECT_LIST_BULLET$ @prestige_icon! 200\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 100\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_court_of_the_lions').GetNameWithTooltip] pendant 10 ans\n$EFFECT_LIST_BULLET$ Bonus de [prestige|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir"
 granada.0020.tooltip.generic_palatial:0 "La construction de la #bold résidence palatiale générique#! prendra de un à cinq ans. Le [ruler|E] du [county|E] de Grenade recevra les bonus suivants une fois achevée :\n$EFFECT_LIST_BULLET$ @prestige_icon! 100 (@prestige_icon! 200 si la [alhambra_structure|E] Cour des Lions a été construite dans l’[alhambra|E])\n$EFFECT_LIST_BULLET$ @piety_icon! 100 (@piety_icon! 200 si la [alhambra_structure|E] Maison de culte de l’Alhambra a été construite dans l’[alhambra|E])\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 50 si la [alhambra_structure|E] mausolée de Rawda a été construit dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_generic_palatial').GetNameWithTooltip] pendant 10 ans"
 granada.0020.tooltip.generic_recreational:0 "La construction des #bold jardins génériques#! prendra de un à cinq ans. Le [ruler|E] du [county|E] de Grenade recevra les bonus suivants une fois achevée :\n$EFFECT_LIST_BULLET$ @piety_icon! 200 (@piety_icon! 300 si la [alhambra_structure|E] Maison de culte de l’Alhambra a été construite dans l’[alhambra|E])\n$EFFECT_LIST_BULLET$ @prestige_icon! 100 si la [alhambra_structure|E] Cour des Lions a été construite dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 50 si la [alhambra_structure|E] mausolée de Rawda a été construit dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_generic_recreational').GetNameWithTooltip] pendant 10 ans"
 granada.0020.tooltip.generic_military:0 "La construction des #bold fortifications génériques#! prendra de un à cinq ans. Le [ruler|E] du [county|E] de Grenade recevra les bonus suivants une fois achevée :\n$EFFECT_LIST_BULLET$ @prestige_icon! 200 (@prestige_icon! 300 si la [alhambra_structure|E] Cour des Lions a été construite dans l’[alhambra|E])\n$EFFECT_LIST_BULLET$ @piety_icon! 100 si la [alhambra_structure|E] Maison de culte de l’Alhambra a été construite dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ @dynasty_prestige_icon! 50 si la [alhambra_structure|E] mausolée de Rawda a été construit dans l’[alhambra|E]\n$EFFECT_LIST_BULLET$ [modifier|E] [GetModifier('RICE_granada_built_generic_military').GetNameWithTooltip] pendant 10 ans"
 granada.0021.t:0 "Fin des travaux à l’Alhambra"
 granada.0021.desc.intro.original:0 "Enfin, le projet de construction le plus récent pour étendre l’Alhambra est achevé ! Tous les fonds que j’y ai consacrés n’ont pas été gaspillés. À présent, l’Alhambra est plus beau encore qu’auparavant, grâce à l’ajout d’une nouvelle aile."
 granada.0021.desc.intro.other_builder:0 "Il n’y a pas si longtemps, les anciens dirigeants de [granada.GetNameNoTier] ont lancé un projet de construction visant à étendre l’Alhambra. Pour une raison ou une autre, je règne désormais sur [granada.GetNameNoTier], et c’est moi qui ai mené ce projet à son terme. À présent, l’Alhambra est plus beau encore qu’avant grâce à l’ajout d’une nouvelle aile."
 granada.0021.desc.structure.generalife:0 "\n\nLe #bold Generalife#! est une structure spectaculaire. Empli de ravissants jardins, d’un charmant escalier d’eau et d’un palais accueillant, c’est le meilleur refuge que l’on puisse imaginer sur la péninsule Ibérique. Et, puisqu’il est situé sur une jolie colline faisant face à l’Alhambra, il est assez proche pour que je puisse facilement aller de l’un à l’autre. Si je souhaite m’offrir de belles vacances, je le peux en un clin d’œil !"
 granada.0021.desc.structure.house_of_worship:0 "\n\nEnfin, nous avons ici, à l’Alhambra, un véritable lieu de culte. La #bold [ROOT.Char.GetFaith.HouseOfWorship|U] de l’Alhambra#!, comme on l’appellera, répondra aux besoins spirituels de tous ceux qui y vivent, moi compris. Bien qu’elle ne soit pas la plus grande des [ROOT.Char.GetFaith.HouseOfWorship], je dirais qu’elle surpasse la plupart des autres : lorsque l’on est entouré de jardins luxuriants, de cours paisibles et d’une architecture d’une élégance et d’un art incomparables, qui ne serait pas inspiré de rendre hommage à [ROOT.Char.GetFaith.HighGodName] devant la beauté de l’Alhambra ?"
 granada.0021.desc.structure.rawda:0 "\n\nCertains pourraient s’étonner que l’on place le #bold mausolée de Rawda#! au cœur de l’Alhambra. Mais pourquoi refuser aux esprits des morts un beau lieu de repos ? Si nous avons joui de l’Alhambra de notre vivant, il est juste que nous ayons la possibilité d’en jouir aussi dans la mort. Désormais, je serai, avec les autres membres de la dynastie [ROOT.Char.GetDynasty.GetName], y compris tous les futurs dirigeants de cette région, enterré ici comme il se doit. Ce sera un plaisir, teinté de mélancolie, que de marcher parmi les tombes et de méditer sur les morts qui nous ont précédés."
 granada.0021.desc.structure.comares_palace:0 "\n\nLe #bold palais des Comares#! était destiné à être un palais grandiose, et je ne doute pas qu’il le soit. Son élément central extérieur est un grand bassin réfléchissant dans la Cour des Myrtes. De là, l’on peut pénétrer dans une majestueuse Salle des Ambassadeurs, qui peut servir de salle du trône. Par‑dessus tout, la structure abrite également des bains d’une taille jamais vue en Ibérie – véritable sujet d’envie pour le monde entier !"
 granada.0021.desc.structure.court_of_the_lions:0 "\n\nLa #bold Cour des Lions#! tire son nom d’une fontaine de marbre entourée de douze lions, reliée au reste du palais par des canaux d’eau. Cette fontaine, principale attraction de la cour, n’est qu’un petit morceau du vaste puzzle qu’est l’Alhambra. Sa beauté est si exquise que je suis certain que chacun se souviendra à jamais du moment où il posera pour la première fois le pied dans cette aile de l’Alhambra : il oubliera de respirer un bref instant à la vue de la fontaine, et même après avoir quitté l’Alhambra, il poussera sans doute un soupir d’admiration chaque fois qu’il s’en souviendra."
 granada.0021.desc.structure.generic_palatial:0 "\n\nIl existe déjà d’autres palais à l’Alhambra, certains peut‑être tout aussi beaux, mais je puis considérer cette #bold résidence palatiale#! comme la mienne, au moins en ce sens que c’est moi qui ai veillé à l’achèvement de sa construction. J’y passerai sans nul doute beaucoup de temps, que ce soit pour me détendre et me reposer, pour accueillir des visiteurs de lointaines contrées ou pour m’occuper des affaires de l’État."
 granada.0021.desc.structure.generic_recreational:0 "\n\nCes #bold jardins#! ne sont que l’un des nombreux que compte l’Alhambra, mais je dois dire qu’ils constituent un ajout digne de ce complexe palatial. Des fleurs, des arbres et des arbustes de toutes contrées ont été soigneusement plantés autour des fontaines et des canaux pour donner à chacun l’impression de se trouver au paradis. Il n’est rien de mieux, à mon sens, que de s’asseoir quelque part dans ce jardin et d’en admirer la vue, d’entendre l’eau s’écouler et les oiseaux chanter, de sentir la brise fraîche contre mon visage. Je suis comblé."
 granada.0021.desc.structure.generic_military:0 "\n\nAu bout du compte, l’Alhambra n’en demeure pas moins une forteresse, et les forteresses doivent être continuellement entretenues si elles veulent remplir leur rôle ultime de rempart défensif. Les nouvelles #bold fortifications#! qui viennent d’être bâties à l’Alhambra remplissent bien ce rôle en ce sens. Tours, murs, casernes et plus encore – ce sont ces éléments qui assureront que nous pourrons protéger l’Alhambra, et que sa beauté ne sera jamais ternie, ni même rasée, par ceux qui cherchent à nous détruire."
 granada.0021.a:0 "Tout simplement magnifique."
 granada.0021.tooltip.generalife:0 "$EFFECT_LIST_BULLET$ Les bonus octroyés par la [decision|E] #bold $RICE_granada_admire_alhambra_gardens$#! sont améliorés\n$EFFECT_LIST_BULLET$ La [decision|E] #bold $RICE_granada_alhambra_munya_estate$#! est moins coûteuse"
 granada.0021.tooltip.house_of_worship:0 "$EFFECT_LIST_BULLET$ Les bonus octroyés par la [decision|E] #bold $RICE_granada_alhambra_comares_baths$#! sont améliorés\n$EFFECT_LIST_BULLET$ Bonus de [piety|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir"
 granada.0021.tooltip.rawda:0 "$EFFECT_LIST_BULLET$ Bonus de [dynasty_prestige|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir"
 granada.0021.tooltip.comares_palace:0 "$EFFECT_LIST_BULLET$ La [decision|E] #bold $RICE_granada_alhambra_comares_baths$#! est déverrouillée pour les [rulers|E] de Grenade"
 granada.0021.tooltip.court_of_the_lions:0 "$EFFECT_LIST_BULLET$ Bonus de [prestige|E] pour tous les [rulers|E] lors de la construction de développements génériques de l’Alhambra à l’avenir"
