 activity_RICE_granada_munya_vacation_group_predicted_cost: "Le coût de villégiature au [munya|E] dépend des [activity_options|E] que vous choisissez."
 activity_RICE_granada_munya_vacation_group_conclusion_desc: "La [GetActivityType( 'activity_RICE_granada_munya_vacation_group' ).GetName] est terminé. Ce fut une expérience plaisante pour tous ceux qui y prirent part !"
 RICE_granada_munya_vacation_group_type: "Type de villégiature"
 RICE_granada_munya_vacation_group_type_party: "Fête continue"
 RICE_granada_munya_vacation_group_type_party_desc: "$EFFECT_LIST_BULLET$ Gagnez [prestige_i|E] [prestige|E] à la fin de l’[activity|E], en plus d’autres bonus\n$EFFECT_LIST_BULLET$ Chance de gagner [GetModifier('RICE_granada_munya_vacation_famed_partier').GetNameWithTooltip] selon votre [diplomacy|E] et votre [intrigue|E]\n\n#weak Quelques riches aristocrates tous rassemblés au même endroit, loin de la civilisation, avec abondance de nourriture, de boisson et de compagnie. Les choses pourraient devenir fort débridées !#!"
 RICE_granada_munya_vacation_group_type_gardens: "Jardins et panoramas"
 RICE_granada_munya_vacation_group_type_gardens_desc: "$EFFECT_LIST_BULLET$ Gagnez [prestige_i|E] [prestige|E] et [piety_i|E] [piety|E] (la moitié des autres [activity_options|E]) à la fin de l’[activity|E], en plus d’autres bonus\n$EFFECT_LIST_BULLET$ Chance de gagner [GetModifier('RICE_granada_munya_vacation_famed_gardens').GetNameWithTooltip] selon votre [diplomacy|E] et votre [stewardship|E]\n\n#weak En vérité, ces magnifiques pépinières, serres, terrasses, paysages et plus encore n’ont pas d’égal, et peuvent être tenus pour un paradis sur terre !#!"
 RICE_granada_munya_vacation_group_type_poetry: "Poètes et intellectuels"
 RICE_granada_munya_vacation_group_type_poetry_desc: "$EFFECT_LIST_BULLET$ Gagnez [piety_i|E] [piety|E] à la fin de l’[activity|E], en plus d’autres bonus\n$EFFECT_LIST_BULLET$ Chance de gagner [GetModifier('RICE_granada_munya_vacation_famed_intellectual').GetNameWithTooltip] selon votre [diplomacy|E] et votre [learning|E]\n\n#weak Un dirigeant qui se tient en la compagnie de gens créatifs, réfléchis et intelligents doit sûrement être de même nature… ou du moins cherche-t-il à le devenir.#!"
 RICE_granada_munya_vacation_group_length: "$RICE_granada_munya_vacation_private_length$"
 RICE_granada_munya_vacation_group_length_short: "$RICE_granada_munya_vacation_private_length_short$"
 RICE_granada_munya_vacation_group_length_short_desc: "$EFFECT_LIST_BULLET$ La villégiature au [munya|E] durera #V 1#! semaine\n$EFFECT_LIST_BULLET$Des villégiatures plus longues augmentent le gain de [prestige_i|E] [prestige|E] et/ou de [piety_i|E] [piety|E], ainsi que la perte de [stress_loss_i|E] [stress|E] pour vous et vos invités.\n\n#weak Tout le monde mène une vie bien remplie, et afin de ne point incommoder chacun, ce séjour sera relativement bref.#!"
 RICE_granada_munya_vacation_group_length_medium: "$RICE_granada_munya_vacation_private_length_medium$"
 RICE_granada_munya_vacation_group_length_medium_desc: "$EFFECT_LIST_BULLET$ La villégiature au [munya|E] durera #V 1#! mois\n$EFFECT_LIST_BULLET$Des villégiatures plus longues augmentent le gain de [prestige_i|E] [prestige|E] et/ou de [piety_i|E] [piety|E], ainsi que la perte de [stress_loss_i|E] [stress|E] pour vous et vos invités.\n\n#weak N’est-ce pas l’un des plus grands plaisirs que de passer un bon moment à se détendre en bonne compagnie ?#!"
 RICE_granada_munya_vacation_group_length_long: "$RICE_granada_munya_vacation_private_length_long$"
 RICE_granada_munya_vacation_group_length_long_desc: "$EFFECT_LIST_BULLET$ La villégiature au [munya|E] durera #V 3#! mois\n$EFFECT_LIST_BULLET$Des villégiatures plus longues augmentent le gain de [prestige_i|E] [prestige|E] et/ou de [piety_i|E] [piety|E], ainsi que la perte de [stress_loss_i|E] [stress|E] pour vous et vos invités.\n\n#weak Oubliez les responsabilités ! Oubliez le devoir ! Qui donc ne voudrait pas s’amuser aussi longtemps que possible ?#!"
