 CHELDEBECHEL_GLOSS: "Traditionally in Palau, #bold Cheldebechel#! were formal clubs that played an important societal role Micronesian nation of Palau. They were organized by age and gender, and had a variety of functions, such as educating younger generations about the roles in society, levying labor for public works projects, enforcing laws and protecting the community's economic and military interests, and so on."
 BITANG_ME_A_BITANG_GLOSS: "The principle of #bold bitang me a bitang#!, meaning “half and half” or “this side and that side,” is a Palauan concept of duality, where every entity is conceptually balanced between two opposite but complementary, connected sides. For instance, a person is not considered good nor bad, but both. In more practical terms, this affected Palau's traditional culture in many ways; clan lineages were divided in two groups, villages were geographically divided into two parts, and political interactions were also based on this principle."
 KWARAAE_WARRIOR_GHOSTS_GLOSS: "The Kwaraʼae, the largest indigenous group from Malaita Island in the Solomon islands, traditionally had great reverence for ghosts. Those who followed the proper rules of “living for the ghosts” could pray to them for support. Warriors could even summon warrior ghosts (#italic akalo ramo’a#!), also known as war ghosts (#italic akalo ni mae#!), who were once famous warriors, to support them in their feuds and conflicts against rival communities or clans. It was believed that while using these powers, men had to avoid the presence of women, who could neutralize such powers."
 SASI_GLOSS: "In parts of eastern Indonesia and Papua, there is a traditional custom of resource conservation often known as #bold Sasi#! (though it is known by various names in different languages, the term Sasi, which comes from the Maluku islands, is often used for convenience). A certain area is or type of resource is "closed" for a period of time, such as one year, and during this time, people are forbidden from harvesting resources affected by the prohibition. For instance, if an area of coastline is closed, fishing is forbidden; or, one might be forbidden from foraging certain plants. Defying the Sasi would carry grave consequences, as it was believed to anger the spirits or ancestors. The Sasi would then be opened again in a ceremony after the time has passed."
 MEGAPODE_GLOSS: "#bold Megapodes#! are several species of related birds that resemble wild chickens and are native to the western Pacific, Australia, New Guinea, eastern Indonesia, and the Andaman and Nicobar Islands. They have a habit of incubating their eggs in small, concentrated nesting areas. For several indigenous groups in the region, the bids' eggs are a major source of food, and often gifted as signs of loyalty, friendship, and respect. Traditionally, ritual conventions in these areas restrict the harvest of these eggs."
 YAP_STONE_MONEY_GLOSS: "As late as the 20th century, the Yapese would travel far to the island of Palau to acquire limestone shaped into a disk with a hole in a center. Because of the large size of these #bold rai stones#!, which could be from a few inches to several feet wide, the voyage back could be perilous, and some lost their lives on the trip. The stones were used for currency, and their value came not only from its size or shape, but also from the oral history attached to the stone, such as who owned it in the past, or how many people died trying to haul it back to Yap. Such stories would be passed down for generations and confirmed its value, so it would be hard to steal the stone since everyone knew each stone's owner."