 niger_delta.0050.t:0 "Un couronnement pour [scoped_ruler.GetTitledFirstNameNoTooltip] ?"
 niger_delta.0050.desc.intro:0 "En tant que Ọọ̀ni de $c_ife$, je suis considéré par de nombreux [ROOT.Char.GetFaith.GetAdherentNamePlural] et habitants du [GetGeographicalRegion('RICE_yorubaland_region').GetName] comme un dirigeant d’une grande importance spirituelle. Traditionnellement, des souverains venus de loin se rendent à la cour du Ọọ̀ni pour y avoir une cérémonie de couronnement avec la précieuse couronne perlée d’Oduduwa afin de légitimer leur règne.\n\nUn de ces souverains, [scoped_ruler.GetTitledFirstName], a fait le voyage jusqu’à ma cour pour faire exactement cela. Comme on ne peut simplement exiger une couronne perlée du Ọọ̀ni, [scoped_ruler.GetSheHe] m’a apporté un cadeau."
 niger_delta.0050.desc.sacrifice:0 "\n\n[scoped_ruler.GetFirstName] a offert un sacrifice à [scoped_ruler.GetFaith.HighGodName] en mon honneur. Ce geste montre qu'[scoped_ruler.GetSheHe] adhère à nos croyances spirituelles et qu’[scoped_ruler.GetSheHe] est dévoué[scoped_ruler.Custom('FR_E')] à nos ancêtres."
 niger_delta.0050.desc.oduduwa_shrine:0 "\n\n[scoped_ruler.GetFirstName] a offert un important don d’or au sanctuaire d’Oduduwa, notre grand ancêtre, à $c_ife$. Les [ROOT.Char.Custom('DefaultPriestTitlePlural')] en sont très heureux, et cela démontre aussi sa foi et sa sincérité ."
 niger_delta.0050.desc.sacred_vow:0 "\n\n[scoped_ruler.GetFirstName] a juré qu’[scoped_ruler.GetSheHe] m’aidera de toutes les manières possibles — même si cela va à l’encontre de ses propres intérêts. En effet, de tels vœux sacrés ne sont pas à prendre à la légère."
 niger_delta.0050.desc.art:0 "\n\n[scoped_ruler.GetFirstName] m’a offert un grand nombre d’œuvres d’art inestimables, réalisées par les guildes d’artisans organisées par sa famille, les [scoped_ruler.GetDynasty.GetName]. Ces objets esthétiquement plaisants témoignent de son statut en tant que [scoped_ruler.GetTitleAsNameNoTooltip] et de mon autorité en tant que Ọọ̀ni."
 niger_delta.0050.desc.land:0 "\n\n[scoped_ruler.GetFirstName] a promis de donner les terres de [county.GetNameNoTier] à un membre de ma famille, [other_character.GetFullName], pour qu’il en prenne le gouvernement. C’est une offre généreuse qui renforcera le pouvoir de ma famille dans le monde."
 niger_delta.0050.desc.low_concubine:0 "\n\n[scoped_ruler.GetFirstName] m’a offert un[other_character.Custom('FR_E')] [other_character.GetWomanMan] nommé[other_character.Custom('FR_E')] [other_character.GetFullName] pour être mon consort. [other_character.GetSheHe|U] posséderait, dit-on, un visage agréable et d’autres bonnes qualités."
 niger_delta.0050.desc.high_concubine:0 "\n\n[scoped_ruler.GetFirstName] m’a offert un membre de sa famille, [other_character.GetFullName], pour être mon consort. Outre le fait qu'[other_character.GetSheHe|U] posséderait un visage agréable et de bonnes qualités, c’est un signe évident de déférence de la part de [scoped_ruler.GetFirstNamePossessiveNoTooltip] d’envoyer un membre précieux de sa famille à ma cour de cette manière."
 niger_delta.0050.desc.no_gift:0 "\n\n[scoped_ruler.GetFirstName] ne m’a rien offert… En réalité, [scoped_ruler.GetSheHe] estime que sa seule présence est un « cadeau » suffisant. C’est… eh bien, je ne sais même pas comment réagir à cela. Est-[scoped_ruler.GetSheHe] f[scoped_ruler.Custom('FR_OuOlle')] ? Quel genre d’imbécile sauvage et sacrilège oserait afficher ouvertement un tel niveau d’irrespect envers le Ọọ̀ni ?"
 niger_delta.0050.a:0 "Bien ! Je lui remettrai une couronne perlée."
 niger_delta.0050.b:0 "Ce n'est pas un grand cadeau, mais je l'accepte quand même."
 niger_delta.0050.c:0 "Aussi absurde que cela soit, j’accepterai son « cadeau »."
 niger_delta.0050.d:0 "Dites-lui que je n’accepterai pas ce « cadeau » insultant !"
 niger_delta.0051.t:0 "Couronnement par le Ọọ̀ni"
 niger_delta.0051.desc:0 "Dès que j’ai appris la bonne nouvelle que [ooni.GetTitledFirstName] avait accepté mon cadeau en tant que Ọọ̀ni, je suis arrivé à $c_ife$ uniquement pour qu'[ooni.GetSheHe] me remette officiellement la couronne perlée, et légitime mon règne en tant que [ROOT.Char.GetTitleAsNameNoTooltip] de [ROOT.Char.GetPrimaryTitle.GetNameNoTier].\n\nLors de la cérémonie qui s’y est tenue, je m’agenouille devant le Ọọ̀ni tandis qu'[ooni.GetSheHe] place la couronne sacrée d’Oduduwa sur ma tête. Après m’être relevé, je fais le serment de protéger la sécurité de mes vassaux, d’honorer les ancêtres, de faire un sacrifice annuel au sanctuaire d’Oduduwa, et de protéger et entretenir les sanctuaires sacrés sur toutes mes terres."
 niger_delta.0051.desc.bad_gift:0 "\n\nJ’ai entendu des rumeurs disant que le Ọọ̀ni n’a pas été totalement satisfait du cadeau que je lui ai présenté. Bien que cela ne me mette pas en valeur, tant qu'[ooni.GetSheHe] a accepté le cadeau, je peux vivre avec ça."
 niger_delta.0051.a:0 "Je sens l’àṣẹ d’Oduduwa couler en moi !"
 niger_delta.0052.t:0 "Retour à la maison"
 niger_delta.0052.desc:0 "Après que [ooni.GetTitledFirstName] a officiellement reçu mon cadeau et m’a couronné avec la couronne perlée d’Oduduwa, j’ai passé un certain temps à $c_ife$, visitant divers sanctuaires et priant [ROOT.Char.GetFaith.HighGodName].\n\nJe suis ensuite rentré chez moi à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier]. Recevoir la couronne perlée du Ọọ̀ni fut un grand honneur, et mes sujets me regarderont désormais avec plus de respect car je me suis affirmé comme un dirigeant légitime à leurs yeux."
 niger_delta.0052.a:0 "Je peux maintenant reprendre mes fonctions de [ROOT.Char.GetTitleAsNameNoTooltip]."
 niger_delta.0053.t:0 "Rejeté par le Ọọ̀ni"
 niger_delta.0053.desc:0 "Mauvaises nouvelles !\n\n[ooni.GetTitledFirstName] a refusé d’accepter mon cadeau et, ce faisant, a également refusé d’honorer ma demande de me couronner avec la couronne perlée sacrée d’Oduduwa. Cela, hélas, ne jouera pas en ma faveur. Peut-être que le Ọọ̀ni changera d’avis à l’avenir et m’accordera l’honneur de recevoir cette couronne."
 niger_delta.0053.desc.no_gift:0 "\n\nEn toute justice, tout le monde s'accorde à dire qu'exiger un couronnement sans même offrir au moins un cadeau symbolique au Ọọ̀ni était tout simplement idiot. Partout où je vais, de terribles rumeurs circulent sur la façon dont le Ọọ̀ni m'a méprisé, mais aussi sur le fait que je suis un souverain inepte et illégitime, maudit par [ROOT.Char.GetFaith.PantheonTerm], qui ne mérite pas de régner."
 niger_delta.0053.a:0 "Ce n'est pas bon...."
