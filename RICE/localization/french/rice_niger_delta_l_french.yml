 niger_delta.0070.t:0 "La date est fixée"
 niger_delta.0070.desc.intro:0 "J’ai reçu la nouvelle que le grand prêtre d’Oranmiyan, qui est aussi le gardien en chef du calendrier [yoruba.GetAdjective], a fixé la date du festival Olojo de cette année. Considéré comme le festival le plus important célébré à [ife.GetNameNoTier] par les [yoruba.GetName], il commémore le moment où Ogun, le farouche dieu du fer et de la guerre, a ouvert la voie aux autres esprits et divinités pour entrer sur terre et est devenu un des premiers Ọọ̀ni de [ife.GetNameNoTierNoTooltip]."
 niger_delta.0070.desc.ooni:0 "\n\nEn tant que Ọọ̀ni, j'ai un rôle important à jouer dans ce festival, car je renouvellerai mon serment sacré de chef spirituel de tous les [yoruba.GetName], je participerai à divers rituels et je bénirai mon peuple. Je dois me préparer et accomplir divers rites et rituels pour communier avec les ancêtres et prier pour tout mon peuple."
 niger_delta.0070.desc.not_ooni:0 "\n\nCette année, j’ai prévu de participer à ce grand événement à [ife.GetNameNoTierNoTooltip]. En tant que [ROOT.Char.GetTitleAsNameNoTooltip], on attend de moi que je participe à un certain nombre de rituels aux côtés du Ọọ̀ni, le chef spirituel de tous les [yoruba.GetName]."
 niger_delta.0070.a:0 "Je suis impatient !"
 niger_delta.0071.t:0 "L'isolement du Ọọ̀ni"
 niger_delta.0071.desc.intro:0 "Une semaine avant le début du festival Olojo, le Ọọ̀ni doit s'isoler jusqu'au début du festival. Ce faisant, le Ọọ̀ni peut se purifier afin d'assurer l'efficacité des divers rituels et cérémonies auxquels il participera pendant le festival d'Olojo."
 niger_delta.0071.desc.ooni:0 "\n\nJe suis le Ọọ̀ni actuel, il est donc de mon devoir de suivre ces traditions sacrées sans faille. Je me suis retiré dans mon palais où je communie maintenant avec mes ancêtres et m’adonne à une prière ininterrompue."
 niger_delta.0071.desc.not_ooni:0 "\n\nLe Ọọ̀ni actuel, [ooni.GetFirstName], s’est retiré dans son palais pour communier avec ses ancêtres et s’adonner à une prière ininterrompue. Nous autres, qui sommes arrivés à [ife.GetNameNoTier], ne pouvons qu’attendre patiemment."
 niger_delta.0071.desc.conclusion:0 "\n\nPendant ce temps, les femmes de la maison royale se réunissent chaque soir pour chanter les louanges d’Ogun et d’Oranmiyan, une autre divinité guerrière et ancien Ọọ̀ni, et pour balayer le palais afin de le purifier symboliquement du mal. Pendant ce temps, le sanctuaire d’Ogun à [ife.GetNameNoTier] a été décoré de palmes."
 niger_delta.0071.a:0 "Cela permet de rappeler à tout le monde que le festival Olojo va bientôt commencer."
 niger_delta.0072.t:0 "Début d'Olojo"
 niger_delta.0072.desc.intro:0 "Aujourd’hui, le festival Olojo commence !\n\nLe premier jour, le jour Ilagun, débute bien avant le lever du soleil, lorsqu’un groupe de recherche est envoyé depuis le palais du Ọọ̀ni pour trouver et capturer un chien qui sera sacrifié à Ogun. Ogun est une divinité colérique qui réclame des victimes à la chasse, à la guerre et lors d’accidents sur la route, il est donc inévitable que ce festival qui lui est dédié commence par un tel sacrifice.\n\nLe grand prêtre du festival Olojo, l’Osogun, mène une procession avec le chien en laisse jusqu’à la résidence du Ọọ̀ni à [ife.GetNameNoTier]."
 niger_delta.0072.desc.ooni:0 "Comme le veut la tradition, en tant que Ọọ̀ni, je ne sors pas pour rencontrer l'Osogun. Au lieu de cela, divers chefs et autres puissants dirigeants qui se sont rassemblés pour l'Olojo ont attendu à l'extérieur du palais à ma place. Ils remettent à l'Osogun un petit pot de médicaments et un message officiel de ma part indiquant que le sacrifice à Ogun peut avoir lieu."
 niger_delta.0072.desc.not_ooni:0 "Comme, selon la tradition, le Ọọ̀ni [ooni.GetFirstName] ne doit pas sortir pour rencontrer l’Osogun, celui-ci est accueilli à l’extérieur du palais par divers chefs et puissants dirigeants comme moi, qui se sont réunis pour l’Olojo. Nous remettons à l’Osogun un petit pot de médicaments, ainsi qu’un message officiel du Ọọ̀ni indiquant que le sacrifice à Ogun peut avoir lieu."
 niger_delta.0072.a:0 "L’Osogun peut maintenant se rendre au sanctuaire d’Ogun."
 niger_delta.0073.t:0 "Le sacrifice à Ogun"
 niger_delta.0073.desc:0 "L’Osogun arrive au sanctuaire d’Ogun avec la procession et le chien sacrificiel. Puis, invoquant Ogun, l’Osogun prie pour le Ọọ̀ni en disant : « Roi, détenteur du pouvoir sacré, second seulement aux dieux, puissiez-vous régner longtemps, puissiez-vous vaincre vos ennemis ! »\n\nLe chien est dûment attaché et sa tête brisée d’un seul coup de massue. Une fois mort, il est attaché aux arbres sacrés pour être éventré, et son sang couler depuis le sanctuaire. Des prières et offrandes sont alors faites pour le Ọọ̀ni et pour tous les autres, tandis qu’un deuxième chien est également sacrifié.\n\nLorsque les cérémonies sacrificielles se terminent pour la journée, tout le monde commence à faire la fête, à danser et à chanter les louanges d’Ogun."
 niger_delta.0073.a:0 "Il y a de l'excitation partout !"
 niger_delta.0074.t:0 "La foule d'Olojo"
 niger_delta.0074.desc:0 "Le deuxième jour d’Olojo, [ife.GetNameNoTier] est encore rempli de foules qui répandent la joie. Plusieurs groupes se distinguent particulièrement.\n\nLes premiers sont les membres de la famille royale, vêtus de longues robes amples et d’un chapeau à frange couvrant leur visage, pour montrer leurs liens forts avec le Ọọ̀ni.\n\nEnsuite viennent les guérisseurs et guérisseuses, qui protègent le Ọọ̀ni des forces maléfiques pendant le festival. Ils exhibent leurs cornes d’animaux médicinales et murmurent des incantations pour empêcher la pluie de tomber pendant Olojo.\n\nLes troisièmes sont les serviteurs du palais, le corps peint en blanc et rouge vif, accompagnés de tambourinaires, qui contrôlent la foule avec des fouets.\n\nEnfin, les chasseurs et les forgerons, qui portent les bannières de leurs guildes."
 niger_delta.0074.a:0 "Les gens se dirigent maintenant aussi vers le palais du Ọọ̀ni."
 niger_delta.0075.t:0 "Le Ọọ̀ni apparaît en public"
 niger_delta.0075.desc.intro:0 "C’est l’un des rares moments où le Ọọ̀ni quitte son palais et se montre en public."
 niger_delta.0075.desc.ooni:0 "\n\nJe sors du palais vêtu de la couronne #italic Are#!. Je fais alors vibrer les perles de la couronne et je regarde la foule. Tous les dirigeants et prêtres présents se prosternent devant moi, reconnaissant mon autorité en tant que dirigeant divin.\n\nJe me rends ensuite au sanctuaire d’Ogun. En chemin, tout le monde m’inonde de prières allant de la bonne santé aux malédictions sur les ennemis, car la #italic Are#! est réputée puissante."
 niger_delta.0075.desc.not_ooni:0 "\n\n[ooni.GetTitledFirstName] sort, fait vibrer les perles de sa couronne #italic Are#! et regarde la foule. Tous les dirigeants et prêtres présents, moi y compris, nous prosternons devant le Ọọ̀ni, reconnaissant son autorité en tant que dirigeant divin.\n\nAlors que le Ọọ̀ni se rend au sanctuaire d’Ogun, tout le monde l’inonde de prières allant de la bonne santé aux malédictions sur les ennemis, car la #italic Are#! est réputée puissante. Peut-être devrais-je moi aussi prier pour quelque chose ?"
 niger_delta.0075.a:0 "Je distribue dûment des prières à toutes les personnes présentes."
 niger_delta.0075.b:0 "Une bonne santé avant tout !"
 niger_delta.0075.c:0 "Fortune et prospérité !"
 niger_delta.0075.d:0 "Malheur à mes ennemis !"
 niger_delta.0075.e:0 "Je n'ai besoin de rien."
 niger_delta.0075.health:0 "Le Ọọ̀ni entend votre prière pour la santé !"
 niger_delta.0075.fortune:0 "Le Ọọ̀ni entend votre prière pour la fortune !"
 niger_delta.0075.enemies:0 "Le Ọọ̀ni entend votre prière pour maudire vos ennemis !"
 niger_delta.0076.t:0 "Les sanctuaires de $c_ife$"
 niger_delta.0076.desc.ooni:0 "Mon trajet jusqu’au sanctuaire d’Ogun prend un certain temps avec toute la foule présente, mais une fois arrivé, j’accomplis divers rituels avec l’Osogun. Le plus important est que je renouvelle mon serment en tant que Ọọ̀ni.\n\nEnsuite, je me rends au sanctuaire de la déesse de la richesse, Aje. Bien que les hommes occupent généralement l’espace rituel et public dans les croyances [yoruba.GetAdjective], les femmes occupent l’espace du marché, où se prennent des décisions économiques cruciales, il est donc important que je sois ici pour faire appel aux esprits pour une année prospère.\n\nDans l’ensemble, ces visites renforcent mon autorité religieuse. Après mon retour au palais à la fin du deuxième jour, le troisième jour suivant est généralement un jour de pause."
 niger_delta.0076.desc.not_ooni:0 "Le trajet du Ọọ̀ni jusqu’au sanctuaire d’Ogun prend un certain temps avec toute la foule présente, mais une fois qu’[ooni.GetSheHe] y arrive, le Ọọ̀ni accomplit divers rituels avec l’Osogun. Le plus important est qu’[ooni.GetSheHe] renouvelle son serment en tant que Ọọ̀ni.\n\nEnsuite, [ooni.GetSheHe] se rend au sanctuaire de la déesse de la richesse, Aje. Bien que les hommes occupent généralement l’espace rituel et public dans les croyances [yoruba.GetAdjective], les femmes occupent l’espace du marché, où se prennent des décisions économiques cruciales, il est donc important que le Ọọ̀ni soit présent pour faire appel aux esprits pour une année prospère.\n\nDans l’ensemble, ces visites renforcent l’autorité religieuse de l’Ọọ̀ni. Après son retour au palais à la fin du deuxième jour, le troisième jour suivant est généralement un jour de pause."
 niger_delta.0076.a:0 "Jusqu'à présent, c'est très excitant."
 niger_delta.0077.t:0 "Le dernier jour d'Olojo"
 niger_delta.0077.desc.ooni:0 "C'est le quatrième et dernier jour d'Olojo, lorsque je retourne au sanctuaire d'Ogun pour y répéter tous les rituels accomplis quelques jours auparavant, comme le renouvellement de mon serment sacré de royauté. Ensuite, je rends visite aux anciens de ma maison, avant de visiter les membres des autres maisons royales voisines.\n\nPendant cette période, il est de coutume que les gens saluent le Ọọ̀ni et lui offrent des cadeaux, avant que je ne retourne à ma résidence, lorsque les femmes les plus âgées de ma maison chantent mes louanges et celles de ma lignée.\n\nCette année, j'ai rencontré un certain nombre de personnes qui m'ont salué et m'ont offert des cadeaux, reconnaissant ainsi mon pouvoir séculier et spirituel en tant que Ọọ̀ni."
 niger_delta.0077.desc.not_ooni:0 "C’est le quatrième et dernier jour d’Olojo, lorsque [ooni.GetTitledFirstName] retourne au sanctuaire d’Ogun pour y répéter tous les rituels accomplis quelques jours plus tôt, comme le renouvellement de son serment sacré de royauté. Ensuite, le Ọọ̀ni rend visite aux anciens de sa maison, avant de visiter les membres des autres maisons royales voisines.\n\nPendant cette période, il est de coutume que les gens saluent le Ọọ̀ni et lui offrent des cadeaux. Il serait bon que je le fasse aussi, avant que le Ọọ̀ni ne retourne à sa résidence, lorsque les femmes les plus âgées de sa maison chantent ses louanges et celles de sa lignée."
 niger_delta.0077.a:0 "Je prie pour tous ceux qui s'adressent à moi."
 niger_delta.0077.a.tooltip:0 "Le Ọọ̀ni a reçu divers cadeaux, dont des [gold_i|E] [gold|E], de la part du peuple"
 niger_delta.0077.b:0 "Je m’approche du Ọọ̀ni pour offrir un modeste cadeau."
 niger_delta.0077.c:0 "Je m’approche du Ọọ̀ni pour offrir un grand cadeau."
 niger_delta.0077.d:0 "Je ne m’approcherai pas du Ọọ̀ni pour offrir un cadeau."
 niger_delta.0078.t:0 "Fin de l'Olojo"
 niger_delta.0078.desc:0 "Le festival Olojo est terminé, et ceux venus de l’extérieur de [ife.GetNameNoTier] quittent la ville. Bien qu’il s’agisse d’une occasion festive, c’est un festival durant lequel les gens honorent le redoutable dieu Osun, rendent hommage au Ọọ̀ni — source du pouvoir séculier et sacré du monde — et commémorent l’histoire, le patrimoine et les valeurs [yoruba.GetAdjective].\n\nAprès tout, [ife.GetNameNoTierNoTooltip] est un site sacré, considéré comme le berceau de l’humanité, là où les dieux sont descendus sur terre. En fin de compte, Olojo est le moment pour nous tous de reconnaître les forces divines qui régissent l’univers."
 niger_delta.0078.a:0 "Jusqu'à la prochaine fois."
 niger_delta.0078.ooni.tooltip:0 "En renouvelant votre serment, vous renforcez rituellement l'institution du Ọọ̀ni."
 niger_delta.0078.ooni.tooltip.1:0 "Les gens pensent que vous avez fait un travail acceptable dans l'exercice de vos fonctions de Ọọ̀ni pendant le festival d'Olojo."
 niger_delta.0078.ooni.tooltip.2:0 "Les gens pensent que vous avez fait du bon travail en tant que Ọọ̀ni pendant le festival d'Olojo."
 niger_delta.0078.ooni.tooltip.3:0 "Les gens pensent que vous avez fait un travail magnifique dans l’exercice de vos fonctions de Ọọ̀ni pendant le festival d’Olojo."
