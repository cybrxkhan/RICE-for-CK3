 activity_RICE_niger_delta_olojo_festival:0 "Festival Olojo"
 activity_RICE_niger_delta_olojo_festival_desc:0 "Le festival Olojo se tient depuis des siècles dans la ville de [GetTitleByKey('b_ile-ife').GetNameNoTier], le berceau de l’humanité. Profondément lié à l’histoire, à la mythologie et à la culture de la région, il marque également le moment où le [GetTrait('RICE_ooni_of_ife').GetName( GetNullCharacter )], chef spirituel de tous les $west_african_orisha_religion_adherent_plural$, renouvelle son serment de charge et offre des sacrifices aux dieux, en particulier à Ogun.\n\n@alert_icon! #alert_trial Le festival Olojo commence en octobre. Si vous arrivez avant, l’activité sera mise en pause en attendant son début à [GetTitleByKey('b_ile-ife').GetNameNoTier].#!"
 activity_RICE_niger_delta_olojo_festival_selection_tooltip: "Participer au festival Olojo.\n\n$RICE_niger_delta_partake_olojo_festival_context_tooltip$"
 activity_RICE_niger_delta_olojo_festival_host_desc: "\n$BULLET_WITH_TAB$Vous pouvez obtenir divers avantages tels que du [piety_i|E] [piety|E] ou des [character_modifiers|E] #P bénéfiques#!\n$BULLET_WITH_TAB$Si vous êtes vous-même l’Ọọ̀ni, vous aurez des responsabilités supplémentaires ainsi que des bonus liés à cette [activity|E]"
 activity_RICE_niger_delta_olojo_festival_guest_desc: "$activity_RICE_niger_delta_olojo_festival_host_desc$"
 activity_RICE_niger_delta_olojo_festival_province_desc: "$c_ife$ est le berceau de l’humanité, et le seul endroit où peut se tenir le festival Olojo."
 activity_RICE_niger_delta_olojo_festival_destination_selection: "$activity_RICE_niger_delta_olojo_festival_province_desc$"
 activity_RICE_niger_delta_olojo_festival_guest_help_text: "$activity_RICE_niger_delta_olojo_festival$"
 activity_RICE_niger_delta_olojo_festival_predicted_cost: "Le coût de la participation au festival Olojo est principalement basé sur votre [income|E]"
 activity_RICE_niger_delta_olojo_festival_conclusion_desc: "Le [GetActivityType( 'activity_RICE_niger_delta_olojo_festival' ).GetName] est terminé. Quelle splendide occasion !"
 RICE_niger_delta_olojo_festival_festival_phase: "Festival"
 RICE_niger_delta_olojo_festival_festival_phase_desc: "Le festival sacré d'Olojo se déroule comme il se doit."
 RICE_niger_delta_olojo_festival_sacred_intent_header: "Sacré :"
 RICE_niger_delta_olojo_festival_sacred_intent: "Sacré"
 RICE_niger_delta_olojo_festival_sacred_intent_desc: "La fête d'Olojo, qui commémore la première aube, est une occasion de la plus haute importance religieuse pour tout le monde, du plus grand Ọọ̀ni au plus humble des paysans."
