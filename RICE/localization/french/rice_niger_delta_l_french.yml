 niger_delta.0010.t:0 "Offre des noix de kola"
 niger_delta.0010.desc.intro:0 "J’ai tout préparé pour la cérémonie d’aujourd’hui. Avec l’aide des [ROOT.Char.Custom('DefaultPriestTitlePlural')], je récite diverses prières et chants et présente différentes offrandes à [ROOT.Char.GetFaith.HighGodName], en particulier les noix de kola sacrées. Après avoir ouvert la première noix de kola, nous comptons combien de lobes elle possède :"
 niger_delta.0010.desc.one:0 "\n\nUn lobe.\n\nMalédiction ! Ce type de noix de kola, appelé #italic Oji Ogbi#! ou « noix de kola muette », est considéré comme une abomination, impropre à la consommation humaine et seulement destinée aux cieux. Je la jette immédiatement, mais c’est de toute façon un funeste présage."
 niger_delta.0010.desc.two:0 "\n\nDeux lobes.\n\nC'est malheureux. Ce type de noix de kola, appelé #italic Oji Gworo#!, ou noix de kola de l'esprit, est considéré avec suspicion parce que le chiffre deux manque d'équilibre et qu'une telle noix de kola appartient aux esprits. Je la jette immédiatement, mais c'est de toute façon un mauvais présage."
 niger_delta.0010.desc.three:0 "\n\nTrois lobes.\n\nBon signe ! Ce type de noix de kola, appelé #italic Oji Ikenga#! ou « noix de kola des vaillants », est considéré comme masculin, incarnant le courage, les guerriers et les hommes saints, ainsi que l’unité familiale de base. Cela montre assurément ma bravoure et ma force en tant que [ROOT.Char.GetTitleAsNameNoTooltip] !"
 niger_delta.0010.desc.four:0 "\n\nQuatre lobes.\n\nMerveilleux ! Ce type de noix de kola, appelé #italic Oji Udo na Ngozi#! ou « noix de kola de paix et de bénédictions », est lié aux quatre jours du marché (et symbolise donc la complétude). Le chiffre quatre étant sacré, c’est clairement un signe de stabilité et d’unité dans ma vie et mon royaume."
 niger_delta.0010.desc.five:0 "\n\nCinq lobes.\n\nExcellente nouvelle ! Ce type de noix de kola, appelé #italic Oji Omumu#! ou « noix de kola de la procréation et de la prospérité », est rare et symbolise une récolte abondante, ainsi qu’une grande richesse et fécondité. Sans aucun doute, c’est le signe d’une prospérité et d’une fortune présentes et à venir."
 niger_delta.0010.desc.six:0 "\n\nSix lobes.\n\nQuelle merveille ! Ce type de noix de kola, appelé #italic Oji Ogbugbandu#! ou « noix de kola des ancêtres », est rare et symbolise l’alliance particulière entre [ROOT.Char.GetFaith.PantheonTerm] et les humains. Traditionnellement, il convient d’accomplir des sacrifices et cérémonies supplémentaires après avoir trouvé une telle noix, car elle annonce une grande prospérité et réussite."
 niger_delta.0010.desc.seven:0 "\n\nSept lobes.\n\nUne bénédiction des bénédictions ! Ce type de noix de kola, appelé #italic Oji Asaa-Asota#! ou « noix de kola du sept et huit » (entre autres noms), est extrêmement rare et symbolise diverses choses : célébration, loi, royauté, prophétie, accomplissement et éternité. Cette noix miraculeuse et précieuse est censée avoir des effets surnaturels ; c’est donc un signe de fortune incommensurable pour moi, et cela appelle des sacrifices en l’honneur de [ROOT.Char.GetFaith.PantheonTerm], ainsi qu’une fête et un banquet."
 niger_delta.0010.a:0 "La cérémonie se conclut ainsi."
