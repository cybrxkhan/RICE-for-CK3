 RICE_niger_delta_form_ironsmiths_option_tooltip:0 "$EFFECT_LIST_BULLET$La [dynasty|E] recevra le [modifier|E] [GetModifier('RICE_niger_delta_ironsmith_guild_modifier').GetNameWithTooltip]\n$EFFECT_LIST_BULLET$Débloque la possibilité pour tout [ruler|E] [landed|E] de cette [dynasty|E] de commander des [artifacts|E] #bold en fer#! en prenant la [decision|E] de commander une œuvre auprès des [niger_delta_craft_guilds|E] (si les autres conditions sont remplies)\n$EFFECT_LIST_BULLET$L’art en fer rapporte généralement plus de [prestige|E] que les autres types d’œuvres\n\n#X Cette option est disponible uniquement si vous avez atteint le [prestige_level|E] $prestige_level_3$#!"

 # Misc Decisions

 RICE_niger_delta_celebrate_new_yam_festival:0 "Célébrer le festival de la nouvelle igname"
 RICE_niger_delta_celebrate_new_yam_festival_tooltip:0 "La première récolte d'ignames arrive bientôt..."
 RICE_niger_delta_celebrate_new_yam_festival_desc:0 "Depuis des siècles, l’igname est une source essentielle de nourriture pour les [ROOT.Char.GetCulture.GetCollectiveNoun] et d’autres peuples d’Afrique de l’Ouest originaires de la côte atlantique. Avec la récolte imminente, je devrais préparer un festival de la nouvelle igname d’ampleur et remercier [ROOT.Char.GetFaith.FertilityGodName] pour cette abondance."
 RICE_niger_delta_celebrate_new_yam_festival_effect_tooltip_1:0 "Vous gagnerez du [prestige|E], de la [piety|E] et potentiellement divers [character_modifiers|E] positifs"
 RICE_niger_delta_celebrate_new_yam_festival_effect_tooltip_2:0 "À la fin du festival, chaque [county|E] que vous possédez aura une chance d’obtenir le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip]"
 RICE_niger_delta_celebrate_new_yam_festival_confirm:0 "C'est la saison des récoltes !"
 RICE_niger_delta_celebrate_new_yam_festival_context_tooltip:0 "#emphasis Contexte historique :#! Les festivals de la nouvelle igname sont des célébrations annuelles que l’on retrouve dans de nombreuses sociétés africaines de la « zone de l’igname », qui s’étend sur une grande partie des régions forestières et côtières de l’Afrique de l’Ouest. Dans ces zones, l’igname a traditionnellement été la principale culture agricole. Bien que les détails varient d’une culture à l’autre, ces festivals peuvent être vus comme des rituels sociaux et religieux festifs, marquant le début de la récolte et renforçant les liens et traditions communautaires."
 RICE_decision_new_yam_month_req:0 "Le mois doit être juillet, août ou septembre"
 RICE_niger_delta_partake_olojo_festival:0 "Participer au festival Olojo"
 RICE_niger_delta_partake_olojo_festival_tooltip:0 "Allons célébrer à $c_ife$ !"
 RICE_niger_delta_partake_olojo_festival_desc:0 "Le festival Olojo se tient depuis des siècles dans la ville de $c_ife$, berceau de l’humanité. Étroitement lié à l’histoire, à la mythologie et à la culture de la région, il est aussi l’occasion pour le Ọọ̀ni de $c_ife$, chef spirituel de tous les [ROOT.Char.GetFaith.GetReligion.GetName], de renouveler son serment et d’offrir des sacrifices à [ROOT.Char.GetFaith.PantheonTerm], en particulier à Ogun. Je devrais participer à l’événement de cette année."
 RICE_niger_delta_partake_olojo_festival_effect_tooltip_1:0 "Vous pourriez gagner de la [piety|E] et possiblement d’autres bienfaits"
 RICE_niger_delta_partake_olojo_festival_effect_tooltip_2:0 "Pendant le festival Olojo, vous pouvez vous joindre à la foule pour demander au Ọọ̀ni, détenteur du titre [GetTitleByKey('d_ooni_of_ife').GetNameNoTier], diverses bénédictions"
 RICE_niger_delta_partake_olojo_festival_effect_tooltip_3:0 "En tant que Ọọ̀ni de [GetTitleByKey('d_ooni_of_ife').GetNameNoTier], vous aurez des responsabilités uniques durant le festival et devrez vous isoler en préparation, mais vous gagnerez davantage de [piety|E], de [prestige|E] et peut-être même des [character_modifiers|E] spéciaux"
 RICE_niger_delta_partake_olojo_festival_confirm:0 "Préparons-nous pour le festival !"
 RICE_niger_delta_partake_olojo_festival_context_tooltip:0 "#emphasis Contexte historique :#! Le festival Olojo est l’un des événements annuels les plus importants de la ville nigériane d’Ife (Ile-Ife). Il remplit des fonctions religieuses, culturelles et politiques, notamment en lien avec le souverain traditionnel d’Ife, le Ọọ̀ni. Selon la légende, le festival fut instauré par le troisième Ọọ̀ni, Ogun."
 RICE_niger_delta_offer_kola_nuts:0 "Offrir des noix de kola à [ROOT.Char.GetFaith.HighGodName]"
 RICE_niger_delta_offer_kola_nuts_tooltip:0 "Offrons des [kola_nuts|E] à [ROOT.Char.GetFaith.HighGodName]"
 RICE_niger_delta_offer_kola_nuts_desc.religion:0 "Chez les [ROOT.Char.GetFaith.GetAdherentNamePlural], les [kola_nuts|E] sont vénérées comme symbole de la philosophie #italic Igwebuike#!, l’interconnexion du monde. Elles sont aussi réputées aider à deviner l’avenir. Je devrais en offrir à [ROOT.Char.GetFaith.HighGodName]."
 RICE_niger_delta_offer_kola_nuts_desc.culture:0 "Chez les [ROOT.Char.GetCulture.GetCollectiveNoun], les [kola_nuts|E] sont vénérées comme symbole de la philosophie #italic Igwebuike#!, l’interconnexion du monde. Elles sont aussi réputées aider à deviner l’avenir. Je devrais en offrir à [ROOT.Char.GetFaith.HighGodName]."
 #RICE_niger_delta_offer_kola_nuts_effect_tooltip_1:0 "You will gain some [piety|E]"
 RICE_niger_delta_offer_kola_nuts_confirm:0 "Préparez les noix de kola !"
 RICE_niger_delta_offer_kola_nuts_tt:0 "Vous gagnez de la [piety|E] et un [character_modifier|E] selon le nombre de lobes de la première [kola_nut|E] que vous offrez"
 RICE_niger_delta_offer_kola_nuts.one:0 "Un lobe"
 RICE_niger_delta_offer_kola_nuts.two:0 "Deux lobes"
 RICE_niger_delta_offer_kola_nuts.three:0 "Trois lobes"
 RICE_niger_delta_offer_kola_nuts.four:0 "Quatre lobes"
 RICE_niger_delta_offer_kola_nuts.five:0 "Cinq lobes"
 RICE_niger_delta_offer_kola_nuts.six:0 "Six lobes"
 RICE_niger_delta_offer_kola_nuts.seven:0 "Sept Lobes"
 RICE_niger_delta_offer_kola_nuts_context_tooltip:0 "#emphasis Contexte historique :#! La noix de kola est importante en Afrique, où elle est utilisée pour accueillir les invités, effectuer des divinations, etc. La noix de kola est peut-être la plus vénérée par les Igbo, qui la considèrent comme un symbole de la philosophie #italic Igwebuike#! d'interconnexion et de réciprocité, et l'utilisent dans de nombreux contextes sociaux et religieux différents. Lorsqu'une noix de kola est cassée, le nombre de lobes a une signification symbolique ; bien que chaque culture de la région ait ses propres interprétations, la représentation ici est basée sur la culture Igbo."
 RICE_restore_ooni_decision:0 "Rétablir le $d_ooni_of_ife$"
 RICE_restore_ooni_decision_desc:0 "La cité de $c_ife$, berceau sacré de l’humanité selon la mythologie [ROOT.Char.GetFaith.GetReligion.GetAdjective], est privée depuis trop longtemps de son véritable souverain, le Ọọ̀ni. Il est temps de rétablir cette fonction."
 RICE_restore_ooni_decision_tooltip:1 "Vous deviendrez le Ọọ̀ni de $c_ife$"
 RICE_restore_ooni_decision_effect_tooltip:1 "Vous deviendrez le Ọọ̀ni de $c_ife$"
 RICE_restore_ooni_decision_confirm:0 "Le Ọọ̀ni revient à $c_ife$ !"
 RICE_restore_ooni_decision_context_tooltip:0 "#emphasis Contexte historique :#! Ife est considéré comme le berceau de l'humanité par les Yorubas. Le souverain d'Ife (ou Ile-Ife), appelé Ọọ̀ni, jouissait et jouit toujours d'une grande autorité religieuse et séculaire. Des sources portugaises du début de la période moderne comparent également le Ọọ̀ni au Pape, et l'un des premiers Ọọ̀nis de la légende yoruba, Oduduwa, est devenu par la suite le progéniteur légendaire de nombreuses familles royales du Yorubaland et du Bénin. Les souverains de la région se rendaient traditionnellement à Ife pour être officiellement couronnés par le Ọọ̀ni avec la couronne d'Oduduwa."
 RICE_niger_delta_restore_ooni_to_ife:0 "Rendre le contrôle de $c_ife$ au Ọọ̀ni"
 RICE_niger_delta_restore_ooni_to_ife_confirm:0 "Accueillons le Ọọ̀ni à $c_ife$ !"
 RICE_niger_delta_restore_ooni_to_ife_desc:0 "Bien que je contrôle $c_ife$, son véritable dirigeant est le Ọọ̀ni, chef cérémoniel et spirituel de la communauté [ROOT.Char.GetFaith.GetReligion.GetAdjective]. Il doit régner sur la cité sacrée, et non moi."
 RICE_niger_delta_restore_ooni_to_ife_tooltip:0 "Le Ọọ̀ni regagnera la cité de $c_ife$"
 RICE_ife_held_by_you_or_vassal_tt:0 "$c_ife$ doit être détenu par vous ou par un [vassal|E]"
 RICE_ife_is_capital:0 "$c_ife$ n'est pas votre [realm_capital|E]"


