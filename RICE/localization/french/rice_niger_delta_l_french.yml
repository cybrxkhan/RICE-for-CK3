 niger_delta.0040.t:0 "Se déchaîner"
 niger_delta.0040.desc:0 "Le festival de l'igname est une période de grande réjouissance, parfois jusqu'à l'excès pour les membres les plus pudiques de notre société. De nombreuses personnes mangent beaucoup, mais consomment aussi beaucoup d'alcool. Parfois, on entend même des rumeurs sur des rencontres érotiques clandestines qui seraient normalement désapprouvées, mais qui passent inaperçues ou sont ignorées en raison de la nature trépidante de ces festivals."
 niger_delta.0040.a:0 "Les gens sont ici pour célébrer la récolte - laissez-les s'amuser !"
 niger_delta.0040.b:0 "Bien que je le désapprouve personnellement, je ne peux pas faire grand-chose."
 niger_delta.0040.c:0 "J'appliquerai des règles plus strictes lors du festival de cette année !"
 niger_delta.0041.t:0 "Herbes magiques"
 niger_delta.0041.desc:0 "Dans certaines régions, il est coutume de distribuer des herbes magiques au début du festival de la nouvelle igname, après la première série de sacrifices à [ROOT.Char.GetFaith.PantheonTerm]. On pense que ces rites protègent tout le monde contre la maladie causée par la consommation prématurée de la nouvelle récolte d'ignames."
 niger_delta.0041.a:0 "Ces choses sont nécessaires pour protéger notre santé et nos âmes."
 niger_delta.0042.t:0 "Des ignames pour les ancêtres"
 niger_delta.0042.desc:0 "Les gens visitent toujours les sanctuaires des ancêtres pendant le festival de la nouvelle igname, et je ne fais pas exception à la règle. Dans les sanctuaires, j'offre de l'igname à mes prédécesseurs pour montrer mon sens du devoir et demander aux ancêtres leurs bénédictions et leurs conseils."
 niger_delta.0042.a:0 "Puissiez-vous apprécier ces ignames, chers ancêtres !"
 niger_delta.0042.b:0 "Les ancêtres méritent une grande, une géante offrande d'ignames !"
 niger_delta.0042.b.tooltip:0 "Cette option #P augmente#! légèrement la chance que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé"
 niger_delta.0043.t:0 "Le roi des ignames"
 niger_delta.0043.desc.intro:0 "Parfois, lors de la fête de la nouvelle igname, les agriculteurs locaux s'affrontent pour savoir qui cultive les meilleures ignames. Celui qui cultive les meilleures ignames est ensuite nommé "roi de l'igname", ce qui lui vaut un grand prestige et beaucoup d'honneur."
 niger_delta.0043.desc.no_farmer:0 "\n\nJe devrais peut-être offrir une récompense à l'agriculteur qui a remporté le concours de cette année. Cela me donnerait certainement une bonne image aux yeux de la communauté !"
 niger_delta.0043.desc.farmer:0 "\n\nLe vainqueur de cette année est un agriculteur du nom de [farmer.GetFullName]. [farmer.GetSheHe|U] serait bien plus talentueu[farmer.Custom('FR_XSe')]  que l'agriculteur moyen (ou au moins très chanceu[farmer.Custom('FR_XSe')]), étant donné le résultat impressionnant de la récolte initiale d'ignames provenant de sa ferme.\n\nPeut-être devrais-je offrir une récompense à [farmer.GetFirstNameNoTooltip]. En fait, compte tenu de ses connaissances et compétences en matière d'agriculture, il pourrait même être à mon avantage de l'inviter à ma cour."
 niger_delta.0043.a:0 "Le prestige et l'honneur sont une récompense suffisante."
 niger_delta.0043.b:0 "Une bonne idée - j'offrirai à cet agriculteur un cadeau approprié !"
 niger_delta.0043.c:0 "[farmer.GetFirstNameNoTooltip] recevra un cadeau et [farmer.GetSheHe] pourra rejoindre ma cour."
 niger_delta.0043.tooltip:0 "Les chances que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé ont été légèrement #P augmentées#!"
 niger_delta.0044.t:0 "Grosses ignames"
 niger_delta.0044.desc:0 "Parfois, pendant le festival de l'igname, les habitants exposent publiquement des ignames anormalement grandes dans leur village, pour l'amusement et la fascination de tous. Je suis en train d'examiner quelques unes de ces ignames. Ces spécimens vraiment remarquables sont certainement grands, certains atteignant la taille d'une personne moyenne."
 niger_delta.0044.a:0 "Beau travail de la part des agriculteurs qui ont réussi cela."
 niger_delta.0044.b:0 "Cela n'a été possible que grâce à [ROOT.Char.GetFaith.PantheonTerm]."
 niger_delta.0045.t:0 "La plus grosse igname"
 niger_delta.0045.desc:0 "Chez certains peuples qui célèbrent le festival de la nouvelle igname, il est coutume de trouver la plus grosse igname de la récolte et de l'apporter à un sanctuaire local. Certaines communautés pensent qu'il est préférable de la conserver jusqu'au prochain festival de la nouvelle igname, où elle sera mangée. D'autres cultures pensent au contraire qu'il vaut mieux réserver ces grosses ignames à des fins sacrificielles.\n\nCette année, dans mon domaine, une igname anormalement grosse a été cultivée dans un village, atteignant la taille d'un homme grand. Que faut-il en faire ?"
 niger_delta.0045.a:0 "Gardons-la pour que nous puissions la manger au prochain festival de la nouvelle igname !"
 niger_delta.0045.b:0 "Nous devrions réserver cette igname aux sacrifices religieux."
 niger_delta.0045.tooltip:0 "Les chances que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé ont été légèrement #P augmentées#!"
 niger_delta.0046.t:0 "Ignames d'un autre pays"
 niger_delta.0046.desc:0 "Il existe de nombreuses règles importantes associées au festival de la nouvelle igname. L'une d'elles, présente dans certaines cultures, stipule que les étrangers ne peuvent pas apporter de nouvelles ignames de leur communauté dans une ville qui est sur le point ou en train de célébrer le festival de la nouvelle igname. L'igname "étrangère" est perçue comme une présence profanatrice.\n\nUn voyageur éminent venant d'ailleurs est récemment arrivé à [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier], ignorant que notre festival de la nouvelle igname n'était pas encore terminé, ce qui a provoqué une situation embarrassante lorsque ce voyageur a été découvert en possession de nouvelles ignames provenant de chez lui.\n\nDemander au contrevenant de payer une amende suffirait normalement, mais d'autres estiment qu'une cérémonie sacrificielle spéciale et urgente doit être effectuée pour purifier rituellement la communauté."
 niger_delta.0046.a:0 "Le paiement de l'amende devrait être une sanction suffisante."
 niger_delta.0046.b:0 "La terre doit être purifiée ! Faisons le sacrifice."
 niger_delta.0046.c:0 "Des amendes ? Des sacrifices ? Pas besoin de tout cela."
 niger_delta.0046.c.tooltip:0 "Cette option #N diminue#! fortement la chance que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé"
 niger_delta.0047.t:0 "Un bon moment"
 niger_delta.0047.desc:0 "Maintenant que le festival de l'igname a commencé, tout le monde s'amuse. [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] est rempli d'habitants qui dansent, jouent de la musique, applaudissent et s'amusent."
 niger_delta.0047.a:0 "Je me joins à la fête !"
 niger_delta.0047.b:0 "J'observerai depuis les coulisses."
