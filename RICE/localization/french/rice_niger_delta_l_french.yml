 niger_delta.0020.t.a:0 "La guilde des fondeurs de bronze"
 niger_delta.0020.t.b:0 "La guilde des forgerons"
 niger_delta.0020.t.c:0 "La guilde des sculpteurs d'ivoire et de bois"
 niger_delta.0020.t.d:0 "La Guilde des fabricants de perles"
 niger_delta.0020.desc.intro.dynasty_head:0 "En tant que [organizer.GetTitleAsNameNoTooltip] de [organizer.GetPrimaryTitle.GetName] et chef du clan [organizer.GetDynasty.GetName], j’ai des liens avec les nombreux artisans qui vivent dans nos terres et avec qui nous travaillons souvent. Cependant, je crois qu’ils pourraient pleinement réaliser leur potentiel sous notre direction.\n\nAinsi, j’estime qu’il est prudent d’organiser la "
 niger_delta.0020.desc.intro.dynasty_other:0 "De nombreux artisans vivent sur les terres gouvernées par la dynastie [organizer.GetDynasty.GetName]. Cependant, [organizer.GetTitledFirstName], chef de notre dynastie, estime que nous pourrions mieux exploiter leur potentiel sous notre direction.\n\nC’est pourquoi [organizer.GetSheHe] a récemment décidé d’organiser la "
 niger_delta.0020.desc.bronze_casters:0 "#bold guilde des fondeurs de bronze#! dans nos terres en un système formel, organisé sous notre patronage royal. Grâce à la technique de la cire perdue, ils créent de magnifiques sculptures et artefacts en bronze, souvent porteurs d’une signification politique et religieuse dans la société [organizer.GetCulture.GetName], en particulier les têtes en bronze représentant des êtres divins, des ancêtres et des dirigeants importants."
 niger_delta.0020.desc.ironsmiths:0 "#bold guilde des forgerons#! dans nos terres en un système formel, organisé sous notre patronage royal. Le fer est largement utilisé dans de nombreuses régions d’Afrique, mais ici, parmi les [organizer.GetCulture.GetCollectiveNoun], nous veillerons à ce qu’il ne serve pas seulement à fabriquer de puissantes armes et des outils du quotidien, mais aussi à créer de l’art, des sculptures, des insignes royaux et bien plus encore pour inspirer et intimider."
 niger_delta.0020.desc.ivory_and_wood_carvers:0 "#bold guilde des sculpteurs d’ivoire et de bois#! dans nos terres en un système formel, organisé sous notre patronage royal. La sculpture sur ivoire et sur bois sont étroitement liées chez les [organizer.GetCulture.GetCollectiveNoun], beaucoup de sculpteurs de bois étant aussi formés à sculpter l’ivoire et inversement. Utilisant les défenses d’éléphants chassés par des guildes locales ou le bois abondant dans les régions forestières, ces artisans créent de magnifiques œuvres pour les élites comme pour le peuple."
 niger_delta.0020.desc.beadmakers:0 "#bold guilde des fabricants de perles#! dans nos terres en un système formel, organisé sous notre patronage royal. Les [organizer.GetCulture.GetCollectiveNoun] accordent une grande importance aux perles comme symbole de pouvoir et de prestige, notamment pour confectionner des couronnes perlées ou des bijoux. Elles sont généralement fabriquées à partir de verre produit dans certains des plus grands ateliers d’Afrique, ou, dans les régions côtières, en corail rouge."
 niger_delta.0020.desc.conclusion:0 "\n\nL'existence d'un système de guildes organisé est bénéfique pour les deux parties. Les artisans bénéficient d'un travail régulier et d'un pouvoir politique accru grâce à leurs liens avec nous, tandis que nous pouvons mieux gérer les industries locales, voire en tirer profit, et patronner leur art pour rehausser le statut de notre dynastie."
 niger_delta.0020.a:0 "Notre dynastie s'agrandit toujours plus."
 niger_delta.0021.t:0 "Commande auprès des guildes"
 niger_delta.0021.desc.intro:0 "En tant que [patron.GetTitleAsNameNoTooltip], j’entretiens des liens avec plusieurs guildes d’artisans organisées sous l’égide de notre grande dynastie [patron.GetDynasty.GetName]. Nous leur commandons régulièrement des œuvres, et en retour, elles bénéficient d’un travail stable et d’un pouvoir politique accru.\n\nAujourd’hui, j’ai décidé de commander une œuvre en bronze à la guilde des"
 niger_delta.0021.desc.bronze:0 "#bold fondeurs de bronze#!. Grâce à la technique de la cire perdue, ils créent de magnifiques sculptures et artefacts en bronze, souvent porteurs d’une signification politique et religieuse dans la société [patron.GetCulture.GetName], notamment les têtes représentant des êtres divins, des ancêtres et des dirigeants importants."
 niger_delta.0021.desc.iron:0 "#bold forgerons#!. Le fer est largement utilisé dans de nombreuses régions d’Afrique, souvent pour de puissantes armes et des outils quotidiens, mais ici, parmi les [patron.GetCulture.GetCollectiveNoun], il peut aussi être façonné en œuvres d’art, sculptures, insignes royaux et autres créations inspirantes et intimidantes."
 niger_delta.0021.desc.ivory_or_wood:0 "#bold sculpteurs d’ivoire et de bois#!. Ces deux savoir-faire sont étroitement liés chez les [patron.GetCulture.GetCollectiveNoun], beaucoup de sculpteurs de bois étant aussi formés à l’ivoire et vice versa. Ils utilisent les défenses d’éléphants chassés localement ou le bois abondant des forêts africaines."
 niger_delta.0021.desc.glass:0 "#bold fabricants de perles#!. Les [patron.GetCulture.GetCollectiveNoun] attachent une grande importance aux perles comme symbole de pouvoir et de statut, par exemple pour fabriquer des couronnes perlées ou des bijoux. Elles sont généralement faites de verre issu des plus grands ateliers africains."
 niger_delta.0021.desc.coral:0 "#bold fabricants de perles#!. Les [patron.GetCulture.GetCollectiveNoun] attachent une grande importance aux perles comme symbole de pouvoir et de statut, par exemple pour fabriquer des couronnes perlées ou des bijoux. Du fait que ma capitale se trouve près de la côte, mes artisans peuvent façonner des pièces en corail rouge."
 niger_delta.0021.desc.conclusion:0 "\n\nMaintenant que j’ai formulé ma demande officielle, il ne reste plus qu’à attendre pour voir ce que ces artisans sont capables de produire, et quels seront les fruits de leur travail."
 niger_delta.0021.a:0 "J'ai hâte d'y être !"
 niger_delta.0021.tooltip:0 "La [niger_delta_craft_guild|E] que vous avez choisie mettra jusqu’à un an pour achever la fabrication de son [artifact|E]."
 niger_delta.0021.tooltip.ivory_or_wood:0 "Il y a 50 % de chances que l'œuvre d'art finale soit en ivoire, et 50 % qu'elle soit en bois."
 niger_delta.0022.t:0 "La Guilde présente ses œuvres d'art"
 niger_delta.0022.desc.intro:0 "Il y a quelque temps, j'ai demandé à certains artisans travaillant pour ma famille de créer une œuvre d'art. L'attente est enfin terminée !"
 niger_delta.0022.desc.intro.heir:0 "Il y a quelque temps, [patron.GetTitledFirstName] avait commandé aux guildes d’artisans travaillant pour la famille [patron.GetDynasty.GetName] la réalisation d’une œuvre d’art. Comme [patron.GetFirstNameNoTooltip] n’est plus parmi nous, c’est moi qui recevrai cette pièce."
 niger_delta.0022.desc.bronze:0 "\n\nAujourd’hui, la guilde des #bold fondeurs de bronze#! m’a présenté le fruit de son dur labeur : une élégante sculpture en bronze, façonnée grâce à la technique de la cire perdue."
 niger_delta.0022.desc.iron:0 "\n\nAujourd’hui, la guilde des #bold forgerons#! m’a présenté le fruit de son dur labeur : une sculpture en fer, solide et imposante, symbole éclatant de mon pouvoir."
 niger_delta.0022.desc.ivory:0 "\n\nAujourd’hui, la guilde des #bold sculpteurs d’ivoire et de bois#! m’a présenté le fruit de son dur labeur : une sculpture en ivoire, réalisée à partir des défenses d’un puissant éléphant abattu par des chasseurs locaux."
 niger_delta.0022.desc.wood:0 "\n\nAujourd’hui, la guilde des #bold sculpteurs d’ivoire et de bois#! m’a présenté le fruit de son dur labeur : une sculpture en bois, réalisée à partir des grands arbres qui couvrent cette région."
 niger_delta.0022.desc.glass:0 "\n\nAujourd’hui, la guilde des #bold fabricants de perles#! m’a présenté le fruit de son dur labeur : un bijou en perles de verre issues des grands ateliers, symbole évident de noblesse et de prestige."
 niger_delta.0022.desc.coral:0 "\n\nAujourd’hui, la guilde des #bold fabricants de perles#! m’a présenté le fruit de son dur labeur : un bijou en corail rouge récolté sur les côtes voisines, symbole évident de noblesse et de prestige."
 niger_delta.0022.desc.quality.fair:0 "Cette oeuvre est de bonne qualité et répond aux normes de ce qui est considéré comme acceptable pour un [current_patron.GetTitleAsNameNoTooltip] comme moi. Même si j'espérais qu'ils créeraient quelque chose de vraiment magnifique, je ne peux pas me plaindre d'avoir reçu une autre belle œuvre d'art."
 niger_delta.0022.desc.quality.good:0 "Cette œuvre d'art est de bonne qualité. Ce n'est pas le summum de ce genre d'art, mais c'est tout de même une oeuvre d'art étonnante. En fin de compte, c'est une offrande appropriée pour un [current_patron.GetTitleAsNameNoTooltip] comme moi, et elle reflète bien les capacités de ces guildes d'artisans."
 niger_delta.0022.desc.quality.excellent:0 "Cette œuvre est d’excellente qualité. Après un simple coup d’œil, je peux déjà dire qu’elle inspirera beaucoup d’admiration. Les gens diront : « Ah, [current_patron.GetFirstNameNoTooltip] est vraiment un grand et puissant [current_patron.GetTitleAsNameNoTooltip] si [current_patron.GetSheHe] peut commander de telles œuvres ! »"
 niger_delta.0022.a:0 "Merci pour vos efforts - c'est magnifique !"
 niger_delta.0022.quality_tooltip:0 "Comme l'[artifact|E] est de qualité #bold excellente#!, il est possible de le [reforge|E] en [court_artifact|E]."
