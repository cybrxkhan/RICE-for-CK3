 # Game Concepts
 game_concept_beaded_crowns:0 "Couronnes perlées"
 game_concept_beaded_crown:0 "Couronne perlée"
 game_concept_beaded_crown_desc:0 "Le souverain de $c_ife$, appelé l’Ọọ̀ni, détient une grande autorité religieuse et séculière parmi les peuples yoruba. Historiquement, les monarques de la région se rendaient à $c_ife$ pour être couronnés par l’Ọọ̀ni avec la couronne perlée sacrée d’Oduduwa, une divinité et ancêtre des différents rois yoruba et edo, afin de légitimer leur règne.\n\nEn jeu, l’Ọọ̀ni est le [head_of_faith|E] de la [faith|E] $west_african_orisha_pagan$. Les [rulers|E] qui suivent une [faith|E] de la [religion|E] $west_african_orisha_religion$, ou ceux de la région remplissant certaines conditions, peuvent prendre la [decision|E] de voyager jusqu’à $c_ife$ pour $RICE_niger_delta_request_beaded_crown$. Après avoir choisi un don à offrir à l’Ọọ̀ni, celui-ci décidera de l’accepter ou non. Si vous êtes l’Ọọ̀ni vous-même, vous pouvez recevoir des dons et couronner des [rulers|E] en retour.\n\nSi vous suivez une [faith|E] de la [religion|E] $west_african_orisha_religion$, vous conserverez le [character_modifier|E] [GetModifier('RICE_niger_delta_uncrowned').GetNameWithTooltip] tant que l’Ọọ̀ni n’aura pas accepté de vous couronner."
 game_concept_niger_delta_craft_guild:0 "Guilde des artisans"
 game_concept_niger_delta_craft_guilds:0 "Guildes des artisans"
 game_concept_niger_delta_craft_guilds_desc:0 "Historiquement, les [rulers|E] du [GetGeographicalRegion('RICE_niger_delta_region').GetName] organisaient des guildes professionnelles, comme celles des artisans, sous patronage royal afin d’accroître leur prestige et de contrôler l’économie, tout en offrant à ces guildes un travail stable et une influence politique.\n\nSi votre [culture|E] possède la [traditions|E] $tradition_RICE_kinship_based_craft_guilds_name$ ou $tradition_RICE_ritual_hegemony_name$, et que vous êtes un [dynast|E], vous pouvez prendre la [decision|E] $RICE_niger_delta_form_craft_guilds$. Vous aurez le choix entre quatre guildes, chacune ayant ses propres conditions : fondeurs de bronze, forgerons, sculpteurs sur ivoire et bois, et perliers.\n\nChaque guilde confère à votre [dynasty|E] un [modifier|E] unique et débloque la [decision|E] $RICE_niger_delta_commission_art_from_craft_guilds$ (selon les guildes organisées par votre [dynasty|E]). Cette [decision|E] vous permettra d’obtenir divers [artifacts|E], dont certains peuvent être [reforge|E] en [court_artifact|E]."
 game_concept_kola_nut:0 "Noix de Kola"
 game_concept_kola_nuts:0 "Noix de Kola"
 game_concept_kola_nuts_desc:0 "Bien que les noix de kola soient importantes dans toute l’Afrique, elles sont particulièrement vénérées chez les Igbo. Ainsi, les [rulers|E] qui suivent une [faith|E] de la [religion|E] $odinala_religion$ ou qui appartiennent à une [culture|E] possédant la [tradition|E] $tradition_RICE_igwebuike_name$ ont accès à deux fonctionnalités spéciales liées aux noix de kola.\n\nPremièrement, vous aurez accès à une [character_interaction|E] permettant de $RICE_niger_delta_kola_nut_interaction$. Cela vous permet de « payer » un autre [ruler|E] en [prestige|E] et [piety|E] (selon votre rang) pour obtenir une [truce|E]. Deuxièmement, vous pourrez prendre la [decision|E] d’offrir des noix de kola pour potentiellement obtenir divers [character_modifiers|E] bénéfiques (ou non)."

 # Culture Stuff
 culture_parameter_unlock_rice_african_royal_guilds:0 "Débloque les [decisions|E] pour organiser et commander des œuvres d'art aux [niger_delta_craft_guilds|E] basées sur des clans."
 #culture_parameter_unlock_rice_african_royal_guilds:0 "Unlocks the [decisions|E] to organize and commission artwork from the [bronze_caster_s|E] and [ivory_and_wood_carver_guilds|E], and, for the [rulers|E] of the [county|E] of $c_ife$, the [Beadmaker_guilds|E]."
 culture_parameter_unlock_rice_unrestricted_beaded_crown_bestowments:0 "Peut demander des [beaded_crowns|E] au [GetTitleByKey('d_ooni_of_ife').GetNameNoTier] sans tenir compte de la [faith|E] ou de l’[heritage|E] si vous possédez au moins un [county|E] dans le [GetGeographicalRegion('RICE_yorubaland_region').GetName]."
 culture_parameter_unlock_rice_ancestor_worship:0 "Débloque l’[activity|E] [GetActivityType( 'activity_RICE_venerate_ancestors' ).GetName]"
 tradition_RICE_kinship_based_craft_guilds_name:0 "Guildes d'artisans basées sur les clans"
 tradition_RICE_kinship_based_craft_guilds_desc:0 "#F Les guildes professionnelles jouent un rôle important dans de nombreuses sociétés africaines, mais dans cette culture, les guildes d'artisans qui revendiquent des origines légendaires exercent un pouvoir et une influence considérables sous le patronage royal. Les étrangers qui ne sont pas nés dans des familles de guildes sont généralement exclus de ces guildes, malgré leurs talents, car ils n'ont pas l'ascendance mystique requise pour pratiquer et maîtriser véritablement ces arts sacrés.#!"
 tradition_RICE_igwebuike_name:0 "Igwebuike"
 tradition_RICE_igwebuike_desc:0 "#F Igwebuike, qui signifie « le nombre fait la force » en langue igbo, est une éthique de réciprocité issue du concept philosophique selon lequel tout est interconnecté. Ainsi, cette culture estime que les conflits doivent être résolus en préservant des relations mutuellement bénéfiques. De plus, dans cette culture, la [kola_nut|E] est souvent considérée comme le plus grand symbole de l’Igwebuike.#!"
 innovation_lost_wax_casting:0 "Moulage à la cire perdue"
 innovation_lost_wax_casting_desc:0 "Inspirés par les maîtres d'Igbo-Ukwu, nos artisans ont maîtrisé une technique hautement sophistiquée de fonte du métal pour produire des œuvres d'art magnifiques et ornementées. Nos œuvres en bronze seront connues à jamais !"
 not_egalitarian_spiritual_or_communal_desc:1 "La [culture|E] ne possède pas l'[ethos|E] $ethos_egalitarian_name$, $ethos_spiritual_name$ ou $ethos_communal_name$."
 culture_parameter_unlock_rice_kola_nut_truce:1 "Débloque l’[interaction|E] $RICE_niger_delta_kola_nut_interaction$ avec d’autres [rulers|E], permettant de prêter des [truces|E] préventives."
 culture_parameter_unlock_rice_kola_nut_decision:1 "Débloque la [decision|E] d’offrir des [kola_nuts|E] lors d’une cérémonie religieuse, quelle que soit la [faith|E]."
 tradition_RICE_ritual_hegemony_name:1 "Hégémonie rituelle"
 tradition_RICE_ritual_hegemony_desc:1 "Les entités politiques souvent décentralisées de cette culture renforcent leur pouvoir hégémonique par les rituels, l’autorité spirituelle, les lignées, l’art sacré et des symboles tels que les feuilles de palmier. Dans nombre de ces communautés, chacun cherche à accroître son influence et son prestige en acquérant des titres, de la renommée et un pouvoir symbolique, quelle que soit sa profession."
 innovation_RICE_nsibidi_pictograms:0 "Pictogrammes nsibidi"
 innovation_RICE_nsibidi_pictograms_desc:0 "Le système de symboles nsibidi, développé par la société secrète Ekpe dans le sud-est du Nigeria, est utilisé pour communiquer, à la fois de manière secrète et publique, ainsi que dans le cadre d’affaires judiciaires."

 # Interactions
 RICE_niger_delta_kola_nut_interaction:0 "Jurez de faire la paix sur les noix de kola"
 RICE_niger_delta_kola_nut_interaction_notification:0 "Je souhaite vous offrir des noix de kola sacrées, afin que nous puissions les partager lors d'une cérémonie officielle et prêter serment de paix entre nos deux parties. Confirmons que nous n'avons aucune rancune l'un envers l'autre, évitons les conflits potentiels et coopérons dans l'esprit de #italic Igwebuike#!!"
 RICE_niger_delta_kola_nut_interaction_desc:0 "Prêter serment d'une [truce|E] préventive sur les [kola_nuts|E] avec [recipient.GetTitledFirstName] en échange de [prestige|E] et de [piety|E]."
 RICE_niger_delta_kola_nut_interaction.accept.actor.tt:0 "[recipient.GetTitledFirstName] accepte de partager la noix de kola"
 RICE_niger_delta_kola_nut_interaction.accept.recipient.tt:0 "[actor.GetTitledFirstName] partage la noix de kola"
 RICE_niger_delta_kola_nut_interaction.decline.actor.tt:0 "[recipient.GetTitledFirstName] a refusé de partager la noix de kola"
 RICE_niger_delta_kola_nut_interaction.decline.recipient.tt:0 "[actor.GetTitledFirstName] se sent insulté par le fait que j'ai rejeté les noix de kola"
 RICE_niger_delta_kola_nut_interaction_truce_purchased:0 "\nTrêve conclue autour de la [kola_nut|E] sacrée entre [actor.GetTitledFirstName] et [recipient.GetTitledFirstName]"
 RICE_niger_delta_kola_nut_interaction_AI_believes_in_igwebuike:0 "Croit aux idéaux de #italic Igwebuike#! : $VALUE|=+0$"
 RICE_niger_delta_kola_nut_interaction_AI_skeptical_of_igwebuike:0 "Sceptique quant aux idéaux de #italic Igwebuike#!: $VALUE|=+0$"
 RICE_niger_delta_kola_nut_interaction_lacking_igwebuike:0 "La [culture|E] [recipient.GetCulture.GetName] ne comprend pas la philosophie #italic Igwebuike#! : $VALUE|=+0$"
 RICE_niger_delta_kola_nut_interaction_non_african:0 "la [culture|E] s[recipient.GetCulture.GetName] n'est pas un [heritage|E] Africain et n'apprécie pas la valeur symbolique des noix de kola : $VALUE|=+0$"

