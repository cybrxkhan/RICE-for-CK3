 niger_delta.0100.t:0 "Viande d'éléphant"
 niger_delta.0100.desc:0 "Un grand éléphant a récemment été tué dans [county.GetNameNoTier] par des chasseurs travaillant pour la guilde des chasseurs placée sous le patronage de ma grande dynastie. Bien que la viande de l’éléphant m’appartienne, certains à ma cour ont suggéré que je la distribue à certaines des communautés de [county.GetNameNoTierNoTooltip] pour démontrer ma générosité."
 niger_delta.0100.a:0 "Oui ! Partagez la viande avec tout le monde."
 niger_delta.0100.b:0 "Non, je pense que je vais garder la viande."
 niger_delta.0101.t:0 "Iyan"
 niger_delta.0101.desc:0 "Aujourd’hui, mes cuisiniers m’ont dit qu’au dîner, ils prépareraient de l’#italic iyan#!, ou igname pilée, un plat traditionnel simple mais délicieux, populaire parmi les [ROOT.Char.GetCulture.GetCollectiveNoun] et d’autres peuples de la région. L’igname bouillie est pilée jusqu’à obtenir une texture lisse, puis mangée avec d’autres aliments, en particulier des soupes comme la soupe gombo ou les épinards mijotés."
 niger_delta.0101.a:0 "Délicieux !"
 niger_delta.0102.t:0 "Fille de l’eau"
 niger_delta.0102.desc:0 "Certains de mes courtisans — principalement des hommes — sont récemment allés en ville pour y mener des affaires en mon nom. Alors que nous parlons de ce qui s’est passé, quelques-uns mentionnent avoir rencontré une très jolie fille pendant qu’ils s’occupaient des affaires de l’État.\n\n« C’était vraiment une #italic Ọmọge omi#! », dit [courtier.GetTitledFirstName], « une fille de l’eau ! »\n\nDans la croyance [ROOT.Char.GetFaith.GetReligion.GetAdjective], une telle beauté est liée à Olokun, l’esprit des eaux, qui entretient une relation complexe avec l’humanité."
 niger_delta.0102.a:0 "Tu es censé travailler, pas regarder les filles !"
 niger_delta.0102.b:0 "Parlez-moi un peu plus de cette fille."
 niger_delta.0103.t:0 "Retournez-y, ô forgeron !"
 niger_delta.0103.desc:0 "J’ai entendu une histoire assez étrange provenant de mon domaine au sujet d’un forgeron éminent récemment sauvé après avoir disparu et failli se noyer dans une rivière.\n\nSelon lui, une jeune femme non mariée, d’une beauté incomparable, est venue dans son atelier pour lui acheter un outil. Il en fut tellement envoûté qu’il lui proposa le mariage sur-le-champ, mais elle répondit qu’elle ne le pouvait pas. Non découragé, il la suivit lorsqu’elle partit, la poursuivant dans la nature hors de la ville, alors même qu’elle ne cessait de l’avertir : « Si tu refuses de repartir, tu rencontreras une rivière de teinture — repars, ô forgeron ! »\n\nAvant qu’il ne s’en rende compte, il tomba dans la rivière. Il est clair qu’il a rencontré une sorte d’esprit aquatique, du genre que l’on entend dans un ancien conte [ROOT.Char.GetFaith.GetAdjective]. Après tout, les rivières sont des frontières entre les vivants et les morts."
 niger_delta.0103.a:0 "Il a été idiot de suivre l'esprit même après qu'elle l'ait averti !"
 niger_delta.0103.b:0 "Je doute qu'il dise la vérité, mais c'est une histoire amusante."
 niger_delta.0104.t:0 "L'eau de la rivière sacrée"
 niger_delta.0104.desc:0 "Je me promenais près d’une rivière proche de ma résidence lorsque j’ai croisé une femme qui recueillait de l’eau de rivière dans de grands pots. Elle chantait une prière :\n\n#italic òrìsà, jé kí omi tútù tán tèmi, òrìsà.\nQue ton eau fraîche résolve mes problèmes.#!\n\nElle semble être une assistante de certains [ROOT.Char.Custom('DefaultPriestTitlePlural')] du sanctuaire local. Il est de coutume de garder de grands pots d’eau blancs dans les sanctuaires [ROOT.Char.GetFaith.GetReligion.GetAdjective] pour symboliser la présence des divinités de l’eau, et il est important que l’eau de ces pots soit changée quotidiennement (habituellement par des jeunes filles vierges ou des femmes ménopausées). Comme l’eau de ces pots est censée avoir des qualités médicinales, elle doit rester fraîche et vivifiante."
 niger_delta.0104.a:0 "Loué soit [ROOT.Char.GetFaith.WaterGodName] !"
 niger_delta.0105.t:0 "Décor en bois"
 niger_delta.0105.desc:0 "J’ajoute actuellement une nouvelle petite aile à ma résidence. Dans l’architecture [ROOT.Char.GetCulture.GetName], il est courant d’orner abondamment nos portes et poteaux de figures d’hommes, de femmes et d’animaux.\n\nJe pourrais demander aux sculpteurs experts que j’ai engagés de graver plus de ces motifs que prévu initialement. Un [ROOT.Char.GetTitleAsNameNoTooltip], après tout, ne devrait pas vivre dans un endroit au look misérable. Les gens devraient être impressionnés par la grandeur de ma demeure !"
 niger_delta.0105.a:0 "Une bonne idée ! C'est ce que nous allons faire."
 niger_delta.0105.b:0 "Restons-en au plan initial."
 niger_delta.0106.t:0 "Une tête en bronze ancienne"
 niger_delta.0106.desc:0 "Les habitants ont récemment découvert une sculpture en bronze à proximité. La sculpture représente la tête de quelqu’un et ressemble aux sculptures en bronze [ROOT.Char.GetCulture.GetName] actuelles, mais n’est clairement pas d’un style contemporain.\n\nIl y a de fortes chances que cette sculpture ait été créée pour honorer ou même vénérer un souverain ayant régné ici il y a de nombreuses générations, et soit donc une représentation de l’un de mes prédécesseurs, d’une manière ou d’une autre, et qu’elle doive donc être traitée avec respect. Certains disent qu’il vaudrait peut-être mieux laisser cette tête en bronze enterrée là où elle a été trouvée, mais marquer l’endroit afin de pouvoir la sortir et lui offrir des sacrifices lors de certaines fêtes religieuses appropriées."
 niger_delta.0106.a:0 "Laissez-la enterrée et utilisez-la seulement lors de certaines occasions religieuses."
 niger_delta.0106.b:0 "Apportez-le dans le sanctuaire de ma maison pour que je puisse le vénérer."
 niger_delta.0107.t:0 "Essor de la verrerie"
 niger_delta.0107.desc:0 "Les verriers de $c_ife$ prospèrent ces derniers temps. La ville étant l’un des principaux centres de production de verre indigène en Afrique, ses produits en verre, en particulier les perles de verre, sont très demandés ailleurs dans la région et au-delà en raison de leur importance culturelle et religieuse. Cet essor de l’industrie verrière aidera sûrement l’économie de la région."
 niger_delta.0107.a:0 "Excellente nouvelle !"
 niger_delta.0108.t:0 "Un voyage réussi à $c_ife$"
 niger_delta.0108.desc:0 "Mes représentants sont récemment revenus de $c_ife$, après avoir assisté à un grand festival là-bas en mon nom. On dit souvent que la ville célèbre chaque jour un festival [ROOT.Char.GetFaith.GetReligion.GetAdjective] en l’honneur de quelque divinité. Même si je ne peux pas toujours me rendre dans ce berceau sacré de l’humanité, il est important que quelqu’un y soit pour me représenter.\n\nQuoi qu’il en soit, mes envoyés ont dit que tout s’était bien passé et que leur présence avait contribué à renforcer ma réputation auprès des habitants et des dirigeants de la ville."
 niger_delta.0108.a:0 "Bien. Vous avez bien fait !"
 niger_delta.0109.t:0 "Stimulation par noix de kola"
 niger_delta.0109.desc:0 "Chez les [ROOT.Char.GetCulture.GetName], il est d’usage de mâcher des noix de kola pour stimuler le corps. J’ai fait cela assez souvent récemment et j’ai trouvé cela agréable et utile. Peut-être devrais-je être plus proactif et m’assurer d’avoir un bon stock de noix de kola afin de maintenir cette bonne habitude."
 niger_delta.0109.a:0 "Une idée géniale ! Plus de noix de kola pour moi !"
 niger_delta.0109.b:0 "En y réfléchissant bien, peut-être pas."
 niger_delta.0110.t:0 "Un rituel matinal"
 niger_delta.0110.desc.culture:0 "En tant que chef de ma maison, il est de mon devoir d’accueillir la nouvelle journée en cassant une noix de kola tôt le matin. C’est une coutume que pratiquent de nombreux [ROOT.Char.GetCulture.GetCollectiveNoun], étant donné l’importance spirituelle de la noix de kola pour nous — encore plus que pour nos voisins, dont beaucoup tiennent déjà la noix de kola en haute estime.\n\nPendant ce rituel, je suis accompagné de ma famille pour remercier les ancêtres et demander à [ROOT.Char.GetFaith.PantheonTerm] de veiller sur nous et de nous bénir pour le reste de la journée.\n\nBien que ce soit un rituel simple, il prend du temps et je dois m’appliquer à bien le faire."
 niger_delta.0110.desc.faith:0 "En tant que chef de ma maison, il est de mon devoir d’accueillir la nouvelle journée en cassant une noix de kola tôt le matin. C’est une coutume que pratiquent de nombreux [ROOT.Char.GetFaith.GetAdherentNamePlural], étant donné l’importance spirituelle de la noix de kola pour nous — encore plus que pour nos voisins, dont beaucoup tiennent déjà la noix de kola en haute estime.\n\nPendant ce rituel, je suis accompagné de ma famille pour remercier les ancêtres et demander à [ROOT.Char.GetFaith.PantheonTerm] de veiller sur nous et de nous bénir pour le reste de la journée.\n\nBien que ce soit un rituel simple, il prend du temps et je dois m’appliquer à bien le faire."
 niger_delta.0110.a:0 "Je ferai de mon mieux !"
 niger_delta.0110.b:0 "Un rituel fatigant, mais je ferai le minimum."
 niger_delta.0111.t:0 "Hospitalité"
 niger_delta.0111.desc.culture:0 "Aujourd’hui, un visiteur éminent est arrivé à ma cour de loin. Bien qu’il ne puisse pas rester longtemps, il est important qu’il soit bien reçu, bien sûr.\n\nAinsi, lorsque je suis allé à la rencontre de cette personne distinguée, je lui ai offert quelques-unes des meilleures noix de kola que j’ai pu trouver, comme le veut la tradition chez nous, les [ROOT.Char.GetCulture.GetCollectiveNoun]."
 niger_delta.0111.desc.faith:0 "Aujourd’hui, un visiteur éminent est arrivé à ma cour de loin. Bien qu’il ne puisse pas rester longtemps, il est important qu’il soit bien reçu, bien sûr.\n\nAinsi, lorsque je suis allé à la rencontre de cette personne distinguée, je lui ai offert quelques-unes des meilleures noix de kola que j’ai pu trouver, comme le veut la tradition chez nous, les [ROOT.Char.GetFaith.GetAdherentNamePlural]."
 niger_delta.0111.desc.conclusion:0 "Comme le veut la coutume, mon visiteur a alors choisi une noix de kola pour l'emporter avec lui sur le chemin du retour, me laissant le reste des noix de kola.\n\nLa visite a par ailleurs été agréable et mon invité a semblé satisfait de mon hospitalité."
 niger_delta.0111.a:0 "Je vous souhaite un bon retour."
 niger_delta.0112.t:0 "Justice par la noix de kola"
 niger_delta.0112.desc:0 "Les [ROOT.Char.GetFaith.GetAdherentNamePlural] croient que la noix de kola possède un grand pouvoir sacré et symbolique. Ainsi, beaucoup de gens prêtent serment sur elle.\n\nDans un village local, un homme a récemment été accusé d’un crime odieux. Aucun de mes fonctionnaires ni les chefs de la communauté n’ont pu déterminer s’il était coupable. Pour se laver des accusations, il a accepté de prêter serment publiquement devant une noix de kola.\n\nDans ce rituel, un lobe de la noix de kola a été laissé tomber au sol, et l’accusé devait se pencher pour le ramasser avec la bouche ; s’il était coupable, il serait frappé par [ROOT.Char.GetFaith.PantheonTerm]. En tout cas, rien ne s’est produit et, ainsi, si [ROOT.Char.GetFaith.PantheonTerm] juge l’accusé innocent, alors il #italic l’est#! de tout méfait."
 niger_delta.0112.a:0 "En vérité, les résultats de ce rituel sont clairs."
 niger_delta.0112.b:0 "Je ne suis pas sûr qu'il soit innocent, mais c'est notre tradition."
