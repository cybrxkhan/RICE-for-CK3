 # Traits
 trait_RICE_ooni_of_ife:0 "Ọọ̀ni d'Ilè-Ifẹ̀"
 trait_RICE_ooni_of_ife_desc:0 "Ce personnage est le Ọọ̀ni, le grand prêtre cérémoniel des $yoruba$, et le dirigeant - que ce soit nominalement ou en pratique - de la ville sacrée d'Ilè-Ifẹ̀ (également appelée Ife). Il quitte rarement son territoire, voire pas du tout, et vit généralement reclus dans son palais à l'abri des regards, sauf lors de certaines cérémonies religieuses importantes."
 trait_RICE_ooni_of_ife_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] est le Ọọ̀ni, le grand prêtre cérémoniel des $yoruba$, et le souverain - que ce soit nominalement ou dans la pratique - de la ville sacrée d'Ilè-Ifẹ̀ (également connue sous le nom d'Ife). [ROOT.GetCharacter.GetSheHe|U] quitte rarement, voire jamais, ses territoires et vit généralement reclus[ROOT.GetCharacter.Custom('FR_E')] dans son palais, à l'abri des regards, sauf lors de certaines cérémonies religieuses importantes."


 # Craft Guild Artifacts
 RICE_niger_delta_bronze_artifact_name:0 "Art du bronze [ROOT.Char.GetCulture.GetNameNoTooltip]"
 RICE_niger_delta_bronze_artifact_good_name:0 "Art du bronze [ROOT.Char.GetCulture.GetNameNoTooltip] de bonne qualité"
 RICE_niger_delta_bronze_artifact_excellent_name:0 "Art du bronze [ROOT.Char.GetCulture.GetNameNoTooltip] d'excellente qualité"
 RICE_niger_delta_bronze_artifact_desc:0 "Une œuvre d’art en bronze, forgée dans le style traditionnel [ROOT.Char.GetCulture.GetName], utilisant la technique de la fonte à la cire perdue courante dans certaines régions d’Afrique. Elle a été réalisée par les artisans de la guilde des fondeurs de bronze au service de la dynastie [ROOT.Char.GetDynasty.GetName], à la demande de l’un de ses membres, [ROOT.Char.GetTitledFirstName]."
 RICE_niger_delta_iron_artifact_name:0 "Art en fer [ROOT.Char.GetCulture.GetNameNoTooltip]"
 RICE_niger_delta_iron_artifact_good_name:0 "Art en fer [ROOT.Char.GetCulture.GetNameNoTooltip] de bonne qualité"
 RICE_niger_delta_iron_artifact_excellent_name:0 "Art en fer [ROOT.Char.GetCulture.GetNameNoTooltip] d’excellente qualité"
 RICE_niger_delta_iron_artifact_desc:0 "Une œuvre d’art forgée en fer, dans le style traditionnel [ROOT.Char.GetCulture.GetName]. De nombreuses cultures africaines possèdent une grande tradition de forge, et cet artefact témoigne d’un haut niveau de sophistication et de savoir-faire. Il a été réalisé par les artisans de la guilde des forgerons au service de la dynastie [ROOT.Char.GetDynasty.GetName], à la demande de l’un de ses membres, [ROOT.Char.GetTitledFirstName]."
 RICE_niger_delta_ivory_artifact_name:0 "Sculpture sur ivoire [ROOT.Char.GetCulture.GetNameNoTooltip]"
 RICE_niger_delta_ivory_artifact_good_name:0 "Sculpture sur ivoire [ROOT.Char.GetCulture.GetNameNoTooltip] de bonne qualité"
 RICE_niger_delta_ivory_artifact_excellent_name:0 "Sculpture sur ivoire [ROOT.Char.GetCulture.GetNameNoTooltip] d’excellente qualité"
 RICE_niger_delta_ivory_artifact_desc:0 "Une œuvre sculptée dans le style traditionnel [ROOT.Char.GetCulture.GetName], à partir d’ivoire issu des défenses d’éléphants africains chassés par une guilde locale de chasseurs. Elle a été réalisée par les artisans de la guilde des sculpteurs sur ivoire et bois, au service de la dynastie [ROOT.Char.GetDynasty.GetName], à la demande de l’un de ses membres, [ROOT.Char.GetTitledFirstName]."
 RICE_niger_delta_wood_artifact_name:0 "Sculpture sur bois [ROOT.Char.GetCulture.GetNameNoTooltip]"
 RICE_niger_delta_wood_artifact_good_name:0 "Sculpture sur bois [ROOT.Char.GetCulture.GetNameNoTooltip] de bonne qualité"
 RICE_niger_delta_wood_artifact_excellent_name:0 "Sculpture sur bois [ROOT.Char.GetCulture.GetNameNoTooltip] d’excellente qualité"
 RICE_niger_delta_wood_artifact_desc:0 "Une œuvre sculptée dans le style traditionnel [ROOT.Char.GetCulture.GetName], à partir de bois courant dans de nombreuses régions d’Afrique subsaharienne. Elle a été réalisée par les artisans de la guilde des sculpteurs sur ivoire et bois, au service de la dynastie [ROOT.Char.GetDynasty.GetName], à la demande de l’un de ses membres, [ROOT.Char.GetTitledFirstName]."
 RICE_niger_delta_glass_artifact_name:0 "Art de perles de verre [ROOT.Char.GetCulture.GetNameNoTooltip]"
 RICE_niger_delta_glass_artifact_good_name:0 "Art de perles de verre [ROOT.Char.GetCulture.GetNameNoTooltip] de bonne qualité"
 RICE_niger_delta_glass_artifact_excellent_name:0 "Art de perles de verre [ROOT.Char.GetCulture.GetNameNoTooltip] d'excellente qualité"
 RICE_niger_delta_glass_artifact_desc:0 "Un ornement en perles de verre réalisé dans le style traditionnel [ROOT.Char.GetCulture.GetName], à partir de verre issu d’ateliers africains autochtones. Il a été réalisé par les artisans de la guilde des perliers au service de la dynastie [ROOT.Char.GetDynasty.GetName], à la demande de l’un de ses membres, [ROOT.Char.GetTitledFirstName]."
 RICE_niger_delta_coral_artifact_name:0 "Art de perles en corail [ROOT.Char.GetCulture.GetNameNoTooltip]"
 RICE_niger_delta_coral_artifact_good_name:0 "Art de perles en corail [ROOT.Char.GetCulture.GetNameNoTooltip] de bonne qualité"
 RICE_niger_delta_coral_artifact_excellent_name:0 "Art de perles en corail [ROOT.Char.GetCulture.GetNameNoTooltip] d'excellente qualité"
 RICE_niger_delta_coral_artifact_desc:0 "Un ornement en perles de corail réalisé dans le style traditionnel [ROOT.Char.GetCulture.GetName], à partir de précieux coraux récoltés sur les côtes africaines. Il a été réalisé par les artisans de la guilde des perliers au service de la dynastie [ROOT.Char.GetDynasty.GetName], à la demande de l’un de ses membres, [ROOT.Char.GetTitledFirstName]."

 
 # Buildings
 building_type_RICE_niger_delta_osun_osogbo_sacred_grove:0 "Forêt sacrée d’Osun-Osogbo"
 building_type_RICE_niger_delta_osun_osogbo_sacred_grove_desc:0 "Bien qu’il existe de nombreuses forêts sacrées au Nigeria, celle d’Osun-Osogbo est l’une des plus importantes. Située sur les rives de la rivière Osun, c’est un grand centre de culte dédié à la déesse yoruba éponyme, Osun, divinité de l’amour, de la fertilité, de l’eau, de la beauté et de la divination."
 building_RICE_niger_delta_osun_osogbo_sacred_grove:0 "$building_type_RICE_niger_delta_osun_osogbo_sacred_grove$"
 building_RICE_niger_delta_osun_osogbo_sacred_grove_desc:0 "$building_type_RICE_niger_delta_osun_osogbo_sacred_grove_desc$"
 # Bronze works
 building_type_wap_bronze_industry_01:1 "Industrie du travail du bronze"
 building_type_wap_bronze_industry_01_desc:1 "Débutée par les artisans d'Igbo-Ukwu avant de se répandre en Ifẹ et au Bénin, la maîtrise de la technique de la fonte à la cire perdue est l'une des grandes innovations de l'histoire de l'Afrique de l'Ouest, produisant certaines des plus belles pièces de métal et de sculpture au monde."
 building_wap_bronze_industry_01:0 "Petits ouvrages en bronze"
 building_wap_bronze_industry_01_desc:1 "Au niveau du village, nos forgerons ont commencé à transformer les matériaux trouvés localement, mais nos efforts pour développer l'industrie sont entravés par notre production encore décentralisée. Actuellement, les villageois rassemblent les ressources au niveau du clan dirigé par les anciens."
 building_wap_bronze_industry_02:0 "Œuvres en bronze de taille moyenne"
 building_wap_bronze_industry_02_desc:1 "Nous avons commencé à centraliser notre industrie du travail du bronze afin de réduire les déchets dans notre production et d'augmenter notre rendement. Nos efforts ont abouti au développement d'un important site de coulée à la cire perdue, alimenté par les mines environnantes."
 building_wap_bronze_industry_03:0 "Grandes œuvres en bronze"
 building_wap_bronze_industry_03_desc:1 "Il existe désormais un quartier centralisé et de grande envergure consacré à nos maîtres bronziers. Spécialisés dans les plus belles pièces de bronze, de cuivre et de fer, nos maîtres artisans sont connus du Niger à la vallée du Nil."
 building_type_RICE_niger_delta_sungbos_eredo_01:0 "Eredo de Sungbo"
 building_type_RICE_niger_delta_sungbos_eredo_01_desc:0 "Le village d'Ijebu Ode a une longue histoire. Selon la légende, son système massif de murs et de fossés défensifs a été construit en l'honneur d'une veuve riche et sans enfant, Bilikisu Sungbo, qui était très respectée par de nombreuses personnes. Ces fortifications sont appelées "Eredo de Sungbo"."
 building_RICE_niger_delta_sungbos_eredo_01:0 "$building_type_RICE_niger_delta_sungbos_eredo_01$"
 building_RICE_niger_delta_sungbos_eredo_01_desc:0 "$building_type_RICE_niger_delta_sungbos_eredo_01_desc$"
 building_RICE_niger_delta_sungbos_eredo_02:0 "Extension de l'Eredo de Sungbo"
 building_RICE_niger_delta_sungbos_eredo_02_desc:0 "$building_type_RICE_niger_delta_sungbos_eredo_01_desc$"

 # Modifiers
 RICE_niger_delta_new_yam_festival_ruler_ate_first_yam:0 "A mangé la première igname"
 RICE_niger_delta_new_yam_festival_ruler_ate_first_yam_desc:0 "Lors d'un récent festival de la nouvelle igname célébré par ce personnage, il s'est donné l'honneur de manger la première nouvelle igname (c'est-à-dire une igname fraîchement récoltée) de l'année."
 RICE_niger_delta_new_yam_festival_priests_ate_first_yam:0 "Le clergé a mangé la première igname"
 RICE_niger_delta_new_yam_festival_priests_ate_first_yam_desc:0 "Lors d'une récente fête de la nouvelle igname célébrée par ce personnage, les membres du clergé ont eu l'honneur de manger la première nouvelle igname (c'est-à-dire une igname fraîchement récoltée) de l'année."
 RICE_niger_delta_new_yam_festival_commoners_ate_first_yam:0 "Les humbles roturiers ont mangé la première igname"
 RICE_niger_delta_new_yam_festival_commoners_ate_first_yam_desc:0 "Lors d’un récent festival de la nouvelle igname célébré par ce personnage, les plus humbles membres de la société ont eu l’honneur de manger la première igname fraîchement récoltée de l’année."
 RICE_niger_delta_received_beaded_crown:0 "Couronne perlée reçue récemment de l’Ọọ̀ni"
 RICE_niger_delta_uncrowned:0 "Non couronné par l'Ọọ̀ni"
 RICE_niger_delta_uncrowned_desc:0 "Ce dirigeant suit une [faith|E] qui reconnaît la primauté spirituelle et séculière du [GetTitleByKey('d_ooni_of_ife').GetNameNoTier], mais il n’a pas encore sollicité de [beaded_crown|E] auprès du Ọọ̀ni. Il doit le faire pour légitimer son règne.\n\n#EMP Ce [character_modifier|E] sera retiré dès que la [decision|E] $RICE_niger_delta_request_beaded_crown$ sera prise et que le Ọọ̀ni acceptera de procéder au couronnement.#!"
 RICE_niger_delta_ooni_scorn:0 "Méprisé par l'Ọọ̀ni de $c_ife$"
 RICE_niger_delta_ooni_denounced:0 "Dénoncé par l'Ọọ̀ni de $c_ife$"
 RICE_niger_delta_ooni_denounced_permanent:0 "Dénoncé à jamais par l'Ọọ̀ni de $c_ife$"
 RICE_niger_delta_ooni_denounced_permanent_desc:0 "Ce personnage a insulté le Ọọ̀ni de $c_ife$ à un degré que peu auraient imaginé possible.\n\n#EMP Ce personnage se voit définitivement interdire de prendre la [decision|E] $RICE_niger_delta_request_beaded_crown$.#!"
 RICE_niger_delta_ife_effects:0 "\n\n#italic Les [rulers|E] du [county|E] de $c_ife$ peuvent [decide|E] d’organiser ou de commander des œuvres aux [niger_delta_craft_guilds|E] de #bold perliers#!, quel que soit leur [title_tier|E], même si leur [culture|E] ne possède pas les [traditions|E] appropriées.#!"
 RICE_niger_delta_city_of_ife:0 "$c_ife$, berceau de l'humanité"
 RICE_niger_delta_city_of_ife_desc:0 "Selon les légendes des peuples vivant dans le delta du Niger, Ife (qui signifie "Terre d'expansion") est la source de tous les pouvoirs séculaires et spirituels. La ville est parsemée de sanctuaires sacrés et de bosquets dédiés aux divinités et aux esprits ancestraux, comme le bosquet d'Olokun, qui abrite l'un des plus grands ateliers de verrerie d'Afrique.$RICE_niger_delta_ife_effects$"
 RICE_niger_delta_ruler_of_ife:0 "Ọọ̀ni de $c_ife$"
 RICE_niger_delta_ruler_of_ife_desc:0 "Ce personnage est le Ọọ̀ni, le dirigeant traditionnel de la ville sacrée de $c_ife$. Il est grandement respecté dans le delta du Niger et les régions voisines, car beaucoup considèrent $c_ife$ comme la source légendaire du pouvoir séculier et spirituel.$RICE_niger_delta_ife_effects$"
 RICE_niger_delta_bronze_caster_guild_modifier:0 "Guilde royale des fondeurs de bronze"
 RICE_niger_delta_bronze_caster_guild_modifier_desc:0 "Les fondeurs de bronze des terres de cette dynastie, liés entre eux par des liens familiaux et sociaux, ont été organisés en guildes formelles sous le patronage royal de cette dynastie. Ils créent de magnifiques œuvres en bronze pour cette famille dans un arrangement mutuellement bénéfique.\n\n#EMP Permet à tout [ruler|E] [landed|E] de cette [dynasty|E] (dont la [culture|E] possède les [traditions|E] $tradition_RICE_kinship_based_craft_guilds_name$ ou $tradition_RICE_ritual_hegemony_name$, et qui remplit les autres conditions) de commander des [artifacts|E] en #bold bronze#! via la [decision|E] Commander une œuvre aux [niger_delta_craft_guilds|E].#!"
 RICE_niger_delta_ironsmith_guild_modifier:0 "Guilde royale des forgerons"
 RICE_niger_delta_ironsmith_guild_modifier_desc:0 "Les forgerons des terres de cette dynastie, liés entre eux par des liens familiaux et sociaux, ont été organisés en guildes formelles sous le patronage royal de cette dynastie. Ils créent de magnifiques œuvres en fer pour cette famille dans un arrangement mutuellement bénéfique.\n\n#EMP Permet à tout [ruler|E] [landed|E] de cette [dynasty|E] (dont la [culture|E] possède les [traditions|E] $tradition_RICE_kinship_based_craft_guilds_name$ ou $tradition_RICE_ritual_hegemony_name$, et qui remplit les autres conditions) de commander des [artifacts|E] en #bold fer#! via la [decision|E] Commander une œuvre aux [niger_delta_craft_guilds|E].#!"
 RICE_niger_delta_ivory_and_wood_carver_guild_modifier:0 "Guilde royale des sculpteurs d'ivoire et de bois"
 RICE_niger_delta_ivory_and_wood_carver_guild_modifier_desc:0 "Les sculpteurs d’ivoire et de bois des terres de cette dynastie, liés entre eux par des liens familiaux et sociaux, ont été organisés en guildes formelles sous le patronage royal de cette dynastie. Ils créent de magnifiques sculptures en ivoire et en bois pour cette famille dans un arrangement mutuellement bénéfique.\n\n#EMP Permet à tout [ruler|E] [landed|E] de cette [dynasty|E] (dont la [culture|E] possède les [traditions|E] $tradition_RICE_kinship_based_craft_guilds_name$ ou $tradition_RICE_ritual_hegemony_name$, et qui remplit les autres conditions) de commander des [artifacts|E] en #bold ivoire et bois#! via la [decision|E] Commander une œuvre aux [niger_delta_craft_guilds|E].#!"
 RICE_niger_delta_bead_maker_guild_modifier:0 "Guilde royale des fabricants de perles"
 RICE_niger_delta_bead_maker_guild_modifier_desc:0 "Les perliers des terres de cette dynastie, liés entre eux par des liens familiaux et sociaux, ont été organisés en guildes formelles sous le patronage royal de cette dynastie. Ils créent de magnifiques œuvres en perles de verre ou de corail pour cette famille dans un arrangement mutuellement bénéfique.\n\n#EMP Permet à tout [ruler|E] [landed|E] de cette [dynasty|E] (dont la [culture|E] possède les [traditions|E] $tradition_RICE_kinship_based_craft_guilds_name$ ou $tradition_RICE_ritual_hegemony_name$, et qui remplit les autres conditions) de commander des [artifacts|E] en #bold perles de verre ou corail#! via la [decision|E] Commander une œuvre aux [niger_delta_craft_guilds|E].#!"
 RICE_niger_delta_opinion_choose_new_yam_date:0 "M’a consulté sur la date du festival de la nouvelle igname"
 RICE_niger_delta_successful_new_yam_festival:0 "Succès du festival de la nouvelle igname"
 RICE_niger_delta_successful_new_yam_festival_desc:0 "Cette province a récemment célébré un important festival de la nouvelle igname, une fête annuelle traditionnelle dans cette région. Les habitants croient que la fête s'est très bien déroulée, qu'elle a plu aux cieux et qu'elle a permis d'obtenir une récolte abondante."
 RICE_niger_delta_opinion_spared_me_from_execution:0 "M'a épargné l'exécution"
 RICE_niger_delta_opinion_spared_me_from_punishment:0 "M'a épargné la punition"
 RICE_niger_delta_kola_nut_one_lobe:0 "Noix de kola à un lobe (Oji Ogbi)"
 RICE_niger_delta_kola_nut_one_lobe_desc:0 "Lors d’une cérémonie récente, la première noix de kola brisée par ce personnage n’avait qu’un lobe. Ce type de noix, appelé #italic Oji Ogbi#! (« noix muette »), est vu comme une abomination impropre à la consommation humaine et réservée aux cieux. Bien que ce personnage l’ait rapidement jetée, cela ne laisse pas une bonne impression."
 RICE_niger_delta_kola_nut_two_lobes:0 "Noix de kola à deux lobes (Oji Gworo)"
 RICE_niger_delta_kola_nut_two_lobes_desc:0 "Lors d’une cérémonie récente, la première noix de kola brisée par ce personnage avait deux lobes. Ce type, appelé #italic Oji Gworo#! (« noix des esprits »), est perçu avec suspicion, car le nombre deux manque d’équilibre et appartient au domaine spirituel. Bien que ce personnage l’ait rapidement jetée, c’est un mauvais présage."
 RICE_niger_delta_kola_nut_three_lobes:0 "Noix de kola à trois lobes (Oji Ikenga)"
 RICE_niger_delta_kola_nut_three_lobes_desc:0 "Lors d’une cérémonie récente, la première noix de kola brisée par ce personnage avait trois lobes. Ce type, appelé #italic Oji Ikenga#! (« noix du vaillant »), est considéré comme masculin, incarnant la bravoure, les guerriers ou les hommes saints, ainsi que l’unité familiale. C’est un bon présage de courage et de force."
 RICE_niger_delta_kola_nut_four_lobes:0 "Noix de kola à quatre lobes (Oji Udo na Ngozi)"
 RICE_niger_delta_kola_nut_four_lobes_desc:0 "Lors d’une cérémonie récente, la première noix de kola brisée par ce personnage avait quatre lobes. Ce type, appelé #italic Oji Udo na Ngozi#! (« noix de la paix et des bénédictions »), est lié aux quatre jours du marché et symbolise la complétude. C’est un bon présage de stabilité et d’unité."
 RICE_niger_delta_kola_nut_five_lobes:0 "Noix de kola à cinq lobes (Oji Omumu)"
 RICE_niger_delta_kola_nut_five_lobes_desc:0 "Lors d’une cérémonie récente, la première noix de kola brisée par ce personnage avait cinq lobes. Ce type, appelé #italic Oji Omumu#! (« noix de la procréation et de la prospérité »), est rare et symbolise l’abondance, la richesse et la fertilité. C’est un bon présage de prospérité."
 RICE_niger_delta_kola_nut_six_lobes:0 "Noix de kola à six lobes (Oji Ogbugbandu)"
 RICE_niger_delta_kola_nut_six_lobes_desc:0 "Lors d’une cérémonie récente, la première noix de kola brisée par ce personnage avait six lobes. Ce type, appelé #italic Oji Ogbugbandu#! (« noix des ancêtres »), est rare et symbolise un pacte spécial entre les dieux et les hommes. C’est un signe de prospérité et de réussite exceptionnelles."
 RICE_niger_delta_kola_nut_seven_lobes:0 "Noix de kola à sept lobes (Oji Asaa-Asota)"
 RICE_niger_delta_kola_nut_seven_lobes_desc:0 "Lors d’une cérémonie récente, la première noix de kola brisée par ce personnage avait sept lobes. Ce type, appelé #italic Oji Asaa-Asota#! (« noix de sept et huit »), est extrêmement rare et symbolise la célébration, la loi, la royauté, la prophétie, l’accomplissement et l’éternité. On lui attribue des effets surnaturels, et c’est un signe de fortune incommensurable."
 RICE_niger_delta_ate_yams_early:0 "A mangé des ignames avant le festival de la nouvelle igname"
 RICE_niger_delta_ate_yams_early_desc:0 "Ce personnage a été surpris à manger des ignames fraîches avant le festival de la nouvelle igname. Peu oseraient briser un tel tabou, mais ce personnage n’en avait cure… ou avait trop envie d’ignames."
 RICE_niger_delta_opinion_fair_punishment_but_still_annoyed:0 "Une punition juste, mais quand même contrariante"
 RICE_niger_delta_opinion_declared_yam_crime:0 "m'a déclaré criminel pour avoir brisé le tabou de l'igname"
 RICE_niger_delta_opinion_broke_yam_taboo:0 "Briser le tabou de la consommation d'ignames"
 RICE_niger_delta_opinion_broke_yam_taboo_not_criminal:0 "Briser le tabou de la consommation d'ignames"
 RICE_niger_delta_yam_festival_party_pooper:0 "A interdit tout comportement sauvage lors du festival de la nouvelle igname"
 RICE_niger_delta_new_yam_festival_herbs:0 "Herbes médicinales du nouveau festival d'ignames"
 RICE_niger_delta_yam_king:0 "Roi de l'igname"
 RICE_niger_delta_yam_king_desc:0 "Ce personnage était à l’origine un cultivateur d’ignames talentueux (ou incroyablement chanceux) qui fut couronné roi de l’igname lors d’un festival de la nouvelle igname."
 RICE_niger_delta_attended_olojo_festival:0 "A récemment participé au festival Olojo à $c_ife$."
 RICE_niger_delta_olojo_ooni_renewed_oaths_1:0 "Serments renouvelés comme Ọọ̀ni (Acceptable)"
 RICE_niger_delta_olojo_ooni_renewed_oaths_1_desc:0 "Cet Ọọ̀ni vient de renouveler ses serments lors du festival d’Olojo. Beaucoup estiment qu’il a rempli ses devoirs de façon acceptable durant la célébration."
 RICE_niger_delta_olojo_ooni_renewed_oaths_2:0 "Serments renoués comme Ọọ̀ni (Grand)"
 RICE_niger_delta_olojo_ooni_renewed_oaths_2_desc:0 "Ce Ọọ̀ni vient de renouveler ses serments pendant le festival d'Olojo. Nombreux sont ceux qui pensent que ces Ọọ̀ni ont admirablement rempli leurs fonctions pendant le festival, garantissant que le monde sera béni par les ancêtres et les esprits, en particulier Ogun, le dieu courroucé de la guerre et du fer."
 RICE_niger_delta_olojo_ooni_renewed_oaths_3:0 "A prêté serment en tant que Ọọ̀ni (Magnifique)"
 RICE_niger_delta_olojo_ooni_renewed_oaths_3_desc:0 "Ce Ọọ̀ni vient de renouveler ses serments pendant le festival d'Olojo. Beaucoup pensent que ce Ọọ̀ni a très bien rempli ses fonctions pendant le festival - ce faisant, non seulement il gagne l'approbation des ancêtres et des esprits, en particulier d'Ogun, le dieu courroucé de la guerre et du fer, mais il annonce aussi une période de paix et de prospérité accrues dans tout le pays..."
 RICE_niger_delta_olojo_good_health:0 "Bénédictions de Ọọ̀ni (Bonne santé)"
 RICE_niger_delta_olojo_good_health_desc:0 "Ce personnage a reçu une bénédiction de bonne santé de la part du Ọọ̀ni lors du festival d'Olojo."
 RICE_niger_delta_olojo_good_fortune:0 "Bénédictions de Ọọ̀ni (bonne fortune)"
 RICE_niger_delta_olojo_good_fortune_desc:0 "Ce personnage a reçu une bénédiction de bonne fortune de la part du Ọọ̀ni pendant le festival d'Olojo."
 RICE_niger_delta_olojo_good_enemies:0 "Bénédictions de Ọọ̀ni (Ennemis maudits)"
 RICE_niger_delta_olojo_good_enemies_desc:0 "Ce personnage a reçu des Ọọ̀ni une bénédiction de malheur sur leurs ennemis pendant le festival d'Olojo."
 RICE_restored_ooni_opinion:0 "Restauré Ọọ̀ni en $c_ife$."
 RICE_niger_delta_opinion_good_ooni_gift:0 "M'a donné un cadeau bon et approprié pour la cérémonie de la couronne perlée"
 RICE_niger_delta_opinion_bad_ooni_gift:0 "M'a offert un cadeau douteux pour la cérémonie de la couronne perlée"
 RICE_niger_delta_opinion_insulting_gift:0 "A essayé de m'offrir un cadeau insultant pour la cérémonie de la couronne perlée"
 RICE_niger_delta_opinion_chastised_me:0 "M'a réprimandé pour ne pas avoir fait du bon travail"
 RICE_niger_delta_opinion_didnt_do_job:0 "Ne s'est pas concentré sur les affaires de l'État"
 RICE_niger_delta_opinion_fun_chat:0 "Chat amusant"
 RICE_niger_delta_shared_elephant_meat:0 "A partagé de la viande d'éléphant avec les villages locaux"
 RICE_niger_delta_glassmaking_industry_good:0 "Industrie verrière prospère en $c_ife$."
 RICE_niger_delta_regularly_chews_kola_nuts:0 "Diligent pour mâcher régulièrement des noix de kola"

 # Beaded Crown Decision
 RICE_niger_delta_request_beaded_crown:0 "Demander une couronne perlée au Ọọ̀ni"
 RICE_niger_delta_request_beaded_crown_tooltip:0 "Le Ọọ̀ni de $c_ife$ peut me conférer une [beaded_crown|E]"
 RICE_niger_delta_request_beaded_crown_desc:0 "Le Ọọ̀ni de $c_ife$ est considéré comme la plus haute autorité séculière et spirituelle par de nombreux peuples du [GetGeographicalRegion('RICE_yorubaland_region').GetName] et même au-delà. Pour gagner le respect de mes sujets et légitimer mon règne, je dois demander au Ọọ̀ni de me couronner avec la [beaded_crown|E] d’Oduduwa, et, si ma requête est acceptée, me rendre à $c_ife$ pour la recevoir."
 RICE_niger_delta_request_beaded_crown_effect_tooltip:0 "Si le Ọọ̀ni juge votre offrande adéquate, il vous remettra une [beaded_crown|E] et vous recevrez les avantages appropriés (le cas échéant)"
 RICE_niger_delta_request_beaded_crown_confirm:0 "Envoyer mes cadeaux au Ọọ̀ni !"
 RICE_niger_delta_request_beaded_crown_context_tooltip:0 "$RICE_restore_ooni_decision_context_tooltip$"
 RICE_not_received_beaded_crown_req:0 "N’a pas reçu de [beaded_crown|E] de la part de [GetTitleByKey('d_ooni_of_ife').GetNameNoTier]"
 RICE_niger_delta_pick_a_ooni_gift_type:0 "Choisissez un cadeau pour le Ọọ̀ni"
 RICE_niger_delta_pick_a_ooni_gift_type_gui:0 "Choisissez un cadeau à offrir au Ọọ̀ni"
 RICE_niger_delta_modest_sacrifice_option:0 "#Bold Sacrifice modeste#!"
 RICE_niger_delta_modest_sacrifice_option_desc:0 "Faire un modeste sacrifice au nom du Ọọ̀ni"
 RICE_niger_delta_modest_sacrifice_option_tooltip:0 "$EFFECT_LIST_BULLET$Vous dépensez#V [gold_i] 50#! sur la réalisation d'un modeste sacrifice au nom du Ọọ̀ni\n$EFFECT_LIST_BULLET$Il s'agit de l'option de base, sans aucun autre avantage"
 RICE_niger_delta_gift_gold_oduduwa_shrine_option:0 "#Bold Donation au sanctuaire d'Oduduwa#!"
 RICE_niger_delta_gift_gold_oduduwa_shrine_option_desc:0 "Envoyer une donation au grand sanctuaire d’Oduduwa à $c_ife$"
 RICE_niger_delta_gift_gold_oduduwa_shrine_option_tooltip:0 "$EFFECT_LIST_BULLET$Envoyer une donation de #V [gold_i] 100#! au grand sanctuaire d’Oduduwa à $c_ife$\n$EFFECT_LIST_BULLET$Gagner #V [piety_i] 200#!\n$EFFECT_LIST_BULLET$Le Ọọ̀ni gagne #V [piety_i] 200#!"
 RICE_niger_delta_sacred_vow_option:0 "#Bold Vœu sacré#!"
 RICE_niger_delta_sacred_vow_option_desc:0 "Faites un vœu sacré pour aider le Ọọ̀ni"
 RICE_niger_delta_sacred_vow_option_tooltip:0 "$EFFECT_LIST_BULLET$Le Ọọ̀ni obtient une [strong_hook|E] sur vous\n$EFFECT_LIST_BULLET$Perdre #V [prestige_i] 100#!"
 RICE_niger_delta_art_gift_option:0 "#Bold Art précieux#!"
 RICE_niger_delta_art_gift_option_desc:0 "Offrir au Ọọ̀ni une magnifique œuvre réalisée par vos [niger_delta_craft_guilds|E]"
 RICE_niger_delta_art_gift_option_tooltip:0 "$EFFECT_LIST_BULLET$Dépenser #V [gold_i] 100#! pour offrir au Ọọ̀ni une magnifique œuvre réalisée par vos [niger_delta_craft_guilds|E]\n$EFFECT_LIST_BULLET$Gagner #V [prestige_i] 200#!\n$EFFECT_LIST_BULLET$Le Ọọ̀ni gagne #V [prestige_i] 200#!"
 RICE_niger_delta_land_option:0 "#Bold Des terres pour la famille du Ọọ̀ni#!"
 RICE_niger_delta_land_option_desc:0 "Donner à un [family_member|E] du Ọọ̀ni un [county|E] que vous possédez"
 RICE_niger_delta_land_option_tooltip:0 "$EFFECT_LIST_BULLET$Un [family_member|E] aléatoire de la [dynasty|E] du Ọọ̀ni reçoit un [county|E] #bold aléatoire#! que vous possédez\n$EFFECT_LIST_BULLET$Si vous êtes au moins de [title_tier|E] [duke|E], ce parent devient votre [vassal|E]"
 RICE_niger_delta_low_concubine_option:0 "#Bold Consort#!"
 RICE_niger_delta_low_concubine_option_desc:0 "Donner au Ọọ̀ni une [concubine|E]"
 RICE_niger_delta_low_concubine_option_tooltip:0 "$EFFECT_LIST_BULLET$Dépenser #V [gold_i] 100#! pour trouver une personne convenable à offrir au Ọọ̀ni comme [concubine|E]\n$EFFECT_LIST_BULLET$Gagner #V [prestige_i] 100#! et #V [piety_i] 100#!"
 #  RICE_niger_delta_low_concubine_option:0 "#Bold Consort of Low Status"
 #  RICE_niger_delta_low_concubine_option_desc:0 "Give the Ọọ̀ni a [courtier|E] to be their [concubine|E] or [spouse|E]"
 #  RICE_niger_delta_low_concubine_option_tooltip:0 "$EFFECT_LIST_BULLET$A random [courtier|E] of the appropriate gender who is not a member of your [family|E] is selected to join the Ọọ̀ni's household as a [concubine|E] or [spouse|E]\n$EFFECT_LIST_BULLET$Gain #V [prestige_i] 50#! and #V [piety_i] 150#!"
 RICE_niger_delta_high_concubine_option:0 "#Bold Consort de haut rang#!"
 RICE_niger_delta_high_concubine_option_desc:0 "Offrir au Ọọ̀ni un [family_member|E] comme [concubine|E] ou [spouse|E]"
 RICE_niger_delta_high_concubine_option_tooltip:0 "$EFFECT_LIST_BULLET$Un [family_member|E] aléatoire dans votre [court|E] du genre approprié est choisi pour rejoindre la maison du Ọọ̀ni comme [concubine|E] ou [spouse|E]\n$EFFECT_LIST_BULLET$Gagner #V [prestige_i] 100#! et #V [piety_i] 100#!"
 RICE_niger_delta_no_gift_option:0 "#Bold Aucun cadeau#!"
 RICE_niger_delta_no_gift_option_desc:0 "Ne présenter aucun cadeau au Ọọ̀ni"
 RICE_niger_delta_no_gift_option_tooltip:0 "$EFFECT_LIST_BULLET$Votre seule présence à la cour du Ọọ̀ni suffit – il n’a pas besoin de cadeau !\n$EFFECT_LIST_BULLET$Perdre #V [prestige_i] 200#! et #V [piety_i] 200#!\n$EFFECT_LIST_BULLET$#X Ne #bold PAS#! faire cela – vous risquez presque à coup sûr d’irriter le Ọọ̀ni et de provoquer un grand scandale !#!"

 # Craft Guild Art Decisions
 RICE_niger_delta_commission_art_from_craft_guilds:0 "Commander une œuvre d'art à une guilde d'artisans"
 RICE_niger_delta_commission_art_from_craft_guilds_tooltip:0 "J’ai autorité sur les [niger_delta_craft_guilds|E] royales – que pourraient-elles créer pour moi ?"
 RICE_niger_delta_commission_art_from_craft_guilds_desc:0 "La [dynasty|E] [ROOT.Char.GetDynasty.GetName] possède plusieurs [niger_delta_craft_guilds|E] royales basées sur des clans, qui nous servent à la demande. En tant que [ROOT.Char.GetTitleAsNameNoTooltip], je peux leur commander la création d’une œuvre démontrant mon statut et mon pouvoir."
 RICE_niger_delta_commission_art_from_craft_guilds_effect_tooltip_1:0 "Vous recevrez un [artifact|E] de qualité variable selon la [niger_delta_craft_guild|E] auprès de laquelle vous passez commande."
 RICE_niger_delta_pick_a_guild_type:0 "Choisissez une guilde pour commander une œuvre d'art"
 RICE_niger_delta_pick_a_guild_type_gui:0 "Choisissez une [niger_delta_craft_guild|E] auprès de laquelle vous souhaitez commander des œuvres."
 RICE_niger_delta_commission_art_from_craft_guilds_confirm:0 "Prévenez les guildes d'artisans !"
 RICE_niger_delta_commission_art_from_craft_guilds_context_tooltip:0 "#emphasis Contexte historique :#! Les civilisations historiques du Nigeria sont célèbres pour leur art, comme les bronzes du Bénin ou les couronnes perlées yoruba, au point qu’elles reçoivent parfois une attention disproportionnée dans les discussions sur ces cultures, même dans le milieu universitaire. Les artisans qui réalisaient ces œuvres étaient souvent organisés en guildes formelles rattachées aux dynasties royales ; cela renforçait à la fois le prestige royal et le contrôle des ressources, tout en donnant aux artisans un plus grand pouvoir et une plus grande influence politiques."
 RICE_niger_delta_bronze_casters_option:0 "#Bold Fondeurs de bronze#!"
 RICE_niger_delta_bronze_casters_option_desc:0 "Les fondeurs de bronze créent des œuvres en bronze grâce à la technique de la fonte à la cire perdue."
 RICE_niger_delta_bronze_casters_option_tooltip:0 "$EFFECT_LIST_BULLET$#Bold Coût minimal : @gold_icon! 100#!\n$EFFECT_LIST_BULLET$Fournit plus de [piety|E] que les autres types d’œuvres\n$EFFECT_LIST_BULLET$Les [artifacts|E] améliorent le [learning|E]"
 RICE_niger_delta_ivory_and_wood_carvers_option:0 "#Bold Sculpteurs d'ivoire et de bois#!"
 RICE_niger_delta_ivory_and_wood_carvers_option_desc:0 "L'ivoire et la sculpture sur bois sont deux savoir-faire étroitement liés."
 RICE_niger_delta_ivory_and_wood_carvers_option_tooltip:0 "$EFFECT_LIST_BULLET$#Bold Coût minimal : @gold_icon! 50#!\n$EFFECT_LIST_BULLET$Moins puissants que les autres types d’œuvres en termes de [piety|E], [prestige|E] et [dynasty_prestige|E], mais généralement moins chers\n$EFFECT_LIST_BULLET$Les [artifacts|E] améliorent le [martial|E] (ivoire) et l’[intrigue|E] (bois)"
 RICE_niger_delta_beadmakers_option:0 "#Bold Fabricants de perles#!"
 RICE_niger_delta_beadmakers_option_desc:0 "Les belles perles en verre ou en corail sont un véritable signe de pouvoir et d'influence."
 RICE_niger_delta_beadmakers_option_tooltip:0 "$EFFECT_LIST_BULLET$#Bold Coût minimal : @gold_icon! 125#!\n$EFFECT_LIST_BULLET$Fournit du [dynasty_prestige|E], contrairement aux autres types d’œuvres\n$EFFECT_LIST_BULLET$Les [artifacts|E] seront en verre, sauf dans les régions côtières où ils seront en corail\n$EFFECT_LIST_BULLET$Les [artifacts|E] améliorent la [diplomacy|E]"
 RICE_niger_delta_ironsmiths_option:0 "#Bold Forgerons#!"
 RICE_niger_delta_ironsmiths_option_desc:0 "Le fer ne sert pas seulement à fabriquer des armes ou des outils, il peut aussi être utilisé dans l'art."
 RICE_niger_delta_ironsmiths_option_tooltip:0 "$EFFECT_LIST_BULLET$#Bold Coût minimal : @gold_icon! 100#!\n$EFFECT_LIST_BULLET$Fournit plus de [prestige|E] que les autres types d’œuvres\n$EFFECT_LIST_BULLET$Les [artifacts|E] améliorent l’[stewardship|E]"
 RICE_niger_delta_currently_commissioning_artwork_req:0 "Les [niger_delta_craft_guilds|E] ne travaillent actuellement pas sur une commission en votre nom"
 RICE_niger_delta_form_craft_guilds:0 "Organiser une guilde d'artisanat basée sur un clan"
 RICE_niger_delta_form_craft_guilds_tooltip:0 "J’ai autorité sur les [niger_delta_craft_guilds|E] royales – que pourraient-elles créer pour moi ?"
 RICE_niger_delta_form_craft_guilds_desc:0 "La [dynasty|E] [ROOT.Char.GetDynasty.GetName] est déjà prestigieuse, mais elle pourrait l’être encore plus. Pour renforcer notre pouvoir, nous allons organiser officiellement les artisans de nos territoires en [niger_delta_craft_guilds|E] royales. En intégrant leurs réseaux sociaux préexistants à notre structure politique, nous en tirerons un bénéfice mutuel."
 RICE_niger_delta_form_craft_guilds_effect_tooltip_1:0 "Votre [dynasty|E] recevra un [modifier|E] selon le type de [niger_delta_craft_guild|E] que vous organisez, ce qui vous permettra également de prendre la [decision|E] $RICE_niger_delta_commission_art_from_craft_guilds$ pour obtenir des [artifacts|E] et d’autres bonus."
 RICE_niger_delta_pick_a_guild_to_form_type:0 "Choisir une guilde à former"
 RICE_niger_delta_pick_a_guild_to_form_type_gui:0 "Choisissez une [niger_delta_craft_guild|E] à organiser sous le patronage de votre [dynasty|E]"
 RICE_niger_delta_form_craft_guilds_confirm:0 "Pour la gloire de notre dynastie !"
 RICE_niger_delta_form_craft_guilds_context_tooltip:0 "$RICE_niger_delta_commission_art_from_craft_guilds_context_tooltip$"
 RICE_niger_delta_form_bronze_casters_option:0 "#Bold Fondeurs de bronze#!"
 RICE_niger_delta_form_bronze_casters_option_desc:0 "$RICE_niger_delta_bronze_casters_option_desc$"
 RICE_niger_delta_form_bronze_casters_option_tooltip:0 "$EFFECT_LIST_BULLET$La [dynasty|E] recevra le [modifier|E] [GetModifier('RICE_niger_delta_bronze_caster_guild_modifier').GetNameWithTooltip]\n$EFFECT_LIST_BULLET$Débloque la possibilité pour tout [ruler|E] [landed|E] de cette [dynasty|E] de commander des [artifacts|E] #bold en bronze#! en prenant la [decision|E] de commander une œuvre auprès des [niger_delta_craft_guilds|E] (si les autres conditions sont remplies)\n$EFFECT_LIST_BULLET$L’art en bronze rapporte généralement plus de [piety|E] que les autres types d’œuvres\n\n#X Cette option est disponible uniquement si votre [culture|E] dispose de l’[innovation|E] $innovation_lost_wax_casting$#!"
 RICE_niger_delta_form_ivory_and_wood_carvers_option:0 "#Bold Sculpteurs d’ivoire et de bois#!"
 RICE_niger_delta_form_ivory_and_wood_carvers_option_desc:0 "$RICE_niger_delta_ivory_and_wood_carvers_option_desc$"
 RICE_niger_delta_form_ivory_and_wood_carvers_option_tooltip:0 "$EFFECT_LIST_BULLET$La [dynasty|E] recevra le [modifier|E] [GetModifier('RICE_niger_delta_ivory_and_wood_carver_guild_modifier').GetNameWithTooltip]\n$EFFECT_LIST_BULLET$Débloque la possibilité pour tout [ruler|E] [landed|E] de cette [dynasty|E] de commander des [artifacts|E] de sculptures #bold en ivoire et bois#! en prenant la [decision|E] de commander une œuvre auprès des [niger_delta_craft_guilds|E] (si les autres conditions sont remplies)\n$EFFECT_LIST_BULLET$Ces œuvres sont moins puissantes que les autres types, mais généralement moins chères"
 RICE_niger_delta_form_beadmakers_option:0 "#Bold Fabricants de perles#!"
 RICE_niger_delta_form_beadmakers_option_desc:0 "$RICE_niger_delta_beadmakers_option_desc$"
 RICE_niger_delta_form_beadmakers_option_tooltip:0 "$EFFECT_LIST_BULLET$La [dynasty|E] recevra le [modifier|E] [GetModifier('RICE_niger_delta_bead_maker_guild_modifier').GetNameWithTooltip]\n$EFFECT_LIST_BULLET$Débloque la possibilité pour tout [ruler|E] [landed|E] de cette [dynasty|E] de commander des [artifacts|E] #bold en perles de verre ou de corail#! en prenant la [decision|E] de commander une œuvre auprès des [niger_delta_craft_guilds|E] (si les autres conditions sont remplies)\n$EFFECT_LIST_BULLET$Les perles de verre ou de corail rapportent généralement plus de [dynasty_prestige|E] que les autres types d’œuvres\n\n#X Cette option est disponible uniquement si vous êtes de [title_tier|E] [king|E] ou [emperor|E], ou si vous possédez [GetTitleByKey('c_ife').GetName] ou [GetTitleByKey('d_ooni_of_ife').GetNameNoTier]#!"
