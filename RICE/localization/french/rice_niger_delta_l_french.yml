 # Activities
 activity_niger_delta_beaded_crown:0 "Voyage à $c_ife$ pour recevoir une [beaded_crown|E]"
 activity_niger_delta_beaded_crown_name:0 "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] voyage à $c_ife$ pour recevoir une [beaded_crown|E]"
 activity_niger_delta_new_yam_festival:0 "Festival de la nouvelle igname"
 activity_niger_delta_new_yam_festival_name:0 "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] festival de la nouvelle igname"
 activity_niger_delta_olojo_festival:0 "Participation au festival Olojo"
 activity_niger_delta_olojo_festival_name:0 "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] participation au festival d'Olojo"
 activity_RICE_niger_delta_new_yam_festival_host_an_a:0 "$host_activity_a$"
 activity_RICE_niger_delta_new_yam_festival:0 "Festival de la nouvelle igname"
 activity_RICE_niger_delta_new_yam_festival_desc:0 "Depuis des siècles, les ignames constituent une source essentielle de nourriture pour les [GetPlayer.GetCulture.GetCollectiveNoun] et d’autres peuples d’Afrique de l’Ouest originaires de la côte atlantique. La récolte des ignames approchant, il est temps de préparer un festival de la nouvelle igname digne de ce nom, et de remercier [GetPlayer.GetFaith.FertilityGodName] pour cette abondance."
 activity_RICE_niger_delta_new_yam_festival_selection_tooltip: "Organiser une grand festival de la nouvelle igname.\n\n$RICE_niger_delta_celebrate_new_yam_festival_context_tooltip$"
 activity_RICE_niger_delta_new_yam_festival_host_desc: "\n$BULLET_WITH_TAB$[prestige_i|E][prestige|E]\n$BULLET_WITH_TAB$[piety_i|E][piety|E]\n$BULLET_WITH_TAB$Perte de [stress_loss_i|E][stress|E]\n$BULLET_WITH_TAB$Chance pour chaque [county|E] que vous possédez de gagner le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip]"
 activity_RICE_niger_delta_new_yam_festival_guest_desc: "\n$BULLET_WITH_TAB$[prestige_i|E][prestige|E]\n$BULLET_WITH_TAB$[piety_i|E][piety|E]\n$BULLET_WITH_TAB$Perte de [stress_loss_i|E][stress|E]"
 activity_RICE_niger_delta_new_yam_festival_province_desc: ""
 activity_RICE_niger_delta_new_yam_festival_destination_selection: "$activity_RICE_niger_delta_new_yam_festival_province_desc$"
 activity_RICE_niger_delta_new_yam_festival_guest_help_text: "$activity_RICE_niger_delta_new_yam_festival$"
 activity_RICE_niger_delta_new_yam_festival_predicted_cost: "Le coût du festival de la nouvelle igname dépend principalement de vos [income|E]."
 activity_RICE_niger_delta_new_yam_festival_conclusion_desc: "Le [GetActivityType( 'activity_RICE_niger_delta_new_yam_festival' ).GetName] de cette année est terminée. Quelle joie d’avoir célébré cette belle récolte !"
 RICE_niger_delta_new_yam_festival_ritual_phase: "Rituel"
 RICE_niger_delta_new_yam_festival_ritual_phase_desc: "Le festival de la nouvelle igname est un moment festif, mais il est aussi marqué par d’importantes cérémonies et règles que nous devons tous respecter."
 RICE_niger_delta_new_yam_festival_celebration_intent_header: "Célébration :"
 RICE_niger_delta_new_yam_festival_celebration_intent: "Célébration"
 RICE_niger_delta_new_yam_festival_celebration_intent_desc: "Bien qu’il s’agisse d’une occasion solennelle, le festival de la nouvelle igname est aussi un moment pour célébrer une bonne récolte ! Vous perdrez du [stress_i|E] [stress|E], et encore plus si vous êtes [GetTrait('gregarious').GetName( GetNullCharacter )|U], [GetTrait('gluttonous').GetName( GetNullCharacter )] ou [GetTrait('content').GetName( GetNullCharacter )]."
 RICE_niger_delta_new_yam_festival_generosity_intent_header: "Générosité :"
 RICE_niger_delta_new_yam_festival_generosity_intent: "Générosité"
 RICE_niger_delta_new_yam_festival_generosity_intent_desc: "Le festival de la nouvelle igname est l’occasion de démontrer votre statut en tant que [GetPlayer.GetTitleAsNameNoTooltip]. Vos [counties|E] auront plus de chances de gagner le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip], et vous perdrez également du [stress_i|E] [stress|E] si vous êtes [GetTrait('just').GetName( GetNullCharacter )|U] ou [GetTrait('generous').GetName( GetNullCharacter )]."
 RICE_niger_delta_new_yam_festival_purification_intent_header: "Purification :"
 RICE_niger_delta_new_yam_festival_purification_intent: "Purification"
 RICE_niger_delta_new_yam_festival_purification_intent_desc: "Vous cherchez à purifier la communauté des criminels lors du festival de la nouvelle igname. Vous #italic devez#! sacrifier un [prisoner|E], et vous en obtiendrez un à sacrifier si vous n’en avez pas déjà un valide ; le sacrifice vous rapportera également #V 100#! de [prestige_i|E]."
