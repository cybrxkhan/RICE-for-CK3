 niger_delta.0030.t:0 "Choisir une date"
 niger_delta.0030.desc:0 "Le festival de la nouvelle igname approche à grands pas, lorsque nous célébrons la première récolte des ignames, l’une des cultures les plus importantes cultivées par le peuple [ROOT.Char.GetCulture.GetName].\n\nAvant même que la préparation du festival puisse commencer, nous devons décider d’une date propice pour sa tenue. Une telle décision ne peut être prise à la légère. Maintenant, la question est : qui devrait avoir la responsabilité de consulter [ROOT.Char.GetFaith.PantheonTerm] et de déterminer la date du festival de cette année ?"
 niger_delta.0030.a:0 "En tant que [ROOT.Char.GetTitleAsNameNoTooltip] du [ROOT.Char.GetPrimaryTitle.GetNameNoTooltip], c'est mon devoir."
 niger_delta.0030.b:0 "Nos érudits [ROOT.Char.Custom('DefaultPriestTitlePlural')] sauront quoi faire."
 niger_delta.0030.c:0 "Réunir les sages et autres notables pour prendre une décision collective."
 niger_delta.0031.t:0 "La date est fixée"
 niger_delta.0031.desc:0 "Après une réflexion attentive, la date a été choisie pour le festival. D’ici là, nous ferons tout notre possible pour nous préparer à cette occasion mémorable, ce qui inclut la purification rituelle de la cérémonie pendant cette période à travers un certain nombre de rituels et de pratiques.\n\nPlus important encore, nous devons tous respecter la règle selon laquelle personne — pas même moi, le [ROOT.Char.GetTitleAsNameNoTooltip] — n’est autorisé à manger de nouvelles ignames avant le festival. Le faire inviterait la réprobation et le mépris de la communauté et de [ROOT.Char.GetFaith.PantheonTerm]."
 niger_delta.0031.a:0 "Commençons les préparatifs – assurez-vous que personne ne mange les nouvelles ignames !"
 niger_delta.0032.t:0 "Le festival de la nouvelle igname commence"
 niger_delta.0032.desc:0 "Le festival de la nouvelle igname commence aujourd’hui, annonçant le début de la récolte des ignames.\n\nLe premier lot de nouvelles ignames — c’est-à-dire les ignames fraîchement récoltées — est offert rituellement à [ROOT.Char.GetFaith.PantheonTerm] lors d’une grande cérémonie, et divers animaux sont également sacrifiés. Nous ne pouvons manger les nouvelles ignames qu’une fois cette cérémonie terminée.\n\nDifférentes communautés de la région ont des traditions différentes concernant qui est autorisé à manger les ignames en premier. Certains laissent cet honneur aux [ROOT.Char.Custom('DefaultPriestTitlePlural')] ou aux dirigeants, tandis que d’autres estiment que les plus humbles membres de la société méritent de manger en premier.\n\nUne fois la première nouvelle igname consommée, le festival commencera véritablement !"
 niger_delta.0032.a:0 "En tant que [ROOT.Char.GetTitledFirstNameNoTooltip], je devrais être le premier à manger les nouvelles ignames."
 niger_delta.0032.b:0 "Les [ROOT.Char.Custom('DefaultPriestTitlePlural')] devraient être les premiers à manger les nouvelles ignames."
 niger_delta.0032.c:0 "Les plus humbles et modestes devraient être les premiers à manger les nouvelles ignames."
 niger_delta.0033.t:0 "Fin du festival de la nouvelle igname"
 niger_delta.0033.desc:0 "Après beaucoup de réjouissances, le festival de la nouvelle igname touche à sa fin. Notre communauté a été purifiée rituellement, [ROOT.Char.GetFaith.PantheonTerm] a reçu de bonnes offrandes, et tout le monde s’est bien amusé.\n\nMes messagers et représentants ont été envoyés à travers le royaume pour informer tout le monde du festival de la nouvelle igname. J’espère que d’autres villages et clans de la région partageront notre joie et nos espoirs pour cette récolte d’ignames désormais en cours.\n\nAlors que les festivités et l’excitation s’apaisent, chacun dans la communauté retourne à sa vie normale. Peut-être que le festival d’ignames de l’année prochaine sera tout aussi amusant !"
 niger_delta.0033.a:0 "En attendant."
 niger_delta.0034.t:0 "L'exécution comme purification"
 niger_delta.0034.desc:0 "Dans certaines régions qui célèbrent le festival de la nouvelle igname, il est coutume de « sacrifier » des criminels. En effet, l’exécution de ces individus est considérée comme une partie importante de la purification rituelle de la communauté, en préparation du festival.\n\nCette année, certains des [ROOT.Char.Custom('DefaultPriestTitlePlural')] m’ont dit qu’ils pensaient qu’il serait des plus propices d’inclure mon prisonnier, [prisoner.GetFullName], parmi les condamnés à être exécutés dans le cadre de ce processus de purification."
 niger_delta.0034.a:0 "Très bien ! Nous purifierons la terre avec son sang."
 niger_delta.0034.a.tooltip:0 "Cette option augmentera légèrement la chance que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé"
 niger_delta.0034.b:0 "Non, je ne vois pas pourquoi [prisoner.GetFirstNameNoTooltip] doit mourir."
 niger_delta.0035.t:0 "Le mangeur d’igname"
 niger_delta.0035.desc:0 "Une partie importante du festival de la nouvelle igname est que #italic personne#! n’est autorisé à manger les nouvelles ignames — c’est-à-dire celles qui sont sur le point d’être récoltées. Pas même un puissant [ROOT.Char.GetTitleAsNameNoTooltip] comme moi n’a le droit de le faire. En fait, les restrictions sont les plus strictes pour ceux de statut élevé comme moi : nous sommes interdits non seulement de regarder les nouvelles ignames, mais même les agriculteurs qui les touchent.\n\nEt pourtant, nous y voilà. [yam_eater.GetTitledFirstName] a été pris en flagrant délit, en train de manger une nouvelle igname. [yam_eater.GetSheHe|U] peut avoir de nombreuses excuses, comme dire qu'[yam_eater.GetSheHe] a confondu l’igname avec une ancienne igname récoltée il y a longtemps, mais nos traditions sont claires à ce sujet. [yam_eater.GetFirstNameNoTooltip] a commis un grave tabou en consommant ces nouvelles ignames.\n\nMaintenant, il m’appartient de décider de son sort."
 niger_delta.0035.a:0 "Si [yam_eater.GetSheHe] a appris sa leçon, je ne vois pas de raison de [yam_eater.GetHerHim] punir."
 niger_delta.0035.a.tooltip:0 "Cette option #N diminue#! légèrement la chance que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé"
 niger_delta.0035.b:0 "Tant qu'[yam_eater.GetSheHe] paie une amende, alors nous lui pardonnerons."
 niger_delta.0035.c:0 "Impardonnable ! Je vais le déclarer publiquement criminel."
 niger_delta.0036.t:0 "La tentation de l'igname"
 niger_delta.0036.desc:0 "Une partie importante du festival de la nouvelle igname est que #italic personne#! n’est autorisé à manger les nouvelles ignames — c’est-à-dire celles qui sont sur le point d’être récoltées. Pas même un puissant [ROOT.Char.GetTitleAsNameNoTooltip] comme moi n’a le droit de le faire. En fait, les restrictions sont les plus strictes pour ceux de statut élevé comme moi : nous sommes interdits non seulement de regarder les nouvelles ignames, mais même les agriculteurs qui les touchent.\n\nMais je les vois juste là, devant moi : de délicieuses ignames savoureuses, prêtes à être récoltées. J’ai #italic vraiment#! envie de les manger, car je suis las de manger de vieilles ignames, mais je sais que je ne devrais pas le faire.\n\nOu devrais-je ?"
 niger_delta.0036.a:0 "Je ne dois même pas regarder les ignames ! Je dois me purifier rituellement !"
 niger_delta.0036.b:0 "Je ne peux pas résister – je dois manger ces ignames !"
 niger_delta.0036.b.success:0 "Vous ne vous faites pas prendre en train de manger les ignames et vous profitez de leur saveur."
 niger_delta.0036.b.failure:0 "Vous vous faites prendre en train de manger les ignames, réduisant la chance que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé"
 niger_delta.0037.t:0 "La tentation de l'igname"
 niger_delta.0037.desc.intro:0 "Ces nouveaux ignames étaient délicieux et n'avaient rien à voir avec les anciens."
 niger_delta.0037.desc.not_caught:0 "\n\nHeureusement, personne ne m’a vu les manger. Peut-être que [ROOT.Char.GetFaith.HighGodName] m’a vu commettre ce tabou, mais a décidé de ne pas me punir pour l’instant. Pourtant, mon acte mauvais pèse lourd sur mon cœur, mais je n’ai tout simplement pas pu résister. Ces ignames étaient vraiment bien trop bonnes."
 niger_delta.0037.desc.caught:0 "\n\nMalheureusement, je me suis fait prendre en train de les manger. S’il n’y avait eu qu’un seul témoin, j’aurais peut-être pu m’en tirer, mais plusieurs personnes ont vu ce que j’ai fait. Maintenant, tout le monde parle de comment [ROOT.Char.GetTitledFirstName] a brisé ce tabou sacré.\n\nLes [ROOT.Char.Custom('DefaultPriestTitlePlural')] sont profondément offensés et exigent que je me repente d’une manière ou d’une autre. Si je ne fais pas attention, ma réputation pourrait être encore plus ternie."
 niger_delta.0037.a:0 "Retour à la préparation du festival de la nouvelle igname !"
 niger_delta.0037.b:0 "Je paierai une amende appropriée et accomplirai des sacrifices pour purifier mon âme."
 niger_delta.0037.b.tooltip:0 "Cette option #N diminue#! légèrement la chance que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé"
 niger_delta.0037.c:0 "Et si j'avais brisé le tabou ? C'était juste une fois."
 niger_delta.0037.c.tooltip:0 "Cette option #N diminue#! légèrement la chance que vos [counties|E] obtiennent le [county_modifier|E] [GetModifier('RICE_niger_delta_successful_new_yam_festival').GetNameWithTooltip] lorsque le festival sera terminé"
