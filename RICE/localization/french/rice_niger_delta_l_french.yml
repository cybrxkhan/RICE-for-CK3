 niger_delta.0006.t:0 "Un nouveau Ọọ̀ni"
 niger_delta.0006.desc:0 "Il n’y a pas eu de Ọọ̀ni à [ife.GetNameNoTier] depuis longtemps. Cependant, en tant que dirigeant de cette cité sacrée, j’ai rassemblé sous mon autorité de nombreux chefs couronnés [yoruba.GetAdjective], et c’est l’occasion de légitimer fermement mon pouvoir politique et spirituel en me proclamant nouveau Ọọ̀ni.\n\nTraditionnellement, le Ọọ̀ni doit être un descendant du grand Oduduwa ; bien que certains contestent ma revendication à ce titre, il existe peu de candidats convenables en dehors de moi.\n\nÀ présent, je dois m’adapter à mon nouveau rôle. Je ne paraîtrai plus en public qu’à de rares occasions, comme le veut la tradition, et je dois remplir mes devoirs avec responsabilité et honneur. Tous les souverains [yoruba.GetAdjective] reconnaissent la primauté du Ọọ̀ni comme chef spirituel des Yorùbá, et sous mon autorité, la stabilité et la prospérité sont promises à tous ceux qui suivent les òrìṣà."
 niger_delta.0006.a:0 "Que mon leadership inspire tout le monde !"
 niger_delta.0007.t:0 "$niger_delta.0006.t$"
 niger_delta.0007.desc:0 "Depuis un certain temps, personne ne revendiquait le titre de Ọọ̀ni de [ife.GetNameNoTier], chef cérémoniel et spirituel de la communauté [yoruba.GetAdjective]. Les fidèles [yoruba.GetAdjective] du [GetGeographicalRegion('RICE_yorubaland_region').GetName] et d’ailleurs, qui reconnaissent l’importance sacrée de [ife.GetNameNoTierNoTooltip], étaient perdus sans la guidance du Ọọ̀ni.\n\nÀ présent, les choses changent. [reformer.GetFirstName] a acquis assez de pouvoir et de prestige pour être proclamé nouveau Ọọ̀ni de [ife.GetNameNoTier]. [reformer.GetSheHe|U] s’est même déjà retiré[reformer.Custom('FR_E')] dans son palais et ne paraît plus guère en public, comme le veut la tradition.\n\nAinsi, le rôle traditionnel du Ọọ̀ni comme faiseur de rois et grand prêtre cérémoniel des òrìṣà sur terre est rétabli."
 niger_delta.0007.a:0 "C’est un nouveau jour pour la communauté [yoruba.GetAdjectiveNoTooltip] !"
 niger_delta.0007.b:0 "Nouvelles intéressantes..."
