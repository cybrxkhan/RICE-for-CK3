 RICE_niger_delta_new_yam_festival_caught_eating_log_title:0 "Pris en flagrant délit de consommation d'ignames"
 RICE_niger_delta_new_yam_festival_caught_eating_log:0 "[CHARACTER.GetShortUIName|U] a été surpris en train de manger des ignames"
