 galicia.0010.t:0 "Soutenir le chemin de Saint-Jacques"
 galicia.0010.desc.intro:0 "Chaque jour, des pèlerins [christian.GetAdjective] traversent les terres que je gouverne pour atteindre le tombeau de Saint Jacques, au haut lieu sacré [christian.GetAdjective] de [santiago.GetNameNoTier]. Voyager peut toutefois être dangereux, car les menaces des bandits, des bêtes sauvages, du mauvais temps, ou même de simples chemins en mauvais état, sont constantes."
 galicia.0010.desc.christian:0 "\n\nAinsi, en tant que [ROOT.Char.GetTitleAsNameNoTooltip] [ROOT.Char.GetFaith.GetReligion.GetAdjective], il est de mon devoir d’aider ces pèlerins – y compris ceux qui viennent de mes terres – dans leur voyage. Après tout, je ne doute pas que Saint Jacques lui-même approuverait toute forme d’aide que je peux accorder à ses dévots."
 galicia.0010.desc.non_christian:0 "\n\nCertains [ROOT.Char.GetFaith.GetAdherentNamePlural] estiment que je ne dois rien à mes sujets [christian.GetAdjective], ni aux pèlerins [christian.GetAdjective] venus de l’étranger. Pourtant, je souhaite être vu comme un dirigeant juste et tolérant, améliorer mes relations avec la communauté [christian.GetAdjective] de mon domaine et faciliter le flux du commerce."
 galicia.0010.desc.conclusion:0 "\n\nJ’ai donc mis de côté des fonds à consacrer à divers projets d’infrastructure le long des grandes routes de pèlerinage menant à [santiago.GetNameNoTier] dans mon domaine, qu’il s’agisse d’améliorer l’état des routes, de construire des hospices, et plus encore. Tout cela garantira un voyage plus sûr et plus confortable pour les pèlerins."
 galicia.0010.a:0 "C'est le moins que je puisse faire."
 galicia.0011.t:0 "Intercession de Santiago"
 galicia.0011.desc.intro:0 "Depuis que Saint Jacques voyagea, il y a bien des siècles, pour prêcher l’Évangile de Jésus-Christ en [GetGeographicalRegion('world_europe_west_iberia').GetName] (où il est connu sous le nom de Santiago), il a toujours entretenu un lien particulier avec cette terre. Il ne fait nul doute qu’il en est le protecteur, et, en tant que tel, je prie pour son intercession."
 galicia.0011.desc.warrior:0 "\n\nLe seul nom de Santiago symbolise la victoire à la guerre. Je prie pour que Santiago nous obtienne la force et la sagesse de triompher de tous les infidèles et hérétiques qui sont nos ennemis iniques. Ce faisant, nous pourrons répandre sur terre la gloire de la foi [ROOT.Char.GetFaith.GetReligion.GetAdjective]."
 galicia.0011.desc.pilgrim:0 "\n\nLe seul nom de Santiago évoque la multitude de pèlerins qui se pressent à son sanctuaire de Saint-Jacques-de-Compostelle. Je prie pour que Santiago nous obtienne la force et la sagesse d’endurer les épreuves de la vie, tout comme le pèlerin endure les épreuves de la route, afin que nous puissions mieux comprendre et servir la volonté du Seigneur."
 galicia.0011.desc.preacher:0 "\n\nLe seul nom de Santiago rappelle la ferveur des Apôtres lorsqu’ils parcouraient le monde pour prêcher l’Évangile du Christ aux hommes. Je prie pour que Santiago nous obtienne la force et la sagesse d’aider le Dieu tout-puissant à répandre l’Évangile au loin, et que nous puissions connaître la paix en notre temps."
 galicia.0011.a:0 "Amen !"
 RICE_saint_james_intercession_tooltip.nothing:0 "Il n’existe aucun signe miraculeux de l’intercession de Santiago"
 RICE_saint_james_intercession_tooltip.minor:0 "Il n’existe que peu de signes de l’intercession de Santiago"
 RICE_saint_james_intercession_tooltip.major:0 "Il existe certains signes de l’intercession de Santiago"
 RICE_saint_james_intercession_tooltip.great:0 "Il existe de nombreux signes de l’intercession de Santiago"
 galicia.0012.t:0 "Lever des péages supplémentaires sur les pèlerins"
 galicia.0012.desc.intro:0 "Le chemin de Saint-Jacques est un réseau de routes qui mènent toutes en un seul lieu : le haut lieu [christian.GetAdjective] de [santiago.GetNameNoTier]. Ainsi, des pèlerins de toute l’Europe doivent traverser les terres de souverains comme moi, qui leur demandent gracieusement de payer des péages, comme c’est notre droit. J’ai décidé que ces péages devaient être encore #italic plus élevés#!."
 galicia.0012.desc.christian:0 "\n\nCertains jugent impie qu’un [ROOT.Char.GetTitleAsNameNoTooltip] [ROOT.Char.GetFaith.GetReligion.GetAdjective] prélève ces péages controversés sur les pèlerins, et plus encore qu’il les augmente."
 galicia.0012.desc.non_christian:0 "\n\nJe suis certain que nombre de mes sujets [ROOT.Char.GetFaith.GetAdjective] se soucient peu que j’augmente les péages que j’impose à ces pèlerins. Certains iraient même jusqu’à dire que je ne vais pas assez loin, en tant que [ROOT.Char.GetTitleAsNameNoTooltip] [ROOT.Char.GetFaith.GetAdjective], et que je devrais être plus cruel envers ces infidèles.\n\nÀ l’inverse, les communautés [christian.GetAdjective] de mon domaine furent fort mécontentes en l’apprenant. Je leur réponds ceci : les pèlerins devraient déjà me remercier de les laisser entrer sur mes terres."
 galicia.0012.desc.court_chaplain_exists:0 "Mon [chaplain.GetCouncilTitle] furieux, [chaplain.GetTitledFirstName], m’a par exemple reproché en privé d’agir ainsi. [chaplain.GetSheHe|U] a également fermé les yeux sur certains des [ROOT.Char.Custom('DefaultPriestTitlePlural')] les plus zélés de mon domaine, qui m’ont publiquement vilipendé pour mes actes.\n\nPourtant, ils ne peuvent pas grand chose contre moi. Je ne fais même pas de mal aux pèlerins. J’ai seulement besoin de plus d’argent."
 galicia.0012.desc.no_court_chaplain_exists:0 "\n\nIl n’est guère surprenant que de nombreux [ROOT.Char.Custom('DefaultPriestTitlePlural')] zélés de mon domaine m’aient ouvertement vilipendé et remis mon autorité en question. À leurs yeux, je n’agis point comme un véritable [ROOT.Char.GetTitleAsNameNoTooltip] [ROOT.Char.GetFaith.GetAdjective] devrait le faire.\n\nPourtant, ils ne peuvent pas grand chose contre moi. Je ne fais même pas de mal aux pèlerins. J’ai seulement besoin de plus d’argent."
 galicia.0012.a:0 "Je ferai ce qu'il faut."
 galicia.0013.t:0 "Découverte du tombeau de Saint-Jacques"
 galicia.0013.desc:0 "Il circule quantité de rumeurs sur la manière dont Saint Jacques serait enterré à [santiago.GetNameNoTier], que je gouverne. J’ai donc décidé d’envoyer mon [chaplain.GetCouncilTitle], [chaplain.GetTitledFirstName], enquêter sur la question, et [chaplain.GetSheHe] est revenu avec ses conclusions.\n\nIl n’y a pas si longtemps, un ermite local nommé [pelayo.GetFirstName] vit, plusieurs nuits de suite, des flammes mystérieuses dans le ciel au-dessus d’une certaine colline. Après avoir contacté [chaplain.GetFirstNameNoTooltip], tous deux se rendirent sur place pour examiner les lieux. Ils découvrirent un ancien cimetière romain… et le tombeau de nul autre que Saint Jacques lui-même.\n\n[chaplain.GetFirstNameNoTooltip] s’assura de vérifier l’authenticité de ce tombeau auprès des érudits locaux et des [ROOT.Char.Custom('DefaultPriestTitlePlural')], et nul ne doute désormais que ce tombeau #italic est#! le véritable."
 galicia.0013.a:0 "Qu'avez-vous appris sur le tombeau ?"
 galicia.0014.t:0 "Découverte du tombeau de Saint-Jacques"
 galicia.0014.desc:0 "Dans le cadre de leur enquête, mon [chaplain.GetCouncilTitle], [chaplain.GetTitledFirstName], nota les signes miraculeux aperçus par [pelayo.GetFirstName]. [chaplain.GetSheHe|U] se pencha également sur les légendes locales concernant Saint Jacques.\n\nDans la plupart des versions, après le martyre de Saint Jacques sous Hérode Agrippa, une barque de pierre porta miraculeusement ses reliques vers le nord-ouest de l'[GetGeographicalRegion('world_europe_west_iberia').GetName], où l’Apôtre avait autrefois converti et baptisé l’ancienne reine païenne, jadis malfaisante, Lupa. Là, ses disciples l’ensevelirent et bâtirent son tombeau.\n\nQuoi qu’il en soit, j’ai jugé bon de faire bâtir une chapelle auprès du tombeau, afin que les habitants puissent honorer notre grand apôtre, décision approuvée par [chaplain.GetFirstNameNoTooltip]. La dernière question soulevée par [chaplain.GetFirstNameNoTooltip] est de savoir que faire de l’ermite [pelayo.GetFirstName], qui fut à l’origine de cette découverte."
 galicia.0014.a:0 "Ce serait un honneur d’accueillir [pelayo.GetFirstNameNoTooltip] à ma cour !"
 galicia.0014.b:0 "J’ai le sentiment que [pelayo.GetFirstNameNoTooltip] préfère les solitudes sauvages."
 RICE_galicia_unlock_santiago_prayer_decision_tooltip:0 "Les [decisions|E] $RICE_galicia_pray_to_santiago$ sont déverrouillées pour tous les [rulers|E] [christian.GetAdjective] en [GetGeographicalRegion('RICE_galicia_region').GetName] qui remplissent les autres conditions"
 RICE_galicia_unlock_santiago_routes_decision_tooltip:0 "Les [decisions|E] $RICE_galicia_saint_james_routes_decision$ et $RICE_galicia_saint_james_levy_extra_tolls$ sont déverrouillées pour tous les [rulers|E] en [GetGeographicalRegion('world_europe_west_iberia').GetName] et en [GetGeographicalRegion('custom_occitan').GetName]"
 galicia.0015.t:0 "Découverte du tombeau de Saint-Jacques"
 galicia.0015.desc:0 "Une nouvelle miraculeuse vient de [santiago.GetNameNoTier] – du moins pour quiconque dans la communauté [christian.GetAdjective] d'[GetGeographicalRegion('world_europe_west_iberia').GetName].\n\nUn ermite vivant là, nommé [pelayo.GetFirstName], a récemment vu plusieurs signes miraculeux dans le ciel nocturne, au cours de plusieurs nuits. Il en informa [chaplain.GetTitledFirstName], le [chaplain.GetCouncilTitle] de [alfonso.GetTitledFirstName], et tous deux enquêtèrent sur la question. À leur stupéfaction, ils découvrirent l’antique tombeau de Saint Jacques l’Apôtre. Une fois l’authenticité du tombeau confirmée par les érudits locaux et les [alfonso.Custom('DefaultPriestTitlePlural')], [alfonso.GetTitledFirstNameNoTooltip] ordonna la construction d’une chapelle à ses côtés.\n\nDéjà, des pèlerins affluent vers le tombeau depuis les régions alentour. La nouvelle de cette découverte se répand vite, et nul doute que bien d’autres pèlerins viendront de loin. Le pèlerinage au tombeau de Saint Jacques ne sera-t-il qu’une mode passagère, ou deviendra-t-il une tradition durable ?"
 galicia.0015.a:0 "Un grand jour ! Que Saint Jacques nous protège."
 galicia.0015.b:0 "C'est certainement intéressant à entendre."
 galicia.0016.t:0 "Fortifier les côtes de Galice"
 galicia.0016.desc:0 "Malgré sa rudesse, la [GetGeographicalRegion('RICE_galicia_region').GetName] subit depuis des siècles des attaques et raids venus de la mer. Tout souverain qui gouverne ces terres sait, ou apprend bien vite, qu’entretenir un réseau de tours, d’avant-postes et autres ouvrages défensifs est nécessaire pour assurer la sécurité durable de la région.\n\nJ’ai récemment mis de côté des fonds pour renforcer les défenses le long du littoral de [GetGeographicalRegion('RICE_galicia_region').GetName] dans les territoires que j’y possède, que ce soit en construisant de nouvelles fortifications, ou en rénovant et agrandissant celles qui existent déjà. J’espère que cela dissuadera nos ennemis de même songer à nous attaquer, du moins par la mer."
 galicia.0016.a:0 "Nos côtes seront sécurisées."
