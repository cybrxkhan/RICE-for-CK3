 activity_galicia_compose_cantiga:0 "Pause pour se concentrer sur la composition d'une Cantiga"
 activity_galicia_compose_cantiga_name:0 "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] Pause pour se concentrer sur la composition d'une Cantiga"

 
 # Buildings
 
 # Modifiers
 RICE_galicia_saint_james_infrastructure_close:0 "Chemin de Saint-Jacques (Proche)"
 RICE_galicia_saint_james_infrastructure_close_desc:0 "Les autorités locales ont récemment œuvré à améliorer les infrastructures ici pour soutenir les pèlerins voyageant le long du chemin de Saint-Jacques vers Santiago de Compostela. Cette région est proche de Santiago ou en contient le territoire, et reçoit ainsi un grand nombre de pèlerins qui y transitent."
 RICE_galicia_saint_james_infrastructure_midrange_high:0 "Chemin de Saint-Jacques (Distance moyenne, contrôle élevé)"
 RICE_galicia_saint_james_infrastructure_midrange_high_desc:0 "Les dirigeants locaux se sont récemment efforcés d'améliorer les infrastructures afin d'aider les pèlerins qui empruntent le chemin de Saint-Jacques-de-Compostelle. Cette région se trouve à une distance modérée de Saint-Jacques-de-Compostelle et les autorités exerçaient un contrôle important sur ce territoire à l'époque où ces projets ont été élaborés."
 RICE_galicia_saint_james_infrastructure_distant_high:0 "Chemin de Saint-Jacques (Lointain, contrôle élevé)"
 RICE_galicia_saint_james_infrastructure_distant_high_desc:0 "Les autorités locales ont récemment œuvré à améliorer les infrastructures ici pour soutenir les pèlerins voyageant le long du chemin de Saint-Jacques vers Saint-Jacques-de-Compostelle (Santiago de Compostela). Cette région est très éloignée de Santiago, et les autorités exerçaient un haut niveau de contrôle sur ce territoire quand ces projets furent entrepris."
 RICE_galicia_saint_james_infrastructure_midrange_low:0 "Chemin de Saint-Jacques (Distance moyenne, contrôle faible)"
 RICE_galicia_saint_james_infrastructure_midrange_low_desc:0 "Les autorités locales ont récemment œuvré à améliorer les infrastructures ici pour soutenir les pèlerins voyageant le long du chemin de Saint-Jacques vers Saint-Jacques-de-Compostelle (Santiago de Compostela). Cette région se trouve à une distance modérée de Santiago, mais les autorités exerçaient un faible niveau de contrôle sur ce territoire au moment de ces travaux, de sorte que l'effet de ces améliorations en fut réduit."
 RICE_galicia_saint_james_infrastructure_distant_low:0 "Chemin de Saint-Jacques (Lointain, contrôle faible)"
 RICE_galicia_saint_james_infrastructure_distant_low_desc:0 "Les dirigeants locaux se sont récemment efforcés d'améliorer les infrastructures afin d'aider les pèlerins qui empruntent le chemin de Saint-Jacques-de-Compostelle. Cette région est très éloignée de Saint-Jacques, et les autorités n'exerçaient qu'un faible contrôle sur ce territoire à l'époque où ces projets ont été élaborés, de sorte que les avantages des améliorations infrastructurelles ont été moindres."
 RICE_galicia_saint_james_modifier_warrior_minor:0 "Saint-Jacques le Guerrier (Intercession mineure)"
 RICE_galicia_saint_james_modifier_warrior_minor_desc:0 "Saint Jacques le Majeur, apôtre de Jésus-Christ, était réputé apparaître en bataille pour aider les chrétiens justes dans la légende. Les bons chrétiens d'Ibérie devraient imiter son exemple en tant que #italic Matamoros#!, le Tueur de Maures, et combattre vaillamment contre les infidèles et hérétiques iniques.\n\n#weak Ce [santiago_modifier|E] a été accordé à la suite de la [decision|E] $RICE_galicia_pray_to_santiago$, parce que la [iberian_struggle|E] se trouve actuellement dans la [struggle_phase_iberia_hostility|E] ou a été close par la [decision|E] #bold $struggle_iberia_ending_hostility_decision$#!. Il sera retiré de ce personnage si celui-ci se convertit à une [faith|E] non chrétienne.#!\n "
 RICE_galicia_saint_james_modifier_warrior_major:0 "Saint-Jacques le Guerrier (Intercession majeure)"
 RICE_galicia_saint_james_modifier_warrior_major_desc:0 "$RICE_galicia_saint_james_modifier_warrior_minor_desc$"
 RICE_galicia_saint_james_modifier_warrior_great:0 "Saint-Jacques le Guerrier (Grande intercession)"
 RICE_galicia_saint_james_modifier_warrior_great_desc:0 "$RICE_galicia_saint_james_modifier_warrior_minor_desc$"
 RICE_galicia_saint_james_modifier_pilgrim_minor:0 "Saint-Jacques le Pèlerin (Intercession mineure)"
 RICE_galicia_saint_james_modifier_pilgrim_minor_desc:0 "Saint Jacques le Majeur, apôtre de Jésus-Christ, parcourut jadis de grandes distances dans l'adversité, tel maint pèlerin. Les bons chrétiens d'Ibérie devraient imiter son exemple en se confiant à la miséricorde de Dieu et en endurant toutes les épreuves qui se dressent sur leur chemin.\n\n#weak Ce [santiago_modifier|E] a été accordé à la suite de la [decision|E] $RICE_galicia_pray_to_santiago$, parce que la [iberian_struggle|E] se trouve actuellement dans la [struggle_phase_iberia_compromise|E] ou la [struggle_phase_iberia_opportunity|E], ou a été close par la [decision|E] #bold $struggle_iberia_ending_compromise_decision$#!. Il sera retiré de ce personnage si celui-ci se convertit à une [faith|E] non chrétienne.#!\n "
 RICE_galicia_saint_james_modifier_pilgrim_major:0 "Saint-Jacques le Pèlerin (Intercession majeure)"
 RICE_galicia_saint_james_modifier_pilgrim_major_desc:0 "$RICE_galicia_saint_james_modifier_pilgrim_minor_desc$"
 RICE_galicia_saint_james_modifier_pilgrim_great:0 "Saint-Jacques le Pèlerin (Grande intercession)"
 RICE_galicia_saint_james_modifier_pilgrim_great_desc:0 "$RICE_galicia_saint_james_modifier_pilgrim_minor_desc$"
 RICE_galicia_saint_james_modifier_preacher_minor:0 "Saint-Jacques le Prédicateur (Intercession mineure)"
 RICE_galicia_saint_james_modifier_preacher_minor_desc:0 "Saint Jacques le Majeur, apôtre de Jésus-Christ, voyagea jusqu'en la lointaine Ibérie pour y prêcher l'Évangile. Les bons chrétiens d'Ibérie devraient s'en souvenir et imiter son exemple en pratiquant la vertu et en apportant la paix au monde par la sainte parole.\n\n#weak Ce [santiago_modifier|E] a été accordé à la suite de la [decision|E] $RICE_galicia_pray_to_santiago$, parce que la [iberian_struggle|E] se trouve actuellement dans la [struggle_phase_iberia_conciliation|E], ou a été close par la [decision|E] #bold $struggle_iberia_ending_conciliation_decision$#!. Il sera retiré de ce personnage si celui-ci se convertit à une [faith|E] non chrétienne.#!\n "
 RICE_galicia_saint_james_modifier_preacher_major:0 "Saint-Jacques le Prédicateur (Intercession majeure)"
 RICE_galicia_saint_james_modifier_preacher_major_desc:0 "$RICE_galicia_saint_james_modifier_preacher_minor_desc$"
 RICE_galicia_saint_james_modifier_preacher_great:0 "Saint-Jacques le Prédicateur (Grande intercession)"
 RICE_galicia_saint_james_modifier_preacher_great_desc:0 "$RICE_galicia_saint_james_modifier_preacher_minor_desc$"
 RICE_galicia_recently_altered_the_altar:0 "Altérations récentes à l'autel de Saint Jacques"
 RICE_galicia_recently_altered_the_altar_desc:0 "Les autorités chrétiennes laïques et ecclésiastiques ont récemment autorisé de profondes modifications de l'autel de Saint-Jacques à Santiago, afin de mieux accueillir les nombreux pèlerins qui se rendent dans la ville. Cependant, de nombreux habitants de la ville ne sont pas satisfaits de cette décision. Présentant un front inhabituellement uni, ils estiment que le caractère sacré de l'ancien tombeau a été profané et que les autorités ignorent leurs traditions et leurs droits au profit d'un accroissement avide du nombre de pèlerins étrangers."
 RICE_galicia_altered_saint_james_tomb:0 "Rénovations controversées du tombeau de Saint-James"
 RICE_galicia_way_of_saint_james_supporter:0 "A soutenu le chemin de Saint-Jacques"
 RICE_galicia_way_of_saint_james_supporter_nonchristian:0 "A soutenu le chemin de Saint-Jacques en tant que non-chrétien"
 RICE_galicia_way_of_saint_james_robber_baron:0 "Péages supplémentaires prélevés sur les pèlerins de Saint-Jacques de Compostelle"
 RICE_galicia_way_of_saint_james_robber_baron_nonchristian:0 "Prélèvement de péages supplémentaires sur les pèlerins de Saint-Jacques en tant que non-chrétien"
 RICE_galicia_saint_james_tolls_close:0 "Péages supplémentaires sur les pèlerins de Santiago (Proche)"
 RICE_galicia_saint_james_tolls_close_desc:0 "Les autorités locales prélèvent des péages supplémentaires sur les pèlerins voyageant le long du chemin de Saint-Jacques – comme cette région jouxte Santiago, les profits peuvent être considérables. Ces dirigeants ne sont-ils que des racketteurs et d'impies seigneurs-brigands ? « Nenni, » prétendraient-ils, « nous avons seulement besoin de “dons” pour protéger les pèlerins ! Ils devraient nous en être reconnaissants ! »"
 RICE_galicia_saint_james_tolls_midrange_high:0 "Péages supplémentaires sur les pèlerins de Santiago (Distance moyenne, contrôle élevé)"
 RICE_galicia_saint_james_tolls_midrange_high_desc:0 "Les autorités locales prélèvent des péages supplémentaires sur les pèlerins voyageant le long du chemin de Saint-Jacques – cette région est proche de Santiago et politiquement stable, de sorte que les profits peuvent être considérables. Ces dirigeants ne sont-ils que des racketteurs et d'impies seigneurs-brigands ? « Nenni, » prétendraient-ils, « nous avons seulement besoin de “dons” pour protéger les pèlerins ! Ils devraient nous en être reconnaissants ! »"
 RICE_galicia_saint_james_tolls_distant_high:0 "Péages supplémentaires sur les pèlerins de Santiago (Lointain, contrôle élevé)"
 RICE_galicia_saint_james_tolls_distant_high_desc:0 "Les dirigeants locaux prélèvent des péages supplémentaires sur les pèlerins qui empruntent le chemin de Saint-Jacques - bien que cette région soit éloignée de Saint-Jacques, elle est stable, et il y a encore des profits à faire. Ces dirigeants ne sont-ils que des racketteurs et des barons impies ? « Non, diront-ils, nous n'avons besoin que de “dons” pour protéger les pèlerins, qui doivent être reconnaissants. Ils devraient être reconnaissants ! »"
 RICE_galicia_saint_james_tolls_midrange_low:0 "Péages supplémentaires pour les pèlerins de Saint-Jacques (moyenne, faible contrôle)"
 RICE_galicia_saint_james_tolls_midrange_low_desc:0 "Les autorités locales prélèvent des péages supplémentaires sur les pèlerins voyageant le long du chemin de Saint-Jacques – bien que cette région soit politiquement instable, elle est proche de Santiago, si bien que les péages rapporteront tout de même quelque profit. Ces dirigeants ne sont-ils que des racketteurs et d'impies seigneurs-brigands ? « Nenni, » prétendraient-ils, « nous avons seulement besoin de “dons” pour protéger les pèlerins ! Ils devraient nous en être reconnaissants ! »"
 RICE_galicia_saint_james_tolls_distant_low:0 "Péages supplémentaires sur les pèlerins de Santiago (Lointain, contrôle faible)"
 RICE_galicia_saint_james_tolls_distant_low_desc:0 "Les dirigeants locaux prélèvent des péages supplémentaires sur les pèlerins qui empruntent le chemin de Saint-Jacques - cette région est éloignée de Santiago et est politiquement instable, de sorte que les péages supplémentaires ne sont pas aussi efficaces, mais l'argent, c'est l'argent. Ces dirigeants ne sont-ils que des racketteurs et des barons voleurs impies ? « Non, diront-ils, nous n'avons besoin que de “dons” pour protéger les pèlerins, qui doivent être reconnaissants. Ils devraient être reconnaissants ! »"
 RICE_galicia_recently_promoted_cantiga:0 "Exemplaires distribués de Cantiga"
 RICE_galicia_recently_promoted_cantiga_desc:0 "Ce personnage a récemment composé une cantiga jugée d'excellente qualité, et il a pris des mesures pour la diffuser largement."
 RICE_currently_compiling_CSM:0 "Compile actuellement les Cantigas de Santa Maria"
 RICE_currently_compiling_CSM_desc:0 "Ce personnage s'affaire actuellement à diriger la compilation de ce qui est peut-être l'une des plus grandes collections de musique médiévale, les #italic Cantigas de Santa Maria#!.\n\n#weak Ce modificateur sera retiré une fois les Cantigas de Santa Maria compilées. Si ce personnage décède avant cela, son héritier héritera du modificateur.#!"
 RICE_currently_expanding_CSM:0 "Étend actuellement les Cantigas de Santa Maria"
 RICE_currently_expanding_CSM_desc:0 "Ce personnage s'affaire actuellement à étendre les #italic Cantigas de Santa Maria#!, sans doute l'une des plus grandes collections de musique médiévale.\n\n#weak Ce modificateur sera retiré une fois que le projet de ce personnage pour étendre les Cantigas de Santa Maria sera terminé. Si ce personnage décède avant cela, son héritier n'en héritera #bold pas#!.#!"
 RICE_galicia_discovered_saint_james_tomb:0 "A découvert le tombeau de Saint Jacques"
 RICE_galicia_santiago_tomb_recently_discovered:0 "Découverte du tombeau de saint Jacques"
 RICE_galicia_santiago_tomb_recently_discovered_desc:0 "Le prétendu tombeau de Saint Jacques, apôtre de Jésus-Christ, a été découvert récemment en ce lieu. Selon la légende locale, un navire de pierre porta son corps vers le nord-ouest de l'Ibérie après son martyre. Quoi qu'il en soit, des pèlerins dévots commencent à affluer ici, venus de près comme de loin."
 RICE_galicia_found_saint_james_tomb:0 "A collaboré pour trouver le tombeau de Saint Jacques"
 RICE_galicia_recently_fortified_coastline:0 "La côte galicienne récemment fortifiée"
 RICE_galicia_learning_about_barallete:0 "Apprend le barallete"
 RICE_galicia_discouraged_trial_by_rocking_stones:0 "A découragé les jugements par pierres branlantes"
 RICE_galicia_tales_of_britons:0 "A entendu des récits sur les anciens Bretons de Galice"
 RICE_galicia_horreo_info:0 "Précieuses informations sur les greniers hórreos"
 RICE_galicia_bought_horses:0 "A acheté des chevaux galiciens"
 RICE_galicia_sold_horses:0 "A vendu des chevaux galiciens aux régions voisines"
 RICE_galicia_kept_horses:0 "Importante population de chevaux galiciens"
 RICE_galicia_moura_blessing:0 "Bénédiction de la moura de la grotte"
 RICE_galicia_forbade_offerings_to_a_local_moura:0 "Offrandes à la moura interdites"
 RICE_galicia_forbade_offerings_to_a_local_moura_desc:0 "Les autorités locales ont récemment interdit à la population d'ici de faire des offrandes à une moura, ou esprit souterrain, que l'on dit hanter une célèbre grotte de la région. Les habitants craignent que la moura ne s'en offusque, et ils ressentent de l'amertume face aux autorités qui considèrent leur coutume comme une superstition vaine."
 RICE_galicia_inspired_by_saint_james:0 "Inspiré par le récit de Saint Jacques"
 RICE_galicia_inspired_by_queen_lupa:0 "Inspiré par l'histoire de la reine Lupa"
 RICE_galicia_offered_criminals_a_second_chance:0 "A offert une seconde chance aux bandits"
 RICE_galicia_offered_criminals_a_second_chance_desc:0 "Comme c'est la coutume dans certaines régions d'Europe, ce souverain a récemment donné à quelques petits nobles et chevaliers qui avaient illégalement extorqué des pèlerins une chance de se repentir de leurs péchés, en devenant eux-mêmes, ironiquement, pèlerins de Saint-Jacques."
 RICE_galicia_punished_pilgrim_extortionists:0 "A puni les bandits qui extorquaient les pèlerins"
 RICE_galicia_locals_wary_of_criminal_pilgrims:0 "Habitants méfiants envers les pèlerins criminels"
 RICE_galicia_locals_wary_of_criminal_pilgrims_desc:0 "Un grand nombre de pèlerins traversent cette région sur le chemin de Santiago (Saint-Jacques-de-Compostelle), dont de nombreux criminels qui souhaitent accomplir ce pèlerinage afin de se repentir de leurs péchés et d'éviter de plus lourdes peines. Nombre d'habitants se montrent mécontents de la présence de ces criminels."
 RICE_galicia_closely_monitoring_criminal_pilgrims:0 "Surveillance étroite des pèlerins criminels"
 RICE_galicia_closely_monitoring_criminal_pilgrims_desc:0 "Un grand nombre de pèlerins passent par cette région sur le chemin de Saint-Jacques, y compris de nombreux criminels qui souhaitent faire le pèlerinage pour se repentir de leurs péchés et éviter des châtiments plus sévères. Les dirigeants locaux se méfient de ces criminels et ont pris des mesures pour les surveiller de près afin de s'assurer qu'ils ne causent pas d'ennuis, ce qui a contrarié certaines autorités ecclésiastiques."
 RICE_galicia_pilgrim_settlers:0 "Colons pèlerins venus du chemin de Saint-Jacques"
 RICE_galicia_pilgrim_settlers_desc:0 "Il n'est point rare que des pèlerins ayant emprunté le chemin de Saint-Jacques s'établissent dans les villes ou villages traversés et se forgent une nouvelle vie après l'accomplissement de leur pèlerinage. Cette région a récemment vu affluer de tels personnes qui ont choisi de s'installer dans plusieurs colonies."
 RICE_galicia_recent_1117_uprising:0 "Récent soulèvement à Santiago"
 RICE_galicia_recent_1117_uprising_desc:0 "Les habitants chrétiens de Saint-Jacques-de-Compostelle se sont récemment soulevés, dans un élan de solidarité inhabituel, contre les autorités ecclésiastiques de la ville, qu'ils considèrent comme des tyrans blasphémateurs. Bien que les choses se soient calmées pour l'instant, ce soulèvement a causé beaucoup de dégâts, du moins à court terme."
 RICE_galicia_braganza_blood:0 "Sang noble arménien et breton prétendu"
 RICE_galicia_braganza_blood_desc:0 "Cette dynastie, originaire d'Ibérie, revendique une descendance de la célèbre famille Artsruni d'Arménie et des ducs de Bretagne. Bien qu'une généalogie aussi illustre soit assez farfelue, les membres de cette famille s'y tiennent."

