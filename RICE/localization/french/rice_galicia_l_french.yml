 galicia.0040.t:0 "Le travail commence"
 galicia.0040.desc:0 "En [GetGeographicalRegion('world_europe_west_iberia').GetName], nombreux sont ceux qui ont composé des cantigas, et il existe force compilations de ces chants et poèmes. Cependant, en tant que [ROOT.Char.GetTitleAsNameNoTooltip] [christian.GetAdjective], j’aspire à accomplir davantage que de simples poèmes mondains et futiles.\n\nJ’ai récemment eu l’idée de travailler avec les poètes de mon domaine pour composer et compiler une collection de cantigas intitulée #italic Cantigas de Santa Maria#!. Contrairement aux cantigas ordinaires, toutes se concentreront sur la gloire de la Vierge Marie et les miracles qui lui sont attribués.\n\nCe ne sera point chose aisée. D’après mes plans, cette collection prendra de longues années à être compilée, et il n’est pas impossible que je ne vive pas assez pour la voir achevée. Mais je ne puis qu’imaginer la stupeur et l’émerveillement que nous inspirerons aux autres une fois ce projet terminé – l’effort en vaudra le prix !"
 galicia.0040.a:0 "Au nom de la bienheureuse Vierge !"
 galicia.0041.t:0 "Les Cantigas de Santa Maria sont achevées"
 galicia.0041.desc.intro:0 "Enfin, après des années d’efforts acharnés, la première version complète des #italic Cantigas de Santa Maria#! est achevée, sous ma direction. Cela n’a été possible que grâce aux poètes qui se sont unis pour travailler à cette collection de cantigas honorant la Vierge Marie."
 galicia.0041.desc.christian:0 "\n\nCes chants montrent à tous non seulement ma dévotion en tant que [ROOT.Char.GetTitleAsNameNoTooltip] [christian.GetAdjective], mais aussi que je manifeste cette dévotion par des moyens intellectuels et artistiques. Déjà, certains des poètes avec qui j’ai travaillé évoquent la possibilité d’élargir à l’avenir cette collection avec de nouveaux chants."
 galicia.0041.desc.non_christian:0 "\n\nBien que je ne partage pas la religion [christian.GetAdjective], cela ne m’empêche pas d’admirer et de goûter la musique de cette collection. Elle est, dans l’ensemble, de grande qualité, et nombre de chants renferment des leçons morales importantes que chacun peut apprécier."
 galicia.0041.a:0 "Je suis fier de ce que nous avons accompli."
 galicia.0041.tooltip:0 "La [decision|E] $RICE_galicia_expand_CSM_decision$ est désormais disponible."
 galicia.0042.t:0 "Les Cantigas de Santa Maria"
 galicia.0042.desc:0 "La rumeur se répand vite au sujet des #italic Cantigas de Santa Maria#!, vaste collection de chants en l’honneur de la Vierge Marie récemment achevée sous la direction d'[alfonso_x.GetTitledFirstName]. Ces centaines de chants [christian.GetAdjective] l’honorent de diverses façons – certains sont des hymnes de louange, tandis que d’autres racontent les miracles qu’elle a accomplis.\n\nDans l’ensemble, l’achèvement de cette grande œuvre de littérature et de musique rejaillit favorablement sur [alfonso_x.GetFirstNameNoTooltip] et sur l’air manifestement raffiné qui règne à sa cour. Même si ces chants ne sont peut-être pas goûtés de tous à présent, nul doute que les générations futures les loueront pour leurs qualités musicales et religieuses."
 galicia.0042.a:0 "Il s'agit d'une grande réussite artistique."
 galicia.0043.t:0 "xxxxx"
 galicia.0043.desc:0 "xxxxx"
 galicia.0043.a:0 "xxxxx"
 galicia.0044.t:0 "Les Cantigas de Santa Maria"
 galicia.0044.desc:0 "Avant de mourir, [CSM_original_compiler.GetTitledFirstName] travaillait avec de nombreux poètes à une collection de chants et de récits sur la Vierge Marie appelée #italic Cantigas de Santa Maria#!.\n\nMaintenant qu'[CSM_original_compiler.GetSheHe] nous a quittés, ce projet n’en sera pas moins mené à bien, car je suis sûr qu'[CSM_original_compiler.GetSheHe] préfèrerait nous voir poursuivre l’ouvrage. Il me revient désormais de diriger cet effort afin que son rêve ne demeure pas inachevé."
 galicia.0044.a:0 "Il est regrettable qu'[CSM_original_compiler.GetSheHe] ne puisse voir l’œuvre achevée."
 galicia.0045.t:0 "Élargir les Cantigas de Santa Maria"
 galicia.0045.desc.x:0 "Il y a des années, les travaux ont commencé sur les #italic Cantigas de Santa Maria#!, une grande collection de chants en l’honneur de la Vierge Marie. Sous ma direction, le projet fut mené à terme avec un grand retentissement, symbole du haut degré de culture, d’intellect et de piété qui règne à ma cour.\n\nÀ présent, je vise plus haut encore, car je souhaite continuer à ajouter des chants aux #italic Cantigas de Santa Maria#!. Une fois encore, je rassemblerai des poètes venus de tout le domaine et travaillerai avec eux à composer et compiler des chants sur la Vierge Marie. Nous veillerons à ce que notre splendide collection soit encore plus magnifique lorsque nous en aurons terminé."
 galicia.0045.a:0 "J’ai hâte de voir ce que nous allons créer."
 RICE_galicia_no_more_CSM_expansions:0 "Les #italic Cantigas de Santa Maria#! ont atteint leur plein potentiel, et la [decision|E] $RICE_galicia_expand_CSM_decision$ ne sera plus disponible."
 galicia.0046.t:0 "Élargir les Cantigas de Santa Maria"
 galicia.0046.desc:0 "Après plusieurs années de dur labeur, la nouvelle version des #italic Cantigas de Santa Maria#! est achevée. Nombre de chants inédits s’y ajoutent à ceux d’autrefois, ce qui en fait une collection encore plus célébrée et merveilleuse de chants en l’honneur de la Vierge Marie.\n\nDéjà, les scribes s’emploient à en copier cette version, et la nouvelle de son achèvement se répand vite – tout cela rejaillit fort bien sur moi et sur ma réputation de [ROOT.Char.GetTitleAsNameNoTooltip] érudit."
 galicia.0046.a:0 "Excellent travail, à tous."
