 # Legends
 RICE_galicia_csm_legend_name: "Chants de Sainte Marie"
 RICE_galicia_csm_legend_desc: "L'érudition et l'éloquence de [compiler.GetTitledFirstName] sont légendaires. La compilation des #italic Cantigas de Santa Maria#!, cette grande collection de poésie galégo-portugaise, peut être attribuée à ses efforts."
 RICE_galicia_csm_legend_chapter_opening_new_title: "Tous connaissent assurément l'érudition et l'éloquence de [ROOT.Legend.GetProtagonist.GetTitledFirstNameNoTooltip]. Encore aujourd'hui, ses œuvres poétiques sont admirées de beaucoup."
 RICE_galicia_csm_legend_chapter_motivation_new_title: "[ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] était un poète de tout premier rang qui, comme nombre d'[ROOT.Legend.GetProperty( 'culture' ).Culture.GetCollectiveNounNoTooltip] instruits, avait composé maintes cantigas, et pourtant [ROOT.Legend.GetProtagonist.GetSheHe] ressentait au fond de son cœur un ardent désir de quelque chose de plus grand. La poésie sur les affaires du monde était une chose, mais qu'en était-il de la poésie sur le sacré, le divin, le saint ? [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] décida ainsi de composer et de compiler des poèmes sur la gloire de #italic Santa Maria#! : la Vierge Marie, Mère de Dieu, responsable de tant de miracles et d'œuvres merveilleuses."
 RICE_galicia_csm_legend_chapter_famous_deed_new_title: "Parcourant les terres, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] rechercha ses plus grands parmi confrères poètes, chanteurs et bardes, les unissant sous une cause sacrée. Ce n'était pas une guerre sainte menée par la monture et la lame, mais par la parole et le chant. Leur but, tel que le voyait [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip], était d'honorer la Vierge Marie à travers de nombreuses cantigas inspirées, d'une grande beauté et dévotion, qui seraient réunies dans les #italic Cantigas de Santa Maria#!."
 RICE_galicia_csm_legend_chapter_extra_deed_new_title: "Nuit et jour, [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] et ses poètes travaillèrent ardemment à composer et interpréter ces cantigas [ROOT.Legend.GetProperty( 'culture' ).Culture.GetNameNoTooltip] sur la Vierge Marie. Ces chants renfermaient des histoires, vraies et glorieuses, sur les miracles et les œuvres de la Vierge Marie."
 RICE_galicia_csm_legend_chapter_conclusion_new_title: "Les cantigas compilées par [ROOT.Legend.GetProtagonist.GetFirstNameNoTooltip] inspirèrent sans nul doute les fidèles parmi les [ROOT.Legend.GetProperty( 'culture' ).Culture.GetCollectiveNounNoTooltip] ainsi que les gens de bien d'autres nations. Comme le dit l'une des cantigas : « De même que les hommes peuvent être rendus impotents par leurs péchés, de même peuvent-ils être rendus sains par la Vierge. »"

 
 # Game Concepts
 game_concept_cantiga:0 "Cantiga"
 game_concept_cantigas:0 "Cantigas"
 game_concept_cantiga_desc:0 "Les Chrétiens de [GetGeographicalRegion('world_europe_west_iberia').GetName] qui parlent $language_iberian_name$ [language|E] et sont d'[heritage|E] $heritage_iberian_name$, ou ont une [culture|E] avec la [tradition|E] $tradition_RICE_galician_portuguese_poetry_name$, et qui remplissent certaines conditions en matière de [trait|E] ou de [skill|E], peuvent prendre une [decision|E] pour $RICE_galicia_cantiga_decision$ après que l'[era|E] $culture_era_high_medieval$ ait été atteinte ou que l'[innovation|E] $innovation_chronicle_writing$ ait été découverte.\n\nPrendre la [decision|E] vous permet de composer une cantiga dans l'un des trois genres suivants :\n\n$EFFECT_LIST_BULLET$ #italic Cantigas de Amor#! : chansons d'amour courtois racontées d'un point de vue masculin\n$EFFECT_LIST_BULLET$ #italic Cantigas de Amigo#!: chansons d'amour romantique, voire érotique, racontées du point de vue féminin\n$EFFECT_LIST_BULLET$ #italic Cantigas de Escarnio e Maldizer#! : chansons de satire et d'ironie\n\nEn terminant la composition d'une cantiga, vous obtiendrez un peu de [prestige|E] et de [piety|E]. Si le cantiga était de bonne ou d'excellente [cantiga_quality|E], vous obtiendrez un [character_modifier|E] aléatoire dont les effets sont basés sur le sujet. Les cantigas d'excellente [cantiga_quality|E] peuvent également être transformés en [artifacts|E] via la [decision|E] de $RICE_galicia_promote_cantiga$, afin que vous puissiez conserver leurs effets de manière permanente, ainsi que d'autres bonus."
 game_concept_cantiga_quality:0 "Qualité"
 game_concept_cantiga_quality_desc:0 "Chaque [cantiga|E] que vous créez (via la [decision|E] de $RICE_galicia_cantiga_decision$) est considéré comme ayant un certain niveau de qualité. Il existe trois niveaux de qualité : #Y acceptable#!, #G bon#! et #D excellent#!.\n\nPlus la qualité de la [cantiga|E] est élevée, plus vous recevrez de récompenses après l'avoir composée. A un niveau bon ou excellent, vous obtiendrez un [character_modifier|E] aux effets aléatoires. Au niveau excellent, vous aurez accès à une autre [decision|E], $RICE_galicia_promote_cantiga$, pour créer un livre ([artifact|E]) à partir de la [cantiga|E].\n\nLa qualité est déterminée par plusieurs facteurs, notamment : vos [skills|E] ; vos [traits|E] ; si vous avez déjà composé des cantigas auparavant ; et si votre [culture|E] possède la [tradition|E] $tradition_RICE_galician_portuguese_poetry_name$."
 game_concept_santiago_modifier:0 "Modificateur Santiago"
 game_concept_santiago_modifiers:0 "Modificateurs Santiago"
 game_concept_santiago_modifiers_desc:0 "Les [character_modifiers|E] positifs sont liés à Saint Jacques (ou Santiago) et donnent divers bonus militaires et personnels qui peuvent être obtenus par une [decision|E] de $RICE_galicia_pray_to_santiago$, qui coûte de la [piety|E]. La [decision|E] est accessible à tous les [rulers|E] chrétiens ayant une [realm_capital|E] en [GetGeographicalRegion('world_europe_west_iberia').GetName] qui répondent à un [piety_level|E] minimum, une fois qu'un [ruler|E] chrétien de Santiago (dans le nord-ouest de l'[GetGeographicalRegion('world_europe_west_iberia').GetName]) a pris la [decision|E] de $RICE_galicia_alter_saint_james_tomb$.\n\nLorsque vous prenez cette [decision|E], il y a une chance que vous gagniez un [character_modifier|E] bénéfique représentant différents aspects de Saint Jacques. Les effets de ces $game_concept_santiago_modifiers$ dépendent de la [struggle_phase|E] actuelle de la [iberian_struggle|E] ou de la [decision|E] qui a été prise pour y mettre fin.\n\nSi vous êtes d'une [culture|E] d'[heritage|E] $heritage_iberian_name$, ou [struggle_involved|E] dans la [iberian_struggle|E], cette [decision|E] sera moins coûteuse et il y a plus de chances d'obtenir un bon résultat. Les [virtues|E] et le [trait|E] [GetTrait('zealous').GetName( GetPlayer )], ainsi que les [sins|E] et le [trait|E] [GetTrait('cynical').GetName( GetPlayer )] ont également un léger impact positif ou négatif sur vos chances d'obtenir un meilleur [modifier|E] ou aucun. Le [piety_level|E] peut également influer sur le coût et les chances d'obtenir un bon résultat.\n\nSi vous ne pouvez plus bénéficier de ces [character_modifiers|E] en vous convertissant à une autre [faith|E], vous perdrez immédiatement les modificateurs."

 
