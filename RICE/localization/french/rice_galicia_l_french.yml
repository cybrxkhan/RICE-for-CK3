 galicia.0030.t:0 "Composer une cantiga"
 galicia.0030.desc.intro:0 "Je me sens d’humeur créatrice, aussi ai-je réservé du temps pour composer une #italic cantiga#! – un envoûtant mélange de musique et de poésie lyrique en langue galicienne-portugaise, variété romane de la péninsule Ibérique. Après tout, c’est là le passe-temps d’aristocrates cultivés tels que moi."
 galicia.0030.desc.courtly_love:0 "\n\nJe souhaite composer une cantiga du genre #italic cantiga de amor#!, et ainsi me concentrer sur les merveilles, les joies et les peines de l’amour courtois. Est-il chose plus noble que cette forme d’amour pur et de désir, qui pousse les hommes héroïques et vertueux à accomplir de grands exploits ?"
 galicia.0030.desc.romantic_love:0 "\n\nJe souhaite composer une cantiga du genre #italic cantiga de amigo#!, qui aborde les thèmes de l’amour romantique du point de vue d’une femme. Par cette perspective singulière, le poète peut explorer diverses facettes de l’amour et de la lyrique."
 galicia.0030.desc.satire:0 "\n\nJe souhaite composer une cantiga du genre #italic Cantiga de Escarnio e Maldizer#!. Ces chants satiriques me donneront l’occasion de critiquer autrui ou certains aspects de la société que je réprouve, qu’il s’agisse de certaines classes sociales, de l’hypocrisie des hommes ou de mauvais poètes."
 galicia.0030.desc.conclusion:0 "\n\nCependant, avant de me mettre à l’ouvrage sur cette #italic cantiga#!, je dois songer à des thèmes ou des sujets appropriés autour desquels elle pourra s’articuler. Il y a tant de choses dont je pourrais parler !"
 galicia.0030.a:0 "Qu'est-ce qui va m'inspirer ?"
 galicia.0030.tooltip.courtly_love:0 "Vous passerez quelques jours à réfléchir aux thèmes que votre [cantiga|E] pourrait aborder."
 galicia.0030.tooltip.romantic_love:0 "Vous passerez quelques jours à réfléchir aux thèmes que votre [cantiga|E] pourrait aborder."
 galicia.0030.tooltip.satire:0 "Vous passerez quelques jours à réfléchir aux thèmes que votre [cantiga|E] pourrait aborder."
 galicia.0031.t:0 "Inspiration pour la cantiga"
 galicia.0031.desc.intro.courtly_love:0 "Les #italic Cantigas de Amor#! sont des chants qui tournent, pour l’essentiel, autour de la romance courtoise. Ils sont racontés du point de vue d’un homme qui admire, idolâtre et aime une femme qu’il ne peut généralement pas obtenir – et bien souvent, l’histoire se termine de manière tragique ou douce-amère !"
 galicia.0031.desc.intro.romantic_love.female:0 "Les #italic Cantigas de Amigo#! sont des chants qui se concentrent sur les sommets et les abîmes de l’amour romantique, voire érotique, et sont souvent narrés du point de vue d’une femme – même si nombre de leurs auteurs sont des hommes. En tant que femme, je puis peut-être offrir un récit plus authentique que les fantasmes de ces messieurs."
 galicia.0031.desc.intro.romantic_love.male:0 "Les #italic Cantigas de Amigo#! sont des chants qui se concentrent sur les sommets et les abîmes de l’amour romantique, voire érotique, et sont souvent narrés du point de vue d’une femme – bien que nombre de leurs auteurs soient des hommes. Même si je suis l’un de ces hommes, cela ne m’empêchera pas de tenter de composer la meilleure cantiga possible !"
 galicia.0031.desc.intro.satire:0 "Les #italic Cantigas de Escarnio e Maldizer#! sont des chants de nature satirique – ils peuvent se moquer de tout et de tous, qu’il s’agisse de personnes précises (dont certains mauvais poètes) ou de la société dans son ensemble. Il me faudra faire appel à tout mon esprit."
 galicia.0031.desc.conclusion:0 "\n\nQuoi qu’il en soit, j’ai mûrement réfléchi à cela ces derniers jours. Il existe quantité de thèmes et de sujets que je pourrais tisser dans ma cantiga, et certains m’inspirent à présent… mais lesquels m’aideront à en tirer la meilleure cantiga possible ?"
