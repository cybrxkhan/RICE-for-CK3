 # Cantiga Artifacts
 RICE_galicia_artifact_cantiga_placeholder_name:0 "Cantiga"
 RICE_galicia_artifact_cantiga_placeholder_desc:0 "Une cantiga, ou chant, écrit en langue galégo-portugaise. (Vous ne devriez pas voir ceci. Il s'agit d'un texte de remplacement.)"
 RICE_galicia_cantigas_de_santa_maria_version_0_name:0 "Cantigas de Santa Maria (Premier codex)"
 RICE_galicia_cantigas_de_santa_maria_version_0_desc:0 "Une collection de poèmes lyriques en variante galégo-portugaise du roman ibérique. La musique est de forme #italic cantiga#!, et chaque chant est lié d'une manière ou d'une autre à la Vierge Marie. La compilation fut menée à son terme sous la direction de [alfonso_x.GetFullName], qui rassembla poètes et savants de tout son royaume pour prendre part à ce grand projet."
 RICE_galicia_cantigas_de_santa_maria_version_1_name:0 "Cantigas de Santa Maria (Second codex)"
 RICE_galicia_cantigas_de_santa_maria_version_1_desc:0 "Une collection de poèmes lyriques en variante galégo-portugaise du roman ibérique. La musique est de forme #italic cantiga#!, et chaque chant est lié d'une manière ou d'une autre à la Vierge Marie. La compilation fut menée à son terme sous la direction de [alfonso_x.GetFullName], qui rassembla poètes et savants de tout son royaume pour prendre part à ce grand projet.\n\nAprès la compilation initiale, [alfonso_x.GetFirstName] patronna la compilation de ce second codex, où un nouvel ensemble de chants fut composé, rassemblé et ajouté aux #italic Cantigas de Santa Maria#!."
 RICE_galicia_cantigas_de_santa_maria_version_2_name:0 "Cantigas de Santa Maria (Troisième codex)"
 RICE_galicia_cantigas_de_santa_maria_version_2_desc:0 "Une collection de poèmes lyriques en variante galégo-portugaise du roman ibérique. La musique est de forme #italic cantiga#!, et chaque chant est lié d'une manière ou d'une autre à la Vierge Marie. La compilation fut menée à son terme sous la direction de [alfonso_x.GetFullName], qui rassembla poètes et savants de tout son royaume pour prendre part à ce grand projet.\n\nAprès les compilations initiales, [alfonso_x.GetFirstName] patronna la compilation de ce troisième codex, où un nouvel ensemble de chants fut composé, rassemblé et ajouté aux #italic Cantigas de Santa Maria#!."
 RICE_galicia_cantigas_de_santa_maria_version_3_name:0 "Cantigas de Santa Maria (Quatrième codex)"
 RICE_galicia_cantigas_de_santa_maria_version_3_desc:0 "Une collection de poèmes lyriques en variante galégo-portugaise du roman ibérique. La musique est de forme #italic cantiga#!, et chaque chant est lié d'une manière ou d'une autre à la Vierge Marie. La compilation fut menée à son terme sous la direction de [alfonso_x.GetFullName], qui rassembla poètes et savants de tout son royaume pour prendre part à ce grand projet.\n\nAprès les compilations initiales, [alfonso_x.GetFirstName] patronna la compilation de ce quatrième codex, où un nouvel ensemble de chants fut composé, rassemblé et ajouté aux #italic Cantigas de Santa Maria#!."
 RICE_galicia_artifact_cantiga_courtly_love_desc:0 "Un splendide manuscrit d'une [cantiga|E] composée par [cantiga_composer.GetFullName] du genre #italic Cantiga de Amor#!. Ce genre se concentre sur les merveilles, joies et peines de l'amour courtois.\n\n[RICE_cantiga.GetDesc]"
 RICE_galicia_artifact_cantiga_romantic_love_desc:0 "Un splendide manuscrit d'une [cantiga|E] composée par [cantiga_composer.GetFullName] du genre #italic Cantiga de Amigo#!. Ce genre touche à des thèmes d'amour romantique contés du point de vue d'une femme.\n\n[RICE_cantiga.GetDesc]"
 RICE_galicia_artifact_cantiga_satire_desc:0 "Un splendide manuscrit d'une [cantiga|E] composée par [cantiga_composer.GetFullName] du genre #italic Cantiga de Escarnio e Maldizer#!. Ce genre de chants satiriques offre au poète l'occasion de critiquer d'autres personnes ou certains aspects de la société qu'il réprouve, qu'il s'agisse de certaines classes sociales, de l'hypocrisie des gens ou de mauvais poètes.\n\n[RICE_cantiga.GetDesc]"
 RICE_galicia_artifact_cantiga_music_name:0 "Cantiga sur la musique de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_music_desc:0 "Cette [cantiga|E] est réputée pour inclure avec art des sujets liés à la musique et à son interprétation, tels que des musiciens tentant de séduire de nobles damoiselles, la comparaison des talents de divers musiciens renommés, ou le processus même de la composition."
 RICE_galicia_artifact_cantiga_female_dialogue_name:0 "Cantiga sur les dialogues féminins de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_female_dialogue_desc:0 "Cette [cantiga|E] est réputée pour intégrer avec art des éléments narratifs tels que des femmes conversant entre elles, comme des amies se soutenant mutuellement ou se taquinant à propos de leurs amours."
 RICE_galicia_artifact_cantiga_beauty_lady_name:0 "Cantiga sur la beauté féminine de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_beauty_lady_desc:0 "Cette [cantiga|E] est réputée pour explorer avec art la beauté de la protagoniste – par exemple, le chant peut recourir à des métaphores pour décrire son beau visage, la réaction des autres face à sa beauté, ou ce que cette beauté inspire à l'homme qui l'aime."
 RICE_galicia_artifact_cantiga_joy_name:0 "Cantiga sur la joie de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_joy_desc:0 "Cette [cantiga|E] est réputée pour explorer avec art le sentiment de bonheur et de liesse sous toutes ses formes, de la jubilation des retrouvailles avec un amant revenu d'un long voyage aux doux rêves éveillés d'une jeune damoiselle ou d'un jouvenceau qui vient de tomber amoureux."
 RICE_galicia_artifact_cantiga_sad_name:0 "Cantiga sur la tristesse de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_sad_desc:0 "Cette [cantiga|E] est réputée pour explorer avec art le sentiment de tristesse, de la sombre dépression d'un amant rejeté à la douleur poignante mais noble de la mort d'un ennemi valeureux."
 RICE_galicia_artifact_cantiga_war_name:0 "Cantiga sur la guerre de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_war_desc:0 "Cette [cantiga|E] est réputée pour inclure avec art des sujets tels que des batailles livrées entre preux chevaliers, l'angoisse d'un soldat séparé de la femme qu'il aime, ou la vie quotidienne des armées en campagne."
 RICE_galicia_artifact_cantiga_anger_name:0 "Cantiga sur la colère de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_anger_desc:0 "Cette [cantiga|E] est réputée pour explorer avec art le sentiment de colère sous ses diverses formes, notamment en matière d'amour – des querelles d'un couple de longue date à la frustration née du rejet ou à la rage que peut engendrer la jalousie."
 RICE_galicia_artifact_cantiga_feudalism_name:0 "Cantiga sur les relations féodales de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_feudalism_desc:0 "Cette [cantiga|E] est réputée pour inclure avec art des sujets liés à la relation entre un homme et son suzerain féodal, tels que ce qui fait un bon seigneur, ou la façon dont un homme amoureux est comme un vassal envers sa bien-aimée, faisant tout ce qui est en son pouvoir pour lui plaire."
 RICE_galicia_artifact_cantiga_dying_for_love_name:0 "Cantiga sur mourir par amour de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_dying_for_love_desc:0 "Cette [cantiga|E] est réputée pour intégrer avec art des éléments narratifs où quelqu'un meurt par amour, tel un homme qui ne peut supporter la douleur d'un amour non partagé et en meurt de chagrin, ou une femme qui attendit trop longtemps le retour de son bien-aimé parti en mer."
 RICE_galicia_artifact_cantiga_holy_land_name:0 "Cantiga sur la Terre sainte de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_holy_land_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle aborde des sujets liés à la Terre sainte – par exemple, l’intrigue peut tourner autour d’un chevalier faisant ses adieux à sa bien-aimée avant de partir en croisade, ou utiliser des lieux sacrés comme Jérusalem comme symboles dans le récit."
 RICE_galicia_artifact_cantiga_sea_name:0 "Cantiga sur la mer de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_sea_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle aborde des thèmes tels qu’une femme attendant le retour de son amant parti en mer, la vie des pêcheurs et des marins, ou la mer elle-même prise comme métaphore de l’amour."
 RICE_galicia_artifact_cantiga_pastoral_name:0 "Cantiga sur les paysages pastoraux de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_pastoral_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle aborde des sujets tels que l’usage de la beauté de la nature comme métaphore – peut-être pour certains sentiments, ou pour des personnes – ainsi que des thèmes voisins comme les bêtes sauvages, les paysages paisibles, les jolies bergères ou les vaillants bergers, et bien d’autres encore."
 RICE_galicia_artifact_cantiga_trade_name:0 "Cantiga sur le commerce et les marchands de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_trade_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle tisse des éléments narratifs liés au commerce, par exemple une scène se déroulant dans un marché animé, ou le narrateur ou son bien-aimé discutant des dernières modes de luxe ou des marchandises qui affluent."
 RICE_galicia_artifact_cantiga_springs_name:0 "Cantiga sur les sources naturelles de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_springs_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle explore la beauté des grands espaces, en particulier celle des sources naturelles – quelles plantes ou bêtes abondent en ces lieux paisibles, par exemple, ou les activités auxquelles les gens peuvent s’y livrer, comme se dévêtir et se délasser de plus d’une façon."
 RICE_galicia_artifact_cantiga_urban_name:0 "Cantiga sur les cités animées de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_urban_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle tisse des éléments narratifs liés aux cités grouillantes de vie, comme lorsque l’homme tombe amoureux de sa bien-aimée en ne faisant que l’apercevoir dans la rue, ou par ses descriptions détaillées du quotidien des citadins."
 RICE_galicia_artifact_cantiga_erotic_name:0 "Cantiga sur l’érotisme de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_erotic_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle explore des thèmes érotiques dans toute leur splendeur, depuis des descriptions sensuelles mais décentes de la beauté du corps d’autrui jusqu’à de fines allusions à l’acte charnel."
 RICE_galicia_artifact_cantiga_cheating_name:0 "Cantiga sur l’infidélité de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_cheating_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle tisse des éléments narratifs liés à l’infidélité sous toutes ses formes, qu’il s’agisse de surprendre son bien-aimé aux bras d’un autre, ou de trahir une promesse faite à un amant ou à son suzerain."
 RICE_galicia_artifact_cantiga_rendezvous_name:0 "Cantiga sur les rendez-vous secret de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_rendezvous_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle intègre des éléments narratifs où deux amants cherchent un moment et un lieu pour se rencontrer en secret et jouir de la présence l’un de l’autre… et peut-être même consommer leur amour !"
 RICE_galicia_artifact_cantiga_jealousy_name:0 "Cantiga sur la jalousie et l’insécurité de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_jealousy_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle explore les sentiments de jalousie que l’on éprouve en voyant son bien-aimé entouré de rivaux, ou l’insécurité qui naît du sentiment d’être indigne ou insuffisant aux yeux de l’être aimé."
 RICE_galicia_artifact_cantiga_court_politics_name:0 "Cantiga sur les intrigues de cour de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_court_politics_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle intègre des éléments narratifs liés à la politique de cour – peut-être l’intrigue se déroule-t-elle dans une cour royale pleine de complots, ou bien des questions d’étiquette y sont-elles subtilement mêlées à l’intrigue."
 RICE_galicia_artifact_cantiga_pilgrimage_name:0 "Cantiga sur les pèlerinages de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_pilgrimage_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle aborde des thèmes liés au pèlerinage, comme les épreuves de ceux qui voyagent au loin pour trouver la rédemption, ou la façon dont ces pèlerinages peuvent servir de prétexte à rencontrer et courtiser de nouveaux amants en terres étrangères."
 RICE_galicia_artifact_cantiga_piety_name:0 "Cantiga sur la piété de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_piety_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle traite de sujets religieux, tels que la nature sacrée de l’amour courtois, une scène se déroulant dans un lieu de culte, ou des allusions à diverses idées et figures religieuses comme Santiago."
 RICE_galicia_artifact_cantiga_loneliness_name:0 "Cantiga sur la solitude de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_loneliness_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle explore des sentiments tels que la solitude que l’on ressent lorsqu’on est séparé d’un amant ou d’un prétendant, ou celle qui nous étreint lorsque l’on se retrouve seul à méditer sur les mystères de la vie."
 RICE_galicia_artifact_cantiga_travel_name:0 "Cantiga sur le voyage de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_travel_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle aborde les thèmes du voyage ; ainsi, le narrateur peut, par exemple, partir en campagne ou se rendre chez sa bien-aimée, évoquer les rudes épreuves de la route ou encore régaler l’auditoire de descriptions de contrées exotiques."
 RICE_galicia_artifact_cantiga_values_name:0 "Cantiga sur les valeurs morales de [cantiga_composer.GetFirstNamePossessiveNoTooltip]"
 RICE_galicia_artifact_cantiga_values_desc:0 "Cette [cantiga|E] est renommée pour l’art avec lequel elle explore les valeurs morales, les vertus et les péchés – peut-être le narrateur ou un autre personnage incarne-t-il une certaine vertu ou un certain vice, par exemple."

 # Decisions
 RICE_galicia_cantiga_decision:0 "Composer une cantiga"
 RICE_galicia_cantiga_decision_tooltip:0 "Je souhaite composer une bonne cantiga !"
 RICE_galicia_cantiga_decision_desc:0 "Nous autres Ibériens avons nos propres formes de poésie lyrique chantée en langue galégo-portugaise, en particulier la [cantiga|E], qui est aujourd'hui fort prisée. Puisque je possède quelque talent pour les mots, je devrais en composer une moi-même !"
 RICE_galicia_cantiga_decision_effect_tooltip_1:0 "Vous recevrez de la [piety|E], du [prestige|E], et possiblement un [character_modifier|E] (aux bonus aléatoires), selon la [cantiga_quality|E] de votre [cantiga|E], influencée par vos [skills|E], vos [traits|E], et votre expérience dans la composition de [cantigas|E]"
 RICE_galicia_cantiga_decision_effect_tooltip_2:0 "Si votre [cantiga|E] est d'excellente [cantiga_quality|E], vous pourrez aussi la promouvoir dans votre cour et gagner un [artifact|E]"
 RICE_galicia_cantiga_decision_effect_tooltip_3:0 "Puisque la [culture|E] [THIS.Char.GetCulture.GetName] possède la [tradition|E] $tradition_RICE_galician_portuguese_poetry_name$, il y a davantage de chances que votre [cantiga|E] soit de plus haute [cantiga_quality|E]"
 RICE_galicia_cantiga_pick_a_genre_type:0 "Choisir un genre de cantiga"
 RICE_galicia_cantiga_pick_a_genre_type_gui:0 "Choisir le genre de [cantiga|E] à composer"
 RICE_galicia_cantiga_decision_confirm:0 "Il est temps de commencer !"
 RICE_galicia_cantiga_decision_context_tooltip:0 "#emphasis Contexte historique :#! Au haut Moyen Âge, une forme de poésie lyrique appelée #italic Lyrique galégo-portugaise#! (ainsi nommée car les poèmes étaient principalement en langue galégo-portugaise) était populaire parmi l'aristocratie de l'Ibérie chrétienne. Bien qu'elle fût au départ influencée par la fameuse tradition des troubadours d'Occitanie, cette lyrique possédait ses propres traits distinctifs. Les cantigas en étaient un genre majeur et représentatif."
 RICE_cantiga_courtly_love_option:0 "#Bold Cantiga de Amor#!\n#weak Un chant sur l'amour courtois#!"
 RICE_cantiga_courtly_love_option_desc:0 "Le plus noble des amours"
 RICE_cantiga_courtly_love_option_tooltip:0 "Un chant axé sur les thèmes de l'amour courtois, conté d'un point de vue masculin. Les [cantigas|E] de plus haute [cantiga_quality|E] dans ce genre vous octroieront plus de [piety|E] que les autres genres."
 RICE_cantiga_romantic_love_option:0 "#Bold Cantiga de Amigo#!\n#weak Un chant sur l'amour passionné#!"
 RICE_cantiga_romantic_love_option_desc:0 "Chanter l'amour passionné, débridé"
 RICE_cantiga_romantic_love_option_tooltip:0 "Un chant axé sur les thèmes de l'amour romantique, voire érotique, conté d'un point de vue féminin. Les [cantigas|E] de plus haute [cantiga_quality|E] dans ce genre vous octroieront plus de [prestige|E] que les autres genres."
 RICE_cantiga_satire_option:0 "#Bold Cantiga de Escarnio e Maldizer#!\n#weak Un chant de satire et de médisance#!"
 RICE_cantiga_satire_option_desc:0 "Un récit mordant et sarcastique"
 RICE_cantiga_satire_option_tooltip:0 "Un chant axé sur les thèmes de la satire, que ce soit pour se moquer d'autrui, instruire ou moraliser. Les [cantigas|E] de plus haute [cantiga_quality|E] dans ce genre vous octroieront des quantités relativement égales de [piety|E] et de [prestige|E] par rapport aux autres genres."
 RICE_galicia_saint_james_routes_decision:0 "Soutenir le chemin de Saint-Jacques"
 RICE_galicia_saint_james_routes_decision_tooltip:0 "Le chemin de Saint-Jacques traverse mes terres… ne pourrais-je point faire quelque chose pour l'améliorer ?"
 RICE_galicia_saint_james_routes_decision_desc:0 "Le chemin de Saint-Jacques qui mène au lieu saint [ROOT.Char.GetFaith.GetReligion.GetAdjective] de Santiago traverse mes terres. Ces réseaux peuvent toujours bénéficier de meilleures infrastructures. Par exemple, je puis financer la réparation des routes pour que les pèlerins voyagent plus aisément, ou bâtir des hospices qui leur offriront un abri."
 RICE_galicia_saint_james_routes_decision_nonchristian_desc:0 "Le chemin de Saint-Jacques est une route de pèlerinage empruntée par les fidèles du Christ, dont certains vivent dans mes domaines. Bien que je ne partage point leurs croyances, je souhaite apporter des améliorations infrastructurelles à ces réseaux. Par exemple, je peux financer la réparation des routes pour que les pèlerins voyagent plus aisément, ou bâtir des hospices qui leur offriront un abri."
 RICE_galicia_saint_james_routes_decision_effect_tooltip_1:0 "La [piety|E] que vous gagnez et le coût de cette [decision|E] dépendent du nombre de [counties|E] que vous possédez en [GetGeographicalRegion('world_europe_west_iberia').GetName] et [GetGeographicalRegion('custom_occitan').GetName] et de leur [control|E]"
 RICE_galicia_saint_james_routes_decision_effect_tooltip_2:0 "Le [prestige|E] que vous gagnez et le coût de cette [decision|E] dépendent du nombre de [counties|E] que vous possédez en [GetGeographicalRegion('world_europe_west_iberia').GetName] et [GetGeographicalRegion('custom_occitan').GetName] et de leur [control|E]"
 RICE_galicia_saint_james_routes_decision_confirm:0 "Voyons ce que nous pouvons faire pour les pèlerins."
 RICE_galicia_saint_james_routes_decision_context_tooltip:0 "#emphasis Contexte historique :#! Saint-Jacques-de-Compostelle n'était devancée que par Jérusalem et Rome en importance comme lieu de pèlerinage dans l'Occident médiéval. Le voyage étant fort dangereux, avec maladie, brigandage et même mort comme risques constants pour les pèlerins, les divers chemins menant à Santiago, appelés chemin de Saint-Jacques, étaient soutenus par un réseau de routes, d'hospices et plus encore, afin de fournir aux pèlerins la protection et le réconfort dont ils avaient grand besoin lors de leur traversée de l'Ibérie."
 RICE_galicia_saint_james_routes_decision_tt:0 "[counties|E] que vous possédez en [GetGeographicalRegion('world_europe_west_iberia').GetName] et [GetGeographicalRegion('custom_occitan').GetName]"
 RICE_galicia_saint_james_routes_decision_non_christian_tt:0 "[counties|E] chrétiens que vous possédez en [GetGeographicalRegion('world_europe_west_iberia').GetName] et [GetGeographicalRegion('custom_occitan').GetName]"
 RICE_galicia_saint_james_routes_decision_counties.close:0 "Qui sont proches de ou contiennent Saint-Jacques-de-Compostelle"
 RICE_galicia_saint_james_routes_decision_counties.close.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_infrastructure_close').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_saint_james_routes_decision_counties.midrange.high:0 "Qui sont à distance modérée de Santiago avec un [control|E] élevé"
 RICE_galicia_saint_james_routes_decision_counties.midrange.high.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_infrastructure_midrange_high').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_saint_james_routes_decision_counties.midrange.low:0 "Qui sont à distance modérée de Santiago avec un [control|E] faible"
 RICE_galicia_saint_james_routes_decision_counties.midrange.low.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_infrastructure_midrange_low').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_saint_james_routes_decision_counties.distant.high:0 "Qui sont à grande distance de Santiago avec un [control|E] élevé"
 RICE_galicia_saint_james_routes_decision_counties.distant.high.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_infrastructure_distant_high').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_saint_james_routes_decision_counties.distant.low:0 "Qui sont à grande distance de Santiago avec un [control|E] faible"
 RICE_galicia_saint_james_routes_decision_counties.distant.low.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_infrastructure_distant_low').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_saint_james_levy_extra_tolls:0 "Lever des péages supplémentaires sur les pèlerins de Santiago"
 RICE_galicia_saint_james_levy_extra_tolls_tooltip:0 "Tant de pèlerins… tant d'argent à gagner !"
 RICE_galicia_saint_james_levy_extra_tolls_desc:0 "Le chemin de Saint-Jacques traverse mes terres. Cela signifie qu’une foule de pèlerins les arpentent en route vers Santiago. Les autorités [ROOT.Char.GetFaith.GetReligion.GetAdjective] pourraient se plaindre si j’impose des péages supplémentaires à ces pèlerins, mais je leur demande simplement de… « donner » des fonds pour m’aider à les protéger."
 RICE_galicia_saint_james_levy_extra_tolls_nonchristian_desc:0 "De nombreux pèlerins chrétiens traversent mes terres sur la route de Santiago, par le soi-disant chemin de Saint-Jacques. Les pèlerins devraient se réjouir que moi, non-chrétien, je les laisse pour l’essentiel en paix, et je suis sûr qu’ils comprendraient que je leur demande de… « donner » des fonds pour m’aider à les protéger."
 RICE_galicia_saint_james_levy_extra_tolls_effect_tooltip_1_christian:0 "Vous recevrez une quantité aléatoire de [gold|E], allant de #V [gold_i|E] 0#! jusqu’à un #bold maximum#! de #V [gold_i|E] [GetPlayer.MakeScope.ScriptValue('RICE_saint_james_toll_money_reward_max_value')]#!"
 RICE_galicia_saint_james_levy_extra_tolls_effect_tooltip_1_nonchristian:0 "Vous recevrez une quantité aléatoire de [gold|E], allant de #V [gold_i|E] 0#! jusqu’à un #bold maximum#! de #V [gold_i|E] [GetPlayer.MakeScope.ScriptValue('RICE_saint_james_toll_money_reward_nonchristian_max_value')]#!"
 RICE_galicia_saint_james_levy_extra_tolls_effect_tooltip_2:0 "En tant que [ruler|E] [christian.GetAdjective], ce montant maximal de [gold|E], ainsi que le coût en [piety|E] de cette [decision|E], dépendent du nombre de [counties|E] que vous possédez en [GetGeographicalRegion('world_europe_west_iberia').GetName] et en [GetGeographicalRegion('custom_occitan').GetName], de leur niveau de [control|E] et de leur distance à [santiago.GetNameNoTier]."
 RICE_galicia_saint_james_levy_extra_tolls_effect_tooltip_3:0 "En tant que [ruler|E] non [christian.GetAdjective], ce montant maximal de [gold|E], ainsi que le coût en [prestige|E] de cette [decision|E], dépendent du nombre de [counties|E] [christian.GetAdjective] que vous possédez en [GetGeographicalRegion('world_europe_west_iberia').GetName] et en [GetGeographicalRegion('custom_occitan').GetName], de leur niveau de [control|E] et de leur distance à [santiago.GetNameNoTier]."
 RICE_galicia_saint_james_levy_extra_tolls_effect_tooltip_4:0 "Parce que la [iberian_struggle|E] se trouve actuellement dans la [struggle_phase_iberia_conciliation|E], ou a été close par la #bold [decision|E] $struggle_iberia_ending_conciliation_decision$#!, cette [decision|E] vous coûte davantage de [prestige|E] en tant que [ruler|E] qui n’est pas [christian.GetAdjective]"
 RICE_galicia_saint_james_levy_extra_tolls_confirm:0 "Je suis sûr que les pèlerins comprendront."
 RICE_galicia_saint_james_levy_extra_tolls_context_tooltip:0 "#emphasis Contexte historique :#! Au Moyen Âge, les habitants – simples gens comme élites – considéraient l’afflux de pèlerins sur le chemin de Saint-Jacques comme une source potentielle de revenus. Le #italic Codex Calixtinus#! (une sorte de guide du XIIe siècle pour les pèlerins du chemin de Saint-Jacques), par exemple, critique des souverains comme le roi d’Aragon pour avoir levé de tels péages."
 RICE_galicia_saint_james_levy_extra_tolls_tt:0 "[counties|E] que vous possédez en [GetGeographicalRegion('world_europe_west_iberia').GetName] et [GetGeographicalRegion('custom_occitan').GetName]"
 RICE_galicia_saint_james_levy_extra_tolls_non_christian_tt:0 "[counties|E] chrétiens que vous possédez en [GetGeographicalRegion('world_europe_west_iberia').GetName] et [GetGeographicalRegion('custom_occitan').GetName]"
 RICE_galicia_saint_james_levy_extra_tolls_counties.close:0 "Qui sont proches de ou contiennent Saint-Jacques-de-Compostelle"
 RICE_galicia_saint_james_levy_extra_tolls_counties.close.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_tolls_close').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_saint_james_levy_extra_tolls_counties.midrange.high:0 "Qui sont à distance modérée de Santiago avec un [control|E] élevé"
 RICE_galicia_saint_james_levy_extra_tolls_counties.midrange.high.tooltip:0 "Gagne [GetModifier('RICE_galicia_saint_james_tolls_midrange_high').GetNameWithTooltip] pour une durée de #V 10#! ans."
 RICE_galicia_saint_james_levy_extra_tolls_counties.midrange.low:0 "Qui sont à distance modérée de Santiago avec un [control|E] faible"
 RICE_galicia_saint_james_levy_extra_tolls_counties.midrange.low.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_tolls_midrange_low').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_saint_james_levy_extra_tolls_counties.distant.high:0 "Qui sont à grande distance de Santiago avec un [control|E] élevé"
 RICE_galicia_saint_james_levy_extra_tolls_counties.distant.high.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_tolls_distant_high').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_saint_james_levy_extra_tolls_counties.distant.low:0 "Qui sont à grande distance de Santiago avec un [control|E] faible"
 RICE_galicia_saint_james_levy_extra_tolls_counties.distant.low.tooltip:0 "Confère [GetModifier('RICE_galicia_saint_james_tolls_distant_low').GetNameWithTooltip] pendant #V 10#! ans"
 RICE_galicia_alter_saint_james_tomb:0 "Altérer le sanctuaire de Saint-Jacques/Santiago"
 RICE_galicia_alter_saint_james_tomb_tooltip:0 "Nous devons répondre au nombre croissant de pèlerins."
 RICE_galicia_alter_saint_james_tomb_desc:0 "L'actuel sanctuaire de Saint-Jacques/Santuago ne peut tout simplement pas accueillir les foules de pèlerins qui le visitent quotidiennement, en raison de sa petite taille et de sa conception rudimentaire. Les autorités ecclésiastiques, compatissant avec les pèlerins, recommandent de rénover, voire de détruire le tombeau de Saint Jacques et d'en reconstruire un nouveau si nécessaire. Ils affirment que nous pouvons ignorer les protestations des habitants et du petit clergé qui craignent superstitieusement toute modification de l'autel."
 RICE_galicia_alter_saint_james_tomb_effect_tooltip_1:0 "Débloque la [decision|E] de $RICE_galicia_pray_to_santiago$ pour tous les [rulers|E] [THIS.Char.GetFaith.GetReligion.GetAdjective] en [GetGeographicalRegion('world_europe_west_iberia').GetName] qui remplissent les autres conditions."
 RICE_galicia_alter_saint_james_tomb_effect_tooltip_2:0 "Les [decisions|E] de $RICE_galicia_saint_james_routes_decision$ et $RICE_galicia_saint_james_levy_extra_tolls$ donneront de meilleurs avantages et auront un temps de recharge plus court."
 RICE_galicia_alter_saint_james_tomb_effect_tooltip_3:0 "De nombreux citoyens locaux et quelques membres du clergé ne seront pas satisfaits des modifications proposées, mais ils finiront certainement par se rallier à la cause."
 RICE_galicia_alter_saint_james_tomb_confirm:0 "L'autel de Santiago sera encore meilleur !"
 RICE_galicia_alter_saint_james_tomb_context_tooltip:0 "#emphasis Contexte historique : #!L'importance de Santiago en tant que ville sainte s'est accrue au XIIe siècle grâce à son premier archevêque, Diego Gelmírez (vers 1069-1140). Il a notamment centralisé l'autorité ecclésiastique, encouragé le pèlerinage à Santiago et, ce qui est le plus controversé, modifié l'espace physique du tombeau de Saint Jacques en détruisant l'ancien sanctuaire - qui aurait été construit par les disciples de Saint Jacques - et en le remplaçant par une conception plus grandiose qui répondait aux besoins et aux désirs des pèlerins étrangers, au détriment des préférences et des traditions locales."
 RICE_galicia_unearth_saint_james_tomb:0 "Améliorer le tombeau de saint Jacques"
 RICE_galicia_unearth_saint_james_tomb_tooltip:0 "Des rumeurs disent que Saint Jacques fut enterré ici… mais est-ce la vérité ?"
 RICE_galicia_unearth_saint_james_tomb_desc:0 "Selon le folklore local d'[GetGeographicalRegion('world_europe_west_iberia').GetName], Saint Jacques l'Apôtre s'y rendit il y a bien des siècles pour y répandre l'Évangile. On murmure qu'après son martyre, il fut enseveli dans la partie nord-ouest de la péninsule… en un territoire que je gouverne. Si tel est le cas, il serait fautif de ma part de ne point rechercher son tombeau."
 RICE_galicia_unearth_saint_james_tomb_effect_tooltip_1:0 "Déverrouille la [decision|E] $RICE_galicia_pray_to_santiago$ pour tous les [rulers|E] [THIS.Char.GetFaith.GetReligion.GetAdjective] en [GetGeographicalRegion('RICE_galicia_region').GetName] qui remplissent les autres conditions"
 RICE_galicia_unearth_saint_james_tomb_effect_tooltip_2:0 "Déverrouille les [decisions|E] $RICE_galicia_saint_james_routes_decision$ et $RICE_galicia_saint_james_levy_extra_tolls$ pour tous les [rulers|E] en [GetGeographicalRegion('world_europe_west_iberia').GetName] et [GetGeographicalRegion('custom_occitan').GetName]"
 RICE_galicia_unearth_saint_james_tomb_confirm:0 "Nous devrions enquêter pour savoir si ces histoires sont vraies."
 RICE_galicia_unearth_saint_james_tomb_context_tooltip:0 "#emphasis Contexte historique :#! Le prétendu tombeau de Saint Jacques à Santiago fut découvert par un ermite ou moine nommé Pelayo dans les années 820 ou 830 de notre ère. Ayant vu d'étranges lumières miraculeuses sur une colline, il porta ces événements à l'attention de l'évêque local, Théodomir. L'enquête qui suivit révéla qu'il s'agissait, dit-on, du lieu d'ensevelissement de Saint Jacques. Le Roi Alphonse II des Asturies y fit ensuite construire une chapelle, et le fameux pèlerinage de Santiago était né."
 RICE_galicia_unearth_saint_james_tomb_date_req:0 "L'année doit être postérieure à 500"
 RICE_galicia_pray_to_santiago:0 "Prier pour l'intercession de Santiago"
 RICE_galicia_pray_to_santiago_tooltip:0 "Puisse Saint Jacques le Majeur nous guider en ces temps troublés."
 RICE_galicia_pray_to_santiago_desc:0 "Puisse Saint Jacques le Majeur, apôtre de Jésus-Christ et défenseur de l'[GetGeographicalRegion('world_europe_west_iberia').GetName], nous guider en ces temps troublés. Je devrais implorer son intercession afin que mes terres, ma famille, et la communauté [ROOT.Char.GetFaith.GetReligion.GetAdjective] d'[GetGeographicalRegion('world_europe_west_iberia').GetName] puissent résister à toute menace et prospérer."
 RICE_galicia_pray_to_santiago_effect_tooltip_1:0 "Vous #italic pourriez#! gagner un [santiago_modifier|E], dont les effets dépendent de la [struggle_phase|E] actuelle de la [iberian_struggle|E] ou de la [decision|E] qui a été prise pour y mettre fin"
 RICE_galicia_pray_to_santiago_confirm:0 "Que Dieu et Saint Jacques nous viennent en aide !"
 RICE_galicia_pray_to_santiago_context_tooltip:0 "#emphasis Contexte historique :#! En tant que figure sainte majeure de la chrétienté ibérique médiévale, Saint Jacques (ou Santiago) symbolisait différentes choses selon le contexte politique et culturel du temps. Par exemple, son image ancienne de Jacques le Pèlerin fut peu à peu supplantée par celle de Jacques le Guerrier ou Tueur de Maures à la fin du Moyen Âge. Dans le Nouveau Monde, il fut d'abord le « Tueur d'Indiens » durant la conquête des Amériques, avant de devenir plus tard le « Tueur d'Espagnols » pour les révolutionnaires d'Amérique latine qui luttaient contre la domination espagnole au XIXe siècle."
 RICE_galicia_promote_cantiga:0 "Faire circuler votre cantiga"
 RICE_galicia_promote_cantiga_tooltip:0 "Pourquoi les autres ne devraient-ils pas entendre parler de votre [cantiga|E] ?"
 RICE_galicia_promote_cantiga_desc.courtly_love:0 "Beaucoup de ceux qui ont écouté la #italic Cantiga de Amor#! que j'ai récemment composée affirment qu'elle est manifestement d'une [cantiga_quality|E] exceptionnelle, excellente. Je devrais promouvoir ma [cantiga|E] partout, en incitant les scribes à en faire des copies et d'autres à la chanter."
 RICE_galicia_promote_cantiga_desc.romantic_love:0 "Beaucoup de ceux qui ont entendu la #italic Cantiga de Amigo#! que j'ai récemment composée affirment qu'elle est manifestement d'une [cantiga_quality|E] exceptionnelle, excellente. Je devrais promouvoir ma [cantiga|E] partout, en incitant les scribes à en faire des copies et d'autres à la chanter."
 RICE_galicia_promote_cantiga_desc.satire:0 "Beaucoup de ceux qui ont entendu la Cantiga de Escarnio e Maldizer que j'ai récemment composée affirment qu'elle est manifestement d'une [cantiga_quality|E] exceptionnelle, excellente. Je devrais promouvoir ma [cantiga|E] partout, en incitant les scribes à en faire des copies et d'autres à la chanter."
 RICE_galicia_promote_cantiga_effect_tooltip_1:0 "Vous recevrez un [artifact|E] [cantiga|E] permanent en lieu et place du [character_modifier|E] d'origine"
 RICE_galicia_promote_cantiga_effect_tooltip_2:0 "Cet [artifact|E] conférera les mêmes bonus que le [character_modifier|E], et d'autres encore selon le genre et le thème de la [cantiga|E]"
 RICE_galicia_promote_cantiga_effect_tooltip_3:0 "Vous gagnerez un peu de [piety|E] et de [prestige|E] selon le genre de la [cantiga|E]"
 RICE_galicia_promote_cantiga_effect_tooltip_4:0 "Vous gagnerez un peu de [piety|E] et de [prestige|E] selon le genre de la [cantiga|E] (et davantage que d'ordinaire, puisque la [culture|E] [THIS.Char.GetCulture.GetName] possède la [tradition|E] $tradition_RICE_galician_portuguese_poetry_name$)"
 RICE_galicia_promote_cantiga_confirm:0 "Allons-y !"
 RICE_galicia_promote_cantiga_context_tooltip:0 "#emphasis Contexte historique :#! $RICE_galicia_cantiga_decision_context_tooltip$"
 RICE_galicia_recently_composed_excellent_cantiga_req:0 "Vous avez récemment composé une [cantiga|E] d'une [cantiga_quality|E] #V excellente#!"
 RICE_galicia_not_recently_composed_excellent_cantiga_req:0 "Vous n'avez pas récemment composé de [cantiga|E]"
 RICE_galicia_compile_CSM_decision:0 "Compiler les Cantigas de Santa Maria"
 RICE_galicia_compile_CSM_decision_tooltip:0 "Louange à Sainte Marie, Mère de Dieu !"
 RICE_galicia_compile_CSM_decision_desc:0 "J'ai composé [ROOT.Char.MakeScope.Var('RICE_num_of_cantigas_written').GetValue] [cantigas|E] notables, mais j'aspire à plus que de simples chants sur des affaires terrestres et futiles. En tant que [ROOT.Char.GetTitleAsNameNoTooltip] [ROOT.Char.GetFaith.GetReligion.GetAdjective], je devrais rassembler les poètes de mon domaine afin de compiler une vaste collection de poèmes lyriques sur la bienheureuse Vierge Marie, que l'on nommera les #V Cantigas de Santa Maria#!."
 RICE_galicia_compile_CSM_decision_effect_tooltip_1:0 "Les #italic Cantigas de Santa Maria#! prendront environ 5 ans ou plus à être achevées"
 RICE_galicia_compile_CSM_decision_effect_tooltip_2:0 "Une fois l'ouvrage achevé, vous recevrez un [artifact|E] qui accroît votre [prestige|E], votre [piety|E], votre [grandeur|E], votre [learning_skill|E] et votre [lifestyle_experience|E]"
 RICE_galicia_compile_CSM_decision_confirm:0 "Allons-y !"
 RICE_galicia_compile_CSM_decision_context_tooltip:0 "#emphasis Contexte historique :#! Le mot cantiga est surtout associé aux #italic Cantigas de Santa Maria#!, une collection de chants sur la Vierge Marie et ses miracles du XIIIe siècle, traditionnellement attribuée au Roi Alphonse X de Castille. S'il en écrivit peut-être quelques-uns, il fut principalement responsable de la direction du projet. De nos jours, ces chants figurent souvent au répertoire des ensembles de musique ancienne."
 RICE_CSM_3_cantigas_written_req:0 "Vous avez déjà composé au moins #V 3#! [cantigas|E]"
 RICE_no_one_working_on_CSM_req:0 "Personne d'autre n'a pris la [decision|E] $RICE_galicia_compile_CSM_decision$"
 RICE_galicia_expand_CSM_decision:0 "Étendre les Cantigas de Santa Maria"
 RICE_galicia_expand_CSM_decision_tooltip:0 "$RICE_galicia_compile_CSM_decision_tooltip$"
 RICE_galicia_expand_CSM_decision_desc:0 "Je suis fier de ce que j’ai accompli concernant les #italic Cantigas de Santa Maria#!, mais il est toujours possible de faire mieux. Moi-même et certains poètes de mon domaine pensons que nous pouvons rassembler et composer un certain nombre de chants supplémentaires à ajouter à cette collection."
 RICE_galicia_expand_CSM_decision_effect_tooltip_1:0 "Élargir les #italic Cantigas de Santa Maria#! prendra environ 3 ans ou davantage"
 RICE_galicia_expand_CSM_decision_effect_tooltip_2:0 "Une fois la tâche accomplie, vous recevrez un [artifact|E] – plus puissant dans ses effets que la version précédente des #italic Cantigas de Santa Maria#!"
 RICE_galicia_expand_CSM_decision_effect_tooltip_3:0 "Vous ne pouvez élargir les #italic Cantigas de Santa Maria#! que #V 3#! fois au maximum"
 RICE_galicia_expand_CSM_decision_effect_tooltip_4:0 "Vous ne pouvez élargir les #italic Cantigas de Santa Maria#! que #V 3#! fois au maximum, et vous l’avez déjà fait au total #V [THIS.Char.MakeScope.Var('RICE_num_of_CSM_expansions').GetValue]#! fois"
 RICE_galicia_expand_CSM_decision_confirm:0 "Pour la Vierge Marie !"
 RICE_galicia_expand_CSM_decision_context_tooltip:0 "$RICE_galicia_compile_CSM_decision_context_tooltip$"
 RICE_CSM_compiler_req:0 "Vous étiez responsable de mener à bien la compilation de la version originelle des #italic Cantigas de Santa Maria#!"
 RICE_galicia_fortify_galician_coast:0 "Fortifier la côte galicienne"
 RICE_galicia_fortify_galician_coast_tooltip:0 "Cette région est vulnérable aux attaques venues de la mer – nous devons la protéger !"
 RICE_galicia_fortify_galician_coast_nonchristian_desc:0 "Je crains que mes terres en [GetGeographicalRegion('RICE_galicia_region').GetName] ne soient vulnérables aux attaques venues de la mer, en raison des nombreuses petites anses et estuaires qui jalonnent les côtes de la région. Je devrais bâtir diverses tours et avant-postes pour protéger la zone, et rebâtir ou rénover les fortifications existantes."
 RICE_galicia_fortify_galician_coast_christian_desc:0 "Je crains que mes terres en [GetGeographicalRegion('RICE_galicia_region').GetName] ne soient vulnérables aux attaques venues de la mer, en raison des nombreuses petites anses et estuaires qui jalonnent les côtes de la région. Je devrais bâtir diverses tours et avant-postes pour protéger la zone, et rebâtir ou rénover les fortifications existantes, surtout afin de défendre le haut lieu sacré de Santiago et ses nombreux pèlerins."
 RICE_galicia_fortify_galician_coast_effect_tooltip_1:0 "Le coût en [gold|E] et en [prestige|E] de cette [decision|E] dépend du nombre de [counties|E] côtiers que vous possédez en [GetGeographicalRegion('RICE_galicia_region').GetName]"
 RICE_galicia_fortify_galician_coast_confirm:0 "Mieux vaut prévenir que guérir !"
 RICE_galicia_fortify_galician_coast_context_tooltip:0 "#emphasis Contexte historique :#! La région côtière de Galice abrite nombre d’anciennes fortifications. Par exemple, les tours de Oeste à Catoira furent d’abord érigées par le Roi Alphonse III des Asturies pour défendre la zone contre les raids vikings, puis agrandies par de futurs souverains et évêques afin de protéger le haut lieu sacré de Santiago."


