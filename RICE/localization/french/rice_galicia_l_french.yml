 # Diplomacy Themes
 cantiga_theme.music:0 "Musique"
 cantiga_theme.tooltip.music:0 "La [cantiga|E] inclura des sujets liés à la musique et à son interprétation, comme des musiciens cherchant à séduire de belles demoiselles, la comparaison des talents de divers musiciens renommés, ou encore le processus de composition musicale."
 cantiga_theme.female_dialogue:0 "Dialogue féminin"
 cantiga_theme.tooltip.female_dialogue:0 "La [cantiga|E] intégrera des éléments narratifs où des femmes conversent entre elles, comme des amies se soutenant mutuellement ou se taquinant au sujet de l’amour."
 cantiga_theme.beauty_lady:0 "Beauté féminine"
 cantiga_theme.tooltip.beauty_lady:0 "La [cantiga|E] célébrera la beauté de la protagoniste féminine – le chant peut, par exemple, recourir à des métaphores pour décrire son visage radieux, la réaction de ceux qui la voient, ou ce que cette beauté inspire à l’homme qui l’aime."
 cantiga_theme.joy:0 "Joie"
 cantiga_theme.tooltip.joy:0 "La [cantiga|E] explorera la joie et l’allégresse sous toutes leurs formes, de l’exultation des retrouvailles avec un amant revenu d’un long voyage aux rêveries délicieuses d’une jeune âme innocente qui vient de tomber amoureuse."
 cantiga_theme.sad:0 "Tristesse"
 cantiga_theme.tooltip.sad:0 "La [cantiga|E] explorera la tristesse, depuis la sombre dépression qui suit le rejet par son bien-aimé jusqu’à la poignante amertume mêlée d’admiration que suscite la mort d’un ennemi noble."
 # Martial Themes
 cantiga_theme.war:0 "Guerre"
 cantiga_theme.tooltip.war:0 "La [cantiga|E] inclura des sujets tels que les batailles livrées par de vaillants chevaliers, l’angoisse d’un soldat séparé de la femme qu’il aime, ou le quotidien des armées en campagne."
 cantiga_theme.anger:0 "Colère"
 cantiga_theme.tooltip.anger:0 "La [cantiga|E] explorera la colère sous ses diverses formes, surtout lorsqu’elle touche à l’amour – des querelles d’un couple de longue date à la frustration du rejet, jusqu’à la rage qui accompagne parfois la jalousie."
 cantiga_theme.feudalism:0 "Relations féodales"
 cantiga_theme.tooltip.feudalism:0 "La [cantiga|E] inclura des sujets liés à la relation entre quelqu’un et son seigneur féodal, par exemple ce qui fait un bon dirigeant, ou comment un homme amoureux est semblable à un vassal envers sa bien-aimée, faisant tout pour lui plaire."
 cantiga_theme.dying_for_love:0 "Mourir d’amour"
 cantiga_theme.tooltip.dying_for_love:0 "La [cantiga|E] intégrera des éléments narratifs où quelqu’un meurt d’amour, tel un homme ne pouvant supporter la douleur d’un amour non partagé et succombant au chagrin, ou une femme ayant attendu trop longtemps le retour de son bien-aimé parti en mer."
 cantiga_theme.holy_land:0 "La Terre sainte"
 cantiga_theme.tooltip.holy_land:0 "La [cantiga|E] inclura des sujets liés à la Terre sainte – par exemple, l’intrigue peut tourner autour d’un chevalier faisant ses adieux à sa bien-aimée avant de partir en croisade, ou utiliser des lieux sacrés comme Jérusalem comme symboles dans le récit."
 # Stewardship Themes
 cantiga_theme.sea:0 "La mer"
 cantiga_theme.tooltip.sea:0 "La [cantiga|E] abordera des sujets tels qu'une femme attendant le retour de son amant en mer, la vie des pêcheurs et des marins, ou la mer elle-même comme métaphore de l'amour."
 cantiga_theme.pastoral:0 "Paysages pastoraux"
 cantiga_theme.tooltip.pastoral:0 "La [cantiga|E] inclura des sujets tels que l’usage de la beauté de la nature comme métaphore – peut-être pour certains sentiments, ou pour des personnes – ainsi que des thèmes voisins comme les bêtes sauvages, les paysages paisibles, les jolies bergères ou les beaux bergers, et bien plus encore."
 cantiga_theme.trade:0 "Commerce et marchands"
 cantiga_theme.tooltip.trade:0 "La [cantiga|E] intégrera des éléments narratifs liés au commerce, par exemple une scène se déroulant dans un marché animé, ou le narrateur ou son bien-aimé discutant des dernières modes de luxe ou des marchandises qui affluent."
 cantiga_theme.springs:0 "Sources naturelles"
 cantiga_theme.tooltip.springs:0 "La [cantiga|E] explorera la beauté des grands espaces, en particulier celle des sources naturelles – quelles plantes ou bêtes abondent en ces lieux paisibles, par exemple, ou les activités auxquelles les gens peuvent s’y livrer, comme se dévêtir et se délasser de plus d’une façon."
 cantiga_theme.urban:0 "Cités animées"
 cantiga_theme.tooltip.urban:0 "La [cantiga|E] intégrera des éléments narratifs liés aux cités grouillantes de vie, comme lorsque l’homme tombe amoureux de sa bien-aimée en ne faisant que l’apercevoir dans la rue, ou par d’intricate descriptions du quotidien des citadins."
 # Intrigue Themes
 cantiga_theme.erotic:0 "L’érotisme"
 cantiga_theme.tooltip.erotic:0 "La [cantiga|E] explorera des thèmes érotiques dans toute leur splendeur, depuis des descriptions sensuelles mais décentes de la beauté du corps de quelqu’un, jusqu’à de fines allusions à l’acte charnel."
 cantiga_theme.cheating:0 "Infidélité"
 cantiga_theme.tooltip.cheating:0 "La [cantiga|E] intégrera des éléments narratifs liés à l’infidélité sous toutes ses formes, qu’il s’agisse de surprendre son bien-aimé avec un autre, ou de trahir une promesse faite à un amant ou à son suzerain."
 cantiga_theme.rendezvous:0 "Rendez-vous secret"
 cantiga_theme.tooltip.rendezvous:0 "La [cantiga|E] intégrera des éléments narratifs où deux amants cherchent un moment et un lieu pour se rencontrer discrètement et jouir de la présence l’un de l’autre… et peut-être même consommer leur amour !"
 cantiga_theme.jealousy:0 "Jalousie et insécurité"
 cantiga_theme.tooltip.jealousy:0 "La [cantiga|E] explorera les sentiments de jalousie que l’on ressent lorsque son bien-aimé est entouré de rivaux, ou l’insécurité que l’on éprouve lorsqu’on se croit indigne ou insuffisant aux yeux de l’être aimé."
 cantiga_theme.court_politics:0 "Politique de cour"
 cantiga_theme.tooltip.court_politics:0 "La [cantiga|E] intégrera des éléments narratifs liés à la politique de cour – peut-être l’histoire se déroule-t-elle dans une cour royale pleine de complots, ou bien des questions d’étiquette y sont-elles subtilement entremêlées."
 # Learning Themes
 cantiga_theme.pilgrimage:0 "Pèlerinage"
 cantiga_theme.tooltip.pilgrimage:0 "La [cantiga|E] inclura des sujets liés au pèlerinage, comme les rudes épreuves de ceux qui voyagent au loin pour trouver la rédemption, ou la façon dont ces pèlerinages peuvent servir de prétexte à rencontrer et courtiser de nouveaux amants en terres étrangères."
 cantiga_theme.piety:0 "Piété"
 cantiga_theme.tooltip.piety:0 "La [cantiga|E] inclura des sujets liés à la religion, tels que la nature sacrée de l’amour courtois, une scène se déroulant dans un lieu de culte, ou des références à diverses idées et figures religieuses comme Santiago."
 cantiga_theme.loneliness:0 "Solitude"
 cantiga_theme.tooltip.loneliness:0 "La [cantiga|E] explorera des sentiments tels que la solitude que l’on ressent lorsqu’on est séparé d’un amant ou d’un prétendant, ou celle qui vous étreint lorsque vous êtes seul à méditer sur les mystères de l’existence."
 cantiga_theme.travel:0 "Voyage"
 cantiga_theme.tooltip.travel:0 "La [cantiga|E] inclura des sujets liés au voyage ; ainsi, le narrateur peut, par exemple, partir en campagne ou se rendre chez sa bien-aimée, évoquer les rudes épreuves de la route ou encore régaler l’auditoire de descriptions de contrées exotiques."
 cantiga_theme.values:0 "Valeurs morales"
 cantiga_theme.tooltip.values:0 "La [cantiga|E] explorera les valeurs morales, les vertus et les péchés – peut-être le narrateur ou un autre personnage incarne-t-il une certaine vertu ou un certain vice, par exemple."
 #cantiga_theme.a:0 "xxxxx"
 #cantiga_theme.tooltip.a:0 "xxxxx"
 galicia.0031.tooltip.after:0 "Vous commencez à travailler sur votre [cantiga|E] – quel en sera le résultat ?"
 galicia.0032.t:0 "La cantiga est achevée"
 galicia.0032.desc.intro.courtly_love:0 "Après de longues peines et un labeur assidu, j’ai enfin achevé la composition de ma cantiga ! Relevant du genre #italic Cantiga de Amor#!, elle se concentre sur les épreuves et tribulations de la romance courtoise, et sur son issue souvent tragique ou douce-amère."
 galicia.0032.desc.intro.romantic_love:0 "Après de longues peines et un labeur assidu, j’ai enfin achevé la composition de ma cantiga ! Relevant du genre #italic Cantiga de Amigo#!, elle se concentre sur les joies et les peines de l’amour romantique, principalement du point de vue d’une femme."
 galicia.0032.desc.intro.satire:0 "Après de longues peines et un labeur assidu, j’ai enfin achevé la composition de ma cantiga ! Relevant du genre #italic Cantiga de Escarnio e Maldizer#!, elle se concentre sur la satire et la moquerie d’autrui ou de la société en général."
 galicia.0032.desc.acceptable:0 "\n\nCeux qui ont entendu ma cantiga jusqu’à présent ont eu des réactions mitigées. Certains l’ont appréciée, tandis que d’autres sont restés plus tièdes. Dans l’ensemble, il semble que ma cantiga ne soit que #bold passable#! au mieux – une œuvre moyenne, rien de remarquable."
 galicia.0032.desc.good:0 "\n\nLes réactions de ceux qui ont entendu ma cantiga furent positives. Sans la considérer comme un chef-d’œuvre de génie, ils la jugent #bold bonne#!, estimant qu’elle emploie bien les conventions du genre et exprime mes idées et pensées avec adresse."
 galicia.0032.desc.excellent:0 "\n\nNul doute que ma cantiga sera applaudie par nombre de gens, à en juger par l’accueil reçu jusqu’à présent. Il semble que ma cantiga soit #bold excellente#!, une œuvre que poètes et gens de lettres, hommes comme femmes, respecteront à travers la région."
 galicia.0032.desc.conclusion:0 "\n\nQuoi qu’il en soit, j’ai passé assez de temps à travailler sur cette cantiga et je dois à présent me concentrer davantage sur mes devoirs officiels. Malgré tout, il fut agréable de pouvoir consacrer quelque temps à cette poursuite artistique."
 galicia.0032.a:0 "Peut-être trouverai-je bientôt le temps de composer une autre cantiga."
 galicia.0032.tooltip.excellent:0 "Parce que votre [cantiga|E] est d’#V excellente#! [cantiga_quality|E], vous pouvez la transformer en [artifact|E] permanent tant que vous conservez le [character_modifier|E] approprié."
 galicia.0033.t:0 "Une excellente cantiga mérite d’être entendue"
 galicia.0033.desc:0 "Il n’y a pas si longtemps, j’ai consacré un certain temps à la composition d’une cantiga. Depuis, son accueil fut des plus favorables ; beaucoup la considèrent comme un chant et un poème excellents.\n\nJ’ai décidé de produire plusieurs copies de cette cantiga. J’espère qu’elles se répandront au loin, afin que beaucoup puissent en jouir.\n\nJ’ai également fait commander une version de ma cantiga sur un manuscrit de grande qualité, décoré des plus belles enluminures et fioritures stylistiques. Ainsi, je disposerai d’un souvenir tangible de mon triomphe en tant que compositeur de cantigas."
 galicia.0033.a:0 "À présent, je me demande… ma cantiga traversera-t-elle les siècles ?"
