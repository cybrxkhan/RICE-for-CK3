 galicia.0020.t:0 "Modifier l’Autel"
 galicia.0020.desc:0 "Sous la direction de [chaplain.GetTitledFirstName], l’autel abritant les reliques de Saint Jacques, ainsi que le reste du tombeau, a été détruit puis repensé pour s’harmoniser avec la cathédrale de [santiago.GetNameNoTier] et mieux accueillir les nombreux pèlerins qui le visitent chaque jour.\n\nNombre d’habitants ont dénoncé nos actes. L’ancien tombeau, bien que grossier et étroit, avait été bâti par les disciples de Saint Jacques ; ils craignent donc que nos actions ne constituent un acte de profanation blasphématoire qui attirera sur nous le châtiment divin. Il est étrange qu’ils ne voient pas que nos modifications honorent en vérité Saint Jacques. Manifestement, ils sont égoïstes et se soucient plus d’eux-mêmes que du sort des pèlerins.\n\nFait curieux, les protestataires viennent de tous les milieux de [santiago.GetNameNoTier], des paysans et des marchands jusqu’aux petits nobles et aux prêtres ! La rumeur veut que certains d’entre eux, bien que provenant de groupes disparates qui parfois se méprisent, se soient unis en une #italic germanitas#! secrète, une confrérie destinée à poursuivre la contestation de mes actes."
 galicia.0020.a:0 "J’ai modifié l’autel. Priez pour que je ne le modifie pas davantage."
 galicia.0020.tooltip:0 "Les habitants finiront par comprendre la portée de notre œuvre. Ce n’est pas comme s’ils oseraient déclencher une violente révolte et profaner un haut lieu sacré comme la Cathédrale de Santiago, de toute façon."
 galicia.0021.t:0 "Modifier l’Autel"
 galicia.0021.desc:0 "[santiago.GetNameNoTier] est devenu le plus important lieu de pèlerinage [christian.GetAdjective] d’Europe après Rome et Jérusalem. Tous cherchent à voir le tombeau de Saint Jacques, ou Santiago, comme on le nomme en ces terres, le grand apôtre de Jésus-Christ.\n\nCependant, le tombeau primitif de Saint Jacques, grossier et exigu, n’avait pas été conçu pour accueillir un grand nombre de visiteurs. Ainsi, sur les conseils des autorités ecclésiastiques locales, tel [chaplain.GetFullName], son dirigeant, [diego_gelmirez.GetTitledFirstName], ordonna récemment la destruction du sanctuaire et de l’autel d’origine dédiés à Santiago et la construction d’un nouveau.\n\nSi un grand nombre de fidèles dans la Chrétienté se réjouissent de ce changement, il semble que nombre d’habitants de [santiago.GetNameNoTier], y compris des membres du clergé local, ne partagent pas cette jubilation. Ils craignent qu’une telle modification de l’ancien tombeau – que l’on dit bâti par les disciples de Saint Jacques – ne soit rien de moins qu’un sacrilège."
 galicia.0021.a:0 "Un grand jour pour toute la communauté [christian.GetAdjective] !"
 galicia.0021.b:0 "Je vois.... Les disciples du Christ sont un groupe intéressant."
 galicia.0022.t:0 "Un manque de foi en Santiago"
 galicia.0022.desc:0 "De troublantes rumeurs parviennent du haut lieu sacré de [santiago.GetNameNoTier] au sujet d’une #italic germanitas#! secrète, ou confrérie, composée de nombreux membres de la communauté [christian.GetAdjective] locale. Ses membres viennent de tous les milieux, incluant prêtres locaux, petits nobles, paysans, marchands et nombre d’officiers du conseil municipal.\n\nPour l’heure, ils acceptent mon autorité, mais se dressent contre les autorités [christian.GetAdjective] de la cité. Ils prétendent que les dignitaires ecclésiastiques sont des tyrans qui bafouent leurs droits légaux et leurs traditions religieuses afin de complaire aux caprices de pèlerins étrangers. Ces audacieux insensés leur résistent de diverses façons, comme en érigeant des palissades sur les terres de l’Église pour intimider les pèlerins.\n\nMême si cela remonte à des années, la modification du tombeau de Saint Jacques demeure une blessure vive pour eux. Ils y voient #italic encore#! un acte blasphématoire, malgré les assurances constantes qu’elle était nécessaire et approuvée par les plus hautes autorités religieuses de la Chrétienté. Nul doute que Santiago est à nos côtés, pas aux leurs !"
 galicia.0022.a:0 "Je trouve leur manque de foi inquiétant."
 galicia.0022.tooltip:0 "Les tensions montent à [santiago.GetNameNoTier], mais tant que les autorités [christian.GetAdjective] ecclésiastiques demeurent calmes, il ne devrait sûrement rien se passer..."
 galicia.0023.t:0 "Le soulèvement de Santiago"
 galicia.0023.desc:0 "Terribles nouvelles ! La « confrérie » de [santiago.GetNameNoTier] a poussé le peuple [christian.GetAdjective] de la ville à lever l’étendard de la révolte – non tant contre moi que contre les autorités ecclésiastiques.\n\nLes émeutiers ont envahi les rues, chassant les pèlerins qu’ils méprisent, et ont pris d’assaut la cathédrale de la cité, la saccageant à leur guise. Ces fous égarés affirment que la cathédrale a été profanée lorsque l’autel de Saint Jacques fut modifié, si bien que le lieu n’a plus droit, selon eux, à être considéré comme sacré.\n\nÀ présent, la foule contrôle la cathédrale et la ville, car la plupart des gardes ont pris son parti. Je ne puis agir à la hâte, puisque les dirigeants de la cité respectent encore mon autorité – mais non celle des autorités ecclésiastiques. Parlant de ces dernières, [diego_gelmirez_priest.GetTitledFirstName] se trouvait dans la cathédrale lorsque l’attaque eut lieu. Je crains ce que la foule pourrait lui faire !"
 galicia.0023.a:0 "Nous devons trouver un moyen de rétablir soigneusement l'ordre !"
 RICE_galicia_diego_gelmirez_attack_tt:0 "La foule fouille [santiago.GetNameNoTier] de fond en comble à la recherche de [diego_gelmirez_priest.GetFirstName]"
 RICE_galicia_diego_gelmirez_attack.minor_wounds:0 "[diego_gelmirez_priest.GetSheHe|U] parvient à s’échapper avec de légères blessures"
 RICE_galicia_diego_gelmirez_attack.major_wounds:0 "La foule s’en prend à [diego_gelmirez_priest.GetHerHim], mais [diego_gelmirez_priest.GetSheHe] survit"
 RICE_galicia_diego_gelmirez_attack.dies:0 "La foule lynche sauvagement [diego_gelmirez_priest.GetFirstNameNoTooltip] et le met à mort"
 galicia.0024.t:0 "Chaos à Santiago"
 galicia.0024.desc.intro:0 "Des pèlerins venant de [santiago.GetNameNoTier] colportent la nouvelle d’un soulèvement qui vient d’éclater dans la ville. Les habitants se sont unis, fait rare, pour organiser une révolte contre les autorités ecclésiastiques [christian.GetAdjective].\n\nParmi leurs griefs figurent le mépris de leurs privilèges politiques et de leurs coutumes religieuses (au profit des pèlerins) et, surtout, la « profanation » de l’autel de Saint Jacques lorsque la structure fut rénovée sous [diego_gelmirez_ruler.GetTitledFirstName]. [santiago_ruler.GetTitledFirstName] a pris des mesures diplomatiques et militaires pour convaincre les insurgés de déposer les armes, mais le mal est fait.\n\n[diego_gelmirez_priest.GetTitledFirstName], [santiago_ruler.GetFirstNamePossessiveNoTooltip] [diego_gelmirez_priest.GetCouncilTitle], se trouvait dans la cathédrale lorsque la foule l’attaqua ; elle lui en voulut particulièrement, symbole de l’autorité religieuse."
 galicia.0024.desc.minor_wounds:0 "Par miracle, ou peut-être grâce à l’intervention divine, [diego_gelmirez_priest.GetSheHe] parvint à s’enfuir lorsque la foule le pourchassa jusque dans un clocher en feu. Tandis que l’édifice s’écroulait, [diego_gelmirez_priest.GetSheHe] s’échappa déguisé en simple clerc."
 galicia.0024.desc.major_wounds:0 "La foule finit par le rattraper, et le roua de coups avec une grande brutalité avant d’essayer de le lapider. [diego_gelmirez_priest.GetSheHe] parvint d’une manière ou d’une autre à s’échapper dans le chaos, mais au prix de graves blessures."
 galicia.0024.desc.dies:0 "La foule le rattrapa au moment même où [diego_gelmirez_priest.GetSheHe] tentait de fuir sous le déguisement d’un simple clerc. Les rebelles déchaînèrent sur [diego_gelmirez_priest.GetHerHim] toute leur colère, et lapidèrent à mort le malheureux [diego_gelmirez_priest.GetWomanMan]."
 galicia.0024.desc.conclusion:0 ""
 galicia.0024.a:0 "Qui sait comment cela affectera le pèlerinage à Santiago ?"
 galicia.0024.b:0 "Les imbéciles se battent entre eux !"
 RICE_galicia_1117_rebellion_context_tooltip:0 "#emphasis Contexte historique :#! Le soulèvement de 1116-1117 à Saint-Jacques fut une tentative pour chasser le premier archevêque de la cité, Diego Gelmírez – l’aboutissement de longues années de ressentiment local envers les autorités ecclésiastiques.\n\nLorsque Gelmírez accéda d’abord à la charge d’évêque en 1100, il se concentra sur la centralisation du pouvoir ecclésiastique et sur la transformation de la ville en un grand centre de pèlerinage. Par exemple, il imposa des règles plus strictes au clergé local, et restreignit de nombreux droits des habitants (du moins à leurs yeux) au profit des pèlerins. En particulier, sa rénovation du tombeau de Saint Jacques fut perçue comme une profanation par beaucoup, puisqu’on disait qu’il avait été bâti par les disciples de l’apôtre. En fin de compte, les habitants eurent l’impression que la cité n’était plus leur demeure, mais qu’elle était désormais dominée par des flots de pèlerins étrangers et par le tyrannique et indigne Gelmírez.\n\nEn 1116, les patriciens de la ville et le clergé local formèrent une confrérie secrète contre Gelmírez. Lors du soulèvement qui s’ensuivit, nombre d’habitants les soutinrent dans leur tentative de reprendre les lieux de la ville “perdus” au profit des pèlerins.\n\nGelmírez lui-même fut pourchassé par une foule jusqu’au clocher de la cathédrale, que les émeutiers incendièrent. Il parvint à s’échapper, et, après l’échec de la rébellion, il demeura au pouvoir à Saint-Jacques. Il poursuivit son programme d’agrandissement de la cathédrale et d’encouragement au pèlerinage, mais ne résolut jamais vraiment la cause profonde des tensions avec les habitants. Une seconde rébellion, plus brève, éclata en 1136 ; elle ne déboucha, elle non plus, sur aucun changement durable."
