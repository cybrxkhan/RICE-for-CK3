 galicia.0050.t:0 "Barallete"
 galicia.0050.desc:0 "En visitant une ville de [GetGeographicalRegion('RICE_galicia_region').GetName], je traversai le quartier des artisans, et plus précisément celui des couteliers. Là, je les entendis parler ce qui sonnait à mes oreilles comme un pur charabia.\n\nJ’y ai repensé un certain temps, et j’ai décidé de demander autour de moi si quelqu’un savait de quel langage il pouvait s’agir. Finalement, je trouvai un érudit qui sembla le reconnaître immédiatement.\n\n« La langue que vous avez entendue se nomme #italic Barallete#!, expliqua le savant. C’est un langage secret que les couteliers de [GetGeographicalRegion('RICE_galicia_region').GetName] ont développé il y a des générations pour communiquer entre eux. Si vous souhaitez l’apprendre, je crains que ce ne soit impossible, car ils n’initient qu’aux gens de leur profession. »"
 galicia.0050.a:0 "Dites-moi ce que vous savez sur cette langue."
 galicia.0050.b:0 "Ah. Rien de plus que des fadaises de gens du commun, alors."
 galicia.0051.t:0 "Un système judiciaire bancal"
 galicia.0051.desc:0 "En [GetGeographicalRegion('RICE_galicia_region').GetName], on trouve en divers endroits de grandes pierres oscillantes, dites #italic pedras de abalar#!. Ces blocs massifs sont en équilibre sur un point, si bien qu’ils se balancent aisément, voire frémissent au simple souffle du vent.\n\nJ’ai entendu dire que les gens du commun de mes terres en [GetGeographicalRegion('RICE_galicia_region').GetName] aiment recourir à ces pierres pour déterminer la culpabilité ou l’innocence d’accusés, surtout dans des affaires locales de peu d’importance, qui ne méritent ni mon temps ni celui de mes officiers.\n\nJe ne sais si je dois laisser cette pratique perdurer. D’un côté, elle pourrait saper mon autorité ; de l’autre, il s’agit d’une tradition ancestrale, et nombre d’habitants jurent qu’elle donne des résultats justes et exacts."
 galicia.0051.a:0 "Si ce système fonctionne, pourquoi vouloir réparer ce qui n’est pas brisé ?"
 galicia.0051.b:0 "Découragez-les d’employer ces pierres pour la justice."
 galicia.0052.t:0 "Les Britanniques en Galice"
 galicia.0052.desc:0 "Autrefois, la région de [GetGeographicalRegion('RICE_galicia_region').GetName] aurait accueilli de grandes vagues d’habitants venus des îles Britanniques. Il y eut même, par exemple, un diocèse chrétien de Britonia pour veiller à leur salut spirituel.\n\nAujourd’hui, tandis que je voyage dans mon domaine en [GetGeographicalRegion('RICE_galicia_region').GetName], je suis passé dans une zone où nombre de ces Bretons vivaient, du moins selon le folklore local. Mon guide m’explique comment la légende du pays assure que telle ou telle pierre fut utilisée par ces anciens Bretons, ou comment les noms de certains villages, rivières et autres lieux voisins sont d’origine bretonne."
 galicia.0052.a:0 "Des récits intéressants, en somme."
 galicia.0053.t:0 "Greniers Hórreo"
 galicia.0053.desc:0 "En [GetGeographicalRegion('RICE_galicia_region').GetName], il est courant de voir de longs greniers rectangulaires appelés #italic hórreo#!. Bâtis en bois ou en pierre, ils reposent ordinairement sur des piliers, de façon à ne pas toucher le sol – ce qui empêche rongeurs et vermine d’y pénétrer.\n\nAujourd’hui, je visite plusieurs villages de [GetGeographicalRegion('RICE_galicia_region').GetName] pour discuter des problèmes locaux avec leurs chefs, et, dans le cadre de notre réunion, ils me montrent quelques-uns des #italic hórreos#! voisins, en m’expliquant comment ces structures fonctionnent et leurs succès récents (ou leurs échecs) pour garder nos réserves de nourriture en sûreté."
 galicia.0053.a:0 "C'est une bonne information à connaître."
 galicia.0054.t:0 "Chevaux galiciens"
 galicia.0054.desc:0 "La race de chevaux élevée en [GetGeographicalRegion('RICE_galicia_region').GetName], malgré sa petite taille, est renommée pour sa robustesse et sa capacité à endurer les rigueurs du relief parfois rude de la région. J’ai actuellement la possibilité d’acquérir quelques-uns de ces chevaux pour mes soldats et mes serviteurs, car il semble qu’un grand nombre d’entre eux soient à vendre dans les écuries de [county.GetNameNoTier]. Le coût en vaudra-t-il la peine ?"
 galicia.0054.a:0 "Oui, je pense que ces chevaux pourraient m'être d'une grande aide."
 galicia.0054.b:0 "Les habitants devraient vendre ces chevaux aux régions voisines."
 galicia.0054.c:0 "Je n’ai point besoin de ces chevaux ; que les habitants les gardent."
 galicia.0055.t:0 "Vengeance des mouros"
 galicia.0055.desc:0 "Un noble de moindre rang est récemment mort en [county.GetNameNoTier] de ce qui semble être des causes naturelles. Cependant, certaines âmes superstitieuses prétendent qu’il y a plus dans sa mort qu’il n’y paraît.\n\nL’an dernier, lui et plusieurs hommes explorèrent une grotte près de son manoir après avoir entendu des légendes locales au sujet d’un grand trésor qui y serait enfoui. Au fond de la grotte, ils auraient vu un groupe mystérieux danser autour d’un immense trésor, mais avant de pouvoir l’atteindre, leurs torches s’éteignirent et ils durent rebrousser chemin dans l’obscurité.\n\nCertains pensent que cet homme fut fou, car il osa clairement voler des richesses qui n’appartenaient qu’aux #italic mouros#!, les antiques esprits souterrains de [GetGeographicalRegion('RICE_galicia_region').GetName]. Pour cela, disent-ils, il paya le prix ultime."
 galicia.0055.a:0 "Il a simplement eu des hallucinations dans la grotte, et sa mort est une coïncidence."
 galicia.0055.b:0 "Je suis d’accord, le prix de pareille cupidité est un châtiment venu d’ailleurs."
 galicia.0056.t:0 "Une offrande à la moura"
 galicia.0056.desc:0 "En [county.GetNameNoTier], une grotte gagne récemment en renommée, car l’on dit qu’elle est habitée par une #italic moura#!, sorte d’esprit censé vivre sous terre en [GetGeographicalRegion('RICE_galicia_region').GetName].\n\nMes officiers rapportent que les villageois des hameaux voisins déposent régulièrement une poule en offrande à cette #italic moura#!. Ils espèrent ainsi qu’elle les aidera à obtenir de bonnes récoltes ou les protégera du mauvais œil et d’autres sombres sortilèges.\n\nQuoi qu’il en soit, les [ROOT.Char.Custom('DefaultPriestTitlePlural')] locaux voient d’un mauvais œil ces pratiques religieuses douteuses, mais ils ne peuvent pas y mettre fin sans mon consentement."
 galicia.0056.a:0 "J’irai rendre visite à la #italic moura#! et déposer une offrande."
 galicia.0056.b:0 "Quelles superstitions paysannes stupides ! Cela ne me concerne pas."
 galicia.0056.c:0 "Interdisez aux habitants de poursuivre cette pratique blasphématoire."
 galicia.0056.a.title:0 "On dit que la moura vous a béni !"
 galicia.0057.t:0 "Saint Jacques et la Reine Lupa"
 galicia.0057.desc:0 "Aujourd’hui, j’écoute un ménestrel local chanter une version de la légende de la conversion de la région de [GetGeographicalRegion('RICE_galicia_region').GetName] à [christian.GetName] par Saint Jacques l’Apôtre.\n\nOn dit que lorsque Saint Jacques arriva en [GetGeographicalRegion('RICE_galicia_region').GetName], la région était gouvernée par une cruelle reine païenne, Lupa. Elle tenta de le mettre en échec à de nombreuses reprises, mais échoua chaque fois. Elle comprit alors que Saint Jacques n’était point un homme ordinaire ; reconnaissant ses torts, elle le laissa la baptiser, et, à partir de ce jour, devint une fidèle servante du Christ. Lorsque l’Apôtre fut plus tard martyrisé par Hérode Agrippa et que son corps fut ramené en Ibérie, la reine aida ses disciples à lui trouver un lieu de sépulture convenable.\n\nFait intéressant, j’ai entendu d’autres versions de ce récit où elle ne se convertit qu’après la mort du Saint."
 galicia.0057.a:0 "Quels récits inspirants que ces triomphes de Saint Jacques !"
 galicia.0057.b:0 "La conversion de Lupa montre que nul n’est hors de portée du salut du Christ."
 galicia.0058.t:0 "Des pèlerins rançonnés sur le chemin de Saint-Jacques"
 galicia.0058.desc:0 "Un groupe de criminels fut récemment arrêté en [county.GetNameNoTier] pour avoir extorqué de l’argent aux pèlerins [christian.GetAdjective] en chemin vers le haut lieu sacré de [santiago.GetNameNoTier]. Nombre d’entre eux sont des chevaliers et des nobles de moindre rang, connus dans la région, mais en vérité, leur conduite ne vaut guère mieux que celle de vulgaires bandits en participant à ce racket de protection.\n\nSi je pourrais les punir comme de simples hors-la-loi, il existe une autre option. Il n’est pas rare que les autorités de diverses parties de la région permettent à des criminels condamnés de partir en pèlerinage à [santiago.GetNameNoTier] afin d’expier leurs fautes, surtout s’il s’agit de criminels issus de milieux respectables et donc moins susceptibles de tenter de fuir.\n\nAu lieu de châtier ces extorqueurs et pillards par les moyens ordinaires, nous pourrions – ultime ironie – les faire devenir pèlerins eux-mêmes."
 galicia.0058.a:0 "Donnons-leur une chance. Qu’ils aillent à [santiago.GetNameNoTier]."
 galicia.0058.b:0 "Ces brigands n’échapperont pas à la justice – qu’ils soient punis comme il se doit !"
 galicia.0059.t:0 "Criminels pèlerins sur le chemin de Saint-Jacques"
 galicia.0059.desc:0 "Il est courant que des criminels [christian.GetAdjective] entreprennent le pèlerinage vers [santiago.GetNameNoTier] pour échapper, dans la légalité, à des châtiments plus redoutés. L’idée est qu’en endurant les difficultés et les privations du pèlerinage, ils se repentiront de leurs fautes et reviendront en hommes et femmes changés.\n\nCependant, le chemin de Saint-Jacques traverse certaines des terres que je gouverne, et, dans ces régions, le flux de criminels condamnés qui passent est souvent très important. En [county.GetNameNoTier], les habitants ont adressé des plaintes à mes officiers à ce sujet, craignant que l’afflux massif de criminels ne menace la sécurité et la stabilité de la contrée."
 galicia.0059.a:0 "Si leurs intentions sont bonnes, ne les harcelons pas."
 galicia.0059.b:0 "Surveillez ces criminels tant qu'ils sont sur notre territoire."
 galicia.0060.t:0 "Un pèlerin"
 galicia.0060.desc:0 "Aujourd’hui, j’ai rencontré un noble [pilgrim.GetWomanMan] de bonne naissance, nommé [pilgrim.GetFullName]. [pilgrim.GetSheHe|U] est un pèlerin qui a récemment parcouru le chemin de Saint-Jacques jusqu’à [santiago.GetNameNoTier] et qui s’en retourne à présent.\n\nToutefois, pour diverses raisons, [pilgrim.GetFirstNameNoTooltip] dit hésiter à revenir à son ancien foyer, et songe à s’installer ici, ayant trouvé la région fort à son goût. Il n’est pas rare que des pèlerins s’installent en terres étrangères après avoir voyagé jusqu’à [santiago.GetNameNoTier], après tout.\n\nPeut-être pourrais-je faire preuve de grâce l'en invitant à rejoindre ma cour. Il serait bon d’avoir ici la perspective de quelqu’un venu de loin, surtout une personne qui a accompli un pèlerinage si renommé. Toutefois, je ne connais pas vraiment [pilgrim.GetFirstNameNoTooltip], du moins pas encore, et je ne sais si [pilgrim.GetSheHe] en vaut la peine."
 galicia.0060.a:0 "S'il vous plaît, restez dans ma cour. Nous pourrions utiliser vos talents."
 galicia.0060.b:0 "Si vous souhaitez vous installer quelque part dans mon royaume, allez-y."
 galicia.0061.t:0 "Coquilles Saint-Jacques"
 galicia.0061.desc:0 "Je visite en ce jour une [ROOT.Char.GetFaith.HouseOfWorship] locale en [county.GetNameNoTier] pour affaires officielles. Tandis que je me trouvais dehors à discuter des questions spirituelles touchant mon domaine avec le [ROOT.Char.Custom('DefaultPriestTitle')] en chef, j’aperçus des voyageurs qui se dirigeaient vers les [ROOT.Char.Custom('DefaultPriestTitlePlural')] qui montaient la garde à l’entrée de la [ROOT.Char.GetFaith.HouseOfWorship].\n\nCes voyageurs arboraient des coquilles Saint-Jacques, signe qu’ils participaient au pèlerinage vers [santiago.GetNameNoTier], en raison de l’association de Saint Jacques avec les coquilles en général. Je vis comment les pèlerins furent accueillis à l’intérieur, et j’entendis les [ROOT.Char.Custom('DefaultPriestTitlePlural')] leur promettre nourriture, boisson et un lieu de repos pour la nuit."
 galicia.0061.a:0 "Quelles nobles âmes pour un tel pèlerinage !"
 galicia.0061.b:0 "Ce ne sont que des pèlerins. Maintenant, de quoi parlions-nous déjà ?"
 galicia.0062.t:0 "Pèlerins colons"
 galicia.0062.desc:0 "Récemment, plusieurs villes de [county.GetNameNoTier] ont acquis la réputation d’attirer des pèlerins voyageant sur le chemin de Saint-Jacques vers [santiago.GetNameNoTier]. En effet, nombre d’entre eux décident de s’installer en [county.GetNameNoTier] après avoir accompli leur pèlerinage. Peut-être sont-ils charmés par les paysages et la culture du lieu, peut-être cherchent-ils à fuir un passé malheureux, ou peut-être encore pensent-ils que la région leur offrira de meilleures opportunités économiques.\n\nQuoi qu’il en soit, cela signifie que bien des gens talentueux ont élu domicile ici. Leur contribution à l’économie et à la société locales n’est pas passée inaperçue."
 galicia.0062.a:0 "Voilà qui est fort réjouissant."
