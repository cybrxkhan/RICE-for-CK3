 bamian.0050.t:0 "Rituels Similaires"
 bamian.0050.desc:0 "Bien que je suive le credo [ROOT.Char.GetFaith.GetAdjective], certains, dans mon royaume, pratiquent la religion [buddhist.GetAdjective].\n\nBeaucoup d’entre nous ont remarqué cette étrange coutume qu’ont ces infidèles de tourner autour de leurs édifices sacrés en accomplissant divers rites. J’ai demandé à quelques érudits [ROOT.Char.GetFaith.GetAdjectiveNoTooltip] et à des [ROOT.Char.Custom('DefaultPriestTitlePlural')] de m’expliquer pourquoi ces gens agissent ainsi, car cela me rappelait fortement le Hajj que tout bon musulman est tenu d’accomplir.\n\nCertains de ces hommes de savoir m’ont confirmé que mes soupçons n’étaient pas infondés, affirmant que ces pratiques s’inspiraient de la Kaaba et du Hajj, de vagues souvenirs déformés d’une époque où ils pratiquaient encore le véritable monothéisme. D’autres, toutefois, ne sont pas d’accord, soutenant qu’il s’agit clairement de pratiques différentes."
 bamian.0050.a:0 "Peut‑être ne sommes‑nous pas si différents d’eux, au fond."
 bamian.0050.b:0 "Ces infidèles stupides ont rejeté la vraie religion !"
 bamian.0051.t:0 "Clichés poétiques"
 bamian.0051.desc:0 "Je m’exerce à écrire de la poésie [ROOT.Char.GetCulture.GetName]. En tant que membre de l’élite, je dois connaître un minimum de poésie, au risque autrement de passer pour un rustre inculte.\n\nCe soir, j’ai d’abord eu du mal à trouver un thème approprié. Après réflexion, j’ai fini par en tenir un : le #italic bot#!, autrement dit, les idoles !\n\nChez les lettrés du monde [ROOT.Char.GetFaith.GetReligion.GetAdjective], décrire le visage d’un bel amant comme ressemblant à un #italic bot#!, ou utiliser la métaphore de l’adoration du #italic bot#! pour parler d’amour romantique, est extrêmement cliché. Mais vu le blocage d’écrivain qui m’afflige, je prends ce qui vient.\n\nJe commence donc à écrire : #italic Le visage de mon bien‑aimé est comme une idole, et moi, le moine qui adore [ROOT.Char.Custom('GetHerHimOpposite')]…#italic"
 bamian.0051.a:0 "C'est très cliché, mais au moins mes idées fusent !"
 bamian.0052.t:0 "Pèlerin d'Extrême-Orient"
 bamian.0052.desc:0 "Un [buddhist.GetAdjective] moine pèlerin venu de l’Extrême‑Orient, nommé [monk.GetFirstName], traverse actuellement mes terres, déclarant que [monk.GetSheHe] souhaite se rendre en [GetGeographicalRegion('world_india').GetName] afin d’y acquérir de nouvelles écritures et de mieux comprendre les enseignements [monk.GetFaith.GetAdjective].​\n\nIl est rare d’avoir un invité aussi instruit et distingué, et je l’ai fait venir à ma cour, l’autorisant à rester aussi longtemps que [monk.GetSheHe] le désire. [monk.GetFirstNameNoTooltip] m’a même assuré qu’à son retour dans sa patrie, [monk.GetSheHe] parlera de moi et de mon royaume hospitalier à tous ceux qu’[monk.GetSheHe] rencontrera.\n\n"
 bamian.0052.desc.buddhist:0 "En tant que fidèle des enseignements de [ROOT.Char.GetFaith.HighGodName], je suis ravi d’avoir à ma cour un [monk.GetWomanMan] aussi érudit, véritablement dévoué aux Trois Joyaux. Autant j’aimerais qu’[monk.GetHerHim] reste ici, autant je sais que [monk.GetHerHis] karma l'enverra en [GetGeographicalRegion('world_india').GetNameNoTooltip], afin qu’[monk.GetSheHe] puisse aider tous les êtres sensibles."
 bamian.0052.desc.non_buddhist:0 "Bien que j’adore [ROOT.Char.GetFaith.HighGodName], je dois reconnaître que l’on peut admirer le dévouement qu’un infidèle comme [monk.GetFirstNameNoTooltip] porte à sa foi. Au minimum, offrir l’hospitalité à ce [monk.GetWomanMan] garantit que les étrangers sauront que mon pays est une terre accueillante pour les marchands et les voyageurs, ce qui ne peut qu’être bénéfique pour notre économie comme pour notre diplomatie."
 bamian.0052.a:0 "Je vous souhaite un bon voyage."
 bamian.0052.toast:0 "[monk.GetFullName] est impressionné par votre hospitalité !"
 bamian.0053.t:0 "Les interprètes"
 bamian.0053.desc:0 "Un certain nombre de [ROOT.Char.GetCulture.GetName] [ROOT.Char.Custom('DefaultPriestTitlePlural')] doués et érudits se sont élevés en importance dans mon royaume, grâce à leur maîtrise de la philosophie et de la religion, ainsi qu’à leur capacité à apprendre diverses langues. Plusieurs souhaitent partir vers l’Extrême-Orient, où l’on dit que la foi [ROOT.Char.GetFaith.GetReligion.GetName] gagne en influence, mais qu’il n’y a que peu de [ROOT.Char.Custom('DefaultPriestTitlePlural')] bien versés dans les écritures [ROOT.Char.GetFaith.GetReligion.GetAdjective].\n\nQuoi qu’il en soit, ces éloquents [ROOT.Char.Custom('DefaultPriestTitlePlural')] projettent de répandre le Dharma en voyageant vers l’est pour servir de traducteurs et de mentors à des étudiants désireux d’apprendre, mais encore ignorants, et ils sollicitent mon aide. Si je devais financer leur voyage, leur fournir des documents de route, et peut-être même quelques escortes, disent‑ils, je gagnerais un immense mérite pour avoir aidé tous les êtres sensibles."
 bamian.0053.a:0 "Je vous aiderai dans vos nobles efforts."
 bamian.0053.b:0 "Je n'ai pas les moyens de vous aider."
 bamian.0054.t:0 "Trapusa et Bhallika"
 bamian.0054.desc:0 "Aujourd’hui, j’écoute les [ROOT.Char.GetFaith.GetAdjective] [ROOT.Char.Custom('DefaultPriestTitlePlural')] donner un sermon. Plus précisément, ils nous content l’histoire de #bold Trapusa#! et de #bold Bhallika#!, les deux premiers disciples du Bienheureux Bouddha.\n​\nSelon la légende, c’étaient deux frères marchands originaires de la cité de [GetTitleByKey('c_balkh').GetNameNoTier]. Ils offrirent au Bouddha son premier repas après l’illumination, alors qu’ils passaient par là, et construisirent plus tard le premier #italic stupa#! de leur ville natale pour y abriter les reliques capillaires qu’ils avaient reçues du Bouddha.\n\nVraiment, les habitants de cette région entretiennent un lien très ancien avec [ROOT.Char.GetFaith.GetReligion.GetName]. Nous devons regarder ces deux frères comme des modèles à imiter."
 bamian.0054.a:0 "Leurs actions sont très inspirantes."
