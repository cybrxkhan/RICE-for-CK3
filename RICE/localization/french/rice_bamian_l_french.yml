 RICE_bamian_pilgrimage_completed_log:0 "[CHARACTER.GetShortUIName|U] a accompli [CHARACTER.GetHerHis] [local_pilgrimage|E] vers les statues de Bouddha de $c_bamian$"
 RICE_bamian_negligence_log_title:0 "Distraction à l'approche des statues"
 RICE_bamian_negligence_log:0 "[CHARACTER.GetShortUIName|U] a été distrait pendant qu'il accomplissait des rituels religieux en tant que [CHARACTER.GetSheHe] s'est approché des statues"
 RICE_bamian_negligence_went_back_log_title:0 "Refaire les rituels religieux"
 RICE_bamian_negligence_went_back_log:0 "Après s’être laissé distraire, [CHARACTER.GetShortUIName|U] a décidé de retourner à l’endroit où [CHARACTER.GetSheHe] a vu les statues de Bouddha de $c_bamian$ pour refaire correctement les rituels religieux."
