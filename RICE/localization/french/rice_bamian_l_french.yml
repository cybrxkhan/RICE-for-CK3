 RICE_bamian_negligence_ignored_log:0 "Après s’être laissé distraire, [CHARACTER.GetShortUIName|U] a décidé de #italic ne pas#! retourner à l’endroit où [CHARACTER.GetSheHe] a vu les statues de Bouddha de $c_bamian$ pour refaire correctement les rituels religieux."
