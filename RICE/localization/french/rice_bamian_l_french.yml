 bamian.0020.t:0 "$RICEmisc.0011.t$"
 bamian.0020.desc:0 "Beaucoup ont entendu parler de la grande vallée de [GetTitleByKey('c_bamian').GetNameNoTier], et des magnifiques statues lumineuses de taille monumentale qui y sont sculptées à flanc de falaise. L'origine de ces statues idolâtres est incertaine, mais des rumeurs circulent selon lesquelles des païens viennent les adorer, ou qu'ils le faisaient autrefois.\n\nQuoi qu'il en soit, j'ai prévu de traverser plusieurs montagnes et vallées pour visiter ces célèbres idoles et admirer leur beauté."
 bamian.0020.desc.islam:0 "\n\nLes érudits et poètes [ROOT.Char.GetFaith.GetReligion.GetAdjective] ont classé ces statues parmi les #italic 'aja'ib#!, ou merveilles du monde. Qui irait se plaindre de profiter des merveilleuses créations de [ROOT.Char.GetFaith.HighGodName] ?"
 bamian.0020.a:0 "J'ai hâte de voir les statues !"
 bamian.0021.t:0 "Voir les statues"
 bamian.0021.desc:0 "Nous sommes arrivés devant les statues de [GetTitleByKey('c_bamian').GetNameNoTier]. Elles sont aussi magnifiques que les poètes les décrivent : deux immenses silhouettes de pierre dressées, taillées dans le flanc de la montagne. Mon entourage et moi‑même nous émerveillons devant la splendeur de ces deux statues, dont la plus grande est connue comme « l’idole rouge » et la plus petite comme « l’idole blanche ».\n\n"
 bamian.0021.desc.sightseeing:0 "Nous prenons le temps de faire du tourisme, de marcher autour des deux statues et d'explorer certaines des grottes voisines, qui sont décorées de peintures murales colorées - certaines charmantes et agréables, d'autres inquiétantes, voire effrayantes.\n\nEn outre, nous prenons également le temps de nous détendre dans la campagne environnante et d'admirer la vue sur la vallée et les montagnes environnantes."
 bamian.0021.desc.inspiration:0 "Je prends le temps de réfléchir et de méditer profondément sur ces deux statues. Comme il est incroyable que ces idoles puissent se dresser ici, tout simplement !\n\nQu’elles aient été érigées par des hommes ou par [ROOT.Char.GetFaith.HighGodName] [ROOT.Char.GetFaith.HighGodHerselfHimself], nul doute que bien peu de monuments peuvent rivaliser avec la grandeur et la beauté de ces statues, même dans leur état de ruine et de délabrement. Elles me donnent envie d’accomplir quelque chose de grand, d’être immortel, en quelque sorte, tout comme ces idoles."
 bamian.0021.desc.examination:0 "Alors que certains membres de mon entourage admirent machinalement les statues et les grottes voisines avec leurs fresques, je prends le temps d’étudier attentivement ces idoles et de réfléchir à leur conception artistique et esthétique.\n\nLes statues et les fresques possèdent un art d’une grande pureté, même dans leur état de ruine et de délabrement, et l’on y distingue des images de souverains, d’esprits, de démons et d’autres êtres, humains comme surnaturels. C’est tout à fait fascinant, et cela me fait réfléchir davantage à ma place dans le cosmos en tant que simple [ROOT.Char.GetTitleAsNameNoTooltip]."
 bamian.0021.desc.romantic:0 "Je prends le temps de discuter avec nos guides de ce qu'ils savent sur les statues. Selon la légende locale, il était une fois un prince et une princesse de différents pays qui tombèrent amoureux, mais ne purent se marier - certains disent qu'ils venaient respectivement d'Égypte et de Chine, d'autres prétendent qu'ils étaient les enfants de deux rois locaux rivaux.\n\nQuoi qu'il en soit, ils ont été transformés en statues de pierre, qui se regarderont à jamais avec nostalgie."
 bamian.0021.desc.understanding:0 "Il reste ici quelques personnes qui suivent encore la soi‑disant religion [buddhist.GetAdjective] et qui vénèrent ces idoles. Intrigué par leurs pratiques païennes, je décide de discuter avec eux de leurs rituels religieux, et de la raison pour laquelle ils adorent ces idoles, qu’ils affirment représenter leurs maîtres spirituels.\n\nJe ne suis pas convaincu par la véracité de ces histoires fantaisistes, mais cela m’aide tout de même à mieux comprendre ces païens et leurs idées."
 bamian.0021.a:0 "Un spectacle magnifique, en effet."
 bamian.0022.t:0 "Conclusion"
 bamian.0022.desc:0 "Après avoir passé quelque temps à [GetTitleByKey('c_bamian').GetNameNoTier] et visité les merveilleuses statues d’idoles qui s’y trouvent, il est temps pour moi de rentrer chez moi.\n\nInutile de dire que ces idoles ont été à la hauteur de leur réputation de merveilles du monde, et je suis heureux d’avoir eu l’occasion de les contempler de mes propres yeux."
 bamian.0022.a:0 "Je leur rendrai peut-être visite à nouveau à l'avenir."
