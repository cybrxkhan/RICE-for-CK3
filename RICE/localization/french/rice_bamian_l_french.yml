 # Buildings
 building_type_RICE_bamian_nowbahar:0 "Nowbahar"
 building_type_RICE_bamian_nowbahar_desc:0 "Dans les temps anciens, Nowbahar (du mot sanskrit #italic nava-vihara#!, ou "Nouveau Monastère") servait de centre majeur d'apprentissage et de culte bouddhiste, dont les administrateurs exerçaient une grande influence politique sur la région. Bien qu'ils ne soient plus aussi importants qu'auparavant, Nowbahar et les monticules et ruines avoisinants conservent une certaine importance cultuelle pour les habitants, quelle que soit leur religion, et les vestiges des bâtiments inutilisés sont utiles comme matériaux de construction."
