 bamian.0030.t:0 "$RICEmisc.0011.t$"
 bamian.0030.desc:0 "Nombreux sont ceux qui pratiquent la doctrine [buddhist.GetAdjective] et connaissent la grande vallée de [GetTitleByKey('c_bamian').GetNameNoTier]. Elle abrite deux statues magnifiques et lumineuses, de taille monumentale, taillées dans la paroi des falaises et représentant Gautama Bouddha, le Bouddha historique de notre époque, et Vairocana, le Bouddha primordial.\n\nDepuis des générations, des foules se rendent en pèlerinage auprès de ces statues, et j’ai bien l’intention d’en faire autant. J’ai terminé mes préparatifs pour ce pèlerinage et je partirai bientôt en direction des statues."
 bamian.0030.a:0 "Que les bouddhas nous protègent au cours de ce voyage !"
 bamian.0031.t:0 "$bamian.0021.t$"
 bamian.0031.desc:0 "Tous sont remplis de joie lorsque nous arrivons dans la vallée de [GetTitleByKey('c_bamian').GetNameNoTier], car les deux grandes statues de Bouddha de la vallée apparaissent à notre vue. Cela ne peut vouloir dire qu’une chose.\n\nAussitôt, nous commençons à accomplir des rituels religieux tout en avançant lentement vers les statues : chants, prosternations, brûler de l’encens, et bien d’autres encore.\n\nLa tradition veut qu’au moment précis où l’on aperçoit les statues, il faille commencer ces rituels, qui doivent ensuite être accomplis sans interruption jusqu’à ce que l’on atteigne les statues. Je ne peux qu’espérer que les Bouddhas m’aideront à rester concentré et à ne pas gâcher ces rituels, car si je les ratais, je serais censé retourner à l’endroit où j’ai vu les idoles pour la première fois et tout recommencer depuis le début."
 bamian.0031.a:0 "Je suis sûr que je n'aurai aucun problème à me concentrer."
 bamian.0031.b:0 "Je dois faire tout mon possible pour rester concentré — pas question de me relâcher !"
 bamian.0031.info:0 "#emphasis Contexte historique :#! Le #italic Kitāb al-Fihrist#!, un recueil de connaissances du Xe siècle rédigé par l'érudit persan Ibn al-Nadim, fait état de certaines coutumes entourant les statues de Bouddha de Bamian. Si les pèlerins négligeaient d'accomplir les rituels religieux nécessaires sur le chemin des statues, ils devaient retourner à l'endroit où ils avaient vu les statues pour la première fois et tout recommencer. Ibn al-Nadaim a peut-être eu connaissance de cette information, car Bamian et une partie de sa famille royale sont probablement restés bouddhistes jusqu'au 10e siècle."
 bamian.0031.success:0 "Vous effectuez les rituels sur les statues sans vous laisser distraire."
 bamian.0031.failure:0 "Vous êtes distrait en chemin lorsque vous vous approchez des statues"
 bamian.0032.t:0 "Fâcheuses distractions"
 bamian.0032.desc:0 "Malédiction ! Mon esprit était bien trop distrait tandis que je me rendais aux statues de Bouddha — peut‑être étais‑je trop envoûté par la beauté de [GetTitleByKey('c_bamian').GetNameNoTier], ou bien me faisais‑je du souci pour d’importantes affaires restées au pays, ou encore pensais‑je à des préoccupations trop terrestres.\n\nQuoi qu’il en soit, j’ai gâché certains des rituels [ROOT.Char.GetFaith.GetAdjective] que j’accomplissais en chemin vers les statues. Normalement, cela signifie que je dois retourner jusqu’à l’endroit exact où j’ai aperçu les statues de Bouddha pour la première fois à l’horizon, puis tout recommencer depuis le début…"
 bamian.0032.a:0 "Je serai plus concentré cette fois-ci !"
 bamian.0032.b:0 "Je suis le [ROOT.Char.GetTitleAsNameNoTooltip], Je peux m'en sortir avec ça...."
 bamian.0033.t:0 "Devant les statues"
 bamian.0033.desc:0 "Enfin, je suis arrivé devant les magnifiques statues de Bouddha de [GetTitleByKey('c_bamian').GetNameNoTier] ! Les deux statues dominent ma personne et tous ceux qui sont présents.\n\nLa plus grande statue représente Vairocana, le Bouddha primordial qui incarne la sagesse et l’illumination ultimes, et dont émanent tous les autres Bouddhas. La plus petite statue est celle de Siddhartha, le Bouddha historique.\n\nMême si j’ai accompli de nombreux rituels en chemin vers ces statues, il m’en reste encore d’autres à faire, comme offrir de l’encens, formuler des vœux et des aspirations spirituelles, et présenter des offrandes aux statues. Peut‑être pourrais‑je faire encore plus d’offrandes pour montrer que je suis un [ROOT.Char.GetFaith.GetAdherentName] dévoué."
 bamian.0033.a:0 "Ne faire que les offrandes obligatoires"
 bamian.0033.b:0 "Faire des offrandes à Siddhartha"
 bamian.0033.c:0 "Faire des offrandes à Vairocana"
 bamian.0033.d:0 "Faire des offrandes aux deux statues"
 RICE_bamian_no_offerings_tooltip:0 "Aucune offrande supplémentaire n'a été faite à l'une ou l'autre des statue"
 bamian.0034.t:0 "Conclusion"
 bamian.0034.desc:0 "Après avoir terminé tous les rituels religieux nécessaires dans le cadre de mon pèlerinage aux statues de Bouddha de [GetTitleByKey('c_bamian').GetNameNoTier], j’ai pris le temps d’explorer et de mieux apprécier le site où elles se trouvent.\n\nDe nombreuses grottes et parois entourent les deux statues, couvertes de fresques représentant une grande variété de sujets, des rois puissants aux divinités solaires. Même si la peinture est fanée et n’a plus l’éclat vibrant qu’elle devait avoir lorsque ce lieu fut créé par des fidèles de [buddhist.GetName], le spectacle reste à couper le souffle.\n\nHélas, on pourrait passer des jours entiers à examiner chaque grotte une par une, mais le temps qui m’est imparti ici est limité. Mon expérience spirituelle à présent achevée, il est temps pour moi de rentrer chez moi."
 bamian.0034.a:0 "Que les trois joyaux nous accordent leur bénédiction !"
