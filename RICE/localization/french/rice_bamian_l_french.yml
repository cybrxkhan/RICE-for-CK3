 # Activities
 activity_RICE_bamian_buddhas_non_buddhist_visit_host_an_a:0 "$host_activity_a$"
 activity_RICE_bamian_buddhas_non_buddhist_visit:0 "Voyage vers les Statues de $c_bamian$"
 #activity_RICE_bamian_buddhas_non_buddhist_visit_desc:0 "The mysterious idol statues of $c_bamian$ are truly a sight to behold, and a marvel of our world. I should take the time to sightsee them."
 activity_RICE_bamian_buddhas_non_buddhist_visit_desc:0 "Les érudits et poètes islamiques classent les statues de $c_bamian$ parmi les #italic ‘ajā’ib #!, c’est-à-dire les merveilles du monde. Je devrais visiter ces statues et la magnifique vallée où elles se trouvent afin de mieux apprécier les créations de [GetPlayer.GetFaith.CreatorNamePossessive]."
 activity_RICE_bamian_buddhas_non_buddhist_visit_selection_tooltip: "Rends visite aux célèbres statues d’idoles de $c_bamian$.\n\n$activity_RICE_bamian_buddhas_non_buddhist_visit_context_tooltip$"
 activity_RICE_bamian_buddhas_non_buddhist_visit_context_tooltip:0 "#emphasis Contexte Historique:#! Même après l'islamisation de l'Afghanistan, l'attitude des musulmans à l'égard des statues du Bouddha de Bamiyan a varié dans le temps et dans l'espace, contrairement à la destruction des statues par le gouvernement taliban en 2001. Par exemple, le folklore local croyait que les deux statues étaient des amants croisés qui avaient été transformés en pierre ; ces histoires ont été influentes parmi les Hazaras qui ont vécu à Bamiyan pendant des siècles, au point que certains érudits ont supposé que les Talibans avaient détruit les statues dans le cadre de leur oppression continue des Hazaras. Les érudits et poètes islamiques médiévaux ont classé et même loué les statues et leur beauté en tant que #italic 'aja'ib#!, ou des merveilles à contempler. Ainsi, Jahangir Mirza, le frère de Babur, le fondateur de l'empire moghol, fit un détour lors d'une expédition militaire pour visiter Bamian en 1506 de notre ère."
 activity_RICE_bamian_buddhas_non_buddhist_visit_host_desc: "\n$BULLET_WITH_TAB$Perds du [stress_loss_i|E][stress|E]\n$BULLET_WITH_TAB$Gagne du [prestige_i|E][prestige|E] et/ou de la [piety_i|E][piety|E] selon ton [intent|E]\n$BULLET_WITH_TAB$Gagne un [character_modifier|E] #P positif#! selon ton [intent|E]\n$BULLET_WITH_TAB$Gagne de l’[experience|E] dans ton [lifestyle|E]"
 activity_RICE_bamian_buddhas_non_buddhist_visit_guest_desc: "$activity_RICE_bamian_buddhas_non_buddhist_visit_host_desc$"
 activity_RICE_bamian_buddhas_non_buddhist_visit_province_desc: ""
 activity_RICE_bamian_buddhas_non_buddhist_visit_destination_selection: "$activity_RICE_bamian_buddhas_non_buddhist_visit_province_desc$"
 activity_RICE_bamian_buddhas_non_buddhist_visit_guest_help_text: "$activity_RICE_bamian_buddhas_non_buddhist_visit$"
 activity_RICE_bamian_buddhas_non_buddhist_visit_predicted_cost: "Le coût de cette visite est basé sur votre [income|E]."
 activity_RICE_bamian_buddhas_non_buddhist_visit_conclusion_desc: "Notre [GetActivityType( 'activity_RICE_bamian_buddhas_non_buddhist_visit' ).GetName] est terminée. Quelle visite inspirante !"
 RICE_bamian_buddhas_non_buddhist_visit_wonder_phase: "S’émerveiller"
 RICE_bamian_buddhas_non_buddhist_visit_wonder_phase_desc: "Contemplez ces magnifiques structures et admirez les merveilles de la création."
 RICE_bamian_buddhas_non_buddhist_visit_sightseeing_intent_header: "Visite touristique"
 RICE_bamian_buddhas_non_buddhist_visit_sightseeing_intent: "Visite touristique"
 RICE_bamian_buddhas_non_buddhist_visit_sightseeing_intent_desc: "Profite des vues grandioses sur les statues et le paysage alentour. Gagne @prestige_icon! #V [EmptyScope.ScriptValue('RICE_bamian_non_buddhist_visit_resource_value')]#! de [prestige|E] et le [GetModifier('RICE_bamian_visit_sightseeing_intent_modifier').GetNameWithTooltip] [modifier|E]. Perds davantage de [stress_loss_i|E][stress|E] si tu es [GetTrait('content').GetName( GetNullCharacter )|U] ou [GetTrait('patient').GetName( GetNullCharacter )]."
 RICE_bamian_buddhas_non_buddhist_visit_inspiration_intent_header: "Inspiration:"
 RICE_bamian_buddhas_non_buddhist_visit_inspiration_intent: "Inspiration"
 RICE_bamian_buddhas_non_buddhist_visit_inspiration_intent_desc: "Que ces mystérieuses statues, d’une beauté merveilleuse, soient ta muse et inspirent les tréfonds de ton âme ! Gagne @piety_icon! #V [EmptyScope.ScriptValue('RICE_bamian_non_buddhist_visit_resource_value')]#! de [piety|E] et le [GetModifier('RICE_bamian_visit_inspired_intent_modifier').GetNameWithTooltip] [modifier|E]. Perds davantage de [stress_loss_i|E][stress|E] si tu es [GetTrait('ambitious').GetName( GetNullCharacter )|U] ou [GetTrait('diligent').GetName( GetNullCharacter )]."
 RICE_bamian_buddhas_non_buddhist_visit_examination_intent_header: "Examen:"
 RICE_bamian_buddhas_non_buddhist_visit_examination_intent: "Examen"
 RICE_bamian_buddhas_non_buddhist_visit_examination_intent_desc: "Étudie l’art de ces statues et les légendes qui entourent ces merveilles du monde, afin de mieux les apprécier. Gagne @piety_icon! #V [EmptyScope.ScriptValue('RICE_bamian_non_buddhist_visit_resource_value')]#! de [piety|E] et le [GetModifier('RICE_bamian_visit_examination_intent_modifier').GetNameWithTooltip] [modifier|E]. Perds davantage de [stress_loss_i|E][stress|E] si tu es [GetTrait('shy').GetName( GetNullCharacter )|U] ou [GetTrait('zealous').GetName( GetNullCharacter )]."
 RICE_bamian_buddhas_non_buddhist_visit_romantic_intent_header: "Romantique :"
 RICE_bamian_buddhas_non_buddhist_visit_romantic_intent: "Romantique"
 RICE_bamian_buddhas_non_buddhist_visit_romantic_intent_desc: "Médite sur les légendes populaires à propos des deux statues, qui parlent souvent d’amants maudits. Gagne @prestige_icon! #V [EmptyScope.ScriptValue('RICE_bamian_non_buddhist_visit_resource_value')]#! de [prestige|E] et le [GetModifier('RICE_bamian_visit_romantic_intent_modifier').GetNameWithTooltip] [modifier|E]. Perds davantage de [stress_loss_i|E][stress|E] si tu es [GetTrait('lustful').GetName( GetNullCharacter )|U] ou [GetTrait('gregarious').GetName( GetNullCharacter )]. "
 RICE_bamian_buddhas_non_buddhist_visit_understanding_intent_header: "Compréhension"
 RICE_bamian_buddhas_non_buddhist_visit_understanding_intent: "Compréhension"
 RICE_bamian_buddhas_non_buddhist_visit_understanding_intent_desc: "Discute avec les pèlerins païens qui viennent adorer ces idoles afin de mieux les comprendre. Gagne @prestige_icon! #V [EmptyScope.ScriptValue('RICE_bamian_non_buddhist_visit_resource_value')]#! de [prestige|E] et le [GetModifier('RICE_bamian_visit_understanding_intent_modifier').GetNameWithTooltip] [modifier|E]. Perds davantage de [stress_loss_i|E][stress|E] si tu es [GetTrait('humble').GetName( GetNullCharacter )|U] ou [GetTrait('compassionate').GetName( GetNullCharacter )]."
