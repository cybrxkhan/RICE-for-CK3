 # Modifiers
 RICE_bamian_siman_tov_modifier: "Les notables juifs de Bamiyan"
 RICE_bamian_siman_tov_modifier_desc: "Le père de Siman-Tov était Yehuda ben Daniel, un membre de l'élite urbaine locale de la vallée de Bamiyan en Afghanistan. Contrairement à d'autres Juifs de la région, qui ne sont pas souvent impliqués dans la production agricole, son père avait un portefeuille économique diversifié, puisqu'il était propriétaire terrien, marchand impliqué dans le commerce, prêteur d'argent et peut-être collecteur d'impôts pour l'État. Siman-Tov a donc hérité du statut et des affaires de son père."
 RICE_bamian_shahr_e_zohak_recently_repaired_small:0 "Réparations mineures récentes à Shahr-e Zohak"
 RICE_bamian_shahr_e_zohak_recently_repaired_medium:0 "Réparations majeures récentes à Shahr-e Zohak"
 RICE_bamian_shahr_e_zohak_recently_repaired_large:0 "Réparations importantes récentes à Shahr-e Zohak"
 RICE_bamian_offerings_siddhartha_modifier:0 "Offrandes supplémentaires à la statue du Bouddha Siddhartha à Bamian"
 RICE_bamian_offerings_vairocana_modifier:0 "Offrandes supplémentaires à la statue du Bouddha Vairocana à Bamian"
 RICE_bamian_visit_sightseeing_intent_modifier:0 "Apprécié les curiosités des idoles bamiennes"
 RICE_bamian_visit_inspired_intent_modifier:0 "Inspiré par la visite des idoles bamiennes"
 RICE_bamian_visit_examination_intent_modifier:0 "Étudié et médité sur les idoles de Bamian"
 RICE_bamian_visit_romantic_intent_modifier:0 "Les légendes romanesques sur les idoles bamiennes ont été appréciées"
 RICE_bamian_visit_understanding_intent_modifier:0 "Discussion avec des bouddhistes qui vénèrent les idoles bamiennes"
 RICE_bamian_hiwi_al_balkhi_modifier:0 "Le célèbre libre-penseur"
 RICE_bamian_hiwi_al_balkhi_modifier_desc:0 "Peu de figures ont suscité autant de controverse que Hiwi al-Balkhi. Ce savant juif sceptique est surtout connu pour ses #italic Deux Cents Questions#!, qui critiquent la Bible et son origine divine. Beaucoup de juifs l’ont dénoncé comme hérétique, voire comme athée. Pourtant, il s’en trouve plus d’un pour le considérer comme un penseur radical qui ne cherche pas à abolir la religion, mais plutôt à mieux comprendre la véritable nature de Dieu sans être lié par les Écritures."
 RICE_bamian_muslim_understanding_buddhists:0 "Contempler les similitudes entre musulmans et bouddhistes"
 RICE_bamian_cliche_poetry:0 "Écrire des poèmes clichés sur les visages d'idoles"
 RICE_bamian_supported_buddhist_translators:0 "Traducteurs bouddhistes soutenus en Extrême-Orient"
 RICE_bamian_trapusa_and_bhallika_modifier:0 "Inspiré par Trapusa et Bhallika"

 # Decisions
 RICE_bamian_repair_shahr_e_zohak:0 "Réparation de Shahr-e Zohak"
 RICE_bamian_repair_shahr_e_zohak_tooltip:0 "Ces fortifications qui protègent [GetTitleByKey('c_bamian').GetNameNoTier] ont besoin de réparations."
 RICE_bamian_repair_shahr_e_zohak_desc:0 "Shahr-e Zohak, l’une des fortifications les plus impressionnantes du Khorasan, est située à un emplacement stratégique dans la vallée de [GetTitleByKey('c_bamian').GetNameNoTier]. En réparant cette ville forteresse, nous pouvons garantir que cette région restera à l’abri des menaces extérieures et offrir un refuge sûr aux marchands comme aux voyageurs."
 RICE_bamian_repair_shahr_e_zohak_confirm:0 "Envoyez des ressources pour l'effort de réparation !"
 RICE_bamian_repair_shahr_e_zohak_effect_tooltip_1:0 "Vous recevrez du [prestige_i|E][prestige|E] et du [dynasty_prestige_i|E][dynasty_prestige|E] en fonction de ce que vous dépensez pour les réparations."
 RICE_bamian_repair_shahr_e_zohak_effect_tooltip_2:0 "[GetTitleByKey('c_bamian').GetNameNoTier] recevra un [county_modifier|E] #P positif#! augmentant le [fort_level_i|E] [fort_level|E|E], le [development_i|E] [development|E], la taille de la [garrison|E] @garrison_icon! et le [control_i|E] [control|E]."
 RICE_bamian_repair_shahr_e_zohak_effect_tooltip_3:0 "La puissance du [modifier|E] dépend de ce que vous dépensez pour les réparations #weak (Coût minimum : @gold_icon! [EmptyScope.ScriptValue('RICE_misc_horse_sacrifice_cost_minor')])#!"
 RICE_bamian_repair_shahr_e_zohak_context_tooltip:0 "#emphasis Contexte historique :#! Shahr-e Zohak est l'une des plus impressionnantes fortifications jamais construites en Afghanistan ; un érudit l'a même appelée le « Krak afghan des Chevaliers ». Elle a été occupée par des groupes successifs, tels que les Hephthalites, les Ghaznavides, les Ghurides et les Timurides. Zohak est un personnage maléfique de la mythologie persane, et bien que l'on ne sache pas exactement pourquoi la forteresse porte son nom, on dit qu'il est l'ancêtre des Ghurides qui vivent à proximité. Une légende veut que la ville forteresse ait été détruite par Gengis Khan et que tous ses habitants aient été massacrés pour se venger de la mort de son petit-fils lors d'un siège."
 RICE_bamian_shahr_e_zohak_recently_repaired_req:0 "Shahr-e Zohak n'a pas été réparé récemment"

 # EVENTS
 # The great statues of Vairocana and Siddhartha are so awe-inspiring, that even non-believers cannot help but admire them!
 bamian.0000.t:0 "xxxxx"
 bamian.0000.desc:0 "xxxxx"
 bamian.0000.a:0 "xxxxx"
 bamian.0001.t:0 "Les Rois de $c_bamian$"
 bamian.0001.desc:0 "Notre dynastie dirige [GetTitleByKey('c_bamian').GetNameNoTier] depuis des générations. Bien que les suzerains de tout le Khorasan, la dynastie des [caliph.GetHouse.GetName], suivent [islam.GetName], tous les membres de notre famille royale ne se sont pas convertis à leur foi ; certains d’entre nous pratiquent encore [buddhist.GetName], tandis que d’autres se sont convertis, comme mon [ROOT.Char.Custom2('RelationToMeShort', harthamah)], [harthamah.GetFullName], qui a servi comme général et gouverneur au service des califes.​\n\nQuoi qu’il en soit, les califes [caliph.GetHouse.GetNameNoTooltip] sont désormais en déclin. En ces temps incertains, nous devons avancer avec prudence. Même si nous avons combattu avec bravoure sous la bannière des califes et que nous leur causons rarement des ennuis, les ennuis finiront peut‑être par nous atteindre, que nous restions fidèles à nos anciennes traditions ou que nous en embrassions de nouvelles."
 bamian.0001.a:0 "Comme mon père, je servirai loyalement la cour du [caliph.GetHouse.GetNameNoTooltip]."
 bamian.0001.b:0 "Je dois faire attention si je suis la voie de mes ancêtres."
 bamian.0001.c:0 "Ces temps sont incertains. Que [mahayana.HighGodName] nous protège !"
 bamian.0001.d:0 "Je dois être politiquement opportun, mais garder le Dharma dans mon cœur."
 bamian.0001.e:0 "Les paroles du Prophète sont vraies et je dois les écouter."
 bamian.0001.stay_faith:0 "Vous continuez à suivre la [faith|E] [GetPlayer.GetFaith.GetAdjective]"
 bamian.0001.fake_faith:0 "Vous suivrez publiquement [ashari.GetName], mais pratiquerez en secret la [faith|E] [mahayana.GetAdjective]."
