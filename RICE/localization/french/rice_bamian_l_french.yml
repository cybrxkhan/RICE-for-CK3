 bamian.0040.t:0 "Shahr-e Zohak"
 bamian.0040.desc:0 "Sur le côté oriental de la vallée de [GetTitleByKey('c_bamian').GetNameNoTier] se trouve un ancien complexe fortifié. Certains l’appellent #italic Shahr-e Zohak#!, la Cité de #italic Zohak#!.\n\nSelon la légende iranienne, #italic Zohak#! comptait parmi les plus infâmes et cruels rois‑sorciers de l’âge des héros et des mythes. Nul ne sait vraiment pourquoi cette forteresse lui est associée, mais cela suffit à lui donner une aura intimidante.\n\nQuoi qu’il en soit, des rois et seigneurs de guerre successifs n’ont cessé de remettre ce site en état au fil des siècles. Il occupe une position stratégique à l’extrémité orientale de la vallée, d’où l’on peut contrôler aisément le passage des armées et des caravanes. Je dois entreprendre des réparations sur cette forteresse, mais combien suis‑je prêt à dépenser pour ce projet ?"
 bamian.0040.a:0 "De petites réparations suffisent pour l'instant"
 bamian.0040.b:0 "Des réparations moyennes permettront de revigorer cette forteresse."
 bamian.0040.c:0 "D'importants travaux de réparation pour redonner à ce lieu sa splendeur d'antan"
